<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>700S Trainer V7 — Flow Edition</title>
  <meta name="description" content="CRT x ICT Trading Trainer V7 — Apprendre, Pratiquer, Journal" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#000000',
            'ink-2': '#1A1A1A',
            'ink-3': '#666666',
            line: '#E8E8E8',
            hover: '#F0F0F0',
            bg: '#FAFAF7',
            'bg-pure': '#FFFFFF',
            green: '#10B981',
            red: '#EF4444',
            gold: '#D4A853',
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'Georgia', 'serif'],
            ui: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ========================================
       ROOT & PALETTE
       ======================================== */
    :root {
      --bg: #FAFAF7;
      --bg-pure: #FFFFFF;
      --ink: #000000;
      --ink-2: #1A1A1A;
      --ink-3: #666666;
      --line: #E8E8E8;
      --hover: #F0F0F0;
      --accent: #000000;
      --green: #10B981;
      --red: #EF4444;
      --gold: #D4A853;
      --radius: 2px;
      --shadow-subtle: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-elevated: 0 8px 24px rgba(0,0,0,0.08);
      --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       RESET & BASE
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Paper grain texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ========================================
       TYPOGRAPHY
       ======================================== */
    .font-serif {
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .font-mono {
      font-family: 'JetBrains Mono', Consolas, monospace;
    }

    .font-ui {
      font-family: 'Inter', system-ui, sans-serif;
    }

    .tabular {
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    /* Magazine-style dropcap */
    .dropcap::first-letter {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.5em;
      font-weight: 700;
      float: left;
      line-height: 0.8;
      margin-right: 0.08em;
      margin-top: 0.05em;
      color: var(--ink);
    }

    /* Editorial heading styles */
    h1, h2, h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--ink);
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ========================================
       ANIMATIONS
       ======================================== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes progressFill {
      from { width: 0%; }
      to { width: var(--fill, 0%); }
    }

    @keyframes flourish {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-10deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.15) rotate(5deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes flip {
      0% { transform: perspective(600px) rotateY(0deg); }
      50% { transform: perspective(600px) rotateY(90deg); }
      100% { transform: perspective(600px) rotateY(0deg); }
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .animate-fadeUp {
      animation: fadeUp 400ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .animate-flourish {
      animation: flourish 500ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .animate-fadeIn {
      animation: fadeIn 300ms ease forwards;
    }

    .animate-slideDown {
      animation: slideDown 300ms ease forwards;
    }

    .animate-flip {
      animation: flip 600ms ease forwards;
    }

    .animate-pulse-soft {
      animation: pulse-soft 2s ease-in-out infinite;
    }

    .animate-shimmer {
      background: linear-gradient(90deg, var(--line) 25%, var(--hover) 50%, var(--line) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Stagger children */
    .stagger > * {
      opacity: 0;
      animation: fadeUp 400ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .stagger > *:nth-child(1) { animation-delay: 0ms; }
    .stagger > *:nth-child(2) { animation-delay: 60ms; }
    .stagger > *:nth-child(3) { animation-delay: 120ms; }
    .stagger > *:nth-child(4) { animation-delay: 180ms; }
    .stagger > *:nth-child(5) { animation-delay: 240ms; }
    .stagger > *:nth-child(6) { animation-delay: 300ms; }
    .stagger > *:nth-child(7) { animation-delay: 360ms; }
    .stagger > *:nth-child(8) { animation-delay: 420ms; }

    /* Page transitions */
    .page-enter {
      animation: fadeUp 350ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .page-exit {
      animation: fadeUp 200ms cubic-bezier(0.4, 0, 0.2, 1) reverse forwards;
    }

    /* ========================================
       SCROLLBAR
       ======================================== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink-3);
    }

    /* Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    /* ========================================
       CANDLE SVG STYLES
       ======================================== */
    .candle-body {
      stroke-width: 1;
      transition: fill var(--transition);
    }

    .candle-wick {
      stroke-width: 1.5;
      stroke-linecap: round;
    }

    .candle-bullish .candle-body {
      fill: var(--bg-pure);
      stroke: var(--ink);
      stroke-width: 1.5;
    }

    .candle-bullish .candle-wick {
      stroke: var(--ink);
    }

    .candle-bearish .candle-body {
      fill: var(--ink);
      stroke: var(--ink);
    }

    .candle-bearish .candle-wick {
      stroke: var(--ink);
    }

    /* ========================================
       TRADING GRID BACKGROUND
       ======================================== */
    .trading-grid {
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* ========================================
       CHART CONTAINER — VISUAL QUIZ
       ======================================== */
    .chart-container {
      position: relative;
      background: var(--bg-pure);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .chart-container .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 40px 30px;
      pointer-events: none;
    }

    .price-bar {
      transition: opacity var(--transition);
    }

    .price-bar:hover {
      opacity: 0.7;
    }

    .annotation-dot {
      fill: var(--red);
      stroke: var(--bg-pure);
      stroke-width: 2;
      cursor: pointer;
      transition: r var(--transition);
    }

    .annotation-dot:hover {
      r: 7;
    }

    .annotation-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: var(--ink-3);
      pointer-events: none;
    }

    /* ========================================
       DRILL PROGRESS TRACK
       ======================================== */
    .drill-track {
      display: flex;
      gap: 2px;
      height: 6px;
      width: 100%;
      border-radius: 3px;
      overflow: hidden;
    }

    .drill-segment {
      flex: 1;
      background: var(--line);
      transition: background var(--transition);
    }

    .drill-segment.completed {
      background: var(--ink);
    }

    .drill-segment.active {
      background: var(--ink-3);
      animation: pulse-soft 1.5s ease-in-out infinite;
    }

    .drill-segment.correct {
      background: var(--green);
    }

    .drill-segment.wrong {
      background: var(--red);
    }

    /* ========================================
       DIFFICULTY BADGES
       ======================================== */
    .badge-easy {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--hover);
      color: var(--ink-3);
      border: 1px solid var(--line);
    }

    .badge-medium {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #E0E0E0;
      color: var(--ink-2);
      border: 1px solid #CACACA;
    }

    .badge-hard {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--bg-pure);
      border: 1px solid var(--ink);
    }

    /* ========================================
       CARDS
       ======================================== */
    .card {
      background: var(--bg-pure);
      border: 1px solid var(--line);
      padding: 1.5rem;
      transition: all var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-card);
      border-color: #D0D0D0;
    }

    .card-hover {
      background: var(--bg-pure);
      border: 1px solid var(--line);
      padding: 1.5rem;
      transition: all var(--transition);
      cursor: pointer;
    }

    .card-hover:hover {
      box-shadow: var(--shadow-elevated);
      transform: translateY(-3px);
      border-color: #D0D0D0;
    }

    .card-elevated {
      background: var(--bg-pure);
      border: 1px solid var(--line);
      padding: 1.5rem;
      box-shadow: var(--shadow-card);
      transition: all var(--transition);
    }

    .card-stark {
      background: var(--bg-pure);
      border: 1.5px solid var(--ink);
      padding: 1.5rem;
      transition: all var(--transition);
    }

    /* ========================================
       BUTTONS
       ======================================== */
    button, [role="button"] {
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--bg-pure);
      border: 1.5px solid var(--ink);
      padding: 10px 24px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all var(--transition);
    }

    .btn-primary:hover {
      background: var(--ink-2);
      transform: translateY(-1px);
      box-shadow: var(--shadow-card);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 10px 24px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--ink);
      background: var(--hover);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink-3);
      border: none;
      padding: 6px 12px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      transition: all var(--transition);
    }

    .btn-ghost:hover {
      color: var(--ink);
      background: var(--hover);
    }

    /* ========================================
       PROGRESS BARS & GAUGES
       ======================================== */
    .progress-track {
      height: 3px;
      background: var(--line);
      overflow: hidden;
      width: 100%;
    }

    .progress-fill {
      height: 100%;
      background: var(--ink);
      animation: progressFill 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .progress-green .progress-fill {
      background: var(--green);
    }

    .gauge-ring {
      fill: none;
      stroke: var(--line);
      stroke-width: 3;
    }

    .gauge-fill {
      fill: none;
      stroke: var(--ink);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 800ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       TABS — ANIMATED UNDERLINE
       ======================================== */
    .tabs-container {
      position: relative;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--line);
    }

    .tab-item {
      padding: 12px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-3);
      background: none;
      border: none;
      position: relative;
      transition: color var(--transition);
      cursor: pointer;
    }

    .tab-item:hover {
      color: var(--ink);
    }

    .tab-item.active {
      color: var(--ink);
    }

    .tab-underline {
      position: absolute;
      bottom: -1px;
      height: 2px;
      background: var(--ink);
      transition: left 220ms cubic-bezier(0.4, 0, 0.2, 1), width 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       MODAL
       ======================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 200ms ease;
    }

    .modal-content {
      background: var(--bg-pure);
      border: 1px solid var(--line);
      max-width: 640px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: fadeUp 300ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-elevated);
    }

    /* ========================================
       TAGS & BADGES
       ======================================== */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      color: var(--ink-3);
      background: var(--bg);
    }

    .tag-dark {
      background: var(--ink);
      color: var(--bg-pure);
      border-color: var(--ink);
    }

    .tag-green {
      color: var(--green);
      border-color: var(--green);
      background: rgba(16, 185, 129, 0.05);
    }

    .tag-red {
      color: var(--red);
      border-color: var(--red);
      background: rgba(239, 68, 68, 0.05);
    }

    .tag-gold {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(212, 168, 83, 0.08);
    }

    /* ========================================
       INPUTS
       ======================================== */
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      background: var(--bg-pure);
      color: var(--ink);
      outline: none;
      transition: border-color var(--transition);
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--ink);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    /* ========================================
       CHECKBOX CUSTOM
       ======================================== */
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .check-item.checked {
      opacity: 0.5;
    }

    .check-item.checked .check-label {
      text-decoration: line-through;
    }

    .check-box {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all var(--transition);
    }

    .check-box.checked {
      background: var(--ink);
    }

    .check-box.checked svg {
      animation: flourish 400ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ========================================
       DIVIDERS
       ======================================== */
    .divider {
      height: 1px;
      background: var(--line);
      border: none;
      margin: 1.5rem 0;
    }

    .divider-thick {
      height: 2px;
      background: var(--ink);
      border: none;
      margin: 2rem 0;
    }

    /* ========================================
       EDITORIAL QUOTES
       ======================================== */
    .editorial-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.5;
      color: var(--ink-2);
      padding-left: 1.25rem;
      border-left: 2px solid var(--ink);
      margin: 1.5rem 0;
    }

    /* ========================================
       SECTION NUMBERS & OVERLINES
       ======================================== */
    .section-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1;
      color: var(--line);
      user-select: none;
    }

    .overline {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    /* ========================================
       RESPONSIVE
       ======================================== */
    @media (max-width: 768px) {
      .dropcap::first-letter {
        font-size: 2.8em;
      }

      .section-number {
        font-size: 2.5rem;
      }

      .tab-item {
        padding: 10px 12px;
        font-size: 11px;
      }

      .card, .card-hover, .card-elevated, .card-stark {
        padding: 1rem;
      }

      .btn-primary, .btn-secondary {
        padding: 8px 16px;
        font-size: 12px;
      }

      .chart-container {
        min-height: 180px;
      }

      .modal-content {
        width: 95%;
        max-height: 90vh;
      }
    }

    @media (max-width: 480px) {
      .tabs-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .tab-item {
        padding: 8px 10px;
        font-size: 10px;
        white-space: nowrap;
      }
    }

    /* ========================================
       MOBILE RESPONSIVE
       ======================================== */

    /* TopBar mobile: scrollable tabs, compact layout */
    @media (max-width: 768px) {
      .topbar-inner {
        padding-left: 12px !important;
        padding-right: 12px !important;
      }
      .topbar-nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
        gap: 0 !important;
      }
      .topbar-nav::-webkit-scrollbar { display: none; }
      .topbar-nav button {
        padding: 8px 10px !important;
        font-size: 12px !important;

e prix marque une evolution vers une comprehension plus profonde de la logique algorithmique. L'i"},{"id":"live_088_2025-09-03","t":"Live Session Technique - Attente de Marche et Observation Post-Chapitre 19","d":"3 septembre 2025","dur":"~45 min","a":"DXY, EUR/USD, NQ, BTC, XAU","r":"Ce live est une session technique particuliere ou 700S attend longuement l'ouverture des marches et les conditions favorables pour analyser. La quasi-totalite de la session est composee d'attente musicale, avec tres peu de contenu verbal. Cette session se situe chronologiquement juste apres la publication du chapitre 19 sur la Quarterly Theory (video_2025-08-07_587) et les premiers lives d'applica","nc":5,"nr":0,"ns":3,"nq":5,"doc":"Cette session, bien que minimale en contenu explicite, s'inscrit dans un moment doctrinal important. Elle se situe entre la publication du chapitre 19 (7 aout) et les premiers lives d'application intensive (live_081, live_085). C'est une periode de t"},{"id":"live_089_2025-09-05","t":"Live 089 - Psychologie et Strategies Mecaniques : Pourquoi 99% Perdent","d":"5 septembre 2025","dur":"~1h05","a":"DXY, EURUSD, GBPUSD, NQ, BTC, XAU","r":"Ce live est un des plus pedagogiques du corpus, melant analyse technique et lecons profondes sur la psychologie du trading. 700S utilise des exemples concrets sur NQ pour montrer comment les strategies mecaniques (flags, supports/resistances, channels) creent de la liquidite pour les market makers. Il detaille le processus psychologique des traders perdants : surconfiance dans un pattern mecanique","nc":7,"nr":7,"ns":4,"nq":5,"doc":"Le live 089 est un moment charniere dans la doctrine car il articule explicitement pourquoi le systeme CRT x ICT est different des approches mecaniques. Ce n'est pas juste une affirmation (\"notre methode est meilleure\") mais une demonstration par l'a"},{"id":"live_090_2025-09-07","t":"Live 090 - Order Flow et DOL : Decomposition Yearly, CRT 6 mois et NQ bearish","d":"7 septembre 2025","dur":"~2h
