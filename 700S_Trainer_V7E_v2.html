  const today = getDayKey();
  const routine = getState().mentorDailyRoutine || {};
  const todayRoutine = routine[today] || { warmup: false, drills: false, sim: false, review: false };

  const toggleStep = (step) => {
    const newRoutine = { ...routine };
    newRoutine[today] = { ...todayRoutine, [step]: !todayRoutine[step] };
    setState({ mentorDailyRoutine: newRoutine });
  };

  const prof = PROFILE_TYPES[profileKey];
  const focusMsg = prof ? `Focus du jour : ${prof.focus[Math.floor(Math.random() * prof.focus.length)]}` : '';

  const steps = [
    { key: 'warmup', label: 'Warm-up mental', desc: '2 min respiration + intention', time: '2 min' },
    { key: 'drills', label: 'Drills adaptatifs', desc: '10 exercices minimum', time: '15 min', action: onStartDrills },
    { key: 'sim', label: 'Simulation mentorée', desc: '1 trade complet avec coaching', time: '10 min', action: onStartSim },
    { key: 'review', label: 'Review & Journal', desc: 'Analyse de la session', time: '5 min' }
  ];

  const completed = Object.values(todayRoutine).filter(Boolean).length;

  return (
    <div className="bg-white border border-gray-200 rounded-sm p-5">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="text-sm font-medium text-gray-700">Routine du jour</h3>
          {focusMsg && <p className="text-xs text-gray-400 mt-0.5 italic">{focusMsg}</p>}
        </div>
        <div className="text-xs font-mono text-gray-400">{completed}/4</div>
      </div>

      <div className="space-y-2">
        {steps.map(s => (
          <div key={s.key}
            className={`flex items-center gap-3 p-3 rounded-sm border transition-all duration-200 ${
              todayRoutine[s.key] ? 'border-green-200 bg-green-50' : 'border-gray-100 hover:border-gray-300'
            }`}>
            <button onClick={() => toggleStep(s.key)}
              className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${
                todayRoutine[s.key] ? 'border-green-500 bg-green-500' : 'border-gray-300'
              }`}>
              {todayRoutine[s.key] && <span className="text-white text-xs">✓</span>}
            </button>
            <div className="flex-1">
              <div className="text-sm text-gray-700">{s.label}</div>
              <div className="text-xs text-gray-400">{s.desc}</div>
            </div>
            <span className="text-xs text-gray-300">{s.time}</span>
            {s.action && !todayRoutine[s.key] && (
              <button onClick={s.action}
                className="text-xs px-2 py-1 bg-black text-white rounded-sm hover:bg-gray-800 transition-colors">
                GO
              </button>
            )}
          </div>
        ))}
      </div>

      {completed === 4 && (
        <div className="mt-3 text-center text-xs text-green-600 py-2 bg-green-50 rounded-sm">
          Routine complete ! Bravo !
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// ADAPTIVE DRILL SESSION
// ══════════════════════════════════════════════════════
function AdaptiveDrillSession({ profileKey, catScores, diffLevel, onComplete, onBack }) {
  const allDrills = useMemo(() => safeDrills(), []);
  const [currentDrill, setCurrentDrill] = useState(null);
  const [selectedChoice, setSelectedChoice] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [sessionStats, setSessionStats] = useState({ total: 0, correct: 0, startTime: Date.now() });
  const [sessionHistory, setSessionHistory] = useState([]);
  const [consecutiveRight, setConsecutiveRight] = useState(0);
  const [consecutiveWrong, setConsecutiveWrong] = useState(0);
  const [toast, setToast] = useState(null);
  const [questionStartTime, setQuestionStartTime] = useState(Date.now());
  const [difficulty, setDifficulty] = useState(diffLevel);

  const pickNextDrill = useCallback(() => {
    const drill = selectDrillByWeakness(allDrills, catScores, profileKey, difficulty);
    setCurrentDrill(drill);
    setSelectedChoice(null);
    setShowFeedback(false);
    setQuestionStartTime(Date.now());
  }, [allDrills, catScores, profileKey, difficulty]);

  useEffect(() => {
    pickNextDrill();
  }, []);

  const handleAnswer = useCallback((idx) => {
    if (selectedChoice !== null) return;
    setSelectedChoice(idx);
    setShowFeedback(true);

    const choice = currentDrill.choices[idx];
    const isCorrect = choice.correct;
    const answerTime = (Date.now() - questionStartTime) / 1000;

    const newTotal = sessionStats.total + 1;
    const newCorrect = sessionStats.correct + (isCorrect ? 1 : 0);

    setSessionStats({ ...sessionStats, total: newTotal, correct: newCorrect });

    const histEntry = {
      drillId: currentDrill.id,
      cat: currentDrill.conceptCat || categorize(currentDrill.concept, ''),
      correct: isCorrect,
      time: answerTime,
      ts: Date.now()
    };
    const newHistory = [...sessionHistory, histEntry];
    setSessionHistory(newHistory);

    // Update global state
    const prevHistory = getState().mentorDrillHistory || [];
    const updatedHistory = [...prevHistory, histEntry];
    const newScores = computeCatScores(updatedHistory);
    const newDiff = computeDifficulty(updatedHistory, difficulty);

    setState({
      mentorDrillHistory: updatedHistory,
      mentorCatScores: newScores,
      mentorDifficultyLevel: newDiff,
      mentorTotalDrills: (getState().mentorTotalDrills || 0) + 1,
      mentorTotalCorrect: (getState().mentorTotalCorrect || 0) + (isCorrect ? 1 : 0),
      mentorStreakCurrent: isCorrect ? (getState().mentorStreakCurrent || 0) + 1 : 0,
      mentorStreakBest: Math.max(getState().mentorStreakBest || 0, isCorrect ? (getState().mentorStreakCurrent || 0) + 1 : 0)
    });

    setDifficulty(newDiff);

    // Streaks and coaching
    if (isCorrect) {
      setConsecutiveRight(prev => prev + 1);
      setConsecutiveWrong(0);
    } else {
      setConsecutiveWrong(prev => prev + 1);
      setConsecutiveRight(0);
    }

    const coachMsg = getCoachingMessage({
      consecutiveWrong: isCorrect ? 0 : consecutiveWrong + 1,
      consecutiveRight: isCorrect ? consecutiveRight + 1 : 0,
      answerTime,
      profile: profileKey,
      skipPattern: null,
      totalToday: newTotal
    });

    if (coachMsg) {
      setTimeout(() => setToast(coachMsg), 600);
    }
  }, [selectedChoice, currentDrill, questionStartTime, sessionStats, sessionHistory, difficulty, consecutiveRight, consecutiveWrong, profileKey, catScores]);

  const handleNext = useCallback(() => {
    pickNextDrill();
  }, [pickNextDrill]);

  const handleEndSession = useCallback(() => {
    // Log session
    const sessions = getState().mentorSessionLog || [];
    sessions.push({
      date: getDayKey(),
      total: sessionStats.total,
      correct: sessionStats.correct,
      duration: Math.round((Date.now() - sessionStats.startTime) / 1000),
      avgTime: sessionHistory.length > 0 ? Math.round(sessionHistory.reduce((s, h) => s + h.time, 0) / sessionHistory.length) : 0
    });
    setState({ mentorSessionLog: sessions });
    onComplete(sessionStats);
  }, [sessionStats, sessionHistory, onComplete]);

  if (!currentDrill) {
    return <div className="text-center text-gray-400 py-12">Chargement...</div>;
  }

  const accuracy = sessionStats.total > 0 ? Math.round((sessionStats.correct / sessionStats.total) * 100) : 0;

  return (
    <div>
      {toast && <CoachingToast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}

      {/* Session header */}
      <div className="flex items-center justify-between mb-6">
        <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-600 transition-colors">
          ← Retour
        </button>
        <div className="flex items-center gap-4">
          <DifficultyIndicator level={difficulty} />
          <div className="text-sm text-gray-500">
            <span className="font-mono">{sessionStats.correct}</span>
            <span className="text-gray-300">/{sessionStats.total}</span>
            <span className="ml-2 text-xs">({accuracy}%)</span>
          </div>
        </div>
        {sessionStats.total >= 3 && (
          <button onClick={handleEndSession}
            className="text-sm px-3 py-1 border border-gray-200 rounded-sm hover:bg-gray-50 text-gray-600 transition-colors">
            Terminer
          </button>
        )}
      </div>

      {/* Streak indicator */}
      {(consecutiveRight >= 2 || consecutiveWrong >= 2) && (
        <div className={`text-center text-xs mb-4 py-1.5 rounded-sm ${
          consecutiveRight >= 2 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'
        }`}>
          {consecutiveRight >= 2 ? `Serie de ${consecutiveRight} bonnes reponses` : `Serie de ${consecutiveWrong} erreurs — ralentis`}
        </div>
      )}

      {/* Drill card */}
      <FadeIn k={currentDrill.id + '-' + sessionStats.total}>
        <div className="bg-white border border-gray-200 rounded-sm overflow-hidden">
          {/* Category + concept */}
          <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
            <div>
              <span className="text-xs text-gray-400 uppercase tracking-wider">
                {MENTOR_CATEGORIES.find(c => c.key === (currentDrill.conceptCat || ''))?.label || currentDrill.conceptCat || 'Concept'}
              </span>
              <span className="text-xs text-gray-300 mx-2">·</span>
              <span className="text-xs text-gray-600">{currentDrill.concept}</span>
            </div>
            <span className="text-xs font-mono text-gray-300">#{sessionStats.total + 1}</span>
          </div>

          {/* Chart */}
          {currentDrill.chart && currentDrill.chart.candles && (
            <div className="px-5 py-4 border-b border-gray-100 bg-gray-50">
              <CandleChart
                candles={currentDrill.chart.candles}
                annotations={currentDrill.chart.annotations || []}
                width={560}
                height={220}
              />
            </div>
          )}

          {/* Question */}
          <div className="px-5 py-4">
            <p className="text-sm text-black font-medium mb-4 leading-relaxed">{currentDrill.question}</p>

            <div className="space-y-2">
              {currentDrill.choices.map((c, i) => {
                let btnClass = 'border-gray-200 text-gray-700 hover:border-gray-400 hover:bg-gray-50';
                if (showFeedback) {
                  if (c.correct) {
                    btnClass = 'border-green-500 bg-green-50 text-green-800';
                  } else if (i === selectedChoice && !c.correct) {
                    btnClass = 'border-red-400 bg-red-50 text-red-700';
                  } else {
                    btnClass = 'border-gray-100 text-gray-300';
                  }
                }

                return (
                  <button key={i}
                    onClick={() => handleAnswer(i)}
                    disabled={showFeedback}
                    className={`w-full text-left p-3 border rounded-sm text-sm transition-all duration-200 ${btnClass}`}>
                    {c.text}
                    {showFeedback && c.correct && <span className="ml-2 text-green-600">✓</span>}
                    {showFeedback && i === selectedChoice && !c.correct && <span className="ml-2 text-red-500">✗</span>}
                  </button>
                );
              })}
            </div>

            {/* Feedback section */}
            {showFeedback && currentDrill.explanation && (
              <div className="mt-4 p-4 bg-gray-50 border border-gray-200 rounded-sm">
                <p className="text-xs text-gray-500 uppercase tracking-wider mb-2">Explication</p>
                <p className="text-sm text-gray-700 leading-relaxed">{currentDrill.explanation}</p>
              </div>
            )}

            {showFeedback && (
              <button onClick={handleNext}
                className="mt-4 w-full py-3 bg-black text-white text-sm rounded-sm hover:bg-gray-900 transition-colors">
                Question suivante →
              </button>
            )}
          </div>
        </div>
      </FadeIn>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MENTORED SIMULATION
// ══════════════════════════════════════════════════════
function MentoredSimulation({ onComplete, onBack }) {
  const [phase, setPhase] = useState('intro');
  const [scenario, setScenario] = useState(null);
  const [currentTF, setCurrentTF] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [showResult, setShowResult] = useState(false);

  const tfs = ['htf', 'mtf', 'ltf', 'entry'];
  const tfLabels = { htf: 'D1 — Vision HTF', mtf: 'H4 — Structure', ltf: 'M15 — Trigger', entry: 'M5 — Execution' };

  const questions = [
    { phase: 'htf', q: "Sur le D1, quelle est la tendance ? Quelle est ta narrative ?",
      choices: [
        { text: "Tendance haussiere — je cherche des longs", correct: true },
        { text: "Pas de tendance — je ne trade pas", correct: false },
        { text: "Range — je trade les bornes", correct: false }
      ]
    },
    { phase: 'mtf', q: "Sur le H4, ou est la zone d'interet ? Que cherches-tu ?",
      choices: [
        { text: "OB / FVG comme zone de pullback pour entrer dans le trend", correct: true },
        { text: "Un breakout pour confirmer la tendance", correct: false },
        { text: "Un pattern de chandelier pour entrer", correct: false }
      ]
    },
    { phase: 'ltf', q: "Sur le M15, quelle manipulation vois-tu ? Quel est le signal ?",
      choices: [
        { text: "Sweep de liquidite + MSS = signal de retournement", correct: true },
        { text: "Double bottom = signal d'achat classique", correct: false },
        { text: "RSI en survente = il faut acheter", correct: false }
      ]
    },
    { phase: 'entry', q: "Sur le M5, comment entres-tu ? SL et TP ?",
      choices: [
        { text: "Entree sur FVG apres MSS, SL sous le sweep, TP au DOL (RR > 2:1)", correct: true },
        { text: "Ordre limite au plus bas, SL 10 pips, TP ouvert", correct: false },
        { text: "Entree au marche immediatement, on verra pour le SL", correct: false }
      ]
    }
  ];

  const startSim = useCallback(() => {
    const types = ['bullish_crt', 'bearish_crt', 'turtle_soup', 'ob_entry', 'fvg_fill', 'no_trade'];
    const type = types[Math.floor(Math.random() * types.length)];
    const sc = generateMTFScenario('crt', type, 2);
    setScenario(sc);
    setPhase('htf');
    setCurrentTF(0);
    setAnswers([]);
    setShowResult(false);
  }, []);

  const handleAnswer = useCallback((idx) => {
    const q = questions[currentTF];
    const isCorrect = q.choices[idx].correct;
    const newAnswers = [...answers, { phase: q.phase, correct: isCorrect, choice: idx }];
    setAnswers(newAnswers);

    setTimeout(() => {
      if (currentTF < 3) {
        setCurrentTF(currentTF + 1);
        setPhase(tfs[currentTF + 1]);
      } else {
        setShowResult(true);
      }
    }, 800);
  }, [currentTF, answers, questions, tfs]);

  if (phase === 'intro') {
    return (
      <div>
        <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-600 mb-6">← Retour</button>
        <div className="text-center mb-8">
          <h2 className="font-serif text-2xl text-black mb-2">Simulation Mentoree</h2>
          <p className="text-sm text-gray-500 max-w-md mx-auto">
            On va derouler un trade complet ensemble, du D1 au M5. A chaque timeframe, tu dois analyser et decider.
          </p>
        </div>
        <button onClick={startSim}
          className="w-full py-4 bg-black text-white text-sm rounded-sm hover:bg-gray-900 transition-colors">
          Commencer la simulation
        </button>
      </div>
    );
  }

  if (showResult) {
    const correct = answers.filter(a => a.correct).length;
    const total = answers.length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

    return (
      <div>
        <div className="text-center mb-8">
          <h2 className="font-serif text-2xl text-black mb-2">Resultat</h2>
          <div className="font-serif text-4xl" style={{ color: pct >= 75 ? '#10B981' : pct >= 50 ? '#D4A853' : '#EF4444' }}>
            {pct}%
          </div>
          <p className="text-sm text-gray-500 mt-2">{correct}/{total} bonnes reponses</p>
        </div>

        {scenario && (
          <div className="bg-white border border-gray-200 rounded-sm p-4 mb-6">
            <div className="text-xs text-gray-400 uppercase mb-2">Resume du scenario</div>
            <div className="text-sm text-gray-600 space-y-2">
              <p><strong>Type :</strong> {scenario.type}</p>
              <p><strong>Asset :</strong> {scenario.asset}</p>
            </div>
          </div>
        )}

        <div className="flex gap-3">
          <button onClick={startSim}
            className="flex-1 py-3 border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 rounded-sm">
            Nouvelle simulation
          </button>
          <button onClick={() => onComplete({ correct, total })}
            className="flex-1 py-3 bg-black text-white text-sm hover:bg-gray-900 rounded-sm">
            Terminer
          </button>
        </div>
      </div>
    );
  }

  const q = questions[currentTF];
  const tfKey = tfs[currentTF];
  const tfData = scenario ? scenario[tfKey] : null;

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-600">← Retour</button>
        <div className="flex gap-1">
          {tfs.map((tf, i) => (
            <div key={tf} className={`w-8 h-1 rounded-full ${
              i < currentTF ? 'bg-green-500' : i === currentTF ? 'bg-black' : 'bg-gray-200'
            }`} />
          ))}
        </div>
      </div>

      <div className="text-center mb-4">
        <div className="text-xs text-gray-400 uppercase tracking-wider">{tfLabels[tfKey]}</div>
      </div>

      {/* Chart */}
      {tfData && (
        <div className="mb-4">
          <div className="mtf-narrative">{tfData.narrative}</div>
          <CandleChart
            candles={tfData.candles}
            annotations={tfData.annotations || []}
            width={560}
            height={250}
            tf={tfData.tf}
            asset={scenario?.asset}
          />
        </div>
      )}

      {/* Question */}
      <div className="bg-white border border-gray-200 rounded-sm p-5">
        <p className="text-sm text-black font-medium mb-4">{q.q}</p>
        <div className="space-y-2">
          {q.choices.map((c, i) => {
            const answered = answers.length > currentTF;
            const chosen = answered ? answers[currentTF]?.choice === i : false;
            let cls = 'border-gray-200 text-gray-700 hover:border-gray-400';
            if (answered) {
              if (c.correct) cls = 'border-green-500 bg-green-50 text-green-800';
              else if (chosen) cls = 'border-red-400 bg-red-50 text-red-700';
              else cls = 'border-gray-100 text-gray-300';
            }
            return (
              <button key={i} onClick={() => !answered && handleAnswer(i)} disabled={answered}
                className={`w-full text-left p-3 border rounded-sm text-sm transition-all ${cls}`}>
                {c.text}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MULTI-TIMEFRAME CHART COMPONENT
// ══════════════════════════════════════════════════════
function MultiTFChart({ scenario, showAnnotations = true, compact = false }) {
  if (!scenario) {
    return <div className="text-center text-gray-400 py-8 text-sm">Aucun scenario genere</div>;
  }

  const tfs = [
    { key: 'htf', zoomTo: 'mtf' },
    { key: 'mtf', zoomTo: 'ltf' },
    { key: 'ltf', zoomTo: 'entry' },
    { key: 'entry', zoomTo: null }
  ];

  const chartW = compact ? 340 : 420;
  const chartH = compact ? 180 : 220;

  return (
    <div className="mtf-grid">
      {tfs.map(({ key, zoomTo }, idx) => {
        const data = scenario[key];
        if (!data) return null;

        return (
          <div key={key} className="mtf-panel">
            {/* Header */}
            <div className="mtf-panel-header">
              <span className="mtf-tf-badge">{data.tf}</span>
              <span className="text-xs text-gray-400">{scenario.asset || ''}</span>
              {zoomTo && scenario[zoomTo] && (
                <span className="mtf-zoom-badge">→ {scenario[zoomTo].tf}</span>
              )}
            </div>

            {/* Narrative */}
            <div className="mtf-narrative">{data.narrative}</div>

            {/* Chart */}
            <div className="p-2 relative">
              <CandleChart
                candles={data.candles}
                annotations={showAnnotations ? (data.annotations || []) : []}
                width={chartW}
                height={chartH}
                tf={data.tf}
                asset={scenario.asset}
                zoomStart={zoomTo && data.zoomStart != null ? data.zoomStart : undefined}
                zoomEnd={zoomTo && data.zoomEnd != null ? data.zoomEnd : undefined}
              />
            </div>

            {/* Annotations legend */}
            {showAnnotations && data.annotations && data.annotations.length > 0 && (
              <div className="mtf-annotations-legend">
                {data.annotations.filter(a => a.text).slice(0, 4).map((ann, ai) => (
                  <span key={ai} className="mtf-legend-item">
                    <span className="mtf-legend-dot" style={{ backgroundColor: ann.color || '#000' }} />
                    {ann.text}
                  </span>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MTF DRILL MODE
// ══════════════════════════════════════════════════════
function MTFDrillMode({ onBack, profileKey, catScores, diffLevel }) {
  const [scenario, setScenario] = useState(null);
  const [selectedSetup, setSelectedSetup] = useState(null);
  const [showAnnotations, setShowAnnotations] = useState(true);
  const [answered, setAnswered] = useState(false);
  const [selectedChoice, setSelectedChoice] = useState(null);
  const [stats, setStats] = useState({ total: 0, correct: 0 });
  const [toast, setToast] = useState(null);

  const generateNew = useCallback((setupType) => {
    const type = setupType || MTF_SCENARIO_TYPES[Math.floor(Math.random() * MTF_SCENARIO_TYPES.length)].key;
    const sc = generateMTFScenario('crt', type, diffLevel || 2);
    setScenario(sc);
    setSelectedSetup(type);
    setAnswered(false);
    setSelectedChoice(null);
  }, [diffLevel]);

  useEffect(() => {
    generateNew();
  }, []);

  const handleAnswer = useCallback((idx) => {
    if (answered) return;
    setSelectedChoice(idx);
    setAnswered(true);

    const isCorrect = scenario.choices[idx].correct;
    const newStats = { total: stats.total + 1, correct: stats.correct + (isCorrect ? 1 : 0) };
    setStats(newStats);

    // Record in mentor history
    const cat = MTF_SCENARIO_TYPES.find(t => t.key === scenario.type)?.category || 'crt';
    const histEntry = {
      drillId: 'mtf_' + Date.now(),
      cat,
      correct: isCorrect,
      time: 0,
      ts: Date.now()
    };
    const prevHistory = getState().mentorDrillHistory || [];
    const updatedHistory = [...prevHistory, histEntry];
    const newScores = computeCatScores(updatedHistory);

    setState({
      mentorDrillHistory: updatedHistory,
      mentorCatScores: newScores,
      mentorTotalDrills: (getState().mentorTotalDrills || 0) + 1,
      mentorTotalCorrect: (getState().mentorTotalCorrect || 0) + (isCorrect ? 1 : 0),
      mentorStreakCurrent: isCorrect ? (getState().mentorStreakCurrent || 0) + 1 : 0,
      mentorStreakBest: Math.max(getState().mentorStreakBest || 0, isCorrect ? (getState().mentorStreakCurrent || 0) + 1 : 0)
    });

    if (isCorrect) {
      setToast({ message: 'Correct ! Tu maitrises le Multi-TF.', type: 'success' });
    } else {
      setToast({ message: 'Pas tout a fait. Relis les narratives de chaque TF.', type: 'warning' });
    }
  }, [answered, scenario, stats]);

  if (!scenario) {
    return <div className="text-center text-gray-400 py-12">Generation du scenario...</div>;
  }

  const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;

  return (
    <div className="max-w-4xl mx-auto py-4">
      {toast && <CoachingToast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}

      {/* Header */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-600">← Retour</button>
        <div className="flex items-center gap-3">
          <div className="text-sm text-gray-500 font-mono">{stats.correct}/{stats.total} ({accuracy}%)</div>
          <button onClick={() => setShowAnnotations(!showAnnotations)}
            className="text-xs px-2 py-1 border border-gray-200 rounded-sm hover:bg-gray-50 text-gray-500">
            {showAnnotations ? 'Masquer annotations' : 'Afficher annotations'}
          </button>
        </div>
      </div>

      {/* Scenario type selector */}
      <div className="flex flex-wrap gap-2 mb-4">
        {MTF_SCENARIO_TYPES.map(t => (
          <button key={t.key} onClick={() => generateNew(t.key)}
            className={`px-3 py-1.5 text-xs border rounded-sm transition-all ${
              selectedSetup === t.key ? 'border-black bg-black text-white' : 'border-gray-200 text-gray-600 hover:border-gray-400'
            }`}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Title */}
      <div className="mb-4">
        <h2 className="font-serif text-xl text-black">
          Analyse Multi-TF : {MTF_SCENARIO_TYPES.find(t => t.key === scenario.type)?.label || scenario.type}
        </h2>
        <p className="text-xs text-gray-400 mt-1">{scenario.asset} — Lis chaque timeframe de gauche a droite, de haut en bas</p>
      </div>

      {/* MTF Charts */}
      <MultiTFChart scenario={scenario} showAnnotations={showAnnotations} />

      {/* Question */}
      <div className="mt-6 bg-white border border-gray-200 rounded-sm p-5">
        <p className="text-sm text-black font-medium mb-4">{scenario.question}</p>
        <div className="space-y-2">
          {scenario.choices.map((c, i) => {
            let cls = 'border-gray-200 text-gray-700 hover:border-gray-400 hover:bg-gray-50';
            if (answered) {
              if (c.correct) cls = 'border-green-500 bg-green-50 text-green-800';
              else if (i === selectedChoice && !c.correct) cls = 'border-red-400 bg-red-50 text-red-700';
              else cls = 'border-gray-100 text-gray-300';
            }
            return (
              <button key={i} onClick={() => handleAnswer(i)} disabled={answered}
                className={`w-full text-left p-3 border rounded-sm text-sm transition-all ${cls}`}>
                {c.text}
                {answered && c.correct && <span className="ml-2 text-green-600">✓</span>}
                {answered && i === selectedChoice && !c.correct && <span className="ml-2 text-red-500">✗</span>}
              </button>
            );
          })}
        </div>

        {answered && scenario.correctExplanation && (
          <div className="mt-4 p-4 bg-gray-50 border border-gray-200 rounded-sm">
            <p className="text-xs text-gray-400 uppercase tracking-wider mb-2">Explication du Mentor</p>
            <p className="text-sm text-gray-700 leading-relaxed">{scenario.correctExplanation}</p>
          </div>
        )}

        {answered && (
          <button onClick={() => generateNew()}
            className="mt-4 w-full py-3 bg-black text-white text-sm rounded-sm hover:bg-gray-900 transition-colors">
            Prochain scenario →
          </button>
        )}
      </div>
    </div>
  );
}

// TRADEZELLA IMPORT COMPONENT
// ══════════════════════════════════════════════════════
function TradezellaImport({ onImportComplete }) {
  const [dragActive, setDragActive] = useState(false);
  const [parsedTrades, setParsedTrades] = useState(null);
  const [error, setError] = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);

  const handleFile = useCallback((file) => {
    if (!file) return;
    setError(null);

    if (!file.name.endsWith('.csv')) {
      setError('Seuls les fichiers CSV sont acceptes.');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const trades = parseTradezellaCsv(text);
        if (trades.length === 0) {
          setError('Aucun trade trouve dans le fichier. Verifie le format CSV.');
          return;
        }
        setParsedTrades(trades);
      } catch (err) {
        setError('Erreur de parsing : ' + (err.message || 'Format invalide'));
      }
    };
    reader.readAsText(file);
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragActive(false);
    const file = e.dataTransfer.files[0];
    handleFile(file);
  }, [handleFile]);

  const handleDragOver = useCallback((e) => {
    e.preventDefault();
    setDragActive(true);
  }, []);

  const handleDragLeave = useCallback(() => {
    setDragActive(false);
  }, []);

  const handleFileInput = useCallback((e) => {
    handleFile(e.target.files[0]);
  }, [handleFile]);

  const confirmImport = useCallback(() => {
    if (!parsedTrades || parsedTrades.length === 0) return;
    setImporting(true);

    const existing = getState().tradezellaImports || [];
    const newImports = [...existing, ...parsedTrades];
    setState({ tradezellaImports: newImports });

    setTimeout(() => {
      setImporting(false);
      if (onImportComplete) onImportComplete(parsedTrades.length);
      setParsedTrades(null);
    }, 500);
  }, [parsedTrades, onImportComplete]);

  return (
    <div>
      {/* Dropzone */}
      {!parsedTrades && (
        <div
          className={`tz-dropzone ${dragActive ? 'tz-drag-active' : ''}`}
          onDrop={handleDrop}
          onDragOver={handleDragOver}
          onDragLeave={handleDragLeave}
          onClick={() => fileRef.current?.click()}
        >
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFileInput} className="hidden" />
          <div className="text-3xl text-gray-300 mb-3">↑</div>
          <div className="text-sm text-gray-500 mb-1">Glisse ton fichier CSV ici</div>
          <div className="text-xs text-gray-400">ou clique pour selectionner</div>
          <div className="mt-3 flex items-center justify-center gap-2">
            <span className="tz-badge">TZ</span>
            <span className="text-xs text-gray-400">Tradezella Export</span>
          </div>
        </div>
      )}

      {error && (
        <div className="mt-3 p-3 bg-red-50 border border-red-200 rounded-sm text-sm text-red-600">{error}</div>
      )}

      {/* Preview */}
      {parsedTrades && parsedTrades.length > 0 && (
        <div className="mt-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-sm text-gray-700">
              <span className="font-mono font-medium">{parsedTrades.length}</span> trades detectes
            </div>
            <button onClick={() => setParsedTrades(null)} className="text-xs text-gray-400 hover:text-gray-600">Annuler</button>
          </div>

          <div className="overflow-x-auto border border-gray-200 rounded-sm mb-4" style={{ maxHeight: '300px' }}>
            <table className="tz-preview-table">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Side</th>
                  <th>Entry</th>
                  <th>Exit</th>
                  <th>PnL</th>
                  <th>Setup</th>
                </tr>
              </thead>
              <tbody>
                {parsedTrades.slice(0, 20).map((t, i) => (
                  <tr key={i}>
                    <td>{t.symbol}</td>
                    <td className={t.side === 'long' ? 'text-green-600' : 'text-red-500'}>{t.side}</td>
                    <td>{t.entryPrice ? t.entryPrice.toFixed(4) : '-'}</td>
                    <td>{t.exitPrice ? t.exitPrice.toFixed(4) : '-'}</td>
                    <td className={t.pnl >= 0 ? 'text-green-600' : 'text-red-500'}>
                      {t.pnl >= 0 ? '+' : ''}{t.pnl.toFixed(2)}
                    </td>
                    <td className="text-gray-500">{t.setup || '-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {parsedTrades.length > 20 && (
              <div className="text-center text-xs text-gray-400 py-2">
                ... et {parsedTrades.length - 20} autres trades
              </div>
            )}
          </div>

          <button onClick={confirmImport} disabled={importing}
            className="w-full py-3 bg-black text-white text-sm rounded-sm hover:bg-gray-900 transition-colors disabled:opacity-50">
            {importing ? 'Import en cours...' : `Importer ${parsedTrades.length} trades`}
          </button>
        </div>
      )}
    </div>
  );
}

// PROGRESS CURVES
// ══════════════════════════════════════════════════════
function ProgressCurves() {
  const history = getState().mentorDrillHistory || [];
  const sessions = getState().mentorSessionLog || [];

  // Build accuracy over time (per 10 drills)
  const accuracyData = [];
  for (let i = 0; i < history.length; i += 10) {
    const chunk = history.slice(i, i + 10);
    const correct = chunk.filter(h => h.correct).length;
    accuracyData.push({ value: Math.round((correct / chunk.length) * 100), label: `${i + 1}-${Math.min(i + 10, history.length)}` });
  }

  // Build category progress
  const catProgressData = {};
  MENTOR_CATEGORIES.forEach(cat => {
    const catItems = history.filter(h => h.cat === cat.key);
    const points = [];
    for (let i = 0; i < catItems.length; i += 5) {
      const chunk = catItems.slice(i, i + 5);
      const correct = chunk.filter(h => h.correct).length;
      points.push({ value: Math.round((correct / chunk.length) * 100) });
    }
    if (points.length >= 2) catProgressData[cat.key] = points;
  });

  // Session history
  const sessionData = sessions.map(s => ({
    value: s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0,
    label: s.date
  }));

  return (
    <div>
      <h2 className="font-serif text-2xl text-black mb-6">Courbes de Progression</h2>

      {accuracyData.length >= 2 ? (
        <div className="bg-white border border-gray-200 rounded-sm p-4 mb-6">
          <div className="text-xs text-gray-400 uppercase tracking-wider mb-3">Precision globale</div>
          <ProgressLineChart data={accuracyData} width={520} height={180} color="#D4A853" label="Precision %" />
        </div>
      ) : (
        <div className="bg-white border border-gray-200 rounded-sm p-4 mb-6 text-center text-gray-400 text-sm">
          Continue a t'entrainer pour voir ta courbe de progression (minimum 20 drills)
        </div>
      )}

      {sessionData.length >= 2 && (
        <div className="bg-white border border-gray-200 rounded-sm p-4 mb-6">
          <div className="text-xs text-gray-400 uppercase tracking-wider mb-3">Precision par session</div>
          <ProgressLineChart data={sessionData} width={520} height={160} color="#10B981" label="Par session" />
        </div>
      )}

      {/* Category breakdowns */}
      {Object.keys(catProgressData).length > 0 && (
        <div className="bg-white border border-gray-200 rounded-sm p-4">
          <div className="text-xs text-gray-400 uppercase tracking-wider mb-3">Progression par categorie</div>
          <div className="space-y-4">
            {Object.entries(catProgressData).map(([catKey, points]) => {
              const cat = MENTOR_CATEGORIES.find(c => c.key === catKey);
              return (
                <div key={catKey}>
                  <div className="text-xs text-gray-600 mb-1">{cat?.label || catKey}</div>
                  <ProgressLineChart data={points} width={480} height={100} color="#666" />
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

      {plan.focusAreas && (
        <div className="mt-6 bg-gray-50 border border-gray-200 rounded-sm p-4">
          <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Focus de la semaine</div>
          <div className="flex flex-wrap gap-2">
            {plan.focusAreas.map((area, i) => (
              <span key={i} className="px-3 py-1 bg-white border border-gray-200 text-xs text-gray-700 rounded-sm">
                {area}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Trades Ledger ────────────────────────────────────
function TradesLedger() {
  const [trades, setTrades] = useState(() => getState().ledgerTrades || []);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [sortField, setSortField] = useState('date');
  const [sortDir, setSortDir] = useState(-1);
  const [filterResult, setFilterResult] = useState('all');

  const defaultTrade = {
    id: '', date: getDayKey(), asset: 'EURUSD', direction: 'long',
    entry: '', sl: '', tp: '', rr: '', grade: 'B', notes: '', result: 'pending'
  };

  const [form, setForm] = useState({ ...defaultTrade });

  const saveTrades = useCallback((newTrades) => {
    setTrades(newTrades);
    setState({ ledgerTrades: newTrades });
  }, []);

  const openNew = useCallback(() => {
    setForm({ ...defaultTrade, id: `trade_${Date.now()}` });
    setEditId(null);
    setShowForm(true);
  }, []);

  const openEdit = useCallback((trade) => {
    setForm({ ...trade });
    setEditId(trade.id);
    setShowForm(true);
  }, []);

  const handleSave = useCallback(() => {
    // Auto-calc RR
    const entry = parseFloat(form.entry);
    const sl = parseFloat(form.sl);
    const tp = parseFloat(form.tp);
    let rr = form.rr;
    if (!isNaN(entry) && !isNaN(sl) && !isNaN(tp) && Math.abs(entry - sl) > 0) {
      rr = (Math.abs(tp - entry) / Math.abs(entry - sl)).toFixed(1);
    }

    const trade = { ...form, rr };

    if (editId) {
      const updated = trades.map(t => t.id === editId ? trade : t);
      saveTrades(updated);
    } else {
      saveTrades([trade, ...trades]);
    }
    setShowForm(false);
    setForm({ ...defaultTrade });
    setEditId(null);
  }, [form, editId, trades, saveTrades]);

  const handleDelete = useCallback((id) => {
    saveTrades(trades.filter(t => t.id !== id));
  }, [trades, saveTrades]);

  // Filtered + sorted trades
  const displayTrades = useMemo(() => {
    let list = [...trades];
    if (filterResult !== 'all') {
      list = list.filter(t => t.result === filterResult);
    }
    list.sort((a, b) => {
      const aVal = a[sortField] || '';
      const bVal = b[sortField] || '';
      if (aVal < bVal) return -1 * sortDir;
      if (aVal > bVal) return 1 * sortDir;
      return 0;
    });
    return list;
  }, [trades, filterResult, sortField, sortDir]);

  // Analytics
  const analytics = useMemo(() => {
    const closed = trades.filter(t => t.result === 'win' || t.result === 'loss');
    const wins = closed.filter(t => t.result === 'win');
    const winrate = closed.length > 0 ? Math.round((wins.length / closed.length) * 100) : 0;
    const avgRR = closed.length > 0
      ? (closed.reduce((sum, t) => sum + (parseFloat(t.rr) || 0), 0) / closed.length).toFixed(1)
      : '0.0';
    const grades = {};
    trades.forEach(t => {
      const g = t.grade || 'B';
      grades[g] = (grades[g] || 0) + 1;
    });
    // Behavioral alerts
    const alerts = [];
    const recentLosses = trades.slice(0, 5).filter(t => t.result === 'loss').length;
    if (recentLosses >= 3) alerts.push('3+ pertes consecutives recentes. Reduisez la taille.');
    const lowRR = trades.filter(t => parseFloat(t.rr) > 0 && parseFloat(t.rr) < 2).length;
    if (lowRR > trades.length * 0.3 && trades.length >= 5) alerts.push('Trop de trades avec RR < 2:1.');
    const bTrades = trades.filter(t => t.grade === 'B' || t.grade === 'C').length;
    if (bTrades > trades.length * 0.5 && trades.length >= 5) alerts.push('Trop de trades grade B/C. Attendez les A+.');

    return { winrate, avgRR, grades, total: trades.length, wins: wins.length, losses: closed.length - wins.length, alerts };
  }, [trades]);

  const toggleSort = useCallback((field) => {
    if (sortField === field) setSortDir(d => d * -1);
    else { setSortField(field); setSortDir(-1); }
  }, [sortField]);

  return (
    <div>
      {/* Analytics */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div className="border border-gray-200 rounded p-4 text-center">
          <div className="font-mono text-2xl font-bold text-black">{analytics.winrate}%</div>
          <div className="text-xs text-gray-400 uppercase tracking-widest mt-1">Winrate</div>
        </div>
        <div className="border border-gray-200 rounded p-4 text-center">
          <div className="font-mono text-2xl font-bold text-black">{analytics.avgRR}</div>
          <div className="text-xs text-gray-400 uppercase tracking-widest mt-1">Avg RR</div>
        </div>
        <div className="border border-gray-200 rounded p-4 text-center">
          <div className="font-mono text-2xl font-bold text-green">{analytics.wins}</div>
          <div className="text-xs text-gray-400 uppercase tracking-widest mt-1">Wins</div>
        </div>
        <div className="border border-gray-200 rounded p-4 text-center">
          <div className="font-mono text-2xl font-bold text-red">{analytics.losses}</div>
          <div className="text-xs text-gray-400 uppercase tracking-widest mt-1">Losses</div>
        </div>
      </div>

      {/* Grade distribution bar chart */}

                      className={`px-3 py-2.5 text-left text-xs text-gray-400 uppercase tracking-wider ${col.field ? 'cursor-pointer hover:text-black' : ''}`}>

                    <td className="px-3 py-2.5 font-mono text-xs font-bold">{trade.rr ? `${trade.rr}:1` : '-'}</td>

// ── Rituels Section ──────────────────────────────────
function RituelsSection() {
  const [checks, setChecks] = useState(() => getState().protocolChecks || {});

  const toggleCheck = useCallback((ritualId, stepIdx) => {
    const key = `${ritualId}_${stepIdx}`;
    const updated = { ...checks };
    if (updated[key]) delete updated[key];
    else updated[key] = getDayKey();
    setChecks(updated);
    setState({ protocolChecks: updated });
  }, [checks]);

  const getProgress = useCallback((ritual) => {
    const today = getDayKey();
    const total = (ritual.steps || []).length;
    let done = 0;
    (ritual.steps || []).forEach((_, si) => {
      if (checks[`${ritual.id}_${si}`] === today) done++;
    });
    return { done, total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  }, [checks]);

  // Use PROTOCOLS if available, otherwise RITUAL_DATA
  const rituals = useMemo(() => {
    if (typeof PROTOCOLS !== 'undefined' && Array.isArray(PROTOCOLS) && PROTOCOLS.length > 0) {
      return PROTOCOLS.map(p => ({
        id: p.id || p.name,
        title: p.name || p.title || '',
        dur: p.timing || '',
        steps: (p.steps || []).map(s => typeof s === 'string' ? s : s.text || s.detail || '')
      }));
    }
    return RITUAL_DATA;
  }, []);

  return (
    <div>
      {/* Rituals */}
      <div className="space-y-4 mb-10">
        {rituals.map(ritual => {
          const prog = getProgress(ritual);
          return (
            <div key={ritual.id} className="border border-gray-200 rounded p-5">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <h3 className="font-medium text-black text-sm">{ritual.title}</h3>
                  <span className="text-xs text-gray-400">{ritual.dur}</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-20 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div
                      className="h-full rounded-full transition-all duration-300"
                      style={{
                        width: `${prog.pct}%`,
                        backgroundColor: prog.pct === 100 ? '#D4A853' : '#000'
                      }}
                    />
                  </div>
                  <span className="font-mono text-xs text-gray-400">{prog.done}/{prog.total}</span>
                </div>
              </div>

              <div className="space-y-1.5">
                {(ritual.steps || []).map((step, si) => {
                  const key = `${ritual.id}_${si}`;
                  const isChecked = checks[key] === getDayKey();
                  return (
                    <button
                      key={si}
                      onClick={() => toggleCheck(ritual.id, si)}
                      className="w-full flex items-center gap-3 text-left py-1.5 group"
                    >
                      <div className={`w-4 h-4 border rounded-sm flex items-center justify-center shrink-0 transition-all ${
                        isChecked ? 'bg-black border-black' : 'border-gray-300 group-hover:border-gray-500'
                      }`}>
                        {isChecked && (
                          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" strokeWidth="2">
                            <path d="M2 5L4 7L8 3" />
                          </svg>
                        )}
                      </div>
                      <span className={`text-sm transition-colors ${isChecked ? 'text-gray-400 line-through' : 'text-gray-700'}`}>
                        {step}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Week Calendar */}
      <div className="border border-gray-200 rounded p-5">
        <h3 className="font-medium text-black text-sm mb-4">Semaine Type</h3>
        <div className="grid grid-cols-7 gap-2">
          {WEEK_SLOTS.map((slot, i) => {
            const isToday = new Date().getDay() === ((i + 1) % 7);
            return (
              <div
                key={i}
                className={`p-3 rounded text-center border transition-all ${
                  isToday ? 'border-black bg-gray-50' : 'border-gray-100'
                } ${i >= 5 ? 'bg-gray-50' : ''}`}
              >
                <div className={`text-xs font-medium mb-1 ${isToday ? 'text-black' : 'text-gray-500'}`}>{slot.day.slice(0, 3)}</div>
                <div className="text-xs text-gray-400 leading-tight">{slot.task}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// 5. SEARCH OVERLAY
// ══════════════════════════════════════════════════════
function SearchOverlay({ onClose, onNavigate }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
    const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleEsc);
    return () => window.removeEventListener('keydown', handleEsc);
  }, [onClose]);

  const results = useMemo(() => {
    if (!query || query.length < 2) return { concepts: [], rules: [], setups: [], lives: [], citations: [] };
    const q = query.toLowerCase();
    const data = safeData();

    const concepts = (data.concepts || [])
      .filter(c => c.n && c.n !== '-' && ((c.n || '').toLowerCase().includes(q) || (c.d || '').toLowerCase().includes(q)))
      .slice(0, 5);

    const rules = (data.rules || [])
      .filter(r => (r.n || '').toLowerCase().includes(q) || (r.d || '').toLowerCase().includes(q))
      .slice(0, 5);

    const setups = (data.setups || [])
      .filter(s => (s.n || '').toLowerCase().includes(q) || (s.d || '').toLowerCase().includes(q))
      .slice(0, 5);

    const lives = (data.lives || [])
      .filter(l => (l.t || '').toLowerCase().includes(q) || (l.id || '').toLowerCase().includes(q) || (l.r || '').toLowerCase().includes(q))
      .slice(0, 5);

    const citations = (data.citations || [])
      .filter(c => {
        const text = typeof c === 'string' ? c : c.t || c.text || '';
        return text.toLowerCase().includes(q);
      })
      .slice(0, 5);

    return { concepts, rules, setups, lives, citations };
  }, [query]);

  const totalResults = Object.values(results).reduce((sum, arr) => sum + arr.length, 0);

  function highlight(text, q) {
    if (!q || !text) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return (
      <span>
        {text.slice(0, idx)}
        <span className="bg-yellow-100 text-black font-medium">{text.slice(idx, idx + q.length)}</span>
        {text.slice(idx + q.length)}
      </span>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-20 bg-black bg-opacity-40" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-2xl mx-4 shadow-2xl max-h-[70vh] overflow-hidden" onClick={e => e.stopPropagation()}>
        {/* Search input */}
        <div className="flex items-center border-b border-gray-200 px-5">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" strokeWidth="2" strokeLinecap="round" className="shrink-0">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            ref={inputRef}
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Rechercher concepts, rules, setups, lives, citations..."
            className="flex-1 px-3 py-4 text-sm focus:outline-none"
          />
          <button onClick={onClose} className="text-xs text-gray-400 border border-gray-200 rounded px-2 py-0.5">ESC</button>
        </div>

        {/* Results */}
        <div className="overflow-y-auto max-h-[55vh] p-4">
          {query.length >= 2 && totalResults === 0 && (
            <div className="text-center py-8 text-gray-400 text-sm">Aucun resultat pour "{query}"</div>
          )}

          {results.concepts.length > 0 && (
            <div className="mb-4">
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Concepts ({results.concepts.length})</div>
              {results.concepts.map((c, i) => (
                <div key={i} className="py-2 border-b border-gray-50">
                  <div className="text-sm font-medium text-black">{highlight(c.n, query)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{highlight((c.d || '').slice(0, 120), query)}</div>
                </div>
              ))}
            </div>
          )}

          {results.rules.length > 0 && (
            <div className="mb-4">
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Rules ({results.rules.length})</div>
              {results.rules.map((r, i) => (
                <div key={i} className="py-2 border-b border-gray-50">
                  <div className="text-sm font-medium text-black">{highlight(r.n || '', query)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{highlight((r.d || '').slice(0, 120), query)}</div>
                </div>
              ))}
            </div>
          )}

          {results.setups.length > 0 && (
            <div className="mb-4">
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Setups ({results.setups.length})</div>
              {results.setups.map((s, i) => (
                <div key={i} className="py-2 border-b border-gray-50">
                  <div className="text-sm font-medium text-black">{highlight(s.n || '', query)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{highlight((s.d || '').slice(0, 120), query)}</div>
                </div>
              ))}
            </div>
          )}

          {results.lives.length > 0 && (
            <div className="mb-4">
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Lives ({results.lives.length})</div>
              {results.lives.map((l, i) => (
                <div key={i} className="py-2 border-b border-gray-50">
                  <div className="text-sm font-medium text-black">{highlight(l.t || '', query)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{l.id} -- {l.d}</div>
                </div>
              ))}
            </div>
          )}

          {results.citations.length > 0 && (
            <div className="mb-4">
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Citations ({results.citations.length})</div>
              {results.citations.map((c, i) => {
                const text = typeof c === 'string' ? c : c.t || c.text || '';
                return (
                  <div key={i} className="py-2 border-b border-gray-50">
                    <div className="text-sm text-gray-600 italic">"{highlight(text.slice(0, 150), query)}"</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const SCORE_COLORS = {
  excellent: '#22c55e',
  good: '#84cc16',
  average: '#eab308',
  poor: '#f97316',
  bad: '#ef4444'
};

function getScoreColor(score) {
  if (score >= 80) return SCORE_COLORS.excellent;
  if (score >= 60) return SCORE_COLORS.good;
  if (score >= 40) return SCORE_COLORS.average;
  if (score >= 20) return SCORE_COLORS.poor;
  return SCORE_COLORS.bad;
}

function getScoreLabel(score) {
  if (score >= 80) return 'Excellent';
  if (score >= 60) return 'Bon';
  if (score >= 40) return 'Moyen';
  if (score >= 20) return 'Faible';
  return 'Critique';
}

function getGradeColor(grade) {
  if (grade === 'A+' || grade === 'A') return '#22c55e';
  if (grade === 'B') return '#eab308';
  if (grade === 'C') return '#f97316';
  return '#ef4444';
}

function ScoreGauge({ score, size = 120, label }) {
  const radius = (size - 16) / 2;
  const circumference = 2 * Math.PI * radius;
  const progress = (score / 100) * circumference;
  const color = getScoreColor(score);

  return (
    <div style={{ width: size, height: size, position: 'relative' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#f3f4f6" strokeWidth="8" />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={circumference} strokeDashoffset={circumference - progress}
          strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: 'stroke-dashoffset 0.8s ease' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: size * 0.28, fontWeight: 700, fontFamily: 'JetBrains Mono, monospace', color }}>{score}</span>
        <span style={{ fontSize: size * 0.1, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label || '/100'}</span>
      </div>
    </div>
  );
}

function ScoreBar({ label, value, max, color }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
        <span style={{ fontSize: 12, color: '#6b7280' }}>{label}</span>
        <span style={{ fontSize: 12, fontFamily: 'JetBrains Mono, monospace', color: '#374151' }}>{typeof max === 'number' ? `${value}/${max}` : value}</span>
      </div>
      <div style={{ height: 6, background: '#f3f4f6', borderRadius: 3, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${Math.min(pct, 100)}%`, background: color || getScoreColor(pct), borderRadius: 3, transition: 'width 0.6s ease' }} />
      </div>
    </div>
  );
}


// ── CRT x ICT Trade Analyzer Engine ──────────────────

const KILLZONES = {
  london: { start: 8, end: 11, label: 'London' },
  ny: { start: 14, end: 17, label: 'New York' },
  asia: { start: 0, end: 4, label: 'Asia' }
};

const CRT_SETUPS = ['turtle soup', 'ts', 'crt', 'model 1', 'model 2', 'model 3', 'ob', 'fvg', 'breaker', 'ote', 'mss', 'bos', 'smt'];

const MISTAKE_RULES = {
  'FOMO': { keywords: ['fomo', 'peur de rater', 'fear of missing', 'rushed', 'chased'], penalty: 15, category: 'discipline' },
  'Revenge Trade': { keywords: ['revenge', 'se refaire', 'anger', 'rage', 'colere', 'frustration'], penalty: 20, category: 'discipline' },
  'SL Déplacé': { keywords: ['sl move', 'deplace sl', 'moved stop', 'widened stop', 'sl deplace', 'sl elargi'], penalty: 20, category: 'risk' },
  'Overtrading': { keywords: ['overtrad', 'trop de trade', 'too many', 'exces'], penalty: 15, category: 'discipline' },
  'Pas de Plan': { keywords: ['no plan', 'pas de plan', 'impulsive', 'impulsi', 'sans plan', 'no setup'], penalty: 25, category: 'process' },
  'Hors Killzone': { keywords: ['hors kz', 'outside kz', 'hors session', 'outside session', 'hors killzone'], penalty: 15, category: 'timing' },
  'Mauvais RR': { keywords: ['rr mauvais', 'bad rr', 'rr < 2', 'risque trop', 'poor rr', 'rr 1'], penalty: 15, category: 'risk' },
  'Taille Excessive': { keywords: ['taille', 'oversize', 'trop gros', 'too large', 'lot trop', 'overlev'], penalty: 20, category: 'risk' }
};

function analyzeTradeICT(trade) {
  const result = {
    scores: { process: 0, setup_quality: 0, risk_management: 0, timing: 0, discipline: 0 },
    maxScores: { process: 30, setup_quality: 25, risk_management: 20, timing: 15, discipline: 10 },
    grade: 'D',
    mistakes: [],
    positives: [],
    recommendations: [],
    flags: {}
  };

  const notes = ((trade.notes || '') + ' ' + (trade.setup || '')).toLowerCase();
  const setup = (trade.setup || '').toLowerCase();

  // ── 1. PROCESS (0-30) ──
  // Has a tagged setup?
  const hasSetupTag = CRT_SETUPS.some(s => setup.includes(s) || notes.includes(s));
  if (hasSetupTag) {
    result.scores.process += 15;
    result.positives.push('Setup CRT/ICT identifié et tagué');
  } else {
    result.scores.process += 3;
    result.recommendations.push('Tague tes trades avec le setup exact (TS, Model 1 OB, Model 2 FVG, etc.)');
  }

  // Has notes/journal?
  if (trade.notes && trade.notes.trim().length > 10) {
    result.scores.process += 10;
    result.positives.push('Trade journalisé avec notes');
  } else {
    result.scores.process += 2;
    result.recommendations.push('Ajoute des notes détaillées à chaque trade (contexte HTF, raison d\'entrée, émotions)');
  }

  // Entry & exit prices present?
  if (trade.entryPrice > 0 && trade.exitPrice > 0) {
    result.scores.process += 5;
  }

  // ── 2. SETUP QUALITY (0-25) ──
  // Determine RR from actual prices
  let actualRR = 0;
  if (trade.entryPrice > 0 && trade.exitPrice > 0 && trade.pnl !== 0) {
    const move = Math.abs(trade.exitPrice - trade.entryPrice);
    // Estimate SL as the loss side — if winning, SL was at entry +/- some amount
    // Simple heuristic: use avgLoss concept or just score based on PnL ratio
    if (trade.pnl > 0) {
      result.scores.setup_quality += 10;
      result.positives.push('Trade gagnant — setup validé par le marché');
    } else {
      result.scores.setup_quality += 3;
    }
  }

  // Setup type scoring
  if (setup.includes('turtle soup') || setup.includes('ts ')) {
    result.scores.setup_quality += 8;
    result.flags.setupType = 'Turtle Soup';
  } else if (setup.includes('model 1') || setup.includes('ob') || setup.includes('order block')) {
    result.scores.setup_quality += 7;
    result.flags.setupType = 'Model 1 (OB)';
  } else if (setup.includes('model 2') || setup.includes('fvg') || setup.includes('fair value')) {
    result.scores.setup_quality += 7;
    result.flags.setupType = 'Model 2 (FVG)';
  } else if (setup.includes('model 3') || setup.includes('breaker')) {
    result.scores.setup_quality += 7;
    result.flags.setupType = 'Model 3 (Breaker)';
  } else if (setup.includes('crt') || setup.includes('mss') || setup.includes('bos')) {
    result.scores.setup_quality += 6;
    result.flags.setupType = 'CRT/MSS';
  } else {
    result.scores.setup_quality += 2;
    result.flags.setupType = 'Non identifié';
    result.recommendations.push('Identifie le modèle exact (Model 1/2/3, Turtle Soup) pour tracker ta performance par setup');
  }

  // OTE mentioned?
  if (notes.includes('ote') || notes.includes('optimal trade entry') || notes.includes('0.618') || notes.includes('0.705') || notes.includes('0.786')) {
    result.scores.setup_quality += 5;
    result.positives.push('OTE (Optimal Trade Entry) respecté');
    result.flags.oteUsed = true;
  }

  // ── 3. RISK MANAGEMENT (0-20) ──
  // PnL ratio as RR proxy
  if (trade.pnl > 0 && trade.pnlPct > 0) {
    // Winning trade — good sign
    result.scores.risk_management += 8;

    // Check if RR is mentioned in notes
    const rrMatch = notes.match(/rr\s*[=:]\s*(\d+\.?\d*)|(\d+\.?\d*)\s*r\b|rr\s*(\d+\.?\d*)/);
    if (rrMatch) {
      const rr = parseFloat(rrMatch[1] || rrMatch[2] || rrMatch[3]);
      if (rr >= 3) {
        result.scores.risk_management += 8;
        result.positives.push(`RR ${rr}:1 — excellent`);
      } else if (rr >= 2) {
        result.scores.risk_management += 6;
        result.positives.push(`RR ${rr}:1 — conforme au minimum`);
      } else {
        result.scores.risk_management += 2;
        result.mistakes.push({ label: 'RR < 2:1', category: 'risk' });
        result.recommendations.push('RR minimum 2:1 — ne prends pas de trades avec un RR inférieur');
      }
    } else {
      result.scores.risk_management += 4;
      result.recommendations.push('Note le RR réel de chaque trade dans tes notes Tradezella');
    }
  } else if (trade.pnl < 0) {
    // Loss — check if controlled
    if (trade.pnlPct && Math.abs(trade.pnlPct) <= 1) {
      result.scores.risk_management += 12;
      result.positives.push(`Perte contrôlée (${trade.pnlPct}%) — risque maîtrisé`);
    } else if (trade.pnlPct && Math.abs(trade.pnlPct) <= 2) {
      result.scores.risk_management += 6;
      result.recommendations.push('Perte de ' + Math.abs(trade.pnlPct).toFixed(1) + '% — vise max 1% par trade');
    } else if (trade.pnlPct && Math.abs(trade.pnlPct) > 2) {
      result.scores.risk_management += 2;
      result.mistakes.push({ label: 'Perte > 2%', category: 'risk' });
      result.recommendations.push('Perte de ' + Math.abs(trade.pnlPct).toFixed(1) + '% — BEAUCOUP trop. Max 1% par trade.');
    } else {
      result.scores.risk_management += 4;
    }
  } else {
    result.scores.risk_management += 5; // breakeven
    result.positives.push('Breakeven — capital protégé');
  }

  // ── 4. TIMING (0-15) ──
  if (trade.entryDate) {
    const entryDate = new Date(trade.entryDate);
    const hour = entryDate.getUTCHours();
    const day = entryDate.getUTCDay();

    // Killzone check
    let inKillzone = false;
    let kzName = '';
    Object.entries(KILLZONES).forEach(([key, kz]) => {
      if (hour >= kz.start && hour < kz.end) {
        inKillzone = true;
        kzName = kz.label;
      }
    });

    if (inKillzone) {
      result.scores.timing += 10;
      result.positives.push(`Entrée en killzone ${kzName}`);
      result.flags.killzone = kzName;
    } else {
      result.scores.timing += 2;
      result.mistakes.push({ label: 'Hors Killzone', category: 'timing' });
      result.recommendations.push(`Entrée à ${hour}h UTC — hors killzone. Trade uniquement en London (8-11h) ou NY (14-17h).`);
      result.flags.killzone = 'Hors KZ';
    }

    // Weekend / Friday afternoon
    if (day === 5 && hour >= 16) {
      result.scores.timing -= 3;
      result.mistakes.push({ label: 'Vendredi fin de journée', category: 'timing' });
    } else if (day === 0 || day === 6) {
      result.scores.timing -= 5;
      result.mistakes.push({ label: 'Weekend', category: 'timing' });
    } else {
      result.scores.timing += 5;
    }
  } else {
    result.scores.timing += 5; // neutral if no date
    result.recommendations.push('Assure-toi que les dates d\'entrée sont bien dans le CSV');
  }

  // ── 5. DISCIPLINE (0-10) ──
  result.scores.discipline = 10; // Start at max, deduct for mistakes

  // Check notes for mistake keywords
  Object.entries(MISTAKE_RULES).forEach(([label, rule]) => {
    if (rule.keywords.some(kw => notes.includes(kw))) {
      result.mistakes.push({ label, category: rule.category });
      result.scores.discipline = Math.max(0, result.scores.discipline - (rule.penalty > 10 ? 5 : 3));

      // Also deduct from the relevant category
      const catKey = rule.category === 'risk' ? 'risk_management' : rule.category === 'process' ? 'process' : rule.category === 'timing' ? 'timing' : 'discipline';
      result.scores[catKey] = Math.max(0, result.scores[catKey] - 3);
    }
  });

  if (result.mistakes.length === 0) {
    result.positives.push('Aucune erreur de discipline détectée');
  }

  // ── TOTAL & GRADE ──
  // Clamp scores to max
  Object.keys(result.scores).forEach(k => {
    result.scores[k] = Math.max(0, Math.min(result.scores[k], result.maxScores[k]));
  });

  const total = Object.values(result.scores).reduce((a, b) => a + b, 0);
  result.scores.total = total;

  if (total >= 85) result.grade = 'A+';
  else if (total >= 70) result.grade = 'A';
  else if (total >= 55) result.grade = 'B';
  else if (total >= 40) result.grade = 'C';
  else result.grade = 'D';

  return result;
}
