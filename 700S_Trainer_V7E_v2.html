// ─── Helpers ─────────────────────────────────────────
function getPhaseForLive(liveId) {
  const num = parseInt((String(liveId).match(/\d{3}/) || ['0'])[0]);
  if (num <= 100) return 1;
  if (num <= 118) return 2;
  if (num <= 135) return 3;
  if (num <= 142) return 4;
  return 0;
}

function categorize(name, detail) {
  const t = ((name || '') + ' ' + (detail || '')).toLowerCase();
  if (/psycho|emotion|revenge|discipline|peur|fear|greed|patience/.test(t)) return 'psychology';
  if (/risk|rr|sl|stop.?loss|money.?management|position.?size|0\.5%/.test(t)) return 'risk';
  if (/crt|candle.?range/.test(t)) return 'crt';
  if (/model.?[12]|entry|entree|trigger/.test(t)) return 'entry';
  if (/killzone|london|new.?york|asian|session/.test(t)) return 'killzone';
  if (/turtle.?soup|ts\b|sweep|purge/.test(t)) return 'liquidity';
  if (/dol|draw.?on|objectif|target/.test(t)) return 'dol';
  if (/po3|power.?of.?3|amd|accumulation|manipulation|distribution/.test(t)) return 'po3';
  if (/narrative|htf|higher.?time|weekly|monthly|bias/.test(t)) return 'narrative';
  if (/decompos|quarterly|q[1-4]/.test(t)) return 'decomposition';
  if (/daily|4h|1h|15m|5m|timeframe|tf\b/.test(t)) return 'timeframe';
  if (/ob\b|order.?block|fvg|fair.?value|imbalance|bos|mss|choch/.test(t)) return 'structure';
  if (/doctrine|synthese|harmoni|integration|evolution/.test(t)) return 'doctrine';
  if (/mastery|maitrise|complet/.test(t)) return 'mastery';
  return 'integration';
}

function dayIndex() {
  return Math.floor(Date.now() / 86400000);

function formatDate(d) {
  const months = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
  const dt = d || new Date();
  return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
}

function generateDefaultDrills() {
  const data = safeData();
  const concepts = (data.concepts || []).filter(c => c.n && c.n !== '-');
  const drills = [];
  const conceptGroups = {};

  concepts.forEach(c => {
    const cat = categorize(c.n, c.d || '');
    if (!conceptGroups[cat]) conceptGroups[cat] = [];
    conceptGroups[cat].push(c);
  });

  let drillId = 1;
  Object.entries(conceptGroups).forEach(([cat, items]) => {
    items.slice(0, 4).forEach((concept, ci) => {
      const levels = ['facile', 'moyen', 'difficile'];
      levels.forEach((level, li) => {
        for (let q = 0; q < 4; q++) {
          const basePrice = 1.0800 + Math.random() * 0.02;
          const candles = generateDrillCandles(cat, level, q);
          const annotations = generateDrillAnnotations(cat, level, candles);
          const qa = generateDrillQuestion(concept, cat, level, q);
          drills.push({
            id: `drill_${drillId++}`,
            concept: concept.n,
            conceptCat: cat,
            level: li,
            type: 'identification',
            title: `${concept.n} -- Niveau ${level}`,
            chart: { candles, annotations },
            question: qa.question,
            choices: qa.choices
          });
        }
      });
    });
  });

  return drills.length > 0 ? drills : generateMinimalDrills();
}

function generateDrillCandles(cat, level, seed) {
  const count = level === 'facile' ? 8 : level === 'moyen' ? 12 : 16;
  const candles = [];
  let price = 1.0800 + (seed * 0.001);

  for (let i = 0; i < count; i++) {
    const move = (Math.sin(i * 0.8 + seed) * 0.003) + (Math.random() - 0.5) * 0.002;
    const o = price;
    const c = price + move;
    const h = Math.max(o, c) + Math.random() * 0.002;
    const l = Math.min(o, c) - Math.random() * 0.002;
    candles.push({
      o: parseFloat(o.toFixed(5)),
      h: parseFloat(h.toFixed(5)),
      l: parseFloat(l.toFixed(5)),
      c: parseFloat(c.toFixed(5))
    });
    price = c;
  }

  // Add specific patterns based on category
  if (cat === 'liquidity' || cat === 'crt') {
    // Add a sweep pattern at the end
    const lastC = candles[candles.length - 1].c;
    const prevHigh = Math.max(...candles.slice(-5).map(c => c.h));
    candles.push({
      o: parseFloat(lastC.toFixed(5)),
      h: parseFloat((prevHigh + 0.003).toFixed(5)),
      l: parseFloat((lastC - 0.004).toFixed(5)),
      c: parseFloat((lastC - 0.002).toFixed(5))
    });
  }

  return candles;
}

function generateDrillAnnotations(cat, level, candles) {
  const annotations = [];
  if (!candles.length) return annotations;

  const maxH = Math.max(...candles.map(c => c.h));
  const minL = Math.min(...candles.map(c => c.l));

  if (cat === 'liquidity' || cat === 'crt') {
    annotations.push({ type: 'label', x: candles.length - 2, y: maxH, text: '?' });
    annotations.push({ type: 'circle', x: candles.length - 1, y: candles[candles.length - 1].h });
  } else if (cat === 'structure') {
    const mid = Math.floor(candles.length / 2);
    annotations.push({ type: 'label', x: mid, y: candles[mid].h, text: 'Zone ?' });
  } else if (cat === 'narrative') {
    annotations.push({ type: 'arrow-down', x: 1, y: maxH + 0.001 });
    annotations.push({ type: 'label', x: candles.length - 1, y: minL, text: 'HTF ?' });
  } else {
    annotations.push({ type: 'circle', x: Math.floor(candles.length / 2), y: candles[Math.floor(candles.length / 2)].h });
  }

  return annotations;
}

// CANDLE CHART — SVG Component
// ══════════════════════════════════════════════════════
function CandleChart({ candles, annotations, width, height, tf, asset, zoomStart, zoomEnd }) {
  const w = width || 480;
  const h = height || 280;
  const padding = { top: 30, right: 55, bottom: 20, left: 10 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  const safeCandles = candles || [];
  const safeAnnotations = annotations || [];

  if (!safeCandles.length) {
    return (
      <svg width={w} height={h} className="bg-white border border-gray-200 rounded">
        <text x={w / 2} y={h / 2} textAnchor="middle" className="fill-gray-400" fontSize="12">
          Pas de donnees chart
        </text>
      </svg>
    );
  }

  const allH = safeCandles.map(c => c.h);
  const allL = safeCandles.map(c => c.l);
  const maxPrice = Math.max(...allH);
  const minPrice = Math.min(...allL);
  const priceRange = maxPrice - minPrice || 0.001;
  const paddedMin = minPrice - priceRange * 0.05;
  const paddedMax = maxPrice + priceRange * 0.05;
  const paddedRange = paddedMax - paddedMin;

  const candleCount = safeCandles.length;
  const candleW = Math.max(4, Math.min(20, (chartW / candleCount) * 0.7));
  const gap = (chartW - candleW * candleCount) / (candleCount + 1);

  function priceToY(p) {
    return padding.top + chartH - ((p - paddedMin) / paddedRange) * chartH;
  }

  function indexToX(i) {
    return padding.left + gap + i * (candleW + gap) + candleW / 2;
  }

  // Grid lines (5 levels)
  const gridLevels = 5;
  const gridLines = [];
  for (let i = 0; i <= gridLevels; i++) {
    const price = paddedMin + (paddedRange * i) / gridLevels;
    gridLines.push({ price, y: priceToY(price) });
  }

  return (
    <svg width={w} height={h} className="bg-white border border-gray-200 rounded" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
      {/* Background */}
      <rect x="0" y="0" width={w} height={h} fill="white" />

      {/* Grid */}
      {gridLines.map((gl, i) => (
        <g key={`grid-${i}`}>
          <line x1={padding.left} y1={gl.y} x2={w - padding.right} y2={gl.y} stroke="#f0f0f0" strokeWidth="1" />
          <text x={w - padding.right + 5} y={gl.y + 3} fontSize="9" fill="#999" textAnchor="start">
            {gl.price.toFixed(gl.price > 100 ? 0 : 4)}
          </text>
        </g>
      ))}

      {/* TF + Asset label */}
      {(tf || asset) && (
        <text x={padding.left + 5} y={padding.top - 10} fontSize="10" fill="#666" textAnchor="start">
          {[tf, asset].filter(Boolean).join(' | ')}
        </text>
      )}

      {/* Candles */}
      {safeCandles.map((candle, i) => {
        const x = indexToX(i);
        const isBullish = candle.c >= candle.o;
        const bodyTop = priceToY(Math.max(candle.o, candle.c));
        const bodyBottom = priceToY(Math.min(candle.o, candle.c));
        const bodyH = Math.max(1, bodyBottom - bodyTop);
        const wickTop = priceToY(candle.h);
        const wickBottom = priceToY(candle.l);

        return (
          <g key={`candle-${i}`}>
            {/* Wick */}
            <line x1={x} y1={wickTop} x2={x} y2={wickBottom} stroke="black" strokeWidth="1" />
            {/* Body */}
            <rect
              x={x - candleW / 2}
              y={bodyTop}
              width={candleW}
              height={bodyH}
              fill={isBullish ? 'white' : 'black'}
              stroke="black"
              strokeWidth="1"
            />
          </g>
        );
      })}

      {/* Annotations */}
      {safeAnnotations.map((ann, i) => {
        const ax = typeof ann.x === 'number' ? indexToX(Math.min(ann.x, candleCount - 1)) : w / 2;
        const ay = typeof ann.y === 'number' ? priceToY(ann.y) : h / 2;

        if (ann.type === 'circle') {
          return (
            <circle key={`ann-${i}`} cx={ax} cy={ay} r={8} fill="none" stroke="black" strokeWidth="1.5" strokeDasharray="3,2" />
          );
        }
        if (ann.type === 'arrow-up') {
          return (
            <g key={`ann-${i}`}>
              <line x1={ax} y1={ay + 15} x2={ax} y2={ay} stroke="black" strokeWidth="1.5" />
              <polygon points={`${ax},${ay - 3} ${ax - 4},${ay + 4} ${ax + 4},${ay + 4}`} fill="black" />
            </g>
          );
        }
        if (ann.type === 'arrow-down') {
          return (
            <g key={`ann-${i}`}>
              <line x1={ax} y1={ay - 15} x2={ax} y2={ay} stroke="black" strokeWidth="1.5" />
              <polygon points={`${ax},${ay + 3} ${ax - 4},${ay - 4} ${ax + 4},${ay - 4}`} fill="black" />
            </g>
          );
        }
        if (ann.type === 'label') {
          return (
            <g key={`ann-${i}`}>
              <rect x={ax - 20} y={ay - 18} width={40} height={16} fill="white" stroke="black" strokeWidth="0.5" rx="2" />
              <text x={ax} y={ay - 7} fontSize="9" fill="black" textAnchor="middle">{ann.text || ''}</text>
            </g>
          );
        }
        if (ann.type === 'line-h') {
          return (
            <line key={`ann-${i}`} x1={padding.left} y1={ay} x2={w - padding.right} y2={ay} stroke="black" strokeWidth="0.8" strokeDasharray="4,3" />
          );
        }
        return null;
      })}

      {/* Zoom zone overlay */}
      {typeof zoomStart === 'number' && typeof zoomEnd === 'number' && zoomStart >= 0 && zoomEnd < candleCount && (
        (() => {
          const zx1 = indexToX(zoomStart) - candleW / 2 - gap * 0.4;
          const zx2 = indexToX(zoomEnd) + candleW / 2 + gap * 0.4;
          const zy1 = padding.top - 2;
          const zy2 = padding.top + chartH + 2;
          return (
            <g>
              {/* Semi-transparent highlight */}
              <rect x={zx1} y={zy1} width={zx2 - zx1} height={zy2 - zy1}
                fill="rgba(59,130,246,0.06)" stroke="#3B82F6" strokeWidth="1.5"
                strokeDasharray="4,3" rx="3" />
              {/* Bracket label */}
              <text x={(zx1 + zx2) / 2} y={zy2 + 12} fontSize="8" fill="#3B82F6"
                textAnchor="middle" fontWeight="600">ZOOM</text>
            </g>
          );
        })()
      )}
    </svg>
  );
}

// FADE WRAPPER
// ══════════════════════════════════════════════════════
function FadeIn({ children, k }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    setShow(false);
    const t = setTimeout(() => setShow(true), 30);
    return () => clearTimeout(t);
  }, [k]);
  return (
    <div className={`transition-all duration-300 ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2'}`}>
      {children}
    </div>
  );
}

// 1. HOME — Dashboard Guide
// ══════════════════════════════════════════════════════
function Home({ onNavigate }) {
  const state = getState();
  const streak = state.streak || 0;
  const drillProgress = state.drillProgress || {};
  const trades = state.ledgerTrades || [];

  const masteryPct = useMemo(() => {
    const m = state.conceptMastery || {};
    const vals = Object.values(m);
    if (!vals.length) return 0;
    return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  }, []);

  const drillsDoneToday = useMemo(() => {
    const today = getDayKey();
    return Object.entries(drillProgress).filter(([_, v]) => v && v.date === today).length;
  }, []);

  const weekTrades = useMemo(() => {
    const now = new Date();
    const weekAgo = new Date(now.getTime() - 7 * 86400000);
    return trades.filter(t => new Date(t.date) >= weekAgo);
  }, []);

  const winrate = useMemo(() => {
    if (!trades.length) return 0;
    const wins = trades.filter(t => t.result === 'win').length;
    return Math.round((wins / trades.length) * 100);
  }, []);

  const completedDrills = Object.values(drillProgress).filter(v => v && v.completed).length;

  // Weakest concept
  const weakestConcept = useMemo(() => {
    const m = state.conceptMastery || {};
    const entries = Object.entries(m);
    if (!entries.length) return null;
    entries.sort((a, b) => a[1] - b[1]);
    return entries[0];
  }, []);

  // Actions recommandees
  const actions = useMemo(() => {
    const acts = [];
    if (weakestConcept && weakestConcept[1] < 50) {
      acts.push({ label: `Revise "${weakestConcept[0]}"`, sub: `Mastery : ${weakestConcept[1]}%`, target: 'apprendre' });
    }
    if (drillsDoneToday < 3) {
      acts.push({ label: '3 drills rapides', sub: '~2 min', target: 'pratiquer' });
    }
    if (weekTrades.length === 0) {
      acts.push({ label: 'Log ton dernier trade', sub: 'Aucun trade cette semaine', target: 'journal' });
    }
    if (streak >= 3) {
      acts.push({ label: `Streak de ${streak} jours`, sub: 'Continue comme ca', target: null });
    }
    if (acts.length === 0) {
      acts.push({ label: 'Session Drills', sub: 'Renforce tes concepts', target: 'pratiquer' });
      acts.push({ label: 'Revise un concept', sub: 'Explore le Canon', target: 'apprendre' });
      acts.push({ label: 'Log un trade', sub: 'Tiens ton journal a jour', target: 'journal' });
    }
    return acts.slice(0, 3);
  }, []);

  const quoteOfDay = QUOTES_POOL[dayIndex() % QUOTES_POOL.length];

  return (
    <div className="relative">
      {/* Mini candlestick decoration */}
      <div className="absolute inset-0 pointer-events-none overflow-hidden" style={{ opacity: 0.04 }}>
        <svg width="100%" height="300" viewBox="0 0 800 300">
          {Array.from({ length: 30 }).map((_, i) => {
            const x = 20 + i * 26;
            const h = 60 + Math.sin(i * 0.7) * 40;
            const top = 150 - h / 2;
            const bodyH = h * 0.4;
            const bodyTop = top + (h - bodyH) * 0.3;
            return (
              <g key={`bg-candle-${i}`}>
                <line x1={x} y1={top} x2={x} y2={top + h} stroke="black" strokeWidth="1.5" />
                <rect x={x - 5} y={bodyTop} width={10} height={bodyH} fill={i % 3 === 0 ? 'black' : 'none'} stroke="black" strokeWidth="1" />
              </g>
            );
          })}
        </svg>
      </div>

      {/* Greeting */}
      <div className="mb-10">
        <h1 className="font-serif text-4xl lg:text-5xl font-light tracking-tight text-black mb-2">
          Bonjour Antoine
        </h1>
        <p className="text-gray-400 text-sm">{formatDate()}</p>
      </div>

      {/* Aujourd'hui */}
      <div className="mb-10">
        <h2 className="text-sm uppercase tracking-widest text-gray-400 mb-4">Aujourd'hui</h2>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {actions.map((act, i) => (
            <button
              key={i}
              onClick={() => act.target && onNavigate(act.target)}
              className={`text-left border border-gray-200 rounded p-5 transition-all duration-200 ${
                act.target ? 'hover:border-black hover:shadow-sm cursor-pointer' : 'cursor-default'
              }`}
              style={streak >= 3 && !act.target ? { borderColor: '#D4A853', background: 'linear-gradient(135deg, #FFFBF0, #FFF)' } : {}}
            >
              <div className="font-medium text-black mb-1">{act.label}</div>
              <div className="text-sm text-gray-400">{act.sub}</div>
              {act.target && (
                <div className="mt-3 text-xs text-gray-300 uppercase tracking-wider">
                  {'->'}
                </div>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Quick Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        {[
          { label: 'Streak', value: streak, suffix: 'j', gold: streak >= 3 },
          { label: 'Mastery', value: masteryPct, suffix: '%' },
          { label: 'Drills', value: completedDrills, suffix: '' },
          { label: 'Winrate', value: winrate, suffix: '%' }
        ].map((stat, i) => (
          <div key={i} className="border border-gray-200 rounded p-5 text-center">
            <div
              className="font-mono text-3xl font-bold"
              style={{ color: stat.gold ? '#D4A853' : '#000' }}
            >
              {stat.value}{stat.suffix}
            </div>
            <div className="text-xs text-gray-400 mt-1 uppercase tracking-widest">{stat.label}</div>
          </div>
        ))}
      </div>

      {/* Quote du jour */}
      <div className="border-l-4 border-black pl-5 py-3 mb-6">
        <p className="font-serif text-lg italic text-gray-700 leading-relaxed">
          "{quoteOfDay}"
        </p>
      </div>
    </div>
  );
}

// ── Concepts Section ─────────────────────────────────
function ConceptsSection() {
  const data = safeData();
  const state = getState();
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('all');
  const [expanded, setExpanded] = useState(null);

  const concepts = useMemo(() => {
    const raw = (data.concepts || []).filter(c => c.n && c.n !== '-');
    return raw.map(c => ({
      ...c,
      cat: categorize(c.n, c.d || ''),
      freq: (c.s || []).length,
      mastery: (state.conceptMastery || {})[c.n] || 0,
      notes: (state.conceptNotes || {})[c.n] || ''
    }));
  }, []);

  const categories = useMemo(() => {
    const cats = new Set(concepts.map(c => c.cat));
    return ['all', ...Array.from(cats).sort()];
  }, [concepts]);

  const filtered = useMemo(() => {
    let list = concepts;
    if (catFilter !== 'all') {
      list = list.filter(c => c.cat === catFilter);
    }
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(c => (c.n || '').toLowerCase().includes(q) || (c.d || '').toLowerCase().includes(q));
    }
    return list;
  }, [concepts, catFilter, search]);

  const updateMastery = useCallback((name, val) => {
    const m = { ...(getState().conceptMastery || {}), [name]: val };
    setState({ conceptMastery: m });
  }, []);

  const updateNotes = useCallback((name, text) => {
    const n = { ...(getState().conceptNotes || {}), [name]: text };
    setState({ conceptNotes: n });
  }, []);

  const catColors = {
    crt: 'bg-black text-white',
    entry: 'bg-gray-800 text-white',
    liquidity: 'bg-gray-700 text-white',
    structure: 'bg-gray-600 text-white',
    narrative: 'bg-gray-500 text-white',
    po3: 'bg-gray-400 text-black',
    dol: 'bg-gray-300 text-black',
    psychology: 'bg-gray-200 text-black',
    risk: 'bg-gray-200 text-black',
    killzone: 'bg-gray-200 text-black',
    decomposition: 'bg-gray-100 text-black',
    timeframe: 'bg-gray-100 text-black',
    doctrine: 'bg-gray-100 text-black',
    mastery: 'bg-gray-100 text-black',
    integration: 'bg-gray-100 text-black'
  };

  return (
    <div>
      {/* Search + Filter */}
      <div className="flex flex-col sm:flex-row gap-3 mb-6">
        <input
          type="text"
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Rechercher un concept..."
          className="flex-1 border border-gray-200 rounded px-4 py-2.5 text-sm focus:outline-none focus:border-black transition-colors"
        />
      </div>

      {/* Category pills */}
      <div className="flex flex-wrap gap-2 mb-6">
        {categories.map(cat => (
          <button
            key={cat}
            onClick={() => setCatFilter(cat)}
            className={`px-3 py-1 text-xs rounded-full border transition-all duration-200 ${
              catFilter === cat
                ? 'bg-black text-white border-black'
                : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'
            }`}
          >
            {cat === 'all' ? 'Tous' : cat}
          </button>
        ))}
      </div>

      {/* Count */}
      <div className="text-xs text-gray-400 mb-4">{filtered.length} concepts</div>

      {/* Grid */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map((concept, i) => (
          <div key={concept.n + i} className="border border-gray-200 rounded transition-all duration-200 hover:border-gray-400">
            {/* Card header */}
            <button
              onClick={() => setExpanded(expanded === i ? null : i)}
              className="w-full text-left p-4"
            >
              <div className="flex items-start justify-between mb-2">
                <h3 className="font-medium text-black text-sm leading-tight pr-2">{concept.n}</h3>
                <span className={`text-xs px-2 py-0.5 rounded-full shrink-0 ${catColors[concept.cat] || 'bg-gray-100 text-black'}`}>
                  {concept.cat}
                </span>
              </div>
              <div className="flex items-center gap-3">
                <span className="font-mono text-xs text-gray-400">{concept.freq}x</span>
                {/* Mini mastery gauge */}
                <div className="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full bg-black rounded-full transition-all" style={{ width: `${concept.mastery}%` }} />
                </div>
                <span className="font-mono text-xs text-gray-400">{concept.mastery}%</span>
              </div>
            </button>

            {/* Expanded */}
            {expanded === i && (
              <div className="border-t border-gray-100 p-4 space-y-4">
                {/* Description */}
                <p className="text-sm text-gray-600 leading-relaxed">{(concept.d || '').slice(0, 500)}</p>

                {/* Sources */}
                {(concept.s || []).length > 0 && (
                  <div>
                    <div className="text-xs text-gray-400 uppercase tracking-wider mb-1">Sources</div>
                    <div className="flex flex-wrap gap-1">
                      {(concept.s || []).slice(0, 8).map((src, si) => (
                        <span key={si} className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">
                          {src}
                        </span>
                      ))}
                      {(concept.s || []).length > 8 && (
                        <span className="text-xs text-gray-400">+{(concept.s || []).length - 8}</span>
                      )}
                    </div>
                  </div>
                )}

                {/* Mastery slider */}
                <div>
                  <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Mastery</div>
                  <input
                    type="range"
                    min="0"
                    max="100"
                    value={concept.mastery}
                    onChange={e => updateMastery(concept.n, parseInt(e.target.value))}
                    className="w-full accent-black"
                  />
                  <div className="font-mono text-xs text-gray-500 mt-1">{concept.mastery}%</div>
                </div>

                {/* Notes */}
                <div>
                  <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Notes</div>
                  <textarea
                    value={concept.notes}
                    onChange={e => updateNotes(concept.n, e.target.value)}
                    placeholder="Tes notes sur ce concept..."
                    className="w-full border border-gray-200 rounded px-3 py-2 text-sm resize-none focus:outline-none focus:border-black transition-colors"
                    rows={3}
                  />
                </div>

                {/* Navigate to practice */}
                <button
                  onClick={() => {
                    setState({ practiceFilter: concept.n });
                    // Will be handled by parent
                  }}
                  className="text-sm text-black border border-black rounded px-4 py-2 hover:bg-black hover:text-white transition-colors"
                >
                  Pratiquer ce concept
                </button>
              </div>
            )}
          </div>
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="text-center py-12 text-gray-400 text-sm">Aucun concept trouve.</div>
      )}
    </div>
  );
}

// ── Archive Section ──────────────────────────────────
function ArchiveSection() {
  const data = safeData();
  const [search, setSearch] = useState('');
  const [phaseFilter, setPhaseFilter] = useState(0);
  const [modalLive, setModalLive] = useState(null);

  const lives = useMemo(() => {
    return (data.lives || []).map(l => ({
      ...l,
      phase: getPhaseForLive(l.id)
    }));
  }, []);

  const filtered = useMemo(() => {
    let list = lives;
    if (phaseFilter > 0) {
      list = list.filter(l => l.phase === phaseFilter);
    }
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(l =>
        (l.t || '').toLowerCase().includes(q) ||
        (l.id || '').toLowerCase().includes(q) ||
        (l.r || '').toLowerCase().includes(q)
      );
    }
    return list;
  }, [lives, phaseFilter, search]);

  const groupedByPhase = useMemo(() => {
    const groups = {};
    filtered.forEach(l => {
      const p = l.phase || 0;
      if (!groups[p]) groups[p] = [];
      groups[p].push(l);
    });
    return groups;
  }, [filtered]);

  const liveDetail = useMemo(() => {
    if (!modalLive) return null;
    return (data.lives || []).find(l => l.id === modalLive.id) || modalLive;
  }, [modalLive]);

  return (
    <div>
      {/* Search + Phase filter */}
      <div className="flex flex-col sm:flex-row gap-3 mb-6">
        <input
          type="text"
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Rechercher un live..."
          className="flex-1 border border-gray-200 rounded px-4 py-2.5 text-sm focus:outline-none focus:border-black transition-colors"
        />
      </div>

      <div className="flex flex-wrap gap-2 mb-6">
        <button
          onClick={() => setPhaseFilter(0)}
          className={`px-3 py-1 text-xs rounded-full border transition-all ${
            phaseFilter === 0 ? 'bg-black text-white border-black' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'
          }`}
        >
          Toutes ({lives.length})
        </button>
        {PHASES.map(p => {
          const count = lives.filter(l => l.phase === p.id).length;
          return (
            <button
              key={p.id}
              onClick={() => setPhaseFilter(p.id)}
              className={`px-3 py-1 text-xs rounded-full border transition-all ${
                phaseFilter === p.id ? 'bg-black text-white border-black' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'
              }`}
            >
              {p.name} ({count})
            </button>
          );
        })}
      </div>

      {/* Grouped lives */}
      {Object.entries(groupedByPhase).sort((a, b) => a[0] - b[0]).map(([phase, phaseLives]) => {
        const phaseInfo = PHASES.find(p => p.id === parseInt(phase)) || { name: 'Autres', months: '' };
        return (
          <div key={phase} className="mb-8">
            <div className="flex items-baseline gap-3 mb-4">
              <h3 className="font-serif text-xl text-black">{phaseInfo.name}</h3>
              <span className="text-xs text-gray-400">{phaseInfo.months} -- {phaseLives.length} lives</span>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              {phaseLives.map(live => (
                <button
                  key={live.id}
                  onClick={() => setModalLive(live)}
                  className="text-left border border-gray-200 rounded p-4 hover:border-black transition-colors"
                >
                  <div className="font-mono text-xs text-gray-400 mb-1">{live.id}</div>

// MTF CHART GENERATION SYSTEM
// ══════════════════════════════════════════════════════

// Subdivide a single HTF candle into N LTF candles that preserve OHLC
function subdivideCandleToLTF(htfCandle, count, pattern) {
  // pattern: 'trend_up', 'trend_down', 'v_shape', 'inv_v', 'chop', 'sweep_low', 'sweep_high'
  const { o, h, l, c } = htfCandle;
  const range = h - l;
  const candles = [];

  if (count < 2) return [{ o: +o.toFixed(5), h: +h.toFixed(5), l: +l.toFixed(5), c: +c.toFixed(5) }];

  // Generate a price path (count+1 points: opens + final close)
  const path = [];
  path.push(o);

  switch (pattern) {
    case 'trend_up': {
      for (let i = 1; i <= count; i++) {
        const t = i / count;
        const noise = (Math.random() - 0.5) * range * 0.12;
        path.push(o + (c - o) * t + noise);
      }
      break;
    }
    case 'trend_down': {
      for (let i = 1; i <= count; i++) {
        const t = i / count;
        const noise = (Math.random() - 0.5) * range * 0.12;
        path.push(o + (c - o) * t + noise);
      }
      break;
    }
    case 'v_shape': {
      const mid = Math.floor(count * 0.4);
      for (let i = 1; i <= count; i++) {
        if (i <= mid) {
          const t = i / mid;
          path.push(o + (l - o) * t + (Math.random() - 0.5) * range * 0.06);
        } else {
          const t = (i - mid) / (count - mid);
          path.push(l + (c - l) * t + (Math.random() - 0.5) * range * 0.06);
        }
      }
      break;
    }
    case 'inv_v': {
      const mid = Math.floor(count * 0.4);
      for (let i = 1; i <= count; i++) {
        if (i <= mid) {
          const t = i / mid;
          path.push(o + (h - o) * t + (Math.random() - 0.5) * range * 0.06);
        } else {
          const t = (i - mid) / (count - mid);
          path.push(h + (c - h) * t + (Math.random() - 0.5) * range * 0.06);
        }
      }
      break;
    }
    case 'sweep_low': {
      const sweepPt = Math.floor(count * 0.35);
      const reversePt = Math.floor(count * 0.5);
      for (let i = 1; i <= count; i++) {
        if (i <= sweepPt) {
          const t = i / sweepPt;
          path.push(o + (l - o) * t + (Math.random() - 0.5) * range * 0.03);
        } else if (i <= reversePt) {
          const t = (i - sweepPt) / (reversePt - sweepPt);
          path.push(l + (o - l) * t + (Math.random() - 0.5) * range * 0.04);
        } else {
          const t = (i - reversePt) / (count - reversePt);
          path.push(o + (c - o) * t + (Math.random() - 0.5) * range * 0.08);
        }
      }
      break;
    }
    case 'sweep_high': {
      const sweepPt = Math.floor(count * 0.35);
      const reversePt = Math.floor(count * 0.5);
      for (let i = 1; i <= count; i++) {
        if (i <= sweepPt) {
          const t = i / sweepPt;
          path.push(o + (h - o) * t + (Math.random() - 0.5) * range * 0.03);
        } else if (i <= reversePt) {
          const t = (i - sweepPt) / (reversePt - sweepPt);
          path.push(h + (o - h) * t + (Math.random() - 0.5) * range * 0.04);
        } else {
          const t = (i - reversePt) / (count - reversePt);
          path.push(o + (c - o) * t + (Math.random() - 0.5) * range * 0.08);
        }
      }
      break;
    }
    case 'chop':
    default: {
      for (let i = 1; i <= count; i++) {
        const t = i / count;
        const base = o + (c - o) * t;
        const noise = (Math.random() - 0.5) * range * 0.35;
        path.push(base + noise);
      }
      break;
    }
  }

  // Force last path point = close
  path[path.length - 1] = c;

  // Clamp all interior path points within [l, h] strictly
  for (let i = 1; i < path.length - 1; i++) {
    path[i] = Math.max(l, Math.min(h, path[i]));
  }

  // Decide which candle gets the global high and which gets the global low
  let highIdx, lowIdx;
  if (pattern === 'v_shape') {
    lowIdx = Math.floor(count * 0.35);
    highIdx = (c > o) ? count - 1 : 0;
  } else if (pattern === 'inv_v') {
    highIdx = Math.floor(count * 0.35);
    lowIdx = (c < o) ? count - 1 : 0;
  } else if (pattern === 'sweep_low') {
    lowIdx = Math.floor(count * 0.35);
    highIdx = count - 1;
  } else if (pattern === 'sweep_high') {
    highIdx = Math.floor(count * 0.35);
    lowIdx = count - 1;
  } else {
    highIdx = Math.floor(Math.random() * count);
    lowIdx = Math.floor(Math.random() * count);
    if (lowIdx === highIdx) lowIdx = (highIdx + 1) % count;
  }

  // Build candles from path
  for (let i = 0; i < count; i++) {
    const cOpen = path[i];
    const cClose = path[i + 1];
    const bodyHi = Math.max(cOpen, cClose);
    const bodyLo = Math.min(cOpen, cClose);
    // Wicks stay strictly within [l, h]
    let wickUp = bodyHi + Math.random() * range * 0.06;
    let wickDown = bodyLo - Math.random() * range * 0.06;
    wickUp = Math.min(h, wickUp);
    wickDown = Math.max(l, wickDown);

    candles.push({
      o: +cOpen.toFixed(5),
      h: +wickUp.toFixed(5),
      l: +wickDown.toFixed(5),
      c: +cClose.toFixed(5)
    });
  }

  // Force exact OHLC constraints
  candles[0].o = +o.toFixed(5);
  candles[candles.length - 1].c = +c.toFixed(5);
  candles[Math.min(highIdx, candles.length - 1)].h = +h.toFixed(5);
  candles[Math.min(lowIdx, candles.length - 1)].l = +l.toFixed(5);

  // Final pass: ensure every candle h >= max(o,c) and l <= min(o,c)
  for (let i = 0; i < candles.length; i++) {
    candles[i].h = +Math.max(candles[i].h, candles[i].o, candles[i].c).toFixed(5);
    candles[i].l = +Math.min(candles[i].l, candles[i].o, candles[i].c).toFixed(5);
  }

  return candles;
}

// Helper: subdivide multiple parent candles into LTF, returning combined array
// with OHLC envelope exactly matching the parents
function subdivideZone(parentCandles, countPerCandle, patterns) {
  const result = [];
  for (let i = 0; i < parentCandles.length; i++) {
    const pat = Array.isArray(patterns) ? (patterns[i] || patterns[patterns.length - 1]) : patterns;
    const cnt = Array.isArray(countPerCandle) ? (countPerCandle[i] || countPerCandle[countPerCandle.length - 1]) : countPerCandle;
    const subs = subdivideCandleToLTF(parentCandles[i], cnt, pat);
    result.push(...subs);
  }
  return result;
}

// Helper: compute OHLC envelope of a candle array
function candleEnvelope(candles) {
  const hh = Math.max(...candles.map(c => c.h));
  const ll = Math.min(...candles.map(c => c.l));
  const oo = candles[0].o;
  const cc = candles[candles.length - 1].c;
  return { o: oo, h: hh, l: ll, c: cc };
}

// Generate realistic candle sequences for a trend
function generateTrendCandles(count, startPrice, direction, volatility, dol) {
  const candles = [];
  let price = startPrice;
  const step = direction === 'bull' ? volatility * 0.3 : -volatility * 0.3;

  for (let i = 0; i < count; i++) {
    const body = (Math.random() * 0.6 + 0.2) * volatility;
    const isTrend = Math.random() > 0.3;
    const dir = isTrend ? (direction === 'bull' ? 1 : -1) : (direction === 'bull' ? -1 : 1);

    const o = price;
    const c = price + dir * body;
    const wickUp = Math.max(o, c) + Math.random() * volatility * 0.4;
    const wickDown = Math.min(o, c) - Math.random() * volatility * 0.4;

    candles.push({
      o: +o.toFixed(5),
      h: +wickUp.toFixed(5),
      l: +wickDown.toFixed(5),
      c: +c.toFixed(5)
    });

    price = c + step * (0.5 + Math.random() * 0.5);
  }

  return candles;
}

  };

}

    const c = Math.max(rangeLow + vol, Math.min(rangeHigh - vol, p + dir * body));

// TRADEZELLA CSV PARSER & ANALYZER
// ══════════════════════════════════════════════════════

function parseTradezellaCsv(csvText) {
  if (!csvText || typeof csvText !== 'string') return [];

  const lines = csvText.split(/\r?\n/).filter(line => line.trim());
  if (lines.length < 2) return [];

  // Parse header
  const header = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());

  // Map columns flexibly
  const colMap = {};
  const mappings = {
    symbol: ['symbol', 'instrument', 'ticker', 'pair', 'asset'],
    side: ['side', 'direction', 'type', 'long/short', 'action'],
    entryDate: ['entry date', 'entry time', 'entry date/time', 'open date', 'date', 'entry_date', 'open_date'],
    exitDate: ['exit date', 'exit time', 'exit date/time', 'close date', 'close_date', 'exit_date'],
    entryPrice: ['entry price', 'entry', 'open price', 'entry_price', 'open_price', 'avg entry'],
    exitPrice: ['exit price', 'exit', 'close price', 'exit_price', 'close_price', 'avg exit'],
    pnl: ['pnl', 'p&l', 'profit', 'profit/loss', 'net p&l', 'pnl/$', 'net pnl', 'realized pnl'],
    pnlPct: ['pnl %', 'pnl/%', 'return', 'return %', 'roi', 'pnl_pct', '% return'],
    lots: ['quantity', 'lots', 'size', 'contracts', 'shares', 'volume', 'qty'],
    setup: ['setup', 'strategy', 'tag', 'setup type', 'pattern'],
    notes: ['notes', 'note', 'comment', 'comments', 'journal', 'description'],
    duration: ['duration', 'hold time', 'holding time', 'time in trade'],
    commission: ['commission', 'fees', 'fee', 'commissions', 'cost']
  };

  Object.entries(mappings).forEach(([key, alternatives]) => {
    const idx = header.findIndex(h => alternatives.some(alt => h.includes(alt)));
    if (idx !== -1) colMap[key] = idx;
  });

  // Parse rows
  const trades = [];
  for (let i = 1; i < lines.length; i++) {
    const values = parseCSVLine(lines[i]);
    if (values.length < 2) continue;

    const get = (key) => {
      const idx = colMap[key];
      return idx !== undefined && idx < values.length ? values[idx].trim() : '';
    };

    const pnlStr = get('pnl').replace(/[$,]/g, '');
    const pnlPctStr = get('pnlPct').replace(/%/g, '');

    const trade = {
      id: 'tz_' + Date.now() + '_' + i,
      symbol: get('symbol') || 'Unknown',
      side: normalizeSide(get('side')),
      entryDate: get('entryDate') || '',
      exitDate: get('exitDate') || '',
      entryPrice: parseFloat(get('entryPrice')) || 0,
      exitPrice: parseFloat(get('exitPrice')) || 0,
      pnl: parseFloat(pnlStr) || 0,
      pnlPct: parseFloat(pnlPctStr) || 0,
      lots: parseFloat(get('lots')) || 0,
      setup: get('setup') || '',
      notes: get('notes') || '',
      duration: get('duration') || '',
      commission: parseFloat(get('commission').replace(/[$,]/g, '')) || 0
    };

    // Skip obviously invalid rows
    if (trade.symbol === 'Unknown' && trade.entryPrice === 0 && trade.pnl === 0) continue;

    trades.push(trade);
  }

  return trades;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

function normalizeSide(s) {
  const lower = (s || '').toLowerCase().trim();
  if (lower.includes('long') || lower.includes('buy') || lower === 'b') return 'long';
  if (lower.includes('short') || lower.includes('sell') || lower === 's') return 'short';
  return lower || 'unknown';
}

function analyzeTrades(trades) {
  if (!trades || trades.length === 0) {
    return { totalTrades: 0, winRate: 0, avgRR: 0, totalPnl: 0, bySymbol: {}, bySetup: {}, mistakes: [], streaks: {} };
  }

  const wins = trades.filter(t => t.pnl > 0);
  const losses = trades.filter(t => t.pnl < 0);
  const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
  const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.pnl, 0) / wins.length : 0;
  const avgLoss = losses.length > 0 ? Math.abs(losses.reduce((s, t) => s + t.pnl, 0) / losses.length) : 1;
  const avgRR = avgLoss > 0 ? avgWin / avgLoss : 0;

  // By symbol
  const bySymbol = {};
  trades.forEach(t => {
    const sym = t.symbol || 'Unknown';
    if (!bySymbol[sym]) bySymbol[sym] = { trades: 0, wins: 0, pnl: 0 };
    bySymbol[sym].trades++;
    if (t.pnl > 0) bySymbol[sym].wins++;
    bySymbol[sym].pnl += t.pnl;
  });
  Object.values(bySymbol).forEach(s => { s.winRate = s.trades > 0 ? Math.round((s.wins / s.trades) * 100) : 0; });

  // By setup
  const bySetup = {};
  trades.forEach(t => {
    const setup = t.setup || 'Non tague';
    if (!bySetup[setup]) bySetup[setup] = { trades: 0, wins: 0, pnl: 0 };
    bySetup[setup].trades++;
    if (t.pnl > 0) bySetup[setup].wins++;
    bySetup[setup].pnl += t.pnl;
  });
  Object.values(bySetup).forEach(s => { s.winRate = s.trades > 0 ? Math.round((s.wins / s.trades) * 100) : 0; });

  // Detect mistakes from notes
  const mistakeKeywords = {
    'FOMO': ['fomo', 'peur de rater', 'fear of missing', 'rushed'],
    'Revenge': ['revenge', 'se refaire', 'anger', 'rage', 'colere'],
    'SL deplace': ['sl move', 'deplace sl', 'moved stop', 'widened stop', 'sl deplace', 'sl elargi'],
    'Overtrading': ['overtrad', 'trop de trade', 'too many', 'exces'],
    'Pas de plan': ['no plan', 'pas de plan', 'impulsive', 'impulsi', 'sans plan'],
    'Hors killzone': ['hors kz', 'outside kz', 'killzone', 'hors session', 'outside session'],
    'Mauvais RR': ['rr mauvais', 'bad rr', 'rr < 2', 'risque trop', 'poor rr'],
    'Taille excessive': ['taille', 'oversize', 'trop gros', 'too large', 'lot trop']
  };

  const mistakes = {};
  trades.forEach(t => {
    const text = ((t.notes || '') + ' ' + (t.setup || '')).toLowerCase();
    Object.entries(mistakeKeywords).forEach(([label, keywords]) => {
      if (keywords.some(kw => text.includes(kw))) {
        mistakes[label] = (mistakes[label] || 0) + 1;
      }
    });
  });

  // Streaks
  let currentStreak = 0;
  let bestWinStreak = 0;
  let bestLossStreak = 0;
  let lossStreak = 0;
  trades.forEach(t => {
    if (t.pnl > 0) {
      currentStreak++;
      lossStreak = 0;
      bestWinStreak = Math.max(bestWinStreak, currentStreak);
    } else if (t.pnl < 0) {
      lossStreak++;
      currentStreak = 0;
      bestLossStreak = Math.max(bestLossStreak, lossStreak);
    }
  });

  return {
    totalTrades: trades.length,
    wins: wins.length,
    losses: losses.length,
    winRate: Math.round((wins.length / trades.length) * 100),
    avgRR: +avgRR.toFixed(2),
    totalPnl: +totalPnl.toFixed(2),
    avgWin: +avgWin.toFixed(2),
    avgLoss: +avgLoss.toFixed(2),
    bySymbol,
    bySetup,
    mistakes,
    bestWinStreak,
    bestLossStreak
  };
}

function generatePersonalizedDrills(analysis) {
  const drills = [];

  if (!analysis || analysis.totalTrades === 0) return drills;

  // Weak symbols
  Object.entries(analysis.bySymbol).forEach(([sym, data]) => {
    if (data.winRate < 50 && data.trades >= 3) {
      drills.push({
        type: 'symbol_focus',
        label: `Focus ${sym}`,
        desc: `Win rate de ${data.winRate}% sur ${sym} — entraîne-toi sur cet actif`,
        priority: 'high',
        scenarioType: 'bullish_crt',
        concept: 'narrative'
      });
    }
  });

  // Mistakes
  if (analysis.mistakes['FOMO']) {
    drills.push({
      type: 'patience',
      label: 'Drill Patience',
      desc: `${analysis.mistakes['FOMO']} trades avec FOMO detecte — travaille la patience`,
      priority: 'high',
      scenarioType: 'no_trade',
      concept: 'psychology'
    });
  }

  if (analysis.mistakes['Revenge']) {
    drills.push({
      type: 'emotional',
      label: 'Gestion emotionnelle',
      desc: `${analysis.mistakes['Revenge']} trades revenge detectes — controle tes emotions`,
      priority: 'high',
      scenarioType: 'no_trade',
      concept: 'psychology'
    });
  }

  if (analysis.mistakes['SL deplace']) {
    drills.push({
      type: 'discipline',
      label: 'Discipline SL',
      desc: `${analysis.mistakes['SL deplace']} SL deplaces — respecte ton plan`,
      priority: 'high',
      scenarioType: 'ob_entry',
      concept: 'risk'
    });
  }

  // RR
  if (analysis.avgRR < 2) {
    drills.push({
      type: 'rr_optimization',
      label: 'Optimiser le RR',
      desc: `RR moyen de ${analysis.avgRR}:1 — vise minimum 2:1`,
      priority: 'medium',
      scenarioType: 'bullish_crt',
      concept: 'entry'
    });
  }

  // Win rate
  if (analysis.winRate < 40) {
    drills.push({
      type: 'accuracy',
      label: 'Precision des entries',
      desc: `Win rate de ${analysis.winRate}% — ameliore tes confirmations`,
      priority: 'high',
      scenarioType: 'fvg_fill',
      concept: 'entry'
    });
  }

  // General drills if nothing specific
  if (drills.length === 0) {
    drills.push({
      type: 'maintenance',
      label: 'Maintien de niveau',
      desc: 'Tes stats sont correctes — continue a pratiquer pour maintenir',
      priority: 'low',
      scenarioType: 'turtle_soup',
      concept: 'crt'
    });
  }

  return drills;
}

// ── Coaching Messages ───────────────────────────────
function getCoachingMessage(context) {
  const { consecutiveWrong, consecutiveRight, answerTime, profile, skipPattern, totalToday } = context;
  if (consecutiveWrong >= 3) {
    return { message: "Pause. Respire. Relis la question avant de répondre.", type: 'warning' };
  }
  if (answerTime < 5) {
    return { message: "Tu ne prends pas le temps d'analyser le chart. Ralentis.", type: 'warning' };
  }
  if (consecutiveRight >= 5) {
    return { message: "Excellent flow. Reste concentré, ne relâche pas.", type: 'success' };
  }
  if (consecutiveRight >= 3) {
    return { message: "Belle série. Continue comme ça.", type: 'success' };
  }
  if (skipPattern) {
    return { message: `Tu évites "${skipPattern}". C'est exactement ce que tu dois travailler.`, type: 'danger' };
  }
  if (totalToday >= 20) {
    return { message: "20 drills aujourd'hui. Beau travail, pense aussi à te reposer.", type: 'info' };
  }
  return null;
}

// ── Weakness Detection & Training ───────────────────
function computeCatScores(drillHistory) {
  const catData = {};
  MENTOR_CATEGORIES.forEach(c => { catData[c.key] = { total: 0, correct: 0 }; });
  drillHistory.forEach(h => {
    const cat = h.cat || 'structure';
    if (!catData[cat]) catData[cat] = { total: 0, correct: 0 };
    catData[cat].total++;
    if (h.correct) catData[cat].correct++;
  });
  const scores = {};
  MENTOR_CATEGORIES.forEach(c => {
    const d = catData[c.key];
    scores[c.key] = d.total === 0 ? 50 : Math.round((d.correct / d.total) * 100);
  });
  return scores;
}

function getWeakestCategories(catScores, count = 3) {
  return Object.entries(catScores)
    .sort((a, b) => a[1] - b[1])
    .slice(0, count)
    .map(e => e[0]);
}

function getStrongestCategories(catScores, count = 2) {
  return Object.entries(catScores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, count)
    .map(e => e[0]);
}

function selectDrillByWeakness(drills, catScores, profileKey, difficultyLevel) {
  const profile = PROFILE_TYPES[profileKey];
  const bias = profile ? profile.drillBias : {};
  const weakCats = getWeakestCategories(catScores, 3);
  const weighted = drills.map(d => {
    let weight = 1;
    const dCat = d.conceptCat || categorize(d.concept, '');
    if (weakCats.includes(dCat)) weight += 5;
    if (bias[dCat]) weight += bias[dCat] * 8;
    const drillLevel = d.level || 0;
    const targetLevel = Math.floor(difficultyLevel);
    const diff = Math.abs(drillLevel - targetLevel);
    if (diff === 0) weight += 3;
    else if (diff === 1) weight += 1;
    return { drill: d, weight };
  });
  const totalWeight = weighted.reduce((sum, w) => sum + w.weight, 0);
  let rand = Math.random() * totalWeight;
  for (const item of weighted) {
    rand -= item.weight;
    if (rand <= 0) return item.drill;
  }
  return weighted[weighted.length - 1].drill;
}

function computeDifficulty(drillHistory, currentLevel) {
  const recent = drillHistory.slice(-20);
  if (recent.length < 5) return currentLevel;
  const recentAccuracy = recent.filter(h => h.correct).length / recent.length;
  const lastFive = drillHistory.slice(-5);
  const lastFiveAcc = lastFive.filter(h => h.correct).length / lastFive.length;
  let newLevel = currentLevel;
  if (recentAccuracy > 0.85 && lastFiveAcc >= 0.8) {
    newLevel = Math.min(4, currentLevel + 0.5);
  } else if (recentAccuracy > 0.7 && lastFiveAcc >= 0.6) {
    newLevel = Math.min(4, currentLevel + 0.25);
  } else if (recentAccuracy < 0.4) {
    newLevel = Math.max(0, currentLevel - 0.5);
  } else if (recentAccuracy < 0.55) {
    newLevel = Math.max(0, currentLevel - 0.25);
  }
  return newLevel;
}

function setMentorState(updates) {
  const mapped = {};
  Object.entries(updates).forEach(([k, v]) => {
    const stateKey = 'mentor' + k.charAt(0).toUpperCase() + k.slice(1);
    mapped[stateKey] = v;
  });
  setState(mapped);
}

// RADAR CHART COMPONENT (SVG)
// ══════════════════════════════════════════════════════
function RadarChart({ scores, size = 280 }) {
  const cats = MENTOR_CATEGORIES;
  const cx = size / 2;
  const cy = size / 2;
  const r = size * 0.38;
  const n = cats.length;
  const angleStep = (2 * Math.PI) / n;

  const pointAt = (i, val) => {
    const a = angleStep * i - Math.PI / 2;
    return {
      x: cx + r * val * Math.cos(a),
      y: cy + r * val * Math.sin(a)
    };
  };

  const gridLevels = [0.25, 0.5, 0.75, 1.0];

  const dataPoints = cats.map((c, i) => {
    const val = Math.max(0.05, Math.min(1, (scores[c.key] || 0) / 100));
    return pointAt(i, val);
  });

  const polyStr = dataPoints.map(p => `${p.x},${p.y}`).join(' ');

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="mx-auto">
      {/* Grid */}
      {gridLevels.map((lv, li) => (
        <polygon
          key={li}
          points={cats.map((_, i) => {
            const p = pointAt(i, lv);
            return `${p.x},${p.y}`;
          }).join(' ')}
          fill="none"
          stroke="#E5E7EB"
          strokeWidth="0.5"
        />
      ))}

      {/* Axes */}
      {cats.map((c, i) => {
        const end = pointAt(i, 1);
        return (
          <line key={i} x1={cx} y1={cy} x2={end.x} y2={end.y}
            stroke="#E5E7EB" strokeWidth="0.5" />
        );
      })}

      {/* Data polygon */}
      <polygon
        points={polyStr}
        fill="rgba(212,168,83,0.15)"
        stroke="#D4A853"
        strokeWidth="2"
      />

      {/* Data points */}
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="3.5"
          fill="#D4A853" stroke="#fff" strokeWidth="1.5" />
      ))}

      {/* Labels */}
      {cats.map((c, i) => {
        const p = pointAt(i, 1.18);
        return (
          <text key={i} x={p.x} y={p.y}
            textAnchor="middle" dominantBaseline="central"
            className="fill-gray-600" style={{ fontSize: '10px', fontFamily: 'Inter' }}>
            {c.short}
          </text>
        );
      })}
    </svg>
  );
}

// ══════════════════════════════════════════════════════
// LINE CHART COMPONENT (SVG)
// ══════════════════════════════════════════════════════
function ProgressLineChart({ data, width = 400, height = 180, color = '#D4A853', label = '' }) {
  if (!data || data.length < 2) {
    return (
      <div className="flex items-center justify-center text-gray-400 text-sm" style={{ height }}>
        Pas assez de données pour le graphique
      </div>
    );
  }

  const maxVal = Math.max(...data.map(d => d.value), 1);
  const minVal = Math.min(...data.map(d => d.value), 0);
  const range = maxVal - minVal || 1;
  const padT = 20, padB = 30, padL = 40, padR = 10;
  const cw = width - padL - padR;
  const ch = height - padT - padB;

  const pts = data.map((d, i) => ({
    x: padL + (i / (data.length - 1)) * cw,
    y: padT + ch - ((d.value - minVal) / range) * ch
  }));

  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
  const areaD = pathD + ` L${pts[pts.length - 1].x},${padT + ch} L${pts[0].x},${padT + ch} Z`;

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ fontFamily: 'JetBrains Mono, monospace' }}>
      {/* Grid */}
      {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => {
        const y = padT + ch - pct * ch;
        const val = minVal + pct * range;
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={width - padR} y2={y} stroke="#f0f0f0" strokeWidth="1" />
            <text x={padL - 5} y={y + 3} textAnchor="end" fontSize="9" fill="#999">{Math.round(val)}</text>
          </g>
        );
      })}

      {/* Area fill */}
      <path d={areaD} fill={color} opacity="0.08" />

      {/* Line */}
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" />

      {/* Points */}
      {pts.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke="white" strokeWidth="1.5" />
      ))}

      {/* Label */}
      {label && (
        <text x={padL} y={12} fontSize="10" fill="#666">{label}</text>
      )}
    </svg>
  );
}

// COACHING TOAST
// ══════════════════════════════════════════════════════
function CoachingToast({ message, type, onDismiss }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setVisible(true), 50);
    const t2 = setTimeout(() => {
      setVisible(false);
      setTimeout(onDismiss, 300);
    }, 5000);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const bgMap = {
    warning: 'bg-yellow-50 border-yellow-300',
    success: 'bg-green-50 border-green-300',
    info: 'bg-blue-50 border-blue-300',
    danger: 'bg-red-50 border-red-300',
    mentor: 'bg-gray-50 border-gray-300'
  };

  const iconMap = {
    warning: '⚠️',
    success: '✨',
    info: '💡',
    danger: '🛑',
    mentor: '🎯'
  };

  return (
    <div className={`fixed top-4 right-4 z-50 max-w-sm border rounded-sm shadow-lg p-4 transition-all duration-300 ${bgMap[type] || bgMap.info} ${visible ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-8'}`}>
      <div className="flex items-start gap-3">
        <span className="text-lg">{iconMap[type] || '💡'}</span>
        <div className="flex-1">
          <p className="text-sm text-gray-800 font-ui leading-relaxed">{message}</p>
        </div>
        <button onClick={() => { setVisible(false); setTimeout(onDismiss, 300); }}
          className="text-gray-400 hover:text-gray-600 text-xs ml-2">✕</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// DIAGNOSTIC QUIZ COMPONENT
// ══════════════════════════════════════════════════════
function DiagnosticQuiz({ onComplete }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [result, setResult] = useState(null);

  const currentQ = DIAGNOSTIC_QUESTIONS[step];

  const handleSelect = useCallback((idx) => {
    setSelectedIdx(idx);
    const newAnswers = [...answers, DIAGNOSTIC_QUESTIONS[step].choices[idx]];
    setAnswers(newAnswers);

    setTimeout(() => {
      if (step < DIAGNOSTIC_QUESTIONS.length - 1) {
        setStep(step + 1);
        setSelectedIdx(null);
      } else {
        // Calculate profile
        const scores = {};
        Object.keys(PROFILE_TYPES).forEach(p => { scores[p] = 0; });
        newAnswers.forEach(a => {
          scores[a.profile] = (scores[a.profile] || 0) + a.weight;
        });
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const profileKey = sorted[0][0];
        setResult(profileKey);
        setShowResult(true);
      }
    }, 400);
  }, [step, answers]);

  const handleConfirm = useCallback(() => {
    setMentorState({ profile: result });
    onComplete(result);
  }, [result, onComplete]);

  if (showResult && result) {
    const prof = PROFILE_TYPES[result];
    return (
      <FadeIn k="diag-result">
        <div className="max-w-lg mx-auto">
          <div className="text-center mb-8">
            <div className="text-5xl mb-4">{prof.icon}</div>
            <h2 className="font-serif text-3xl text-black mb-2">Ton profil : {prof.name}</h2>
            <div className="w-12 h-px bg-gold mx-auto mb-4" />
          </div>

          <div className="bg-white border border-gray-200 rounded-sm p-6 mb-6">
            <p className="text-gray-700 leading-relaxed mb-6">{prof.desc}</p>

            <div className="grid grid-cols-2 gap-6">
              <div>
                <h4 className="text-xs uppercase tracking-wider text-gray-400 mb-2">Forces</h4>
                {prof.strengths.map((s, i) => (
                  <div key={i} className="flex items-center gap-2 text-sm text-green-700 mb-1">
                    <span className="w-1.5 h-1.5 bg-green-500 rounded-full" /> {s}
                  </div>
                ))}
              </div>
              <div>
                <h4 className="text-xs uppercase tracking-wider text-gray-400 mb-2">Faiblesses</h4>
                {prof.weaknesses.map((w, i) => (
                  <div key={i} className="flex items-center gap-2 text-sm text-red-600 mb-1">
                    <span className="w-1.5 h-1.5 bg-red-500 rounded-full" /> {w}
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-6 pt-4 border-t border-gray-100">
              <h4 className="text-xs uppercase tracking-wider text-gray-400 mb-2">Focus recommandé</h4>
              <div className="flex flex-wrap gap-2">
                {prof.focus.map((f, i) => (
                  <span key={i} className="px-3 py-1 bg-gray-100 text-xs text-gray-700 rounded-full">{f}</span>
                ))}
              </div>
            </div>
          </div>

          <div className="flex gap-3">
            <button onClick={() => { setStep(0); setAnswers([]); setSelectedIdx(null); setShowResult(false); setResult(null); }}
              className="flex-1 py-3 border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 rounded-sm transition-colors">
              Refaire le diagnostic
            </button>
            <button onClick={handleConfirm}
              className="flex-1 py-3 bg-black text-white text-sm hover:bg-gray-900 rounded-sm transition-colors">
              Confirmer mon profil
            </button>
          </div>
        </div>
      </FadeIn>
    );
  }

  return (
    <FadeIn k={`diag-${step}`}>
      <div className="max-w-lg mx-auto">
        <div className="text-center mb-8">
          <h2 className="font-serif text-2xl text-black mb-2">Diagnostic du Trader</h2>
          <p className="text-gray-500 text-sm">Question {step + 1} / {DIAGNOSTIC_QUESTIONS.length}</p>
          <div className="mt-3 h-1 bg-gray-100 rounded-full overflow-hidden">
            <div className="h-full bg-black transition-all duration-500"
              style={{ width: `${((step + 1) / DIAGNOSTIC_QUESTIONS.length) * 100}%` }} />
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-sm p-6 mb-6">
          <p className="text-lg text-black font-medium mb-6 leading-relaxed">{currentQ.q}</p>
          <div className="space-y-3">
            {currentQ.choices.map((c, i) => (
              <button key={i}
                onClick={() => handleSelect(i)}
                disabled={selectedIdx !== null}
                className={`w-full text-left p-4 border rounded-sm transition-all duration-200 ${
                  selectedIdx === i
                    ? 'border-black bg-black text-white'
                    : selectedIdx !== null
                    ? 'border-gray-100 text-gray-300 cursor-not-allowed'
                    : 'border-gray-200 text-gray-700 hover:border-gray-400 hover:bg-gray-50'
                }`}>
                <span className="text-sm">{c.text}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </FadeIn>
  );
}
