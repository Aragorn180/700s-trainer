5,"doc":"Cette video est un chapitre fondateur du cursus (chapitre 12, novembre 2024). Les regles definies ici (NFP/FOMC J-1, Forex Factory, hierarchie des news) seront repetees dans quasiment chaque live ulterieur. C'est la pierre angulaire de l'integration "},{"id":"video_2024-11-17_120","t":"Les Doubles Purges - Chapitre 13","d":"2024-11-17","dur":"~27 min","a":"EUR/USD (exemples sur charts reels en 4H, 1H, Daily)","r":"Ce chapitre 13 du mentorship presente en detail le concept des doubles purges, un pilier fondamental du trading selon 700S. La video explique trois methodes pour reperer les doubles purges : le Classical Market Structure Trap, le One Candle Purge, et l'AMD Double Purge. La these centrale est que les vrais mouvements de marche arrivent toujours apres des doubles purges, car le marche a besoin de pr","nc":7,"nr":0,"ns":5,"nq":5,"doc":"Ce chapitre introduit formellement le concept de double purge qui deviendra central dans la doctrine. La methode \"one candle purge\" est explicitement presentee comme recente, nee de l'engouement pour le CRT. Cela montre l'evolution du systeme qui int"},{"id":"video_2024-12-16_167","t":"Chapitre Selection CRT et Backtest : protocole de selection et recolte de data","d":"16 decembre 2024","dur":"~45min","a":"EUR/USD (demonstration backtest)","r":"Video pedagogique (chapitre de formation) consacree a deux sujets fondamentaux : comment selectionner un CRT correctement et comment backtester avec la strategie CRT Turtle Soup. 700S presente un protocole en 4 points obligatoires pour valider un CRT, insistant sur le fait que la selection mecanique ne fonctionne pas (\"les market makers ne sont pas aussi betes que ca\"). La deuxieme partie montre u","nc":7,"nr":6,"ns":3,"nq":5,"doc":"Cette video est fondatrice pour la methodologie de backtest dans le systeme CRT x ICT. Elle formalise le protocole de selection CRT en 4 points qui deviendra la reference dans tous les lives suivants. L'insistance sur le tap reading plutot que le bac"},{"id":"video_2025-01-31_220","t":"Video DOL Long Terme vs Court Terme - Expansion, Retracement et Dealing Range","d":"31 janvier 2025","dur":"~1h00","a":"EUR/USD, DXY (exemples)","r":"Cette video est consacree a la distinction fondamentale entre la DOL long terme et la DOL court terme, deux concepts souvent confondus par les eleves. La DOL long terme correspond aux profils d'expansion (le prix va chercher de la liquidite eloignee), tandis que la DOL court terme correspond aux profils de retracement (le prix revient sur une zone avant de reprendre sa direction). 700S introduit l","nc":7,"nr":0,"ns":3,"nq":5,"doc":"Cette video est fondamentale pour la comprehension de la methode 700S car elle clarifie une confusion recurrente chez les eleves : la difference entre la DOL qui guide la vision et la DOL qui sert d'objectif de trade. Avant cette video, de nombreux e"},{"id":"video_2025-02-27_259","t":"Video 259 - Chapitre : Les differentes manieres d'entrer en troisieme candle (Model 1, 2, 3)","d":"27 fevrier 2025","dur":"~50min (67KB transcript)","a":"Theorique (tous assets, exemples sur CRT daily)","r":"Ce chapitre du mentorship explique en detail les trois manieres d'entrer en troisieme candle d'un CRT. 700S rappelle que tout est base sur le PO3 (Consolidation, Manipulation, Expansion) et presente les trois modeles d'entree : le Model 1 (order block apres le turtle soup), le Model 2 (premier FVG dans l'expansion), et le Model 3 (breaker block). La video insiste sur le fait que l'entree ne se fai","nc":7,"nr":6,"ns":3,"nq":6,"doc":"Ce chapitre marque un tournant dans la pedagogie de 700S car il formalise les trois modeles d'entree qui seront utilises dans tous les lives et analyses ulterieurs. Avant cette video, les entrees etaient enseignees de maniere plus generale. Apres, la"},{"id":"video_2025-03-19_289","t":"Video 289 - Chapitre 17 : Adaptation de la bougie monthly (decomposition et selectivite)","d":"19 mars 2025","dur":"~1h30 (67KB transcript)","a":"GBPUSD 4h, CADCHF weekly, NZDCAD weekly, EURUSD, CADJPY, GBPCHF","r":"Ce chapitre 17 du mentorship est consacre a l'adaptation de la bougie monthly dans la methodologie CRT. 700S montre comment decomposer une bougie monthly en ses composantes weekly (week 1 a week 4/5) pour identifier les meilleures semaines de trading, les DOL long terme, et les moments ou le calendrier economique (NFP, CPI) s'aligne avec la structure du prix. La video couvre plusieurs paires de ma","nc":7,"nr":6,"ns":4,"nq":5,"doc":"Ce chapitre 17 represente l'aboutissement de la construction pedagogique ascendante de 700S : apres avoir enseigne la market structure (ch.2), les CRT (ch.suivants), les entrees (ch. Model 1/2/3), et les profils intraday (ch.7), la video monte au niv"},{"id":"video_2025-06-26_475","t":"Entree en Bougie de Manipulation - Chapitre 18","d":"2025-06-26","dur":"~45 min","a":"Exemples theoriques (Monthly, Weekly, Daily, 4H)","r":"Ce chapitre 18 est un enseignement avance sur l'entree en bougie de manipulation, c'est-a-dire comment rentrer en trade AVANT que la bougie de manipulation ne soit fermee. 700S avertit que ce chapitre n'est PAS pour les debutants car il necessite une maitrise solide de la higher time frame narrative. La video reprend les 7 points fondamentaux avant chaque trade, introduit le concept de high probab","nc":8,"nr":0,"ns":1,"nq":5,"doc":"Ce chapitre marque un tournant dans la doctrine en formalisant l'entree en bougie de manipulation, jusque-la reservee aux lives. C'est la premiere fois que les 7 points sont poses concretement dans un chapitre. Le concept de pre-open liquidity pool e"},{"id":"video_2025-08-07_587","t":"Chapitre 19 - Quarterly Theory, Decomposition PO3 et Classic Shape Q2","d":"7 aout 2025","dur":"~1h30","a":"Tous (concepts universels)","r":"Ce chapitre 19 est considere comme le plus important du cursus 700S ICT. Il introduit la Quarterly Theory et la decomposition de bougies HTF, un changement de paradigme fondamental dans l'approche du trading. Le concept central est que \"chaque bougie possede son propre PO3\" (Power of Three : Range, Manipulation, Distribution), et que toute bougie peut etre decomposee en 4 sous-bougies (Q1, Q2, Q3,","nc":9,"nr":0,"ns":3,"nq":1,"doc":"Ce chapitre est le tournant doctrinal le plus important du corpus 700S. Avant le chapitre 19, la methode etait basee sur des concepts individuels (CRT, turtle soup, DOL, OB, FVG) utilises de maniere relativement independante. Le chapitre 19 unifie to"},{"id":"video_2025-08-30_637","t":"Video 637 - Analyse EURUSD Daily : Structure, DOL et Preparation de Semaine","d":"30 aout 2025","dur":"~0h20","a":"EURUSD, DXY","r":"Cette video courte (environ 20 minutes) est une analyse concentree d'EURUSD en daily, filmee depuis l'application mobile TradingView. 700S analyse la structure recente d'EURUSD avec un focus sur les bougies daily et leur contexte dans la weekly candle. La video montre comment lire les signaux directionnels (close above/below, corps de bougies, meches) et comment en deriver des DOL actionables pour","nc":5,"nr":6,"ns":2,"nq":5,"doc":"Cette video est dans la phase 1 (fondations, aout 2025). L'approche est basique et directe : lecture des bougies, pas de formalisation HTF/LTF narrative ni de decomposition Q1-Q5. C'est l'enseignement le plus simple et accessible du corpus, qui pose "},{"id":"video_2025-09-24_681","t":"Video 681 - Analyse Avancee : Decomposition 3 Mois et DOL sur DXY","d":"24 septembre 2025","dur":"~0h30","a":"DXY, EURUSD","r":"Cette video relativement courte (environ 30 minutes) est une video complementaire au live 094 du meme jour. Elle se concentre sur la decomposition avancee de la bougie 3 mois sur DXY et l'identification des DOL pertinentes pour les prochaines semaines. 700S approfondit la methode de decomposition en Q1-Q5 appliquee specifiquement a la bougie 3 mois de DXY, montrant comment identifier la structure ","nc":5,"nr":6,"ns":3,"nq":5,"doc":"Cette video represente la maturation du concept de decomposition de bougies. Le passage de la simple lecture des bougies (phase 1) a la decomposition systematique en Q1-Q5 avec identification des structures (soup, SIBI, close billot) est une evolutio"},{"id":"video_2025-09-29_696","t":"Video 696 - 3 Trades dans une bougie HTF : Manipulation, Expansion, Retracement","d":"29 septembre 2025","dur":"~35min (52KB transcript)","a":"DXY (weekly decomposition), theorique","r":"Cette video enseigne un concept central de la methodologie CRT : dans une bougie higher time frame, il existe exactement 3 trades possibles - le trade de manipulation, le trade d'expansion et le trade de retracement. 700S decompose une bougie weekly de DXY (open low high close) pour illustrer ces trois phases et avertit sur l'erreur la plus courante : confondre la manipulation avec l'expansion. Le","nc":7,"nr":6,"ns":3,"nq":6,"doc":"Cette video represente une etape importante dans la maturation de la doctrine. Le concept des \"3 trades dans une bougie HTF\" systematise ce qui etait auparavant enseigne de maniere plus intuitive. L'avertissement sur la confusion manipulation/expansi"},{"id":"video_2025-11-28_817","t":"Video 2025-11-28 (#817) - Defense avant Attaque & 50% CRT","d":"","dur":"","a":"","r":"Video de recap hebdomadaire (vendredi 28 novembre 2025) qui introduit deux principes majeurs : \"Defense avant Attaque\" et le 50% CRT comme objectif de carriere. 700S analyse le DXY en 1h montrant la structure de la semaine passee, puis bascule sur le DXY en daily pour montrer les niveaux weekly. Le coeur de la video porte sur le principe que le prix doit d'abord DEFENDRE un niveau (rebond depuis u","nc":6,"nr":0,"ns":3,"nq":5,"doc":"Cette video marque l'introduction du principe \"Defense avant Attaque\" qui deviendra un pilier de la Phase 3. Avant cette video, les entrees etaient basees principalement sur la sequence de distribution (TS > M1 > OB, etc.). Avec ce nouveau principe, "},{"id":"video_2025-12-28_859","t":"Video 2025-12-28 (#859) - Fins de cycle & NQ Monthly CRT","d":"","dur":"","a":"","r":"Video d'analyse de fin d'annee (28 decembre 2025) consacree aux fins de cycle et a la preparation de la nouvelle annee. 700S met en garde contre les fins de cycle (fin de mois, fin de trimestre, fin d'annee) ou la volatilite est reduite et les mouvements moins fiables. Le coeur de l'analyse porte sur le NQ en monthly avec un CRT bullish identifie, le BTCUSDT en weekly avec des SMT multiples et le ","nc":6,"nr":0,"ns":3,"nq":5,"doc":"Cette video represente un moment de reflexion dans la doctrine. Les fins de cycle etaient mentionnees en passant dans les lives precedents ; ici, elles deviennent une regle explicite de non-trading. Le Monday Range comme CRT daily est un concept nouv"},{"id":"video_2026-01-15_888","t":"video_2026-01-15_888 — Chapitre 21 : OHLC / OLHC Avance","d":"","dur":"","a":"","r":"Ce chapitre 21, intitule \"Open High Low Close / Open Low High Close en version avancee\", constitue l'un des coeurs du systeme CRT x ICT de 700S. Il depasse la comprehension basique des bougies (biriche = OHLC, bullish = OLHC) pour introduire la decomposition multi-timeframe de chaque bougie. L'idee centrale : chaque bougie contient des sous-bougies qui reproduisent le meme PO3 (Power of Three) a l","nc":7,"nr":0,"ns":3,"nq":5,"doc":"Ce chapitre 21 represente une avancee majeure dans la doctrine CRT x ICT. Alors que les chapitres precedents traitaient le CRT comme un pattern autonome (purge du high/low, corps de bougie de l'autre cote), ce chapitre integre la dimension fractale c"},{"id":"video_2026-01-18_899","t":"Video 899 - Order Flow et DOL : Vision multi-timeframe DXY (Yearly a Weekly) en week 4 janvier 2026","d":"18 janvier 2026","dur":"~37min (61KB transcript)","a":"DXY, EURUSD, BTC","r":"Cette video \"Order Flow et DOL\" est une analyse complete de DXY du yearly au weekly en preparation de la week 4 de janvier 2026. 700S commence par rappeler le contexte temporel : Q1 du 3-mois, mois de janvier, week 4 - un environnement qui n'est pas high probability. Malgre cela, la video demontre comment construire une Higher Time Frame Narrative solide en empilant les visions yearly, 6-mois, 3-m","nc":7,"nr":7,"ns":6,"nq":7,"doc":"Cette video est un exemple parfait de la Phase 3 (maturation) de la doctrine. La demonstration de la hierarchie entre CRT concurrents en utilisant le temps, les seasonal tendencies, et la decomposition multi-timeframe montre un niveau de sophisticati"},{"id":"video_2026-01-28_917","t":"Video - Week Above / Week Below : concept de creation d'Order Flow et de DOL","d":"28 janvier 2026","dur":"~30min","a":"DXY (exemples theoriques)","r":"Video pedagogique consacree au concept de Week Above et Week Below, utilise dans la creation d'Order Flow et de DOL, et dans la creation de Trends Higher Time Frame. 700S explique ce que signifient ces termes (meche au-dessus ou meche en dessous d'une bougie), comment les reperer sur les charts, et comment les integrer dans l'analyse HTF. La video insiste sur le fait que rien en trading ne doit et","nc":6,"nr":6,"ns":3,"nq":5,"doc":"Cette video fait partie de la phase de consolidation doctrinale (phase 3) ou 700S formalise les concepts individuels qui composent la creation de trends HTF. Le Week Above/Below est un des concepts les plus simples mais aussi les plus mal compris mec"},{"id":"video_2026-03-14_995","t":"Weekly Recap - Close Above, Defense Before Attack et Classic Expansion Week 1","d":"14 mars 2026","dur":"~30 min","a":"DXY, EUR/USD, NQ, BTC, XAU","r":"Ce recap hebdomadaire analyse la semaine ecoulee avec un focus sur le concept de close above comme signal de continuation bullish, la regle de defense before attack, et le pattern de classic expansion en Week 1. 700S rappelle que le close above un niveau cle signifie \"higher prices\" a venir, et que le CRT bearish n'est \"pas interessant\" dans ce contexte car il reviendrait a trader une manipulation","nc":6,"nr":0,"ns":4,"nq":5,"doc":"Ce recap consolide des concepts deja etablis plutot que d'en introduire de nouveaux. La valeur ajoutee est dans l'application contextuelle : montrer quand NE PAS trader (CRT bearish dans contexte bullish) est aussi important que montrer quand trader."},{"id":"video_2026-03-17_1001","t":"Video 2026-03-17 (#1001) - Trade Explanation NQ Algorithmique","d":"","dur":"","a":"","r":"Video d'explication de trade (trade explanation) sur le NQ (Micro E-mini Nasdaq-100 Futures) montrant un trade algorithmique complet du weekly au 15min. 700S decompose le trade depuis la narrative weekly bearish du NQ, puis descend au daily pour identifier la zone d'entree, et enfin zoome au 15min pour l'entree precise. La video met en avant l'alignement de TOUS les filtres du plan en 7 points : D","nc":6,"nr":0,"ns":2,"nq":5,"doc":"Cette video est une demonstration parfaite de la methodologie complete appliquee en temps reel. C'est une video \"de reference\" qui montre ce que donne le plan en 7 points quand il est execute sans deviation. L'accent sur l'alignement de TOUS les filt"},{"id":"video_2026-03-23_1009","t":"Video 2026-03-23 (#1009) - Recolte de Data Avancee","d":"","dur":"","a":"","r":"Video pedagogique avancee consacree a la methodologie de recolte de data (backtesting avance). 700S explique comment analyser systematiquement les mouvements de prix en les decomposant en trois phases : Range, Turtle Soup, Trend. La video utilise le DXY en 4h comme support principal, puis descend en weekly pour montrer la dissection mensuelle des bougies. L'objectif est de construire une base de d","nc":6,"nr":0,"ns":3,"nq":5,"doc":"Cette video represente la boucle de retour de la methodologie sur elle-meme. Apres avoir enseigne les concepts (Phases 1-3), 700S enseigne maintenant comment VERIFIER ces concepts par soi-meme a travers la recolte de data. C'est une etape de maturite"}],"concepts":[{"n":"-","s":["live_081_2025-08-10","live_084_2025-08-21","live_085_2025-08-24","live_088_2025-09-03","live_091_2025-09-14","live_101_2025-10-21","live_102_2025-10-24","live_109_2025-11-09","live_110_2025-11-14","live_114_2025-12-03"],"d":"- **FVG (Fair Value Gap) / BC (Bullish Candle) / CB (Candle Bearish)** : Le FVG est un gap cree par 3 bougies consecutives ou la meche de la bougie 1 et la meche de la bougie 3 ne se chevauchent pas, laissant un \"trou\" au niveau de la bougie 2. \"Le FVG, c'est trois bougies. Le gap entre la meche de la premiere et la meche de la troisieme.\" C'est la","f":30},{"n":"Decomposition Monthly en Weekly","s":["live_087_2025-08-31","live_123_2026-01-15"],"d":"4. **Decomposition Monthly en Weekly** — La Week 1 et la Week 2 fermees a l'interieur de la Monthly candle donnent des data precieuses. La Week 2 qui valide une OB confirme le key level le plus pertinent. L'histoire se repete et c'est anticipable.","f":2},{"n":"NFP week = debut de semaine interessant","s":["live_095_2025-09-28","live_126_2026-02-01"],"d":"2. **NFP week = debut de semaine interessant** — Statistiquement, dans une NFP week, les meilleures journees sont lundi/mardi/mercredi. Un jour avant la NFP, toute purge est interdite car elle a plus de chances d'etre un ajout de liquidite pre-news. La regle s'applique aussi aux heures avant la NFP.","f":2},{"n":"Week 3 = high probability","s":["live_098_2025-10-12","live_122_2026-01-11"],"d":"Week 3 = high probability\n\"Tres bonne week comme la week 2, ca fait partie des weeks les plus a haute probabilite.\" La week 3 peut etre tres interessante pour trader, surtout quand les DOL sont proches et le volume est au rendez-vous.","f":2},{"n":"Tentative vs officiel sur Forex Factory","s":["live_098_2025-10-12","video_2024-11-10_112"],"d":"Tentative vs officiel sur Forex Factory\nLa PPI est en \"tentative\" sur Forex Factory : \"peut etre reporte, annulee ou reellement la. Attendez bien que ce soit officiel... ne pensez pas qu'on va avoir la PPI parce que c'est encore en tentative.\" Regle : tant qu'il n'y a pas un horaire precis, la news n'est pas confirmee.","f":2},{"n":"SMT de DOL","s":["live_103_2025-10-26","live_111_2025-11-16"],"d":"SMT de DOL : prudence sur les gros timeframes\n700S met en garde contre les SMT de DOL sur les tres gros timeframes (3 mois, yearly) : \"les SMT de DOL faites attention parce que la personne qui avait price le fait que la SMT de DOL etait validee, on pouvait repartir a la baisse sur DXY... c'est complexe, c'est dangereux, peut tuer une vision\". Les 5","f":2},{"n":"Open low high close vs Open high low close","s":["live_113_2025-11-30","live_128_2026-02-08"],"d":"Open Low High Close vs Open High Low Close\nL'anticipation de la structure de la weekly candle guide toute la strategie de la semaine. Si on anticipe un open low high close, on cherche le low en debut de semaine. Le close above/below est \"le plus gros signe de retracement en trading\" et influence la direction attendue.","f":2},{"n":"Patience comme qualite fondamentale","s":["live_135_2026-03-08","live_137_2026-03-22"],"d":"4. **Patience comme qualite fondamentale** — 95% de l'apprentissage est de la souffrance. Pour arriver a un haut niveau, il faut le vouloir. C'est une vraie profession, un vrai metier qui prend du temps. Derriere tout trader rentable, il y a du travail — plus que les personnes en apprentissage.","f":2},{"n":"Anti-mecanique","s":["live_141_2026-04-05","video_2025-06-26_475"],"d":"4. **Anti-mecanique** — Exemple reel d'un trader ayant sorti 70k de prop firms au profit puis ayant tout reperdu sur un compte propre. Causes : mauvaise gestion psychologique et setups mecaniques qui ne fonctionnaient plus. Le mecanique peut durer un temps mais au bout de quelques mois c'est la fin.","f":2},{"n":"NQ en yearly","s":["live_082_2025-08-15"],"d":"NQ en yearly : structure runner\nLe chart NQ en yearly (12M, CME) montre une progression haussiere quasi ininterrompue depuis les plus bas de 2019 (autour de 8000) vers les 23800 en 2025. Cette structure \"runner\" est fondamentale pour comprendre que les DOL bearish sur NQ doivent etre contextualisees : un retournement majeur est peu probable sur un ","f":1},{"n":"Bougies semestrielles (6M) et decomposition","s":["live_082_2025-08-15"],"d":"Bougies semestrielles (6M) et decomposition\nLa vue 6M permet de voir les cycles semestriels et d'identifier les points de retournement intermediaires. Les yearly candles peuvent etre decomposees en 2 bougies de 6 mois, puis en 4 bougies de 3 mois, etc.","f":1},{"n":"Key levels en yearly pour le contexte","s":["live_082_2025-08-15"],"d":"Key levels en yearly pour le contexte\nLes niveaux de prix identifies en yearly (open yearly, 50% de range yearly, etc.) servent de contexte pour les trades en weekly et daily. Meme si on ne trade pas directement sur le yearly, ces niveaux influencent la lecture des DOL.","f":1},{"n":"Analyse multi-paires derivee","s":["live_082_2025-08-15"],"d":"Analyse multi-paires derivee\nApres NQ, l'analyse DXY puis EURUSD suit la methodologie standard. La vision sur les paires forex est toujours derivee de DXY.","f":1},{"n":"Preparation de la semaine","s":["live_082_2025-08-15"],"d":"Preparation de la semaine\nCalendrier economique analyse, identification des jours cles de la semaine, et priorites de trading etablies. Le format est le meme que les lives ulterieurs mais en phase plus precoce de la doctrine.","f":1},{"n":"Lecture des bougies daily dans le contexte weekly","s":["live_083_2025-08-17"],"d":"Lecture des bougies daily dans le contexte weekly\n700S montre comment chaque bougie daily raconte une histoire dans le contexte de la weekly candle en cours. La position du prix par rapport a l'open weekly, la sequence des bougies (bullish puis bearish ou l'inverse), et les corps de bougies par rapport aux precedentes sont des indicateurs cles.","f":1},{"n":"Close above/below sur EURUSD","s":["live_083_2025-08-17"],"d":"Close above/below sur EURUSD\nLe close above (corps de bougie ferme au-dessus de la precedente) est le signal de retracement le plus fort dans une trend bearish. L'observation de ces closes sur le daily d'EURUSD guide la lecture de la weekly candle : un close above peut indiquer une manipulation avant la continuation bearish.","f":1},{"n":"Utilisation de TradingView mobile","s":["live_083_2025-08-17"],"d":"Utilisation de TradingView mobile\nLe live montre que 700S utilise TradingView sur mobile pour certaines analyses rapides. Les frames montrent l'interface mobile avec EURUSD en daily, le badge \"700S ICT\" visible. Cela illustre que l'analyse ne necessite pas un setup complexe.","f":1},{"n":"DOL sur EURUSD derivees de DXY","s":["live_083_2025-08-17"],"d":"DOL sur EURUSD derivees de DXY\nMeme a ce stade precoce, 700S rappelle que les DOL pertinentes pour EURUSD sont derivees de l'analyse de DXY. Les niveaux identifies sur DXY sont traduits en niveaux inverses sur EURUSD.","f":1},{"n":"Structure des bougies daily","s":["live_083_2025-08-17"],"d":"Structure des bougies daily : meches et corps\nL'importance des meches (wicks) par rapport aux corps : une grande meche superieure sur une bougie daily indique une forte rejection, tandis qu'un grand corps plein indique une conviction. La lecture des meches aide a anticiper la prochaine bougie.","f":1},{"n":"Weekly CRT et horaire de purge","s":["live_086_2025-08-29"],"d":"1. **Weekly CRT et horaire de purge** : Pour les Daily CRT, l'horaire de purge est obligatoire a verifier. Pour le swing trading via Weekly CRT, c'est un niveau avance ou l'on peut passer outre : \"le niveau de passer outre si l'horaire de purge n'est pas high probability, c'est un niveau avance\".","f":1},{"n":"Ne pas perdre confiance sur la HTF Narrative","s":["live_086_2025-08-29"],"d":"2. **Ne pas perdre confiance sur la HTF Narrative** : Quand le prix consolide ou retrace, beaucoup de traders perdent confiance. 700S martele : \"tant que votre HTF Narrative est posee avec une vision avancee parfaite, vous n'avez pas a douter. Tout mouvement contraire n'est qu'un ajout de liquidite.\"","f":1},{"n":"Butterfly Effect Model (variante)","s":["live_086_2025-08-29"],"d":"3. **Butterfly Effect Model (variante)** : Entree sur la troisieme candle du CRT Weekly. Extremement risque mais offre de gros RR. \"Ce n'est pas du tout quelque chose a faire pour les debutants ou intermediaires.\" La version pure necessiterait de descendre en 4h puis 15min pour attendre le Modele 1.","f":1},{"n":"Sequence de distribution en 4h","s":["live_086_2025-08-29"],"d":"4. **Sequence de distribution en 4h** : Turtle Soup du CRT Low -> Validation OB -> Modele 1 -> Modele 2 -> OTE. 700S decompose chaque etape et distingue OB vs Modele 1 : \"un Modele 1, c'est un OB++\".","f":1},{"n":"Defense > Attaque","s":["live_086_2025-08-29"],"d":"5. **Defense > Attaque** : \"La defense est toujours plus importante que l'attaque en trading.\" Face a de grosses pips (meches), il vaut mieux attendre. Le prix ne bouge que pour trois raisons : generer, purger ou fill de la liquidite.","f":1},{"n":"Trois trades dans une bougie","s":["live_086_2025-08-29"],"d":"6. **Trois trades dans une bougie** : Manipulation, expansion, retracement. Le meilleur trade est l'expansion vers les DOL. \"Le pire des trois c'est la manipulation.\"","f":1},{"n":"SMT de key level","s":["live_086_2025-08-29"],"d":"7. **SMT de key level** : Sur une paire on fillet un key level (Modele 2), sur une autre on ne le fillet pas. Cela cree une divergence (SMT) exploitable.","f":1},{"n":"Cycles fractals et renouvellement","s":["live_087_2025-08-31"],"d":"1. **Cycles fractals et renouvellement** : \"Chaque nouvelle bougie quand on parle fractale est interessante, chaque nouveau cycle est interessant.\" 700S insiste sur l'importance de chaque ouverture de cycle comme point de depart d'une nouvelle opportunite d'analyse.","f":1},{"n":"Sondage directionnel DXY","s":["live_087_2025-08-31"],"d":"3. **Sondage directionnel DXY** : 700S demande aux membres de voter bullish ou bearish pour le mois prochain (pas la semaine), entrainant une reflexion sur la distinction entre horizon court terme et moyen terme.","f":1},{"n":"Logique algorithmique des opens","s":["live_087_2025-08-31"],"d":"4. **Logique algorithmique des opens** : \"Les moments les plus pertinents c'est au debut de candle. C'est pour ca que le temps domine sur le prix.\" Demonstration sur plusieurs monthly candles du pattern Open-Turtle Soup-Expansion.","f":1},{"n":"Squelette des bougies monthly","s":["live_087_2025-08-31"],"d":"5. **Squelette des bougies monthly** : Analyse de plusieurs monthly candles passees pour identifier les modeles recurrents : Open, Turtle Soup, Re-open, Mickey T-Pool, expansion vers les DOL.","f":1},{"n":"Modele 1 sur les monthly candles","s":["live_087_2025-08-31"],"d":"6. **Modele 1 sur les monthly candles** : \"Ce modele 1 a ete respecte durant tout l'OLHC qu'on a eu dans cette bougie.\" Demonstration que le Modele 1 (Open-TS-Expansion) se repete sur les timeframes superieures.","f":1},{"n":"Strategies mecaniques = liquidite des market makers","s":["live_089_2025-09-05"],"d":"Strategies mecaniques = liquidite des market makers\n700S montre un exemple sur NQ ou des traders utilisant des flags/channels achetent et vendent dans un range, gagnent temporairement, puis perdent tout sur un mouvement violent : \"Toute strategie mecanique peut durer un temps... c'est normal c'est mecanique. Quand on parle de mecanique le meilleur ","f":1},{"n":"La verite sur les robots de trading","s":["live_089_2025-09-05"],"d":"La verite sur les robots de trading\n\"Robot trading vous lui donnez premiere etape deuxieme etape troisieme etape, des que les trois etapes sont remplies tu rentres en achat ou en vente. Purement mecanique, ca fonctionnera jamais.\" Les robots peuvent etre profitables sur une courte periode mais \"sur le long terme jamais\".","f":1},{"n":"Psychologie de la perte","s":["live_089_2025-09-05"],"d":"Psychologie de la perte : surconfiance post-gains\nLe trader mecanique gagne dans le range, developpe de la surconfiance, augmente son risque, puis est detruit par la rupture du range : \"ils viennent meme potentiellement avoir une surconfiance dans leur vision a mettre un enorme risque dans ces zones, par la suite ils viennent a tout perdre en une s","f":1},{"n":"Range comme outil de collecte de liquidite","s":["live_089_2025-09-05"],"d":"Range comme outil de collecte de liquidite\nLe range n'est pas que du \"choppy price action\". C'est un outil algorithmique de collecte de liquidite : \"un enorme range qui a influence acheteurs, vendeurs, acheteurs, vendeurs, on soupe un cote du range pour aller chercher le cote oppose.\" La distinction entre le range visuel et le range fonctionnel est","f":1},{"n":"Double purge et influence psychologique","s":["live_089_2025-09-05"],"d":"Double purge et influence psychologique\nLa double purge (purge des deux cotes du range) est l'outil ultime de manipulation : elle fait croire aux acheteurs que la direction est haussiere, puis aux vendeurs que la direction est baissiere, avant de partir dans la vraie direction. \"Belle pips bullish qui influence encore plus d'acheteurs a entrer.\"","f":1},{"n":"Profession a somme nulle","s":["live_089_2025-09-05"],"d":"Profession a somme nulle\n\"C'est une profession a somme nulle... quand vous gagnez quelqu'un perd en face. Oui c'est pas tres moral, il faut bien s'en sortir d'une facon.\" 700S assume la realite du trading : les gains sont finances par les pertes des autres.","f":1},{"n":"Choppy price action et market profiles","s":["live_089_2025-09-05"],"d":"Choppy price action et market profiles\nDans le cadre des market profiles, le choppy price action est un indicateur de range. Mais le range peut prendre des formes differentes : \"le range n'est pas que sous forme de choppy price action\" - il peut aussi se manifester par des mouvements plus amples qui creent de la liquidite dans les deux sens.","f":1},{"n":"Wick Above = DOL en dessous","s":["live_090_2025-09-07"],"d":"1. **Wick Above = DOL en dessous** : Sur le yearly DXY, une meche au-dessus de la bougie precedente indique une DOL en dessous. C'est le concept de \"Week Above\" applique au yearly : \"cette DOL m'est donnee par cette meche au-dessus de cette bougie\".","f":1},{"n":"CRT 6 mois","s":["live_090_2025-09-07"],"d":"2. **CRT 6 mois** : 700S identifie un CRT en 6 mois sur DXY qui donne la meme DOL que le yearly. Bougie de range, bougie de manipulation, distribution. \"Ca prend le temps qu'il faut mais distribution vers potentiellement ce CRT long.\"","f":1},{"n":"Decomposition en quartiles (Q1-Q4)","s":["live_090_2025-09-07"],"d":"3. **Decomposition en quartiles (Q1-Q4)** : Chaque bougie (yearly, 3 mois, monthly) se decompose en 4 quartiles. Q2 cree souvent le low de la yearly candle (Classic Shape). \"La selection du CRT descend de la decomposition d'une bougie a yearly timeline. Et personne ne l'explique.\"","f":1},{"n":"Heure de New York obligatoire","s":["live_090_2025-09-07"],"d":"4. **Heure de New York obligatoire** : Rappel que tous les horaires du systeme sont en heure de New York car \"les algos tournent sur ces horaires\".","f":1},{"n":"Double Purge bearish sur NQ","s":["live_090_2025-09-07"],"d":"5. **Double Purge bearish sur NQ** : En weekly, 700S identifie une double purge bearish (cell stop puis bull stop purges dans les deux sens) comme signe de potentiel retracement, mais precise que ce n'est pas high probability car les indices sont naturellement bullish.","f":1},{"n":"Narrative low probability vs high probability","s":["live_090_2025-09-07"],"d":"6. **Narrative low probability vs high probability** : 700S distingue clairement les narratives selon leur niveau de probabilite et deconseille aux debutants de trader les narratives low probability sur NQ.","f":1},{"n":"Ne pas sauter sur les setups","s":["live_092_2025-09-15"],"d":"1. **Ne pas sauter sur les setups** : Mise en garde fondamentale repetee en debut de live. \"Dans l'oeil d'un amateur il y a enormement de setups, dans l'oeil d'un expert il y en a tres peu.\" Meme si les 50% du weekly semblent cocher, il ne faut pas entrer si le CRT bullish n'existe pas.","f":1},{"n":"Pas de CRT = pas d'entree","s":["live_092_2025-09-15"],"d":"2. **Pas de CRT = pas d'entree** : Regle absolue. Si le CRT bullish n'est pas valide (pas de deuxieme bougie fermee a l'interieur), il est impossible de rentrer. \"Je peux pas rentrer en fait, dans un sens.\"","f":1},{"n":"HTF Narrative de GU","s":["live_092_2025-09-15"],"d":"3. **HTF Narrative de GU** : 700S montre comment construire la HTF Narrative sur une paire qu'il ne trade pas habituellement. La demarche est identique : yearly, 6 mois, 3 mois, monthly, weekly. Il montre que meme sur une paire inhabituelle, le systeme s'applique de maniere uniforme.","f":1},{"n":"Structure du trade complet","s":["live_092_2025-09-15"],"d":"4. **Structure du trade complet** : L'explication suit un protocole precis qui sera formalise dans les lives suivants : (1) Trend HTF avec DOL, (2) Bougie HTF a trader identifiee, (3) Key level pertinent, (4) CRT identifie, (5) Entree en LTF.","f":1},{"n":"Risque de trader plusieurs paires","s":["live_092_2025-09-15"],"d":"5. **Risque de trader plusieurs paires** : 700S reconnait qu'il trade \"un petit peu plusieurs paires majeures\" mais precise que \"c'est pas ce qui est conseille quand on debute. Si vous debutez, vous allez voir beaucoup de setups, donc faites attention.\"","f":1},{"n":"Narrative HTF pas extremement high probability","s":["live_092_2025-09-15"],"d":"6. **Narrative HTF pas extremement high probability** : Meme sur un beau setup, 700S note que la narrative HTF n'est pas hyper high probability, ce qui montre sa transparence analytique. Il prend le trade car le setup specifique est exceptionnel.","f":1},{"n":"Week 4 et reduction des probabilites","s":["live_093_2025-09-21"],"d":"1. **Week 4 et reduction des probabilites** : 700S explique que la derniere semaine du mois est generalement moins favorable au trading. Apres le volume de la week 3, la week 4 presente des narratives \"tres low probability\". Il ne faut pas forcer des trades dans ces conditions.","f":1},{"n":"Approche narrative non-mecanique","s":["live_093_2025-09-21"],"d":"2. **Approche narrative non-mecanique** : Transition majeure dans la pedagogie. Au lieu de cocher des cases mecaniques, les eleves doivent maintenant formuler leur vision \"avec leurs propres mots\". 700S precise : \"c'est beaucoup plus la demarche que doit avoir un trader quand il vient creer son HTF narrative au lieu de cocher des cases mecaniques\".","f":1},{"n":"Revue des visions Outlook","s":["live_093_2025-09-21"],"d":"3. **Revue des visions Outlook** : Les eleves soumettent leurs analyses DXY dans le canal Outlook avant le live du dimanche. 700S les corrige en direct, identifiant les erreurs recurrentes dans la lecture des order flows et le placement des DOL. C'est un exercice pedagogique central.","f":1},{"n":"Prop firms et diversification","s":["live_093_2025-09-21"],"d":"4. **Prop firms et diversification** : FTMO, Blueberry Funded et The 5%ers sont les trois prop firms recommandees. Fundednext est mentionnee avec reserve (problemes de payout signales). Le conseil cle est de diversifier : \"c'est comme l'investissement, ne pas investir dans une seule chose a fond\".","f":1},{"n":"Brokers et fiabilite","s":["live_093_2025-09-21"],"d":"5. **Brokers et fiabilite** : Fusion Markets est le broker recommande depuis longtemps. IC Markets et Vantage FX ont eu des problemes (SL declenches anormalement). Fusion Markets n'a jamais eu ces problemes et son emplacement est ideal.","f":1},{"n":"Strategie unique sur prop firms","s":["live_093_2025-09-21"],"d":"6. **Strategie unique sur prop firms** : Le systeme utilise reste identique partout : \"CRT Turtle Soup correle aux meilleurs concepts ICT, plutot tourne vers le swing trading\", que ce soit en compte reel ou prop firm.","f":1},{"n":"Decomposition de bougies yearly sur NQ","s":["live_094_2025-09-24"],"d":"Decomposition de bougies yearly sur NQ\n700S analyse NQ depuis le yearly : structure haussiere massive (runner), ce qui influence l'attente d'un open low high close plutot qu'un open high low close. \"Sur un tel runner qui est NQ, la future attente d'un open high low close n'est pas forcee a quoi on va s'attendre.\"","f":1},{"n":"Runner vs non-runner","s":["live_094_2025-09-24"],"d":"Runner vs non-runner\nLa nature de l'asset (runner comme NQ ou BTC vs non-runner comme DXY) influence fondamentalement la lecture des CRT et des DOL. Un runner en forte tendance haussiere ne se prete pas mecaniquement a un open high low close meme apres un CRT high.","f":1},{"n":"Quarterly decomposition (Q1-Q5)","s":["live_094_2025-09-24"],"d":"Quarterly decomposition (Q1-Q5)\n700S decompose les bougies en Q1 (premier quart temporel), Q2, Q3, Q4, Q5. \"Q1 range, Q2 soup, Q3 expansion\" est la structure la plus classique. L'identification du moment dans le quarter guide l'anticipation du mouvement.","f":1},{"n":"Market profiles","s":["live_094_2025-09-24"],"d":"Market profiles : range, extension, reversal, retracement\nLes market profiles definissent l'etat actuel du marche dans la LTF narrative. \"Range, extension, reverse, retracement, on est dans quoi actuellement ?\" C'est une question cle avant tout trade.","f":1},{"n":"XAU comme paire a potentiel sans setup","s":["live_094_2025-09-24"],"d":"XAU comme paire a potentiel sans setup\nL'analyse de XAU montre des DOL bullish au-dessus mais l'absence de creation de range propre pour un turtle soup empeche la formation d'un setup. \"XAU ne recree pas de beau range pour venir soup ce range et creer l'expansion vers notre DOL.\"","f":1},{"n":"Importance du temps face au prix","s":["live_094_2025-09-24"],"d":"Importance du temps face au prix\n\"Le temps passe toujours avant le prix, ca n'a pas change.\" La decomposition temporelle des bougies (quand sommes-nous dans le cycle) precede l'analyse des niveaux de prix.","f":1},{"n":"Numerotation des weeks","s":["live_095_2025-09-28"],"d":"1. **Numerotation des weeks** — 700S considere la Week 1 comme la premiere bougie weekly qui ouvre sur la nouvelle candle Monthly. Si la Week 5 de l'ancien mois chevauche le nouveau mois, elle est consideree Week 1 a condition que l'open de la nouvelle candle Monthly tombe dedans. Lundi et mardi peuvent encore appartenir a l'ancien mois.","f":1},{"n":"Fin de cycle 3 mois","s":["live_095_2025-09-28"],"d":"3. **Fin de cycle 3 mois** — En fin de cycle, les purges ne sont pas high probability. Des traders s'interdisent completement de trader les fins de cycles aussi grosses que le 3 mois. C'est un moment d'observation, pas d'action.","f":1},{"n":"DOL long terme et SMT de DOL","s":["live_095_2025-09-28"],"d":"4. **DOL long terme et SMT de DOL** — Deux visions existent : ceux qui considerent que les DOL long terme de DXY sont toujours valides (car non atteintes sur DXY meme), et ceux qui considerent qu'elles ont ete prises via SMT avec EUR/USD (qui a atteint le CRT high en 6 mois et le close opposite). Les deux visions peuvent etre bullish grace a la dec","f":1},{"n":"Correlation RR/Winrate","s":["live_095_2025-09-28"],"d":"5. **Correlation RR/Winrate** — La rentabilite n'est qu'une correlation entre RR et winrate. Le minimum par trade est 2 RR dans ce systeme. Un RR en dessous n'est pas interessant au niveau de cette correlation. Les RR de 6-10 sont possibles en niveau avance en laissant tourner les trades vers les DOL higher timeframe.","f":1},{"n":"Partiels et niveau","s":["live_095_2025-09-28"],"d":"6. **Partiels et niveau** — Les debutants/intermediaires doivent prendre beaucoup de partiels car leurs setups sont naturellement de moindre probabilite. Par la suite, les partiels deviennent de 5-10-15%. Partiel au 50% et full TP au cote oppose du CRT pour les debutants.","f":1},{"n":"SMT les plus utilisees","s":["live_095_2025-09-28"],"d":"7. **SMT les plus utilisees** — DXY → EUR/USD, NQ → SPX500 (ES en futures), BTC → ETH, XAU → XAG. Ce sont les paires les plus correlees pour faire des SMT.","f":1},{"n":"Mercredi = journee pivot","s":["live_095_2025-09-28"],"d":"8. **Mercredi = journee pivot** — Dans cette semaine specifique, mercredi ouvre les nouveaux cycles Monthly et 3 mois, ce qui en fait la journee la plus interessante pour les purges et les turtle soups.","f":1},{"n":"Preparation hebdomadaire dominicale","s":["live_096_2025-10-05"],"d":"1. **Preparation hebdomadaire dominicale** — Le dimanche est dedie a la preparation de la nouvelle semaine : decomposition du calendrier economique, creation de la Higher Timeframe Narrative, identification des Order Flows et DOL, determination de la direction biriche ou bullish. Le samedi sert a la review de la semaine passee.","f":1},{"n":"Blueberry prop firm","s":["live_096_2025-10-05"],"d":"2. **Blueberry prop firm** — Partenariat confirme par 700S comme legitime : vrai broker derriere, payouts reels. Cela fait partie de l'ecosysteme du mentorship pour les traders qui veulent scaler vers des comptes finances.","f":1},{"n":"Week 1 et nouveaux cycles","s":["live_096_2025-10-05"],"d":"3. **Week 1 et nouveaux cycles** — La semaine est identifiee comme Week 1, ouvrant un nouveau mois et un nouveau cycle de 3 mois. Mercredi est le point pivot car c'est le premier jour ouvrable du nouveau cycle (les deux premiers jours appartiennent encore a l'ancien mois).","f":1},{"n":"Problemes de plateforme","s":["live_096_2025-10-05"],"d":"4. **Problemes de plateforme** — Les lives sont heberges sur Telegram malgre ses limitations (bugs, serveurs instables). Plusieurs alternatives ont ete testees (Google Meet, etc.) mais Telegram reste la meilleure plateforme pour la gestion globale du groupe prive et les rediffusions.","f":1},{"n":"Rediffusion comme outil d'apprentissage","s":["live_096_2025-10-05"],"d":"5. **Rediffusion comme outil d'apprentissage** — Les rediffusions sont essentielles pour les absents et pour revoir les concepts. L'enregistrement est lance systematiquement en debut de live.","f":1},{"n":"HTF Narrative via DXY pour EUR/USD","s":["live_097_2025-10-08"],"d":"1. **HTF Narrative via DXY pour EUR/USD** — Pour creer une Higher Timeframe Narrative sur EUR/USD, on analyse DXY. La narrative se construit du plus haut timeframe vers le plus bas : Yearly → 6 mois → 3 mois → Monthly → Weekly. Chaque timeframe apporte des DOL et des order flows qui orientent la direction.","f":1},{"n":"Decomposition Yearly → 3 mois","s":["live_097_2025-10-08"],"d":"2. **Decomposition Yearly → 3 mois** — La Yearly candle se decompose en Q1/Q2/Q3/Q4 (candles de 3 mois). Si Q1 fait l'expansion (high) et Q3 ferme en signe de retracement, cela confirme un OHLC biriche sur la Yearly. Chaque bougie possede son propre OHLC/OLHC interne.","f":1},{"n":"SMT de DOL — deux visions","s":["live_097_2025-10-08"],"d":"3. **SMT de DOL — deux visions** — Les traders qui autorisent les SMT avec les DOL ne considerent plus les DOL long terme de DXY comme valides (car EUR/USD les a prises). Ceux qui ne s'autorisent pas les SMT de DOL gardent ces DOL actives. Les deux visions menent au meme biais bullish grace a la decomposition.","f":1},{"n":"Attente de fermeture des candles","s":["live_097_2025-10-08"],"d":"4. **Attente de fermeture des candles** — On ne peut poser des DOL que quand la bougie est fermee. Dans ce trade, les candles Monthly et 3 mois n'etaient pas encore fermees le dimanche, donc les DOL potentielles ne pouvaient etre notees qu'a partir de mercredi (ouverture du nouveau cycle).","f":1},{"n":"Order Flow Yearly biriche","s":["live_097_2025-10-08"],"d":"5. **Order Flow Yearly biriche** — Close below en Yearly, WIQ above (mesh au dessus) donnant des DOL biriche en Yearly. Ces DOL long terme n'avaient pas ete atteintes sur DXY mais avaient ete prises par EUR/USD (SMT).","f":1},{"n":"Week 1 et nouveau cycle","s":["live_097_2025-10-08"],"d":"6. **Week 1 et nouveau cycle** — Le trade se situe dans la Week 1 d'un nouveau mois et d'un nouveau cycle de 3 mois. Lundi-mardi sont les derniers jours de l'ancien cycle, mercredi ouvre le nouveau. Les anticipations se font avant la fermeture mais les DOL ne se posent qu'apres.","f":1},{"n":"Fed Chair Powell Speaks vs NFP/FOMC","s":["live_098_2025-10-12"],"d":"Fed Chair Powell Speaks vs NFP/FOMC\n\"On peut s'attendre a un tres tres gros volume comme aussi dans certains cas a pas un volume excessif.\" Contrairement a NFP et FOMC, Fed Chair Powell Speaks ne declenche pas systematiquement la regle J-1. On peut avoir le setup avant 12:20 PM et la news sert d'accelerateur.","f":1},{"n":"Purge a l'open avec SMT","s":["live_098_2025-10-12"],"d":"Purge a l'open avec SMT\nExemple concret sur EURUSD : purge visuellement a 12 AM (fin de London), EU n'a pas reussi a souper le low mais GU a soupe a 2 AM (London) avec un SMT. \"C'est ce SMT qui a supporte cette acceleration.\" Demonstration que ce n'est pas obligatoire d'attendre la news pour entrer.","f":1},{"n":"Hierarchie des DOL et pertinence","s":["live_098_2025-10-12"],"d":"Hierarchie des DOL et pertinence\n\"Moins il y a de DOL, moins ca a de probabilites.\" Sur NQ, 4-5 DOL bearish en weekly, 5 jours, 3 jours et 15 jours. Sur XAU, seulement 2 DOL au-dessus, vision bullish mais \"longtemps que j'ai pas eu de trade sur XAU parce que XAU ne recree pas de beau range pour venir soup ce range et creer l'expansion vers notre DO","f":1},{"n":"Thursday Reversal","s":["live_098_2025-10-12"],"d":"Thursday Reversal\nIllustration sur NQ : \"jeudi tiens comme c'est bizarre, jeudi reversal\" - un puissant retournement le jeudi apres accumulation de liquidite toute la semaine, avec une \"double purge bullish belle pips bullish qui influence encore plus d'acheteurs a entrer\" avant le reversal.","f":1},{"n":"Decomposition quarterly (Q1-Q4)","s":["live_099_2025-10-17"],"d":"1. **Decomposition quarterly (Q1-Q4)** : 700S detaille comment chaque quarter d'une bougie trimestrielle a un role specifique. Q1 est la phase d'accumulation, Q2 la distribution, Q3 le mouvement majeur, Q4 le retracement ou la fermeture. Cette decomposition est fractale et s'applique a toutes les timeframes.","f":1},{"n":"DOL comme aimant directionnel","s":["live_099_2025-10-17"],"d":"2. **DOL comme aimant directionnel** : Les DOL ne sont pas de simples niveaux de prix mais des aimants algorithmiques. \"Les DOL agissent comme des aimants.\" Le prix est attire vers les DOL les plus proches dans la direction du trend HTF.","f":1},{"n":"Selectivite des paires","s":["live_099_2025-10-17"],"d":"3. **Selectivite des paires** : Il ne faut pas trader toutes les paires simultanement. La meilleure approche est d'identifier 1-2 paires ou la narrative HTF est la plus claire et les DOL les plus evidentes. Trader trop de paires dilue l'attention et augmente les erreurs.","f":1},{"n":"Correlation DXY/EURUSD","s":["live_099_2025-10-17"],"d":"4. **Correlation DXY/EURUSD** : L'analyse du DXY en miroir avec EURUSD permet une double confirmation. Un mouvement bullish DXY devrait correspondre a un mouvement bearish EURUSD. Toute divergence est un signal d'alerte (potentielle SMT).","f":1},{"n":"Order Flow et confirmation","s":["live_099_2025-10-17"],"d":"5. **Order Flow et confirmation** : L'order flow en 4h et daily donne des indications sur la direction a court terme. Des order blocks bullish ou bearish confirmes en close sont des signaux forts pour la direction de la semaine.","f":1},{"n":"Gestion des paires \"complexes\"","s":["live_099_2025-10-17"],"d":"6. **Gestion des paires \"complexes\"** : Quand une paire ne presente pas de narrative claire (ni DOL bullish ni bearish evidente, pipe non fermee, etc.), il vaut mieux s'abstenir. \"Si c'est pas clair, on ne trade pas.\"","f":1},{"n":"Impact du shutdown sur le calendrier","s":["live_100_2025-10-19"],"d":"1. **Impact du shutdown sur le calendrier** : Les news retardees (CPI en week 4 au lieu de la semaine habituelle) changent completement la dynamique de la semaine. \"C'est pas problematique, mais c'est assez embetant niveau prevision, niveau fluidite habituelle.\"","f":1},{"n":"Double vision et probabilite","s":["live_100_2025-10-19"],"d":"2. **Double vision et probabilite** : 700S presente honnement deux visions opposees pour DXY et refuse de trancher clairement : \"il y a deux visions ou je n'ai pas forcement une vision qui aura plus de sens qu'une autre\". C'est un enseignement majeur sur l'honnetete analytique.","f":1},{"n":"SMT entre DXY et GBP/USD","s":["live_100_2025-10-19"],"d":"3. **SMT entre DXY et GBP/USD** : Un signe de retracement identifie non pas sur DXY ou EUR/USD mais sur GBP/USD (CRT bullish weekly) avec SMT par rapport a DXY et EU. \"Un signe bearish dans une trend bullish, ca peut etre tres dangereux.\"","f":1},{"n":"Week 4 avec 5 weeks dans le mois","s":["live_100_2025-10-19"],"d":"4. **Week 4 avec 5 weeks dans le mois** : Le mois possede 5 weeks. Pour le savoir, il suffit de \"mettre l'open et la fermeture du mois et compter 1, 2, 3, 4, 5\".","f":1},{"n":"CPI et FOMC","s":["live_100_2025-10-19"],"d":"5. **CPI et FOMC : regles differentes** : Un jour avant la NFP ou FOMC, il ne faut pas confirmer la manipulation de la semaine. Mais cette regle ne s'applique pas de la meme maniere a la CPI. La CPI est cependant une des \"news les plus importantes des marches\".","f":1},{"n":"Autonomie avant le live","s":["live_100_2025-10-19"],"d":"6. **Autonomie avant le live** : 700S rappelle fermement : \"Avant le live, faites vos propres HTF narratives, notez vos propres DOL sans aucune aide. Le trading c'est personnel.\"","f":1},{"n":"Review des visions Outlook","s":["live_103_2025-10-26"],"d":"Review des visions Outlook\n700S regarde les visions DXY uniquement, envoyees dans le sous-groupe Outlook avant le live. Il corrige en direct : trop de DOL notees sans concept valide, visions en 15 minutes trop court-termistes, manque de texte explicatif sur les charts. La review de la vision de Babanks montre une approche disciplinee : \"week 3, hig","f":1},{"n":"NFP decalee et impact sur la week","s":["live_103_2025-10-26"],"d":"NFP decalee et impact sur la week\nLa NFP a ete decalee a mercredi (rumeurs de shutdown). Les deux plus grandes news : NFP mercredi et CPI vendredi. Lundi sans news peut quand meme creer le high/low de la semaine. Mardi un jour avant NFP sera peu interessant sauf si lundi a deja cree le high/low.","f":1},{"n":"Les 3 trades dans une bougie HTF","s":["live_103_2025-10-26"],"d":"Les 3 trades dans une bougie HTF\n700S rappelle les trois trades possibles dans une bougie HTF : (1) la manipulation - le plus dangereux, (2) l'expansion - le plus probable et le meilleur mouvement, (3) le retracement - le moins interessant en rendement. \"Le trade le plus interessant, celui avec le plus de rendement, c'est l'expansion vers les DOL.\"","f":1},{"n":"Retracement narratif vs trade de retracement","s":["live_103_2025-10-26"],"d":"Retracement narratif vs trade de retracement\nDistinction cruciale : etre dans un retracement au niveau de la narrative (ex: retracement d'un open high low close yearly) est different de prendre un trade de retracement. \"On n'est pas dans le trade en 3 mois... c'est la creation de la HTF narrative qui nous fait dire qu'on est dans un retracement.\"","f":1}],"rules":[{"n":"Toujours commencer par le macro","d":"Yearly > 6M > 3M avant de descendre dans les TF inferieurs.","s":"live_082_2025-08-15"},{"n":"Runner = prudence sur les DOL bearish","d":"Ne pas projeter des DOL bearish sur un runner haussier de long terme.","s":"live_082_2025-08-15"},{"n":"Coherence multi-TF","d":"Les DOL doivent etre coherentes entre les timeframes pour etre pertinentes.","s":"live_082_2025-08-15"},{"n":"Analyse DXY systematique","d":"Meme quand le focus est sur NQ, DXY reste analyse pour les paires forex.","s":"live_082_2025-08-15"},{"n":"Contexte > pattern","d":"Les niveaux yearly donnent le contexte qui invalide ou valide les patterns en TF inferieur.","s":"live_082_2025-08-15"},{"n":"Daily dans le contexte weekly","d":"Jamais lire une bougie daily isolement, toujours dans le contexte de la weekly candle.","s":"live_083_2025-08-17"},{"n":"Close above = signal de retracement","d":"Le signal le plus fiable pour anticiper un retracement.","s":"live_083_2025-08-17"},{"n":"Meches = rejection, corps = conviction","d":"La structure interne des bougies guide la lecture.","s":"live_083_2025-08-17"},{"n":"TradingView suffisant","d":"Pas besoin d'outils complexes, TradingView (meme mobile) suffit pour l'analyse.","s":"live_083_2025-08-17"},{"n":"EURUSD via DXY","d":"Toujours passer par DXY pour les DOL sur EURUSD.","s":"live_083_2025-08-17"},{"n":"HTF Narrative = confiance indefectible","d":"Ne jamais douter tant que les DOL ne sont pas invalidees, meme si le prix va dans l'autre sens.","s":"live_086_2025-08-29"},{"n":"Defense > Attaque","d":"Ne pas trader dans le sens contraire des DOL meme si le setup semble attractif.","s":"live_086_2025-08-29"},{"n":"Le meilleur trade = expansion","d":"Pas la manipulation, pas le retracement, mais l'expansion vers les DOL.","s":"live_086_2025-08-29"},{"n":"Prix bouge pour 3 raisons","d":"Generer de la liquidite, purger de la liquidite, fill de la liquidite.","s":"live_086_2025-08-29"},{"n":"Mid-month reversal","d":"Un des jours les plus avec probabilite pour des reversals (lundi, mardi, mercredi, jeudi reversal).","s":"live_086_2025-08-29"},{"n":"HTF Narrative de EU se fait sur DXY uniquement","d":"\"L'analyse HTF, la creation de narrative, se fait uniquement sur DXY.\"","s":"live_086_2025-08-29"},{"n":"Temps > Prix","d":"Le temps domine toujours le prix. Les opens de bougies sont les moments les plus pertinents pour l'action des algorithmes.","s":"live_087_2025-08-31"},{"n":"TP par le prix pour debutants","d":"\"Je vous conseillerai toujours pour le moment par le prix si vous etes debutant ou intermediaire, c'est-a-dire a votre 50% du range et aux cotes opposes.\"","s":"live_087_2025-08-31"},{"n":"Fractalite des modeles","d":"Le meme modele (Open-TS-Expansion) se retrouve sur toutes les timeframes, du monthly au daily.","s":"live_087_2025-08-31"},{"n":"Chaque sortie est une entree","d":"Principe de continuite des cycles fractals.","s":"live_087_2025-08-31"},{"n":"Tout mecanique = echec a long terme","d":"Aucune strategie mecanique ne fonctionne sur la duree.","s":"live_089_2025-09-05"},{"n":"Range = liquidite, pas bruit","d":"Le range est un outil algorithmique, pas du bruit de marche.","s":"live_089_2025-09-05"},{"n":"Surconfiance = risque excessif","d":"Les gains dans un range creent une fausse securite qui mene a la destruction.","s":"live_089_2025-09-05"},{"n":"Double purge = signal fort","d":"La purge des deux cotes du range precede souvent le vrai mouvement.","s":"live_089_2025-09-05"},{"n":"Esprit critique obligatoire","d":"\"Travaillez votre esprit critique\" - ne jamais croire aveuglement ce qu'on voit sur les reseaux.","s":"live_089_2025-09-05"},{"n":"Profession a somme nulle","d":"Accepter cette realite pour mieux comprendre la dynamique du marche.","s":"live_089_2025-09-05"},{"n":"Thursday reversal contextuel","d":"Quand ca a du sens dans la decomposition de la weekly candle, pas mecaniquement.","s":"live_089_2025-09-05"},{"n":"Wick above = DOL below, Wick below = DOL above","d":"Regle fondamentale de lecture des order flows sur les bougies HTF.","s":"live_090_2025-09-07"},{"n":"Q2 = souvent le low de la yearly candle","d":"Classic Shape le plus frequent pour les bougies yearly.","s":"live_090_2025-09-07"},{"n":"Chaque bougie a un OHLC","d":"Meme les bougies en 3 mois respectent un open low high close ou open high low close.","s":"live_090_2025-09-07"},{"n":"Ne pas forcer les paires low probability","d":"\"C'est pas la ou il faut forcer la paire a aller dans votre sens.\"","s":"live_090_2025-09-07"},{"n":"Samedi = analyse de la semaine passee, Dimanche = preparation","d":"Workflow hebdomadaire structure.","s":"live_090_2025-09-07"},{"n":"Nettoyer sa chart chaque semaine","d":"\"Chaque semaine vous enlevez tout et vous refaites tout.\"","s":"live_090_2025-09-07"},{"n":"Pas de CRT valide = pas d'entree","d":"Regle absolue, meme si les niveaux de prix semblent bons.","s":"live_092_2025-09-15"},{"n":"Expert vs Amateur","d":"L'expert voit peu de setups, l'amateur en voit partout. La selectivite est une marque de competence.","s":"live_092_2025-09-15"},{"n":"Debutants = une seule paire","d":"Ne pas trader plusieurs paires quand on debute, meme si on voit des setups partout.","s":"live_092_2025-09-15"},{"n":"HTF Narrative meme sur paires inhabituelles","d":"Le systeme s'applique de maniere identique sur toutes les paires. La demarche est universelle.","s":"live_092_2025-09-15"},{"n":"Setup magnifique ≠ high probability garanti","d":"Un beau setup peut coexister avec une narrative HTF pas optimale. La transparence sur ce point est essentielle.","s":"live_092_2025-09-15"},{"n":"Week 4 = prudence maximale","d":"Derniere semaine du mois, pas la plus favorable. Ne pas forcer les paires dans une direction.","s":"live_093_2025-09-21"},{"n":"Diversification des prop firms","d":"Repartir les comptes sur 2-3 prop firms fiables pour limiter le risque de contrepartie.","s":"live_093_2025-09-21"},{"n":"Autonomie analytique","d":"Faire sa propre HTF narrative AVANT le live du dimanche, puis comparer. Le trading est personnel.","s":"live_093_2025-09-21"},{"n":"Brokers fiables uniquement","d":"Fusion Markets recommande. Eviter les brokers avec historique de declenchements SL anormaux.","s":"live_093_2025-09-21"},{"n":"Pas d'approche mecanique","d":"La narrative doit etre construite avec logique et comprehension, pas en cochant des cases.","s":"live_093_2025-09-21"},{"n":"Runner = pas d'open high low close mecanique","d":"Sur un asset en forte tendance, ne pas attendre mecaniquement un retournement.","s":"live_094_2025-09-24"},{"n":"Q1 range, Q2 soup, Q3 expansion","d":"Structure classique de decomposition de bougie.","s":"live_094_2025-09-24"},{"n":"Le temps avant le prix","d":"Toujours determiner ou l'on se trouve dans le cycle temp tat est un SL.","s":"live_137_2026-03-22"},{"n":"Rien sur DXY, EUR/USD, BTC","d":"Aucun trade sur ces actifs durant la Week 3.","s":"live_137_2026-03-22"},{"n":"Vision pour la semaine","d":"Mardi (PMI + bel horaire), mercredi, et potentiellement jeudi si le contexte le permet. Mais en Week 4, pas d'attente excessive.","s":"live_137_2026-03-22"},{"n":"DXY Daily CRT bearish","d":"Un CRT bearish en Daily sur DXY est identifie avec une purge du high de la veille suivie d'un retour sous le range et d'une expansion bearish. Ce CRT est aligne avec la vision bearish HTF de DXY et sert de signal pour entrer long sur EU.","s":"live_138_2026-03-25"},{"n":"EUR/USD entree bullish","d":"En utilisant la correlation inverse, l'entree est prise sur EU en bullish apres confirmation du CRT bearish DXY. Les niveaux d'entree correspondent a un OB en 4h/1h sur EU, avec un SL sous le low de la manipulation et un TP sur la DOL court terme.","s":"live_138_2026-03-25"},{"n":"Breaker blocks weekly","d":"Deux breaker blocks weekly sont identifies et montres comme ayant provoque des reactions significatives du prix. Le premier est un ancien support devenu resistance apres un displacement bearish. Le second est teste comme support apres un retournement. Ces niveaux structurels weekly sont parmi les pl","s":"live_138_2026-03-25"},{"n":"Pre-open liquidity pool application","d":"700S montre sur le chart comment la zone de pre-open London a accumule de la liquidite qui a ete purgee a l'ouverture, creant le mouvement initial de manipulation avant l'expansion dans la direction de la HTF Narrative.","s":"live_138_2026-03-25"},{"n":"Trade 1 - Expansion Monthly BTC","d":"Trend HTF bearish, bougie monthly, trade d'expansion. DOL : close billot en 3 semaines (bearish). Key level identifie en weekly. CRT weekly. Setup A+.","s":"live_140_2026-04-02"},{"n":"Trade 2 - Manipulation BTC","d":"Meme trend HTF, bougie weekly, trade de manipulation (achat dans un contexte bearish). CRT daily bullish comme signe de retracement. Key level : hold of low (swing low). Trade C/C+. Pris sur compte secondaire.","s":"live_140_2026-04-02"},{"n":"Trade 3 - Expansion BTC","d":"Suite du trade 2, le full TP de la manipulation devient l'entree de l'expansion. SIBI daily unfilled en zone premium, modele 1 valide mercredi (nouveau cycle 3 mois + monthly). Setup A+.","s":"live_140_2026-04-02"},{"n":"DXY Weekly Biriche","d":"Double purge biriche, CRT biriche, SMT -- enormement de signes biriches en weekly tous respectes. Le mouvement de la week 2 est un classique mouvement d'expansion biriche.","s":"live_142_2026-04-12"},{"n":"Monthly Close Above","d":"Le close above en monthly est le seul element qui maintient une vision bullish. Sa validation ou invalidation \"en dira tres long\" pour la suite.","s":"live_142_2026-04-12"},{"n":"FVG Weekly / OB Monthly","d":"Les eleves notent un FVG weekly bullish et un OB monthly comme zones d'appui pour un potentiel retournement. Le corps de l'OB se trouve au meme niveau que le FVG.","s":"live_142_2026-04-12"},{"n":"Aucun trade recommande","d":"\"Rien de high probability\" selon 700S. La situation est trop complexe avec des conflits entre time frames.","s":"live_142_2026-04-12"},{"n":"Bullish Market Structure","d":"Demonstration complete : Range (Short Term Lows) -> Turtle Soup sur DOL/Key Level -> MSS (Market Structure Shift) -> Trend bullish avec Intermediate Term Lows confirmes.","s":"video_2024-08-29_22"},{"n":"Bearish Market Structure","d":"Meme logique inversee : Range (Short Term Highs) -> Turtle Soup -> MSS -> Trend bearish avec Intermediate Term Highs confirmes.","s":"video_2024-08-29_22"},{"n":"Exemples visuels","d":"La video utilise des schemas theoriques annotes avec les STS et ITS pour illustrer chaque etape de la structure.","s":"video_2024-08-29_22"},{"n":"Scenario Range > Expansion","d":"700S montre comment identifier un Range (consolidation visible en LTF), puis attendre l'Expansion (break directionnel avec volume). L'entree se fait au debut de l'Expansion, apres confirmation du break du Range. Le SL est de l'autre cote du Range, le TP sur la DOL court terme.","s":"video_2024-09-02_24"},{"n":"Scenario Expansion > Retracement > Expansion","d":"Sequence classique ou une Expansion initiale est suivie d'un Retracement sur un key level, puis d'une nouvelle Expansion dans la meme direction. C'est le setup le plus commun de la methode : attraper la deuxieme Expansion apres le Retracement.","s":"video_2024-09-02_24"},{"n":"Scenario Manipulation","d":"Un faux mouvement (Manipulation) purge la liquidite d'un cote du Range, puis l'Expansion se produit dans la direction opposee. C'est le mecanisme du PO3 en action et la base du turtle soup.","s":"video_2024-09-02_24"},{"n":"Exemples en 15m pour daily","d":"700S montre les profils daily observes en 15m sur des charts reels, illustrant comment identifier chaque profil et anticiper la succession.","s":"video_2024-09-02_24"},{"n":"Scenarios pratiques","d":"700S montre plusieurs scenarios ou les key levels et les profils convergent. Chaque scenario illustre comment identifier le key level, attendre le profil de confirmation, et placer l'entree avec un SL serre. Les exemples couvrent des setups bullish (OB + retracement) et bearish (BB + reversal).","s":"video_2024-09-05_27"},{"n":"Application du tableau d'alignement","d":"Des exemples montrent comment passer du daily key level a la confirmation en 1h, et du 4h key level a la confirmation en 15m. Le processus est toujours descendant : identifier le key level en HTF, chercher la confirmation en LTF.","s":"video_2024-09-05_27"},{"n":"FVG comme zone de reaction","d":"Un exemple montre le prix revenant dans un FVG pour le \"combler\" avant de reprendre sa direction. Le FVG agit comme un aimant qui attire le prix, creant une opportunite d'entree previsible.","s":"video_2024-09-05_27"},{"n":"EURUSD 4h OB bullish","d":"Demonstration en replay d'un OB bullish sur EURUSD en 4h. La derniere bougie baissiere avant le mouvement impulsif haussier est identifiee comme l'OB. Le TS prealable (purge du low precedent) valide la condition 1. Le mouvement impulsif haussier qui suit valide la condition 2. Le retour du prix sur ","s":"video_2024-09-08_36"},{"n":"EURUSD daily OB bearish","d":"Exemple d'OB bearish sur le daily. La derniere bougie haussiere avant la chute est l'OB. Le TS (purge du high precedent) precede l'OB. Le mouvement impulsif baissier confirme la prise de liquidite. L'OB est annote avec les zones corps et meche distinctes.","s":"video_2024-09-08_36"},{"n":"Faux OB vs vrai OB","d":"Contre-exemple montrant une zone qui RESSEMBLE a un OB mais qui n'en est pas un car il n'y a pas eu de prise de liquidite prealable (pas de TS). 700S montre que trader sur ce faux OB mene a un SL. C'est la distinction fondamentale que beaucoup de traders ratent.","s":"video_2024-09-08_36"},{"n":"Structure complete TS + OB + FVG","d":"Le dernier exemple montre la structure complete avec le TS au point de retournement, l'OB en zone de re-entry et le FVG comme confirmation. Les annotations +OB, +TS et FVG sont visibles sur le chart EURUSD daily avec les niveaux de prix.","s":"video_2024-09-08_36"},{"n":"CEW-1 sur EURUSD en replay","d":"Demonstration en replay TradingView d'une CEW-1 bullish sur EURUSD. Le lundi cree le low de la semaine. Le mardi confirme la direction. Le mercredi continue l'expansion. Le jeudi atteint le high de la semaine. Le vendredi consolide pres du high. Les key levels KL-1 et KL-2 sont annotes sur le chart ","s":"video_2024-09-11_39"},{"n":"CEW-2 sur EURUSD","d":"Exemple de CEW-2 avec le label \"CEW-2\" visible en haut du chart. Le lundi est un jour de consolidation. Le mouvement directionnel commence mardi et l'expansion est visible sur les bougies daily avec une acceleration mercredi-jeudi. Les zones grisees montrent les dealing ranges.","s":"video_2024-09-11_39"},{"n":"Structure avec OB et TS","d":"Le dernier exemple montre un daily avec les annotations KL-2, OB, TS (Turtle Soup) et FVG sur le chart EURUSD. Le TS est place au point de retournement et l'OB en zone discount. Le KL-1 est le premier key level en bas et le KL-2 est la zone de target en haut.","s":"video_2024-09-11_39"},{"n":"Normal Protraction","d":"Demonstration theorique du profil avec manipulation au London Open et expansion vers le London Close. Vision en 4h avec CRT de 9pm ou 5pm.","s":"video_2024-09-17_44"},{"n":"Day Led Protraction","d":"Manipulation pre-London (Asian Session), expansion directe au London Open vers le New York Open ou London Close.","s":"video_2024-09-17_44"},{"n":"Vision 4h","d":"Decomposition de la journee en bougies 4h avec identification des bougies de range, de manipulation et d'expansion.","s":"video_2024-09-17_44"},{"n":"Scenario 1 (Bullish)","d":"Premium key level -> LTF expansion -> retracement (pas reversal) -> nouvelle expansion vers discount key level -> reversal -> expansion HTF. C'est la sequence complete d'un trade dans une dealing range bullish.","s":"video_2024-09-20_46"},{"n":"Scenario 2 (inverse)","d":"Meme logique inversee pour les dealing ranges bearish.","s":"video_2024-09-20_46"},{"n":"Exemple sur vrai marche","d":"Swing low pris, swing high pris, dealing range definie. Le prix revient en zone discount dans un FVG bullish (BC = key level discount HTF). Expansion swing depuis ce key level discount qui respecte parfaitement le Monday Range et la logique de dealing range.","s":"video_2024-09-20_46"},{"n":"EURUSD Daily (exemple)","d":"Le chart montre EURUSD en daily depuis mai 2023 a novembre 2024, illustrant comment les mouvements importants coincident avec les annonces economiques majeures. La structure de prix est utilisee pour montrer les reactions typiques aux news.","s":"video_2024-11-10_112"},{"n":"Exemple NFP","d":"Illustration d'un setup valide avant NFP qui se confirme avec la news. Le low de la semaine cree en debut de semaine, la NFP accelere l'expansion vers les DOL.","s":"video_2024-11-10_112"},{"n":"Exemple FOMC","d":"Midweek  une DOL court terme offrait une opportunite de trade dans la direct","s":"video_2025-01-31_220"},{"n":"Illustration du dealing range","d":"Le dealing range est montre sur le chart avec la ligne mediane (50%). Les zones de premium (au-dessus) et discount (en dessous) sont annotees. Les entrees optimales sont en discount pour les achats et en premium pour les ventes.","s":"video_2025-01-31_220"},{"n":"Kiss of death example","d":"Un exemple de kiss of death est montre ou le prix revient tester un ancien support (devenu resistance) avant un mouvement bearish massif. Le test est le dernier contact avant l'expansion, piégeant les traders qui interpretent le retour comme un signal de continuation bullish.","s":"video_2025-01-31_220"},{"n":"CRT Bullish complet","d":"Demonstration visuelle avec la vision HTF a gauche montrant les 3 candles (consolidation, manipulation, distribution) et la vision LTF a droite montrant le detail de l'entree avec les trois modeles. Le stop loss se place sous le low du turtle soup pour les trois modeles, et le take profit vise les D","s":"video_2025-02-27_259"},{"n":"Sequence du Turtle Soup","d":"Le premier point est le soup du CRT low (manipulation). Le deuxieme point est l'entree via Model 1, 2 ou 3 (debut d'expansion). Le troisieme point est l'atteinte des DOL (completion de l'expansion). Cette sequence en trois etapes structure toute la prise de decision.","s":"video_2025-02-27_259"},{"n":"Comparaison des trois modeles","d":"Le Model 1 est recommande pour les debutants car il offre le meilleur ratio confirmation/risque. Le Model 2 est intermediaire. Le Model 3 est pour les traders avances qui comprennent bien la structure du breaker block et acceptent le risque plus eleve de faux signal.","s":"video_2025-02-27_259"},{"n":"GBPUSD 4h","d":"Le premier chart montre GBPUSD en 4h avec le titre du chapitre. L'analyse part probablement d'une vue macro pour descendre vers les entrees en 3rd candle daily.","s":"video_2025-03-19_289"},{"n":"CADCHF Weekly","d":"DOL long terme identifiee en-dessous du prix actuel. La structure weekly montre un potentiel CRT avec des niveaux de consolidation clairs. Les bougies recentes montrent de grandes meches et des corps reduits, indiquant une zone de range avant une potentielle expansion.","s":"video_2025-03-19_289"},{"n":"NZDCAD Weekly","d":"Le chart montre une structure de prix complexe avec des phases de range etendues et des expansions. L'analyse cherche a identifier les CRT weekly et les DOL pertinentes dans le contexte de la decomposition monthly.","s":"video_2025-03-19_289"},{"n":"Multi-paires","d":"L'analyse couvre au moins 6 paires pour trouver la meilleure opportunite. Chaque paire est evaluee selon la clarte de la narrative, la proximite des DOL, et l'alignement avec le calendrier.","s":"video_2025-03-19_289"},{"n":"Setup theorique bullish en Weekly CRT","d":"Week 1 range, Week 2 ouvre et turtle soup la pre-open liquidity pool (= CRT low) un mardi a 3am. Key level en dessous. Sequence de distribution : TS > Model 1 > FVG (Model 2) > Breaker block (Model 3) avec vrai MSS. Entree sur M1, M2 ou M3. OTE se produit, continuation, puis run vers cote oppose. SL","s":"video_2025-06-26_475"},{"n":"Exemples theoriques de decomposition","d":"700S montre plusieurs exemples de decomposition sur differentes time frames pour illustrer les concepts. Chaque exemple montre comment identifier la Classic Shape Q2 et comment placer les entrees en consequence.","s":"video_2025-08-07_587"},{"n":"Monday Range recontextualise","d":"Le Monday Range est explique comme une consequence directe de la Quarterly Theory. Si Q1 (lundi) range et Q2 (mardi) cree le high ou low en 80% des cas, alors le Monday Range est la phase de range du PO3 weekly. \"Le Monday Range, utilise mecaniquement chaque semaine, ca fonctionnera pas sur le long ","s":"video_2025-08-07_587"},{"n":"Application multi-timeframe","d":"La decomposition s'applique a toutes les echelles. Un trader peut decomposer la Yearly pour avo 696"},{"n":"Identification du trade d'expansion","d":"Le trade d'expansion se prend apres l'identification du turtle soup et de la PIPSS sur la bougie de manipulation. On entre via Model 1, 2 ou 3 dans la troisieme candle (distribution) en visant les DOL identifiees en HTF. Le stop loss se place sous le low du turtle soup.","s":"video_2025-09-29_696"},{"n":"DXY defense du 99.400","d":"Le DXY montre une defense claire du niveau 99.400 en milieu de semaine. Apres un rebond depuis ce niveau, le prix attaque le DOL au-dessus (100.300). La defense est visible en 1h avec un double test du niveau suivi d'un MSS haussier. Le trade offre un RR de 2.5:1 avec le 50% CRT comme target.","s":"video_2025-11-28_817"},{"n":"DXY daily niveaux","d":"Le DXY en daily montre les bougies interagissant avec les niveaux de la semaine. Les zones grisees montrent les dealing ranges weekly. Les annotations montrent ou la defense a eu lieu (rebond) et ou l'attaque a suivi (expansion vers le DOL).","s":"video_2025-11-28_817"},{"n":"XAUUSD 4h (Gold)","d":"Le gold en 4h montre un setup avec un profit de 49.831 points (1.188%, 99 000 USD). Le Real MSS est annote avec l'entree visible. L'OB weekly a servi de zone de defense avant l'attaque vers le high. Le trade illustre parfaitement le principe defense-attaque avec un RR exceptionnel.","s":"video_2025-11-28_817"},{"n":"NQ monthly bullish","d":"Le NQ en monthly montre un CRT bullish confirme. La decomposition en weekly montre que la derniere semaine de decembre a cree un low (potential manipulation) qui sert de reference. Le DOL mensuel pour janvier est haussier avec target au-dessus du high de decembre. La confirmation viendra du premier ","s":"video_2025-12-28_859"},{"n":"DXY weekly bearish continuation","d":"Le DXY en weekly reste bearish avec le prix a 98.053 descendant depuis le sommet. Les bougies weekly montrent la continuation de la distribution avec des lower highs. Les niveaux de support sont identifies a 97.000 et 96.500.","s":"video_2025     function getState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...DEFAULT_STATE };
        const parsed = JSON.parse(raw);
        return { ...DEFAULT_STATE, ...parsed };
      } catch (e) {
        console.warn('[700S V7] Failed to read state:', e);
        return { ...DEFAULT_STATE };
      }
    }

    function setState(updater) {
      try {
        const current = getState();
        const next = typeof updater === 'function' ? updater(current) : { ...current, ...updater };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        return next;
      } catch (e) {
        console.warn('[700S V7] Failed to write state:', e);
        return getState();
      }
    }

    function getDayKey(date) {
      const d = date || new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function getPhase(liveId) {
      if (!liveId) return null;
      const numMatch = liveId.match(/(\d+)/);
      if (numMatch) {
        const num = parseInt(numMatch[1], 10);
        for (const phase of DOCTRINAL_PHASES) {
          if (num >= phase.liveRange[0] && num <= phase.liveRange[1]) {
            return phase;
          }
        }
      }
      return null;
    }

    function fmt(n, decimals = 1) {

    function getMasteryPct(mastery, concept) {
      const data = mastery[concept];
      if (!data) return 0;
      const { correct = 0, total = 0 } = data;
      if (total === 0) return 0;
      return Math.round((correct / total) * 100);
    }

    function getHeatmapLevel(count) {
      if (!count || count === 0) return 0;
      if (count === 1) return 1;
      if (count <= 3) return 2;
      if (count <= 6) return 3;
      return 4;
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

      if (h < 7) return "Nuit studieuse";
      if (h < 12) return "Bon matin";
      if (h < 18) return "Bon apres-midi";
      return "Bonsoir";
    }

    function getCurrentKillzone() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const t = h * 60 + m;
      if (t >= 480 && t <= 660) return { name: "London", active: true };
      if (t >= 810 && t <= 960) return { name: "New York", active: true };
      if (t >= 120 && t <= 480) return { name: "Asian", active: true };
      return { name: "Off-hours", active: false };
    }

    function getDrillCompletion(drillProgress, concept) {
      const drills = getDrillsByConcept(concept);
      if (drills.length === 0) return 0;
      const completed = drills.filter(d => drillProgress[d.id]?.completed).length;
      return Math.round((completed / drills.length) * 100);
    }

    function getSimCompletion(simProgress, simId) {
      const sim = SIMULATION_BANK.find(s => s.id === simId);
      if (!sim) return 0;
      const prog = simProgress[simId];
      if (!prog) return 0;
      const totalSteps = sim.steps.length;
      const completedSteps = prog.completedSteps || 0;
      return Math.round((completedSteps / totalSteps) * 100);
    }

      if (concepts.length === 0) return 0;
      const total = concepts.reduce((sum, c) => sum + getMasteryPct(conceptMastery, c), 0);
      return Math.round(total / concepts.length);
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('[700S V7] Error caught by boundary:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return React.createElement('div', {
            style: {
              padding: '2rem',
              textAlign: 'center',
              fontFamily: 'Inter, system-ui, sans-serif'
            }
          },
            React.createElement('h2', {
              style: {
                fontFamily: 'Cormorant Garamond, serif',
                fontSize: '1.5rem',
                marginBottom: '1rem'
              }
            }, 'Une erreur est survenue'),
            React.createElement('p', {
              style: {
                color: '#666',
                fontSize: '14px',
                marginBottom: '1rem'
              }
            }, this.state.error?.message || 'Erreur inconnue'),
            React.createElement('button', {
              className: 'btn-primary',
              onClick: () => {
                this.setState({ hasError: false, error: null });
                window.location.reload();
              }
            }, 'Recharger')
          );
        }
        return this.props.children;
      }
    }
