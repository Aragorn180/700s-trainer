// --- CHALLENGE ---
function Challenge30({state,setState}) {
  const startChallenge=()=>{const ns={...state,challengeStartDate:todayStr(),challengeDay:1,challengeCompleted:{}};setState(ns);saveState(ns);};
  const challengeActive=state.challengeStartDate!=null;const challengeDay=challengeActive?Math.min(30,Math.floor((Date.now()-new Date(state.challengeStartDate).getTime())/86400000)+1):0;
  const toggleObjective=(day,objIdx)=>{const ns={...state};const key='day_'+day;if(!ns.challengeCompleted[key])ns.challengeCompleted[key]={completed:false,date:todayStr(),objectives:[]};const objs=[...(ns.challengeCompleted[key].objectives||[])];objs[objIdx]=!objs[objIdx];ns.challengeCompleted[key].objectives=objs;const dayData=CHALLENGE_30[day-1];const allDone=dayData.objectives.every((_,i)=>objs[i]);ns.challengeCompleted[key].completed=allDone;if(allDone&&!ns.challengeCompleted[key].xpAwarded){if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _cr7=DAILY_XP_CAP-((ns.dailyXpLog||{})[todayStr()]||0);const _ax7=Math.min(dayData.xp,Math.max(0,_cr7));ns.xp+=_ax7;ns.dailyXpLog[todayStr()]=((ns.dailyXpLog||{})[todayStr()]||0)+_ax7;ns.challengeCompleted[key].xpAwarded=true;ns.rank=getRank(ns.xp);}setState(ns);saveState(ns);};
  if(!challengeActive){return(<div className="animate-fade-in text-center py-16"><span className="text-6xl block mb-6">&#127942;</span><h2 className="text-3xl font-bold text-white mb-3">30-Day Challenge</h2><p className="text-gray-400 mb-8">30 jours pour devenir discipline.</p><button onClick={startChallenge} className="px-8 py-4 bg-gradient-to-r from-amber-500 to-amber-600 text-black font-bold rounded-xl text-lg">Commencer</button></div>);}
  const weekColors=['#8B5CF6','#06B6D4','#F59E0B','#EF4444'];const weekNames=['Fondations','Repetition','Precision','Transition'];
  return(<div className="animate-fade-in space-y-6"><div className="flex items-center justify-between"><h2 className="text-xl font-bold text-white">30-Day Challenge</h2><span className="text-amber-400 font-bold">Jour {challengeDay}/30</span></div><div className="dojo-card p-4"><div className="h-3 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-purple-500 via-cyan-500 to-red-500 transition-all" style={{width:(challengeDay/30*100)+'%'}}/></div></div>{[1,2,3,4].map(week=>(<div key={week}><h3 className="text-sm font-medium mb-3" style={{color:weekColors[week-1]}}>S{week} — {weekNames[week-1]}</h3><div className="space-y-2">{CHALLENGE_30.filter(d=>d.week===week).map(day=>{const key='day_'+day.day,data=state.challengeCompleted[key]||{objectives:[]};const isCurrent=day.day===challengeDay,isPast=day.day<challengeDay,isFuture=day.day>challengeDay,isComplete=data.completed;return(<div key={day.day} className={`dojo-card p-4 ${isCurrent?'border-amber-500/40':''} ${isFuture?'opacity-50':''}`}><div className="flex items-center justify-between mb-2"><div className="flex items-center gap-2"><div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isComplete?'bg-emerald-500/20 text-emerald-400':isCurrent?'bg-amber-500/20 text-amber-400':'bg-dojo-border text-gray-500'}`}>{isComplete?'\u2713':day.day}</div><span className={`font-medium text-sm ${isCurrent?'text-white':'text-gray-400'}`}>{day.title}</span></div><span className="text-xs font-mono text-amber-400/50">+{day.xp}</span></div>{(isCurrent||isPast)&&<div className="space-y-1.5 ml-9">{day.objectives.map((obj,i)=>{const dn=data.objectives[i];return(<div key={i} className="flex items-center gap-2 cursor-pointer" onClick={()=>!isFuture&&toggleObjective(day.day,i)}><div className={`w-4 h-4 rounded border flex items-center justify-center text-xs ${dn?'bg-emerald-500/20 border-emerald-500 text-emerald-400':'border-gray-600'}`}>{dn?'\u2713':''}</div><span className={`text-xs ${dn?'text-gray-500 line-through':'text-gray-300'}`}>{obj}</span></div>);})}</div>}</div>);})}</div></div>))}</div>);
}

// --- ANALYTICS (PATCH 4: Reset Progress button) ---
function Analytics({state,setState}) {
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const branches=Object.entries(SKILL_BRANCHES);const branchScores=branches.map(([key,branch])=>{const scores=branch.concepts.map(c=>{const s=state.conceptScores[c.id];return(!s||s.total===0)?0:s.correct/s.total*100;});return{key,name:branch.name,icon:branch.icon,color:branch.color,avg:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)};});
  const handleCSVImport=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const lines=ev.target.result.split('\n');const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());const trades=lines.slice(1).filter(l=>l.trim()).map(line=>{const vals=line.split(',');const obj={};headers.forEach((h,i)=>obj[h]=vals[i]?.trim());return obj;});const ns={...state,trades:[...state.trades,...trades]};setState(ns);saveState(ns);}catch(err){}};reader.readAsText(file);};

  const handleResetProgress = () => {
    const ns = defaultState();
    // Preserve settings/preferences but reset XP and progress
    ns.lastActiveDate = todayStr();
    ns.streak = 1;
    ns.dailyMissions = generateDailyMissions(ns);
    ns.missionsDate = todayStr();
    setState(ns);
    saveState(ns);
    setShowResetConfirm(false);
  };

  return(<div className="animate-fade-in space-y-6"><h2 className="text-xl font-bold text-white">Analytics</h2><div className="grid gap-3" style={{gridTemplateColumns:'repeat(3, 1fr)'}}><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-amber-400">{state.totalQuizAnswered}</p><p className="text-xs text-gray-500">Quiz</p></div><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-emerald-400">{state.totalQuizAnswered>0?Math.round(state.totalCorrect/state.totalQuizAnswered*100):0}%</p><p className="text-xs text-gray-500">Precision</p></div><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-purple-400">{(state.arenaStats?.totalArenaXp||0)}</p><p className="text-xs text-gray-500">Arena XP</p></div></div><div className="dojo-card p-5"><h3 className="text-sm text-gray-400 font-medium mb-4">FORCES & FAIBLESSES</h3><div className="space-y-3">{branchScores.map(b=>(<div key={b.key}><div className="flex items-center justify-between mb-1"><span className="text-sm text-gray-300">{b.icon} {b.name}</span><span className="text-sm font-mono" style={{color:b.avg>=80?'#10B981':b.avg>=60?'#F59E0B':b.avg>0?'#EF4444':'#4B5563'}}>{b.avg}%</span></div><div className="h-2 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:b.avg+'%',background:b.color}}/></div></div>))}</div></div><div className="dojo-card p-5"><h3 className="text-sm text-gray-400 font-medium mb-3">IMPORT CSV</h3><label className="inline-block px-4 py-2 bg-dojo-border text-gray-300 rounded-lg cursor-pointer hover:bg-dojo-hover text-sm">Importer <input type="file" accept=".csv" className="hidden" onChange={handleCSVImport}/></label>{state.trades.length>0&&<p className="text-xs text-emerald-400 mt-2">{state.trades.length} trades</p>}</div>

    {/* PATCH 4: Reset Progress */}
    <div className="dojo-card p-5 border-red-500/10">
      <h3 className="text-sm text-gray-400 font-medium mb-3">RESET</h3>
      {!showResetConfirm ? (
        <button onClick={() => setShowResetConfirm(true)} className="px-4 py-2 bg-red-500/10 text-red-400 rounded-lg text-sm hover:bg-red-500/20 border border-red-500/20">
          Reset Progress
        </button>
      ) : (
        <div className="space-y-3">
          <p className="text-sm text-red-400">Confirmer le reset ? XP, rank, quiz, arena, challenge seront remis a zero.</p>
          <div className="flex gap-2">
            <button onClick={handleResetProgress} className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm font-bold border border-red-500/30">Confirmer Reset</button>
            <button onClick={() => setShowResetConfirm(false)} className="px-4 py-2 bg-dojo-border text-gray-400 rounded-lg text-sm">Annuler</button>
          </div>
        </div>
      )}
    </div>
  </div>);
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [state, setState] = useState(loadState);
  const [page, setPage] = useState('dashboard');
  const [subPage, setSubPage] = useState(null);

  useEffect(() => {
    const today = todayStr();
    if (state.missionsDate !== today || state.dailyMissions.length === 0) {
      const ns = { ...state };
      if (state.lastActiveDate) {
        const y = new Date(); y.setDate(y.getDate() - 1);
        // PATCH 5: +2 XP per streak day with daily cap
        ns.streak = state.lastActiveDate === y.toISOString().split('T')[0] ? (state.streak || 0) + 1 : state.lastActiveDate === today ? state.streak : 1;
        if (ns.streak > 1) {
          if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _cr6=DAILY_XP_CAP-((ns.dailyXpLog||{})[today]||0);const _ax6=Math.min(2,Math.max(0,_cr6));ns.xp=(ns.xp||0)+_ax6;ns.dailyXpLog[today]=((ns.dailyXpLog||{})[today]||0)+_ax6;
        }
      } else { ns.streak = 1; }
      ns.lastActiveDate = today;
      ns.longestStreak = Math.max(ns.streak, state.longestStreak || 0);
      ns.dailyMissions = generateDailyMissions(ns);
      ns.missionsDate = today;
      ns.rank = getRank(ns.xp);
      setState(ns); saveState(ns);
    }
  }, []);

  const r = getRank(state.xp);
  const rk = RANKS[r];

  const pages = [
    { id: 'dashboard', label: 'Home', icon: '\u2B21' },
    { id: 'arena', label: 'Arena', icon: '\u2694\uFE0F' },
    { id: 'dojo', label: 'Dojo', icon: '\u26A1' },
    { id: 'mentor', label: 'Mentor', icon: '\uD83E\uDDE0' },
    { id: 'skills', label: 'Skills', icon: '\uD83C\uDF33' },
    { id: 'challenge', label: '30 Days', icon: '\uD83C\uDFC6' },
    { id: 'analytics', label: 'Stats', icon: '\uD83D\uDCCA' },
  ];

  return (
    <div className="min-h-screen bg-dojo">
      <div className="sticky top-0 z-50 bg-dojo/90 backdrop-blur-md border-b border-dojo-border">
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <span className="text-lg font-bold" style={{ color: rk.color }}>700S</span>
              <span className="text-lg font-bold text-white">DOJO</span>
              <span className="text-xs text-gray-600 font-mono">v4</span>
            </div>
            <div className="flex items-center gap-4">
              <StreakFlame streak={state.streak} />
              <RankBadge rankIndex={r} size="sm" />
              <span className="text-xs font-mono text-amber-400">{state.xp} XP</span>
            </div>
          </div>
          <div className="flex gap-1 mt-2 nav-scroll -mx-4 px-4">
            {pages.map(p => (
              <button key={p.id} className={`nav-item px-3 py-1.5 text-sm font-medium whitespace-nowrap ${page === p.id ? 'active text-amber-400' : 'text-gray-500'}`} onClick={() => { setPage(p.id); setSubPage(null); }}>
                <span className="mr-1">{p.icon}</span>{p.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 py-6">
        {page === 'dashboard' && <Dashboard state={state} setState={setState} setPage={setPage} setSubPage={setSubPage} />}
        {page === 'arena' && <ArenaPage state={state} setState={setState} />}
        {page === 'dojo' && <DojoPage state={state} setState={setState} subPage={subPage} setSubPage={setSubPage} />}
        {page === 'mentor' && <MentorPage />}
        {page === 'skills' && <SkillTree state={state} />}
        {page === 'challenge' && <Challenge30 state={state} setState={setState} />}
        {page === 'analytics' && <Analytics state={state} setState={setState} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
