// ============================================================
// CHART ENGINE — Canvas-based candlestick renderer
// ============================================================

const CHART_COLORS = {
  bg: '#0B0B14',
  grid: '#1A1A25',
  bullish: '#10B981',
  bearish: '#EF4444',
  text: '#6B7280',
  crosshair: '#D4A85380',
  entry: '#06B6D4',
  sl: '#EF4444',
  tp: '#10B981',
  ob: '#8B5CF680',
  fvg: '#3B82F640',
  highlight: '#D4A85340',
};

function drawCandlestickChart(ctx, candles, width, height, options = {}) {
  const {
    markers = [],
    zones = [],
    highlightCandles = [],
    visibleCount = candles.length,
    scrollOffset = 0,
    showPriceAxis = true,
    showCandleNumbers = true,
    crosshair = null,
    interactionMode = null,
    zoomLabel = null,
    animateLastCandle = false,
    priceScaleOffset = 0,
  } = options;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = CHART_COLORS.bg;
  ctx.fillRect(0, 0, width, height);

  if (candles.length === 0) return;

  const padding = { top: 20, bottom: showCandleNumbers ? 30 : 15, left: 10, right: showPriceAxis ? 60 : 10 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  const startIdx = Math.max(0, scrollOffset);
  const endIdx = Math.min(candles.length, startIdx + visibleCount);
  const visible = candles.slice(startIdx, endIdx);

  if (visible.length === 0) return;

  let minP = Infinity, maxP = -Infinity;
  visible.forEach(c => { minP = Math.min(minP, c.low); maxP = Math.max(maxP, c.high); });
  markers.forEach(m => { if (m.price) { minP = Math.min(minP, m.price); maxP = Math.max(maxP, m.price); } });
  const priceRange = maxP - minP || 1;
  const pPad = priceRange * 0.08;
  minP -= pPad; maxP += pPad;

  // Apply price scale offset for vertical zoom
  const scaleExpand = priceScaleOffset * 0.002;
  const midP = (minP + maxP) / 2;
  const halfRange = (maxP - minP) / 2;
  minP = midP - halfRange * (1 + scaleExpand);
  maxP = midP + halfRange * (1 + scaleExpand);

  const totalRange = maxP - minP;

  const priceToY = (p) => padding.top + chartH * (1 - (p - minP) / totalRange);
  const yToPrice = (y) => minP + (1 - (y - padding.top) / chartH) * totalRange;
  const candleW = Math.max(3, chartW / visible.length);
  const bodyW = Math.max(2, candleW * 0.65);
  const gap = (candleW - bodyW) / 2;

  // Grid lines
  ctx.strokeStyle = CHART_COLORS.grid;
  ctx.lineWidth = 0.5;
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const y = padding.top + (chartH / gridLines) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
    if (showPriceAxis) {
      const price = yToPrice(y);
      ctx.fillStyle = CHART_COLORS.text;
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText(price.toFixed(price > 100 ? 0 : 4), width - padding.right + 5, y + 3);
    }
  }

  // Zones (OB, FVG)
  zones.forEach(z => {
    const y1 = priceToY(z.high);
    const y2 = priceToY(z.low);
    const x1 = z.startCandle !== undefined ? padding.left + (z.startCandle - startIdx) * candleW : padding.left;
    const x2 = z.endCandle !== undefined ? padding.left + (z.endCandle - startIdx + 1) * candleW : width - padding.right;
    ctx.fillStyle = z.type === 'ob' ? CHART_COLORS.ob : CHART_COLORS.fvg;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    if (z.label) {
      ctx.fillStyle = z.type === 'ob' ? '#8B5CF6' : '#3B82F6';
      ctx.font = 'bold 9px Inter';
      ctx.fillText(z.label, x1 + 3, y1 - 3);
    }
  });

  // Highlight candles
  highlightCandles.forEach(idx => {
    const ci = idx - startIdx;
    if (ci >= 0 && ci < visible.length) {
      const x = padding.left + ci * candleW;
      ctx.fillStyle = CHART_COLORS.highlight;
      ctx.fillRect(x, padding.top, candleW, chartH);
    }
  });

  // Candles
  visible.forEach((c, i) => {
    const x = padding.left + i * candleW;
    const isBull = c.close >= c.open;
    const color = isBull ? CHART_COLORS.bullish : CHART_COLORS.bearish;

    // Wick
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    const wickX = x + candleW / 2;
    ctx.beginPath();
    ctx.moveTo(wickX, priceToY(c.high));
    ctx.lineTo(wickX, priceToY(c.low));
    ctx.stroke();

    // Body
    const bodyTop = priceToY(isBull ? c.close : c.open);
    const bodyBot = priceToY(isBull ? c.open : c.close);
    const bodyH = Math.max(1, bodyBot - bodyTop);
    ctx.fillStyle = color;
    ctx.fillRect(x + gap, bodyTop, bodyW, bodyH);

    // Candle number
    if (showCandleNumbers && (visible.length <= 40 || i % Math.ceil(visible.length / 20) === 0)) {
      ctx.fillStyle = CHART_COLORS.text;
      ctx.font = '9px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(String(startIdx + i + 1), x + candleW / 2, height - 5);
    }
  });

  // Markers (Entry, SL, TP)
  markers.forEach(m => {
    const y = priceToY(m.price);
    if (y < padding.top || y > height - padding.bottom) return;
    ctx.setLineDash(m.type === 'entry' ? [] : [5, 3]);
    ctx.strokeStyle = m.type === 'entry' ? CHART_COLORS.entry : m.type === 'sl' ? CHART_COLORS.sl : CHART_COLORS.tp;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = ctx.strokeStyle;
    ctx.font = 'bold 10px Inter';
    ctx.textAlign = 'right';
    const label = m.type === 'entry' ? 'ENTRY' : m.type === 'sl' ? 'SL' : 'TP';
    ctx.fillText(`${label} ${m.price.toFixed(m.price > 100 ? 0 : 4)}`, width - padding.right - 5, y - 5);

    // Diamond for entry
    if (m.type === 'entry') {
      ctx.fillStyle = CHART_COLORS.entry;
      ctx.beginPath();
      ctx.moveTo(padding.left + 15, y);
      ctx.lineTo(padding.left + 20, y - 5);
      ctx.lineTo(padding.left + 25, y);
      ctx.lineTo(padding.left + 20, y + 5);
      ctx.closePath();
      ctx.fill();
    }
  });

  // Crosshair
  if (crosshair) {
    ctx.strokeStyle = CHART_COLORS.crosshair;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(crosshair.x, padding.top); ctx.lineTo(crosshair.x, height - padding.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(padding.left, crosshair.y); ctx.lineTo(width - padding.right, crosshair.y); ctx.stroke();
    ctx.setLineDash([]);

    const price = yToPrice(crosshair.y);
    ctx.fillStyle = '#D4A85390';
    ctx.fillRect(width - padding.right, crosshair.y - 8, padding.right, 16);
    ctx.fillStyle = '#FFF';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(price.toFixed(price > 100 ? 0 : 4), width - padding.right + 3, crosshair.y + 3);
  }

  // PATCH 5: Zoom label
  if (zoomLabel) {
    ctx.fillStyle = '#D4A85360';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(zoomLabel, padding.left + 5, padding.top + 14);
  }

  return { padding, candleW, chartW, chartH, minP, maxP, totalRange, priceToY, yToPrice, startIdx, endIdx };
}

// ============================================================
// PROCEDURAL CHART GENERATION
// ============================================================

function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }

function makeCandle(open, dir, vol) {
  const bodySize = rnd(vol * 0.2, vol * 1.2);
  const close = dir > 0 ? open + bodySize : open - bodySize;
  const wickUp = rnd(0, vol * 0.6);
  const wickDn = rnd(0, vol * 0.6);
  const high = Math.max(open, close) + wickUp;
  const low = Math.min(open, close) - wickDn;
  return { open: +open.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +close.toFixed(5) };
}

function makeRangeCandles(start, count, vol, center) {
  const candles = [];
  let price = start;
  for (let i = 0; i < count; i++) {
    const dir = price > center ? -1 : price < center - vol ? 1 : (Math.random() > 0.5 ? 1 : -1);
    const c = makeCandle(price, dir, vol * 0.6);
    candles.push(c);
    price = c.close;
  }
  return candles;
}

function makeTrendCandles(start, count, vol, direction) {
  const candles = [];
  let price = start;
  for (let i = 0; i < count; i++) {
    const dir = Math.random() < 0.75 ? direction : -direction;
    const c = makeCandle(price, dir, vol);
    candles.push(c);
    price = c.close;
  }
  return candles;
}

// PATCH 2: Helper to make tight candles (no FVG gaps)
function makeTightCandles(start, count, vol, direction) {
  const candles = [];
  let price = start;
  for (let i = 0; i < count; i++) {
    const dir = Math.random() < 0.75 ? direction : -direction;
    const bodySize = rnd(vol * 0.2, vol * 0.8);
    const close = dir > 0 ? price + bodySize : price - bodySize;
    // Keep wicks small to prevent FVG gaps
    const wickUp = rnd(0, vol * 0.15);
    const wickDn = rnd(0, vol * 0.15);
    const high = Math.max(price, close) + wickUp;
    const low = Math.min(price, close) - wickDn;
    candles.push({ open: +price.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +close.toFixed(5) });
    price = close;
  }
  return candles;
}

// PATCH 2: Helper to make trend without equal highs/lows (no TS structure)
function makeTrendNoEqualLevels(start, count, vol, direction) {
  const candles = [];
  let price = start;
  let prevLow = Infinity;
  let prevHigh = -Infinity;
  for (let i = 0; i < count; i++) {
    const dir = Math.random() < 0.8 ? direction : -direction;
    const bodySize = rnd(vol * 0.3, vol * 1.0);
    const close = dir > 0 ? price + bodySize : price - bodySize;
    const wickUp = rnd(vol * 0.1, vol * 0.4);
    const wickDn = rnd(vol * 0.1, vol * 0.4);
    let high = Math.max(price, close) + wickUp;
    let low = Math.min(price, close) - wickDn;
    // Ensure no equal levels by adding progressive offset
    if (direction > 0) {
      low = low + i * vol * 0.1;
      high = high + i * vol * 0.15;
    } else {
      low = low - i * vol * 0.15;
      high = high - i * vol * 0.1;
    }
    candles.push({ open: +price.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +close.toFixed(5) });
    price = close;
  }
  return candles;
}

// PATCH 2: Improved generators that suppress secondary patterns
function generateTurtleSoupChart() {
  const basePrice = rnd(1.05, 1.25);
  const vol = rnd(0.002, 0.006);
  const candles = [];

  // Build up: slight downtrend then range with equal lows
  // Use tight candles to avoid FVG gaps
  candles.push(...makeTightCandles(basePrice, 3, vol, -1));
  candles.push(...makeRangeCandles(candles[candles.length-1].close, 5, vol * 0.5, basePrice - vol));

  // Create equal lows zone
  const eqLow = Math.min(...candles.slice(3).map(c => c.low));

  // Manipulation candle: purge below equal lows then close back inside
  const manipOpen = candles[candles.length-1].close;
  const purgeLow = eqLow - vol * 1.5;
  const manipClose = manipOpen + vol * 0.5;
  const manipHigh = manipOpen + vol * 0.3;
  candles.push({ open: +manipOpen.toFixed(5), high: +manipHigh.toFixed(5), low: +purgeLow.toFixed(5), close: +manipClose.toFixed(5) });
  const manipIdx = candles.length - 1;

  // Aggressive reversal up (displacement) — use tight candles to avoid secondary FVG
  candles.push(...makeTightCandles(manipClose, 5, vol * 1.3, 1));

  // More continuation
  candles.push(...makeTightCandles(candles[candles.length-1].close, 4, vol * 0.8, 1));

  return {
    candles,
    pattern: 'turtle_soup',
    patternName: 'Turtle Soup',
    dominantPattern: 'turtle_soup',
    direction: 'bullish',
    keyCandles: [manipIdx],
    entryZone: { price: manipClose + vol * 0.3, sl: purgeLow - vol * 0.3, tp: manipClose + vol * 5 },
    zones: [{ type: 'ob', high: manipOpen, low: purgeLow, startCandle: manipIdx, endCandle: manipIdx, label: 'Manipulation' }],
    explanation: 'Turtle Soup: Le prix purge les equal lows (liquidite), puis reverse agressivement. Entry apres le displacement, SL sous la meche de manipulation.',
    manipIdx,
    askAt: manipIdx + 1,
  };
}

function generateDoublePurgeChart() {
  const basePrice = rnd(1.08, 1.20);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  // Range phase — make it messy so individual purges don't look like clean TS
  candles.push(...makeRangeCandles(basePrice, 5, vol, basePrice));
  const rangeHigh = Math.max(...candles.map(c => c.high));
  const rangeLow = Math.min(...candles.map(c => c.low));

  // Purge HIGH first — messy, not clean reversal (no TS look)
  const purgeHighOpen = candles[candles.length-1].close;
  const purgeHighHigh = rangeHigh + vol * 1.2;
  const purgeHighClose = purgeHighOpen - vol * 0.1; // Small close, not aggressive reversal
  candles.push({ open: +purgeHighOpen.toFixed(5), high: +purgeHighHigh.toFixed(5), low: +(purgeHighClose - vol * 0.2).toFixed(5), close: +purgeHighClose.toFixed(5) });
  const purgeHighIdx = candles.length - 1;

  // Messy transition (not clean, multiple candles)
  candles.push(...makeRangeCandles(purgeHighClose, 3, vol * 0.5, (purgeHighClose + rangeLow) / 2));

  // Purge LOW — also messy
  const purgeLowOpen = candles[candles.length-1].close;
  const purgeLowLow = rangeLow - vol * 1.2;
  const purgeLowClose = purgeLowOpen + vol * 0.3;
  candles.push({ open: +purgeLowOpen.toFixed(5), high: +(purgeLowClose + vol * 0.2).toFixed(5), low: +purgeLowLow.toFixed(5), close: +purgeLowClose.toFixed(5) });
  const purgeLowIdx = candles.length - 1;

  // Expansion up (bullish resolution) — tight candles
  candles.push(...makeTightCandles(purgeLowClose, 6, vol * 1.2, 1));
  candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 0.7, 1));

  return {
    candles, pattern: 'double_purge', patternName: 'Double Purge', dominantPattern: 'double_purge', direction: 'bullish',
    keyCandles: [purgeHighIdx, purgeLowIdx],
    entryZone: { price: purgeLowClose + vol * 0.4, sl: purgeLowLow - vol * 0.3, tp: purgeHighHigh + vol * 2 },
    zones: [
      { type: 'fvg', high: rangeHigh, low: rangeLow, startCandle: 0, endCandle: candles.length - 1, label: 'Range' },
    ],
    explanation: 'Double Purge: Le prix purge le HIGH puis le LOW du range. Les deux DOL sont prises = haute probabilite de reversal bullish.',
    manipIdx: purgeLowIdx,
    askAt: purgeLowIdx + 1,
  };
}

function generateCRTChart(valid = true) {
  const basePrice = rnd(1.06, 1.22);
  const vol = rnd(0.003, 0.006);
  const candles = [];
  const isBullish = Math.random() > 0.5;

  // Pre-context
  candles.push(...makeRangeCandles(basePrice, 4, vol, basePrice));

  if (valid) {
    if (isBullish) {
      const o = candles[candles.length-1].close;
      candles.push(makeCandle(o, -1, vol * 0.8));
      candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 1.2, 1));
      const lastP = candles[candles.length-1].close;
      candles.push(makeCandle(lastP, 1, vol * 0.5));
    } else {
      const o = candles[candles.length-1].close;
      candles.push(makeCandle(o, 1, vol * 0.8));
      candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 1.2, -1));
      const lastP = candles[candles.length-1].close;
      candles.push(makeCandle(lastP, -1, vol * 0.5));
    }
  } else {
    candles.push(...makeRangeCandles(candles[candles.length-1].close, 5, vol * 1.2, basePrice));
  }

  candles.push(...makeTightCandles(candles[candles.length-1].close, 4, vol * 0.8, isBullish ? 1 : -1));

  const crtStart = 4;
  return {
    candles,
    pattern: valid ? 'crt' : 'invalid_crt',
    patternName: valid ? `CRT ${isBullish ? 'Bullish (OLHC)' : 'Bearish (OHLC)'}` : 'CRT Invalide',
    dominantPattern: valid ? 'crt' : 'invalid_crt',
    direction: isBullish ? 'bullish' : 'bearish',
    keyCandles: [crtStart, crtStart + 1, crtStart + 2],
    entryZone: valid ? { price: candles[crtStart + 2]?.close || basePrice, sl: isBullish ? candles[crtStart]?.low - vol * 0.3 : candles[crtStart]?.high + vol * 0.3, tp: isBullish ? candles[crtStart + 2]?.close + vol * 4 : candles[crtStart + 2]?.close - vol * 4 } : null,
    zones: [],
    explanation: valid ? `CRT valide ${isBullish ? 'bullish (OLHC)' : 'bearish (OHLC)'}. La sequence Open > ${isBullish ? 'Low > High > Close' : 'High > Low > Close'} est respectee.` : 'CRT invalide. La sequence OHLC/OLHC n\'est pas respectee. PASS.',
    valid,
    askAt: 6,
  };
}

function generateMSSChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  // Downtrend (creating lower highs, lower lows) — no equal levels
  candles.push(...makeTrendNoEqualLevels(basePrice, 6, vol, -1));

  // MSS: break above last lower high
  const lastHigh = Math.max(...candles.slice(-3).map(c => c.high));
  const mssOpen = candles[candles.length-1].close;
  const mssClose = lastHigh + vol * 1.5;
  candles.push({ open: +mssOpen.toFixed(5), high: +(mssClose + vol * 0.3).toFixed(5), low: +(mssOpen - vol * 0.2).toFixed(5), close: +mssClose.toFixed(5) });
  const mssIdx = candles.length - 1;

  // Retracement to OTE (50% of the MSS move)
  const midPoint = (mssOpen + mssClose) / 2;
  candles.push(makeCandle(mssClose, -1, vol * 0.6));
  candles.push({ open: +candles[candles.length-1].close.toFixed(5), high: +(candles[candles.length-1].close + vol * 0.2).toFixed(5), low: +midPoint.toFixed(5), close: +(midPoint + vol * 0.3).toFixed(5) });
  const oteIdx = candles.length - 1;

  // Expansion up — tight candles
  candles.push(...makeTightCandles(candles[candles.length-1].close, 5, vol * 1.3, 1));
  candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 0.8, 1));

  return {
    candles, pattern: 'mss_ote', patternName: 'MSS + OTE', dominantPattern: 'mss_ote', direction: 'bullish',
    keyCandles: [mssIdx, oteIdx],
    entryZone: { price: midPoint + vol * 0.3, sl: midPoint - vol * 1.5, tp: mssClose + vol * 5 },
    zones: [
      { type: 'fvg', high: mssClose, low: mssOpen, startCandle: mssIdx, endCandle: mssIdx, label: 'MSS' },
      { type: 'ob', high: midPoint + vol * 0.5, low: midPoint - vol * 0.5, startCandle: oteIdx, endCandle: oteIdx, label: 'OTE Zone' },
    ],
    explanation: 'MSS + OTE: Le prix casse la structure (MSS = break du dernier lower high), puis retrace a 50% (OTE). Double validation = entree la plus safe.',
    manipIdx: mssIdx,
    askAt: oteIdx,
  };
}

function generateManipulationTrap() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  candles.push(...makeRangeCandles(basePrice, 5, vol, basePrice));
  const rangeLow = Math.min(...candles.map(c => c.low));

  // Fake purge: breaks below but closes below too (breakout, not TS)
  const fakeOpen = candles[candles.length-1].close;
  const fakeLow = rangeLow - vol * 2;
  const fakeClose = rangeLow - vol * 0.8;
  candles.push({ open: +fakeOpen.toFixed(5), high: +(fakeOpen + vol * 0.2).toFixed(5), low: +fakeLow.toFixed(5), close: +fakeClose.toFixed(5) });
  const trapIdx = candles.length - 1;

  candles.push(makeCandle(fakeClose, 1, vol * 0.4));
  candles.push(makeCandle(candles[candles.length-1].close, 1, vol * 0.3));

  candles.push(...makeTrendCandles(candles[candles.length-1].close, 6, vol * 1.1, -1));

  return {
    candles, pattern: 'manipulation_trap', patternName: 'Piege (Faux Turtle Soup)', dominantPattern: 'manipulation_trap', direction: 'bearish',
    keyCandles: [trapIdx],
    entryZone: null,
    zones: [{ type: 'ob', high: fakeOpen, low: fakeLow, startCandle: trapIdx, endCandle: trapIdx, label: 'PIEGE' }],
    explanation: 'PIEGE: Ca ressemble a un Turtle Soup mais le prix CLOSE en-dessous du range. C\'est un vrai breakout bearish, pas un TS. Entrer long ici = se faire pieger. La discipline dit PASS.',
    isTrap: true,
    askAt: trapIdx + 2,
  };
}

function generateFVGChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.003, 0.006);
  const candles = [];

  // PATCH 2: Use trend without equal levels (no TS structure)
  candles.push(...makeTrendNoEqualLevels(basePrice, 4, vol * 0.5, 1));

  // Create FVG: 3 candles where wick1 doesn't touch wick3
  const fvgOpen = candles[candles.length-1].close;
  const c1 = makeCandle(fvgOpen, 1, vol * 0.5);
  candles.push(c1);
  // Big displacement candle — creates the gap
  const c2 = { open: +c1.close.toFixed(5), high: +(c1.close + vol * 3).toFixed(5), low: +(c1.close - vol * 0.1).toFixed(5), close: +(c1.close + vol * 2.5).toFixed(5) };
  candles.push(c2);
  // C3 opens above c1 high with gap
  const c3Open = c2.close - vol * 0.3;
  const c3 = makeCandle(c3Open, 1, vol * 0.6);
  candles.push(c3);
  const fvgIdx = candles.length - 2;

  // Continuation then retrace — tight to avoid secondary patterns
  candles.push(...makeTightCandles(c3.close, 3, vol * 0.5, 1));
  candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 0.6, -1));
  candles.push(...makeTightCandles(candles[candles.length-1].close, 4, vol * 0.8, 1));

  return {
    candles, pattern: 'fvg', patternName: 'Fair Value Gap (FVG)', dominantPattern: 'fvg', direction: 'bullish',
    keyCandles: [fvgIdx - 1, fvgIdx, fvgIdx + 1],
    entryZone: { price: (c1.high + c3.low) / 2, sl: c1.high - vol, tp: c2.high + vol * 2 },
    zones: [{ type: 'fvg', high: c3.low, low: c1.high, startCandle: fvgIdx - 1, endCandle: fvgIdx + 1, label: 'FVG' }],
    explanation: 'FVG bullish: Ecart entre meche haute de la bougie 1 et meche basse de la bougie 3. Le prix revient souvent mitiger ce gap.',
    askAt: fvgIdx + 2,
  };
}

function generateOBChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.003, 0.006);
  const candles = [];

  // PATCH 2: Use tight candles to avoid FVG gaps
  candles.push(...makeTightCandles(basePrice, 3, vol * 0.5, -1));

  // Last bearish candle before displacement up = OB
  const obCandle = makeCandle(candles[candles.length-1].close, -1, vol * 0.8);
  candles.push(obCandle);
  const obIdx = candles.length - 1;

  // Displacement up — tight candles to avoid secondary FVG
  candles.push(...makeTightCandles(obCandle.close, 4, vol * 1.5, 1));

  // Retest OB — tight candles
  candles.push(...makeTightCandles(candles[candles.length-1].close, 3, vol * 0.7, -1));
  // Bounce from OB
  const bouncePrice = obCandle.high + vol * 0.2;
  const lastC = candles[candles.length-1];
  if (lastC.close > obCandle.open) {
    candles.push({ open: +lastC.close.toFixed(5), high: +(lastC.close + vol * 0.1).toFixed(5), low: +bouncePrice.toFixed(5), close: +(bouncePrice + vol * 0.4).toFixed(5) });
  } else {
    candles.push(makeCandle(lastC.close, 1, vol * 0.8));
  }

  candles.push(...makeTightCandles(candles[candles.length-1].close, 4, vol * 1.0, 1));

  return {
    candles, pattern: 'ob', patternName: 'Order Block', dominantPattern: 'ob', direction: 'bullish',
    keyCandles: [obIdx],
    entryZone: { price: obCandle.high, sl: obCandle.low - vol * 0.5, tp: obCandle.high + vol * 6 },
    zones: [{ type: 'ob', high: obCandle.open, low: obCandle.low, startCandle: obIdx, endCandle: obIdx, label: 'OB Bullish' }],
    explanation: 'Order Block: La derniere bougie bearish avant le displacement haussier. L\'algo defend ce niveau. Entry sur le retest, SL sous l\'OB.',
    askAt: obIdx + 3,
  };
}

function generateHTFContext(direction) {
  const isBullish = direction === 'bullish';
  const monthlyBias = isBullish ? 'Bullish' : 'Bearish';
  const weeklyCandle = isBullish
    ? (Math.random() > 0.3 ? 'Close Above prev high' : 'Wick Above prev high, Close inside')
    : (Math.random() > 0.3 ? 'Close Below prev low' : 'Wick Below prev low, Close inside');
  const basePrice = rnd(1.05, 1.25);
  const dolOffset = rnd(0.005, 0.02);
  const dol = isBullish
    ? (basePrice + dolOffset).toFixed(4)
    : (basePrice - dolOffset).toFixed(4);
  const dolPosition = isBullish ? 'above' : 'below';
  const correctDirection = isBullish ? 'Bullish' : 'Bearish';

  return {
    monthlyBias,
    weeklyCandle,
    dol,
    dolPosition,
    correctDirection,
    currentPrice: basePrice.toFixed(4),
  };
}

function getRank(xp) { let r=0; for(let i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].xpRequired){r=i;break;}} return r; }
function getXpProgress(xp) { const r=getRank(xp); const cur=RANKS[r],next=RANKS[r+1]; if(!next)return{pct:100,current:xp-cur.xpRequired,needed:0}; const inR=xp-cur.xpRequired,needed=next.xpRequired-cur.xpRequired; return{pct:Math.min(100,(inR/needed)*100),current:inR,needed}; }
function todayStr() { return new Date().toISOString().split('T')[0]; }

function generateDailyMissions(state) {
  const r = getRank(state.xp);
  const today = todayStr();
  if (state.missionsDate === today && state.dailyMissions.length > 0) return state.dailyMissions;
  const branches = Object.keys(SKILL_BRANCHES);
  const weakBranches = [...branches].sort((a,b) => {
    const aS=SKILL_BRANCHES[a].concepts.reduce((s,c)=>s+(state.skillLevels[c.id]||0),0);
    const bS=SKILL_BRANCHES[b].concepts.reduce((s,c)=>s+(state.skillLevels[c.id]||0),0);
    return aS-bS;
  });
  // PATCH 4: Cap mission XP at 30 per mission
  const missionXp = (base) => Math.min(30, base);
  return [
    { id:'m1_'+today, text:`Reussis ${5+r*2} quiz ${SKILL_BRANCHES[weakBranches[0]].name}`, type:'quiz', xp:missionXp(15+r*3), completed:false, target:5+r*2, progress:0, branch:weakBranches[0] },
    { id:'m2_'+today, text:`Enchaine ${3+r} bonnes reponses`, type:'streak_quiz', xp:missionXp(20+r*3), completed:false, target:3+r, progress:0 },
    { id:'m3_'+today, text:`${60+r*5}% sur un set de quiz`, type:'score', xp:missionXp(20+r*3), completed:false, target:60+r*5, progress:0 },
    { id:'m4_'+today, text:'Complete un scenario', type:'scenario', xp:missionXp(25+r*3), completed:false, target:1, progress:0 },
    { id:'m5_'+today, text:`${15+r*5} quiz au total`, type:'total_quiz', xp:missionXp(25+r*3), completed:false, target:15+r*5, progress:0 },
    { id:'m6_'+today, text:'Complete 1 exercice Arena', type:'arena', xp:missionXp(25+r*3), completed:false, target:1, progress:0 },
  ];
}

function generateQuizSet(state, branch = null, count = 15) {
  const rankIdx = getRank(state.xp);
  // 25% fixed, 75% generated — maximise variety via procedural templates
  const fixedCount = Math.floor(count * 0.25);
  const generatedCount = count - fixedCount;

  // --- Fixed questions: shuffle the ENTIRE pool, slight weak-concept bias ---
  let fixedPool = QUIZ_DB.filter(q => { const qRankIdx=RANKS.findIndex(r=>r.id===q.rank); return qRankIdx<=rankIdx+1; });
  if (branch) fixedPool = fixedPool.filter(q => q.branch === branch);
  // Fisher-Yates shuffle first for true randomness
  for(let i=fixedPool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fixedPool[i],fixedPool[j]]=[fixedPool[j],fixedPool[i]];}
  // Light weak-concept boost: move 30% of weak-concept Qs toward front (not hard sort)
  const weakBoost = Math.floor(fixedPool.length * 0.3);
  const weakQs = fixedPool.filter(q => { const s=state.conceptScores[q.concept]; return s ? s.correct/s.total < 0.5 : true; }).slice(0, weakBoost);
  const rest = fixedPool.filter(q => !weakQs.includes(q));
  // Interleave: weak questions sprinkled in first half
  fixedPool = [];
  let wi=0, ri=0;
  while(wi<weakQs.length||ri<rest.length){
    if(wi<weakQs.length && Math.random()<0.4){fixedPool.push(weakQs[wi++]);}
    else if(ri<rest.length){fixedPool.push(rest[ri++]);}
    else if(wi<weakQs.length){fixedPool.push(weakQs[wi++]);}
  }
  const fixedQuestions = [];
  const usedIds = new Set();
  for(let i=0; i<fixedPool.length && fixedQuestions.length<fixedCount; i++){
    if(!usedIds.has(fixedPool[i].id)){usedIds.add(fixedPool[i].id);fixedQuestions.push(fixedPool[i]);}
  }

  // --- Generated questions: round-robin across ALL templates for max variety ---
  let templates = QUIZ_TEMPLATES.filter(t => t.minRank <= rankIdx + 1);
  if (branch) templates = templates.filter(t => t.branch === branch);
  // Shuffle templates
  for(let i=templates.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[templates[i],templates[j]]=[templates[j],templates[i]];}
  const generated = [];
  let tIdx = 0, attempts = 0;
  const usedTexts = new Set();
  while (generated.length < generatedCount && templates.length > 0 && attempts < generatedCount * 5) {
    attempts++;
    const t = templates[tIdx % templates.length];
    tIdx++;
    try {
      const q = t.generate();
      const sig = q.question.slice(0,60);
      if(!usedTexts.has(sig)){
        usedTexts.add(sig);
        generated.push({...q,concept:t.concept,branch:t.branch,id:'gen_'+t.id+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),isGenerated:true});
      }
    } catch(e) {}
  }
  return [...fixedQuestions, ...generated].sort(() => Math.random() - 0.5);
}

// ============================================================
// CHART CANVAS COMPONENT — PATCH 1: Full interaction support
// ============================================================

function ChartCanvas({ candles, markers, zones, highlightCandles, visibleCount: propVisibleCount, crosshairEnabled, onChartClick, width: propWidth, height: propHeight, className, enableInteraction = true, animateNewCandle = false }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [dimensions, setDimensions] = useState({ w: propWidth || 350, h: propHeight || 280 });
  const [crosshair, setCrosshair] = useState(null);
  const chartInfoRef = useRef(null);

  // PATCH 1: Zoom/pan/pinch state
  const totalCandles = (candles || []).length;
  const [zoomLevel, setZoomLevel] = useState(1.0);
  const [scrollOffset, setScrollOffset] = useState(0);
  const [priceScaleOffset, setPriceScaleOffset] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [isPriceAxisDrag, setIsPriceAxisDrag] = useState(false);
  const dragStartRef = useRef(null);
  const pinchStartRef = useRef(null);
  const lastTapRef = useRef(0);

  // Compute visible count from zoom
  const computedVisibleCount = propVisibleCount || totalCandles;
  const zoomedVisibleCount = Math.max(5, Math.min(totalCandles, Math.round(computedVisibleCount / zoomLevel)));

  // Clamp scroll offset
  const maxScroll = Math.max(0, totalCandles - zoomedVisibleCount);
  const clampedScroll = Math.max(0, Math.min(maxScroll, scrollOffset));

  // Reset zoom when candles change significantly (new scenario)
  const prevCandleCountRef = useRef(totalCandles);
  useEffect(() => {
    if (Math.abs(totalCandles - prevCandleCountRef.current) > 5) {
      setZoomLevel(1.0);
      setScrollOffset(0);
      setPriceScaleOffset(0);
    }
    prevCandleCountRef.current = totalCandles;
  }, [totalCandles]);

  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(entries => {
      const e = entries[0];
      if (e) setDimensions({ w: e.contentRect.width, h: propHeight || Math.min(320, Math.max(220, e.contentRect.width * 0.7)) });
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, [propHeight]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = dimensions.w * dpr;
    canvas.height = dimensions.h * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = dimensions.w + 'px';
    canvas.style.height = dimensions.h + 'px';
    chartInfoRef.current = drawCandlestickChart(ctx, candles || [], dimensions.w, dimensions.h, {
      markers: markers || [],
      zones: zones || [],
      highlightCandles: highlightCandles || [],
      visibleCount: zoomedVisibleCount,
      scrollOffset: clampedScroll,
      crosshair,
      zoomLabel: zoomLevel !== 1.0 ? `x${zoomLevel.toFixed(1)}` : null,
      priceScaleOffset,
      animateLastCandle: animateNewCandle,
    });
  }, [candles, markers, zones, highlightCandles, zoomedVisibleCount, clampedScroll, crosshair, dimensions, zoomLevel, priceScaleOffset]);

  // Zoom with scroll wheel
  const handleWheel = useCallback((e) => {
    if (!enableInteraction) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    setZoomLevel(prev => {
      const newZoom = Math.max(1.0, Math.min(10.0, prev + delta));
      return Math.round(newZoom * 100) / 100;
    });
    // Adjust scroll to keep center
    if (e.deltaY < 0) {
      setScrollOffset(prev => Math.max(0, prev + 1));
    }
  }, [enableInteraction]);

  // Double-click/tap to reset
  const handleDoubleAction = useCallback(() => {
    setZoomLevel(1.0);
    setScrollOffset(0);
    setPriceScaleOffset(0);
  }, []);

  // Mouse events for pan/drag
  const handleMouseDown = useCallback((e) => {
    if (!enableInteraction) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    // Check if clicking on price axis area (right side)
    if (x > dimensions.w - 60) {
      setIsPriceAxisDrag(true);
      dragStartRef.current = { x: e.clientX, y: e.clientY, scrollOffset: clampedScroll, priceScaleOffset };
      return;
    }
    setIsDragging(true);
    dragStartRef.current = { x: e.clientX, y: e.clientY, scrollOffset: clampedScroll, priceScaleOffset };
  }, [enableInteraction, clampedScroll, priceScaleOffset, dimensions.w]);

  const handleMouseMove = useCallback((e) => {
    if (isDragging && dragStartRef.current) {
      const dx = e.clientX - dragStartRef.current.x;
      const candlesPerPixel = zoomedVisibleCount / (dimensions.w - 70);
      const scrollDelta = Math.round(-dx * candlesPerPixel * 0.5);
      setScrollOffset(Math.max(0, Math.min(maxScroll, dragStartRef.current.scrollOffset + scrollDelta)));
      setCrosshair(null);
    } else if (isPriceAxisDrag && dragStartRef.current) {
      const dy = e.clientY - dragStartRef.current.y;
      setPriceScaleOffset(dragStartRef.current.priceScaleOffset + dy);
    } else if (crosshairEnabled) {
      const r = canvasRef.current.getBoundingClientRect();
      setCrosshair({ x: e.clientX - r.left, y: e.clientY - r.top });
    }
  }, [isDragging, isPriceAxisDrag, crosshairEnabled, zoomedVisibleCount, dimensions.w, maxScroll]);

  const handleMouseUp = useCallback(() => {
    setIsDragging(false);
    setIsPriceAxisDrag(false);
    dragStartRef.current = null;
  }, []);

  const onMouseLeave = () => { setCrosshair(null); setIsDragging(false); setIsPriceAxisDrag(false); };

  const onClick = (e) => {
    if (isDragging) return;
    const now = Date.now();
    if (now - lastTapRef.current < 300) {
      handleDoubleAction();
      lastTapRef.current = 0;
      return;
    }
    lastTapRef.current = now;
    handleInteraction(e.clientX, e.clientY);
  };

  // Touch events for pan + pinch
  const handleTouchStart = useCallback((e) => {
    if (!enableInteraction) return;
    if (e.touches.length === 2) {
      // Pinch start
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      pinchStartRef.current = { distance: d, zoomLevel };
      e.preventDefault();
    } else if (e.touches.length === 1) {
      const rect = canvasRef.current.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      if (x > dimensions.w - 60) {
        setIsPriceAxisDrag(true);
        dragStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, scrollOffset: clampedScroll, priceScaleOffset };
      } else {
        setIsDragging(true);
        dragStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, scrollOffset: clampedScroll, priceScaleOffset };
      }
    }
  }, [enableInteraction, zoomLevel, clampedScroll, priceScaleOffset, dimensions.w]);

  const handleTouchMove = useCallback((e) => {
    if (e.touches.length === 2 && pinchStartRef.current) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const scale = d / pinchStartRef.current.distance;
      setZoomLevel(Math.max(1.0, Math.min(10.0, pinchStartRef.current.zoomLevel * scale)));
      e.preventDefault();
    } else if (e.touches.length === 1 && dragStartRef.current) {
      if (isPriceAxisDrag) {
        const dy = e.touches[0].clientY - dragStartRef.current.y;
        setPriceScaleOffset(dragStartRef.current.priceScaleOffset + dy);
      } else if (isDragging) {
        const dx = e.touches[0].clientX - dragStartRef.current.x;
        const candlesPerPixel = zoomedVisibleCount / (dimensions.w - 70);
        const scrollDelta = Math.round(-dx * candlesPerPixel * 0.5);
        setScrollOffset(Math.max(0, Math.min(maxScroll, dragStartRef.current.scrollOffset + scrollDelta)));
      }
      e.preventDefault();
    }
  }, [isDragging, isPriceAxisDrag, zoomedVisibleCount, dimensions.w, maxScroll]);

  const handleTouchEnd = useCallback((e) => {
    if (e.touches.length === 0) {
      // Double-tap detection
      if (e.changedTouches.length > 0 && !isDragging && !isPriceAxisDrag) {
        const now = Date.now();
        if (now - lastTapRef.current < 300) {
          handleDoubleAction();
          lastTapRef.current = 0;
        } else {
          lastTapRef.current = now;
          const t = e.changedTouches[0];
          handleInteraction(t.clientX, t.clientY);
        }
      }
      setIsDragging(false);
      setIsPriceAxisDrag(false);
      pinchStartRef.current = null;
      dragStartRef.current = null;
    }
    if (e.cancelable) e.preventDefault();
  }, [isDragging, isPriceAxisDrag, handleDoubleAction]);

  const handleInteraction = useCallback((clientX, clientY) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    if (crosshairEnabled) setCrosshair({ x, y });
    if (onChartClick && chartInfoRef.current) {
      const price = chartInfoRef.current.yToPrice(y);
      const candleIdx = Math.floor((x - chartInfoRef.current.padding.left) / chartInfoRef.current.candleW) + chartInfoRef.current.startIdx;
      onChartClick({ x, y, price, candleIdx });
    }
  }, [crosshairEnabled, onChartClick]);

  // Attach wheel listener with passive: false
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !enableInteraction) return;
    canvas.addEventListener('wheel', handleWheel, { passive: false });
    return () => canvas.removeEventListener('wheel', handleWheel);
  }, [handleWheel, enableInteraction]);

  return (
    <div ref={containerRef} className={`w-full rounded-lg overflow-hidden ${className || ''}`} style={{ background: CHART_COLORS.bg }}>
      <canvas
        ref={canvasRef}
        onMouseDown={handleMouseDown}
        onMouseMove={handleMouseMove}
        onMouseUp={handleMouseUp}
        onMouseLeave={onMouseLeave}
        onClick={onClick}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
        style={{ cursor: isDragging ? 'grabbing' : isPriceAxisDrag ? 'ns-resize' : crosshairEnabled ? 'crosshair' : 'grab' }}
      />
    </div>
  );
}

function TradeReplay({ state, setState, onBack }) {
  const [scenario, setScenario] = useState(null);
  const [visibleCandles, setVisibleCandles] = useState(0);
  const [phase, setPhase] = useState('intro'); // intro, building, question, placing, result, summary
  const [question, setQuestion] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [score, setScore] = useState(0);
  const [totalQ, setTotalQ] = useState(0);
  const [userMarkers, setUserMarkers] = useState([]);
  const [placingMode, setPlacingMode] = useState(null);
  const [flashClass, setFlashClass] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [animateCandle, setAnimateCandle] = useState(false);

  const startScenario = () => {
    const genIdx = Math.floor(Math.random() * CHART_GENERATORS.length);
    const gen = CHART_GENERATORS[genIdx];
    const data = gen.fn();
    setScenario(data);
    setVisibleCandles(3);
    setPhase('building');
    setAnswers([]);
    setScore(0);
    setTotalQ(0);
    setUserMarkers([]);
    setFeedback(null);
    setAnimateCandle(false);
  };

  const addCandle = () => {
    if (!scenario) return;
    const next = visibleCandles + 1;
    // PATCH 5: Animate new candle
    setAnimateCandle(true);
    setVisibleCandles(next);
    setTimeout(() => setAnimateCandle(false), 300);

    if (next >= scenario.candles.length) {
      setPhase('summary');
      return;
    }

    if (scenario.askAt && next === scenario.askAt) {
      askQuestion();
    }
  };

  const askQuestion = () => {
    const questions = [];

    if (!answers.find(a => a.type === 'profile')) {
      const profiles = ['Range', 'Expansion', 'Manipulation', 'Reversal'];
      const correct = scenario.isTrap ? 'Manipulation' : scenario.direction === 'bullish' ? 'Reversal' : 'Reversal';
      const opts = profiles.sort(() => Math.random() - 0.5);
      questions.push({
        type: 'profile',
        text: 'Quel est le profil de marche actif ?',
        options: opts,
        correct: opts.indexOf(correct),
      });
    }

    if (!answers.find(a => a.type === 'pattern')) {
      const patterns = ['Turtle Soup', 'Double Purge', 'CRT Valide', 'MSS + OTE', 'FVG', 'Order Block', 'Piege / Invalide'];
      const correct = scenario.isTrap ? 'Piege / Invalide' : scenario.patternName.includes('Invalide') ? 'Piege / Invalide' : patterns.find(p => scenario.patternName.includes(p)) || scenario.patternName;
      const visible = [correct];
      const others = patterns.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [...visible, ...others].sort(() => Math.random() - 0.5);
      questions.push({
        type: 'pattern',
        text: 'Quel pattern identifies-tu ?',
        options: opts,
        correct: opts.indexOf(correct),
      });
    }

    if (!answers.find(a => a.type === 'decision')) {
      const correct = scenario.isTrap || !scenario.valid === false || scenario.pattern === 'invalid_crt' ? 'PASS — conditions non reunies' : 'ENTRY — setup valide';
      const opts = ['ENTRY — setup valide', 'PASS — conditions non reunies', 'Attendre plus de bougies', 'Shorter le mouvement'];
      if (!opts.includes(correct)) opts[0] = correct;
      const shuffled = [...opts].sort(() => Math.random() - 0.5);
      questions.push({
        type: 'decision',
        text: 'Decision : Entrer, Attendre, ou Pass ?',
        options: shuffled,
        correct: shuffled.indexOf(correct),
      });
    }

    if (questions.length > 0) {
      setQuestion(questions[0]);
      setPhase('question');
    } else if (scenario.entryZone && !scenario.isTrap && !answers.find(a => a.type === 'placement')) {
      setPhase('placing');
      setPlacingMode('entry');
      setFeedback({ text: 'Tape sur le chart pour placer ton ENTRY', color: '#06B6D4' });
    }
  };

  const answerQuestion = (idx) => {
    const isCorrect = idx === question.correct;
    const newScore = score + (isCorrect ? 1 : 0);
    setScore(newScore);
    setTotalQ(totalQ + 1);
    setAnswers([...answers, { type: question.type, correct: isCorrect }]);
    setFlashClass(isCorrect ? 'flash-correct' : 'flash-wrong');
    setTimeout(() => setFlashClass(''), 500);

    // PATCH 4: Reduced XP — 3 XP per correct arena answer
    const xpGain = isCorrect ? 3 : 0;
    setFeedback({
      text: isCorrect ? `Correct ! +${xpGain} XP` : `Incorrect. Reponse : ${question.options[question.correct]}`,
      color: isCorrect ? '#10B981' : '#EF4444',
    });

    if (isCorrect) {
      const ns = { ...state, xp: state.xp + xpGain };
      ns.rank = getRank(ns.xp);
      setState(ns); saveState(ns);
    }

    setTimeout(() => {
      setQuestion(null);
      setFeedback(null);
      if (answers.length + 1 < 3) {
        askQuestion();
      } else if (scenario.entryZone && !scenario.isTrap) {
        setPhase('placing');
        setPlacingMode('entry');
        setFeedback({ text: 'Tape sur le chart pour placer ton ENTRY', color: '#06B6D4' });
      } else {
        setPhase('building');
      }
    }, 1500);
  };

  const handleChartClick = ({ price }) => {
    if (phase !== 'placing') return;
    if (placingMode === 'entry') {
      setUserMarkers([...userMarkers, { type: 'entry', price }]);
      setPlacingMode('sl');
      setFeedback({ text: 'Maintenant place ton STOP LOSS (SL)', color: '#EF4444' });
    } else if (placingMode === 'sl') {
      setUserMarkers([...userMarkers, { type: 'sl', price }]);
      setPlacingMode('tp');
      setFeedback({ text: 'Maintenant place ton TAKE PROFIT (TP)', color: '#10B981' });
    } else if (placingMode === 'tp') {
      const newMarkers = [...userMarkers, { type: 'tp', price }];
      setUserMarkers(newMarkers);
      setPlacingMode(null);

      const entry = newMarkers.find(m => m.type === 'entry');
      const sl = newMarkers.find(m => m.type === 'sl');
      const tp = newMarkers.find(m => m.type === 'tp');
      const ideal = scenario.entryZone;

      if (entry && sl && tp && ideal) {
        const risk = Math.abs(entry.price - sl.price);
        const reward = Math.abs(tp.price - entry.price);
        const rr = risk > 0 ? (reward / risk) : 0;
        const goodRR = rr >= 1.8;
        const goodSL = scenario.direction === 'bullish' ? sl.price < ideal.sl + Math.abs(ideal.sl - ideal.price) * 0.5 : sl.price > ideal.sl - Math.abs(ideal.sl - ideal.price) * 0.5;
        const placementScore = (goodRR ? 1 : 0) + (goodSL ? 1 : 0);
        const xpGain = placementScore * 3;

        setFeedback({
          text: `RR = ${rr.toFixed(1)}:1 ${goodRR ? '(OK)' : '(< 2:1 !)'}. SL ${goodSL ? 'bien place' : 'a ameliorer'}. +${xpGain} XP`,
          color: placementScore >= 2 ? '#10B981' : placementScore >= 1 ? '#F59E0B' : '#EF4444',
        });

        setScore(score + placementScore);
        setTotalQ(totalQ + 2);

        if (xpGain > 0) {
          const ns = { ...state, xp: state.xp + xpGain };
          ns.rank = getRank(ns.xp);
          setState(ns); saveState(ns);
        }
      }

      setTimeout(() => {
        setPhase('building');
        setFeedback(null);
      }, 2500);
    }
  };

  const finishReplay = () => {
    // PATCH 5: Arena exercise completion XP with daily cap
    const totalXP = 20;
    const ns = { ...state };
    if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _capRem=DAILY_XP_CAP-((ns.dailyXpLog||{})[todayStr()]||0);const _actualXp=Math.min(totalXP,Math.max(0,_capRem));ns.xp+=_actualXp;ns.dailyXpLog[todayStr()]=((ns.dailyXpLog||{})[todayStr()]||0)+_actualXp;
    ns.arenaStats = { ...ns.arenaStats, replaysCompleted: (ns.arenaStats.replaysCompleted || 0) + 1, totalArenaXp: (ns.arenaStats.totalArenaXp || 0) + totalXP };
    ns.rank = getRank(ns.xp);
    if (ns.missionsDate === todayStr()) {
      ns.dailyMissions = ns.dailyMissions.map(m => m.type === 'arena' && !m.completed ? { ...m, progress: 1, completed: true } : m);
      ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp += m.xp; m.xpAwarded = true; } });
    }
    setState(ns); saveState(ns);
    setPhase('summary');
  };

  // INTRO SCREEN
  if (phase === 'intro' || !scenario) {
    return (
      <div className="animate-fade-in">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
          <h2 className="text-xl font-bold text-white">Trade Replay</h2>
        </div>
        <div className="text-center py-8">
          <span className="text-5xl block mb-4">&#128200;</span>
          <h3 className="text-2xl font-bold text-white mb-2">Trade Replay Mode</h3>
          <p className="text-gray-400 mb-6 max-w-sm mx-auto">Le chart se construit bougie par bougie. Identifie les patterns, prends tes decisions, place tes trades.</p>
          <button onClick={startScenario} className="arena-btn primary px-8 py-4 rounded-xl text-amber-400 font-bold text-lg">Commencer un Replay</button>
        </div>
      </div>
    );
  }

  // SUMMARY SCREEN
  if (phase === 'summary') {
    const pct = totalQ > 0 ? Math.round(score / totalQ * 100) : 0;
    return (
      <div className="animate-slide-up text-center py-8">
        <span className="text-5xl block mb-4">{pct >= 70 ? '\u2705' : '\u274C'}</span>
        <h3 className="text-2xl font-bold text-white mb-2">Replay Termine</h3>
        <p className="text-gray-400 mb-1">{scenario.patternName}</p>
        <p className="text-3xl font-bold mb-4" style={{ color: pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444' }}>{pct}%</p>
        <p className="text-sm text-gray-400 mb-2">{score}/{totalQ} correct</p>

        <div className="dojo-card p-4 mx-auto max-w-md text-left mb-6">
          <p className="text-xs text-amber-400 font-semibold mb-2">EXPLICATION</p>
          <p className="text-sm text-gray-300">{scenario.explanation}</p>
        </div>

        <div className="flex gap-3 justify-center">
          <button onClick={startScenario} className="arena-btn primary px-6 py-3 rounded-lg text-amber-400 font-medium">Nouveau Replay</button>
          <button onClick={onBack} className="arena-btn px-6 py-3 rounded-lg text-gray-300 font-medium">Retour</button>
        </div>
      </div>
    );
  }

  const displayCandles = scenario.candles.slice(0, visibleCandles);

  return (
    <div className={`animate-fade-in ${flashClass}`}>
      <div className="flex items-center gap-3 mb-3">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-amber-500 rounded-full transition-all" style={{ width: (visibleCandles / scenario.candles.length * 100) + '%' }} />
        </div>
        <span className="text-xs text-gray-500 font-mono">{visibleCandles}/{scenario.candles.length}</span>
      </div>

      <ChartCanvas
        candles={displayCandles}
        markers={userMarkers}
        zones={visibleCandles > (scenario.askAt || 999) ? scenario.zones : []}
        highlightCandles={[]}
        crosshairEnabled={phase === 'placing'}
        onChartClick={handleChartClick}
        animateNewCandle={animateCandle}
      />

      {feedback && (
        <div className="animate-slide-up dojo-card p-3 mt-3 text-center" style={{ borderColor: feedback.color + '40' }}>
          <p className="text-sm font-medium" style={{ color: feedback.color }}>{feedback.text}</p>
        </div>
      )}

      {phase === 'question' && question && (
        <div className="mt-4 animate-slide-up">
          <div className="dojo-card p-4 mb-3">
            <p className="text-white font-medium">{question.text}</p>
          </div>
          <div className="space-y-2">
            {question.options.map((opt, i) => (
              <div key={i} className="quiz-option dojo-card p-3 text-sm text-gray-200" onClick={() => answerQuestion(i)}>{opt}</div>
            ))}
          </div>
        </div>
      )}

      {phase === 'building' && (
        <div className="mt-4 flex gap-3">
          <button onClick={addCandle} className="flex-1 arena-btn primary py-3 rounded-lg text-amber-400 font-medium">
            Bougie suivante \u25B6
          </button>
          {visibleCandles >= scenario.candles.length - 2 && (
            <button onClick={finishReplay} className="arena-btn py-3 px-4 rounded-lg text-gray-300 font-medium">Terminer</button>
          )}
        </div>
      )}

      {phase === 'placing' && (
        <div className="mt-3 text-center text-xs text-gray-500">
          Mode placement : {placingMode === 'entry' ? 'ENTRY (cyan)' : placingMode === 'sl' ? 'STOP LOSS (rouge)' : 'TAKE PROFIT (vert)'}
        </div>
      )}
    </div>
  );
}

  const [htfContext, setHtfContext] = useState(null);
  const [htfAnswered, setHtfAnswered] = useState(false);

  const startScenario = () => {
    const validGens = CHART_GENERATORS.filter(g => g.id !== 'manipulation_trap' && g.id !== 'invalid_crt');
    const gen = validGens[Math.floor(Math.random() * validGens.length)];
    const data = gen.fn();

    setScenario(data);
    setHtfContext(htf);
    setPhase('htf_question');
    setSelectedPattern(null);
    setSelectedCandles([]);
    setEntryPrice(null);
    setScore(0);
    setHtfScore(0);
    setHtfAnswered(false);
  };

    const correct = answer === htfContext.correctDirection;

    if (correct) {
      const ns = { ...state, xp: state.xp + 3 };

                    (pattern === 'CRT Bullish' && scenario.pattern === 'crt' && scenario.direction === 'bullish') ||
                    (pattern === 'CRT Bearish' && scenario.pattern === 'crt' && scenario.direction === 'bearish') ||
                    (pattern === 'Order Block' && scenario.pattern === 'ob');

      setScore(score + 1);

function QuickDrill({ state, setState, onBack }) {
  const [round, setRound] = useState(0);
  const [totalRounds, setTotalRounds] = useState(8);
  const [scenario, setScenario] = useState(null);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(false);
  const [flashClass, setFlashClass] = useState('');
  const [isFinished, setIsFinished] = useState(false);
  const [timer, setTimer] = useState(15);
  const timerRef = useRef(null);
  // PATCH 5: Show explanation on wrong answer
  const [showExplanation, setShowExplanation] = useState(null);

  const nextRound = useCallback(() => {
    if (round >= totalRounds) {
      setIsFinished(true);
      // PATCH 5: Reduced XP for drill completion with daily cap
      const xpGain = Math.min(25, score * 3 + 5);
      const ns = { ...state };
      if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _capRem3=DAILY_XP_CAP-((ns.dailyXpLog||{})[todayStr()]||0);const _actualXp3=Math.min(xpGain,Math.max(0,_capRem3));ns.xp+=_actualXp3;ns.dailyXpLog[todayStr()]=((ns.dailyXpLog||{})[todayStr()]||0)+_actualXp3;
      ns.arenaStats = { ...ns.arenaStats, drillsCompleted: (ns.arenaStats.drillsCompleted || 0) + 1, totalArenaXp: (ns.arenaStats.totalArenaXp || 0) + xpGain };
      ns.rank = getRank(ns.xp);
      if (ns.missionsDate === todayStr()) {
        ns.dailyMissions = ns.dailyMissions.map(m => m.type === 'arena' && !m.completed ? { ...m, progress: 1, completed: true } : m);
        ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp += m.xp; m.xpAwarded = true; } });
      }
      setState(ns); saveState(ns);
      return;
    }

    const gen = CHART_GENERATORS[Math.floor(Math.random() * CHART_GENERATORS.length)];
    const data = gen.fn();

    // PATCH 2: Use confusion map for better wrong answers
    const patterns = ['Turtle Soup', 'Double Purge', 'CRT', 'MSS + OTE', 'FVG', 'Order Block', 'Piege / Invalide'];
    const correctName = data.isTrap ? 'Piege / Invalide' : !data.valid && data.valid !== undefined ? 'Piege / Invalide' : patterns.find(p => data.patternName.toLowerCase().includes(p.toLowerCase().split(' ')[0].toLowerCase())) || data.patternName;

    // Use confusion map to pick plausible but distinguishable wrong answers
    const confusionList = PATTERN_CONFUSION_MAP[data.dominantPattern || data.pattern] || [];
    let others;
    if (confusionList.length >= 3) {
      others = confusionList.slice(0, 3);
    } else {
      others = patterns.filter(p => p !== correctName).sort(() => Math.random() - 0.5).slice(0, 3);
    }
    const opts = [correctName, ...others].sort(() => Math.random() - 0.5);

    setScenario({ ...data, options: opts, correctIdx: opts.indexOf(correctName) });
    setAnswered(false);
    setShowExplanation(null);
    setTimer(15);

    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimer(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setAnswered(true);
          setFlashClass('flash-wrong');
          setTimeout(() => { setFlashClass(''); setRound(r => r + 1); }, 1200);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  }, [round, totalRounds, score, state]);

  useEffect(() => {
    if (!isFinished) nextRound();
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [round]);

  const handleAnswer = (idx) => {
    if (answered) return;
    setAnswered(true);
    if (timerRef.current) clearInterval(timerRef.current);
    const correct = idx === scenario.correctIdx;
    if (correct) setScore(s => s + 1);
    setFlashClass(correct ? 'flash-correct' : 'flash-wrong');

    // PATCH 5: Show explanation briefly on wrong answer
    if (!correct) {
      setShowExplanation(scenario.explanation || `Reponse : ${scenario.options[scenario.correctIdx]}`);
      setTimeout(() => { setShowExplanation(null); setFlashClass(''); setRound(r => r + 1); }, 2500);
    } else {
      setTimeout(() => { setFlashClass(''); setRound(r => r + 1); }, 1000);
    }
  };

  if (isFinished) {
    const pct = Math.round(score / totalRounds * 100);
    return (
      <div className="animate-slide-up text-center py-8">
        <span className="text-5xl block mb-4">{pct >= 70 ? '\u26A1' : '\u274C'}</span>
        <h3 className="text-2xl font-bold text-white mb-2">Quick Drill Termine</h3>
        <p className="text-3xl font-bold mb-4" style={{ color: pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444' }}>{score}/{totalRounds}</p>
        <p className="text-gray-400 mb-6">{pct}% de precision</p>
        <div className="flex gap-3 justify-center">
          <button onClick={() => { setRound(0); setScore(0); setIsFinished(false); }} className="arena-btn primary px-6 py-3 rounded-lg text-amber-400 font-medium">Rejouer</button>
          <button onClick={onBack} className="arena-btn px-6 py-3 rounded-lg text-gray-300 font-medium">Retour</button>
        </div>
      </div>
    );
  }

  if (!scenario) return <div className="text-center py-20 text-gray-400">Chargement...</div>;

  return (
    <div className={`animate-fade-in ${flashClass}`}>
      <div className="flex items-center gap-3 mb-3">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-amber-500 rounded-full transition-all" style={{ width: (round / totalRounds * 100) + '%' }} />
        </div>
        <span className="text-xs text-gray-500 font-mono">{round}/{totalRounds}</span>
        <span className={`text-sm font-bold font-mono ${timer <= 5 ? 'text-red-400' : 'text-amber-400'}`}>{timer}s</span>
      </div>

      <div className="flex items-center justify-between mb-2">
        <span className="text-xs text-emerald-400 font-mono">{score} \u2713</span>
        <span className="text-xs text-gray-500">Identifie le pattern rapidement !</span>
      </div>

      <ChartCanvas candles={scenario.candles} zones={[]} highlightCandles={[]} />

      <div className="mt-3 grid grid-cols-2 gap-2">
        {scenario.options.map((opt, i) => (
          <div key={i} className={`quiz-option dojo-card p-3 text-sm text-center ${answered ? (i === scenario.correctIdx ? 'correct' : 'wrong') : 'text-gray-200'}`} onClick={() => handleAnswer(i)}>{opt}</div>
        ))}
      </div>

      {/* PATCH 5: Brief explanation on wrong answer */}
      {showExplanation && (
        <div className="animate-slide-up dojo-card p-3 mt-3 border-red-500/30 text-center">
          <p className="text-xs text-red-400 font-medium">{showExplanation}</p>
        </div>
      )}
    </div>
  );
}

function QuizEngine({ state, setState, onBack, branch = null }) {
  const [questions,setQuestions]=useState([]); const [currentQ,setCurrentQ]=useState(0); const [selected,setSelected]=useState(null); const [showResult,setShowResult]=useState(false); const [sessionCorrect,setSessionCorrect]=useState(0); const [sessionTotal,setSessionTotal]=useState(0); const [consecutiveCorrect,setConsecutiveCorrect]=useState(0); const [isFinished,setIsFinished]=useState(false); const [started,setStarted]=useState(false);
  const startQuiz=(size)=>{setQuestions(generateQuizSet(state,branch,size));setStarted(true);};
  if(!started){return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><h2 className="text-xl font-bold text-white">Taille du quiz</h2></div>{branch&&<div className="mb-4 text-sm text-gray-400">Branche : <span style={{color:SKILL_BRANCHES[branch]?.color}}>{SKILL_BRANCHES[branch]?.name}</span></div>}<div className="grid gap-3" style={{gridTemplateColumns:'repeat(2, 1fr)'}}>{[{size:10,label:'10',desc:'Rapide',color:'#10B981'},{size:15,label:'15',desc:'Standard',color:'#F59E0B'},{size:25,label:'25',desc:'Approfondi',color:'#8B5CF6'},{size:50,label:'50',desc:'Marathon',color:'#EF4444'}].map(o=>(<button key={o.size} onClick={()=>startQuiz(o.size)} className="dojo-card p-5 text-left" style={{borderColor:o.color+'30'}}><p className="text-2xl font-bold" style={{color:o.color}}>{o.size}</p><p className="text-sm text-white">{o.label} questions</p><p className="text-xs text-gray-500">{o.desc}</p></button>))}</div></div>);}
  // PATCH 5: XP with daily cap + diminishing returns
  const handleAnswer=(idx)=>{if(showResult)return;setSelected(idx);setShowResult(true);const q=questions[currentQ];const isC=idx===q.correct;const nC=sessionCorrect+(isC?1:0);const nCons=isC?consecutiveCorrect+1:0;setSessionTotal(sessionTotal+1);setSessionCorrect(nC);setConsecutiveCorrect(nCons);const ns={...state};ns.totalQuizAnswered=(state.totalQuizAnswered||0)+1;ns.totalCorrect=(state.totalCorrect||0)+(isC?1:0);if(!ns.conceptScores[q.concept])ns.conceptScores[q.concept]={correct:0,total:0};ns.conceptScores[q.concept].total++;if(isC)ns.conceptScores[q.concept].correct++;
  // Daily XP cap
  const today=todayStr();if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const dailyXpSoFar=ns.dailyXpLog[today]||0;const dailyDrills=((ns.dailyDrillCount||0)+1);if(ns.dailyDrillDate!==today){ns.dailyDrillCount=1;ns.dailyDrillDate=today;}else{ns.dailyDrillCount=dailyDrills;}
  let xpGain=3+(nCons>=3?2:0);if(dailyDrills>DRILL_DIMINISH_THRESHOLD*2)xpGain=Math.ceil(xpGain/4);else if(dailyDrills>DRILL_DIMINISH_THRESHOLD)xpGain=Math.ceil(xpGain/2);xpGain=Math.min(xpGain,DAILY_XP_CAP-dailyXpSoFar);if(xpGain<0)xpGain=0;
  if(isC){ns.xp=(state.xp||0)+xpGain;ns.dailyXpLog[today]=dailyXpSoFar+xpGain;}const cs=ns.conceptScores[q.concept];if(cs.total>=3){const ratio=cs.correct/cs.total;ns.skillLevels[q.concept]=Math.max(ns.skillLevels[q.concept]||0,ratio>=0.95?5:ratio>=0.85?4:ratio>=0.7?3:ratio>=0.5?2:ratio>=0.3?1:0);}if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>{if(m.completed)return m;if(m.type==='quiz'&&m.branch===q.branch){const p=(m.progress||0)+(isC?1:0);return{...m,progress:p,completed:p>=m.target};}if(m.type==='total_quiz'){const p=(m.progress||0)+1;return{...m,progress:p,completed:p>=m.target};}if(m.type==='streak_quiz')return{...m,progress:Math.max(m.progress||0,nCons),completed:nCons>=m.target};return m;});ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});}ns.rank=getRank(ns.xp);setState(ns);saveState(ns);};
  const nextQuestion=()=>{if(currentQ+1>=questions.length){setIsFinished(true);const pct=Math.round(sessionCorrect/sessionTotal*100);const ns={...state};if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>(m.type==='score'&&pct>=m.target&&!m.completed?{...m,progress:pct,completed:true}:m));ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});ns.rank=getRank(ns.xp);setState(ns);saveState(ns);}return;}setCurrentQ(currentQ+1);setSelected(null);setShowResult(false);};
  if(questions.length===0)return<div className="text-center py-20 text-gray-400">Chargement...</div>;
  if(isFinished){const pct=sessionTotal>0?Math.round(sessionCorrect/sessionTotal*100):0;const gc=pct>=90?'#10B981':pct>=80?'#3B82F6':pct>=70?'#F59E0B':'#EF4444';return(<div className="animate-slide-up text-center py-10"><div className="relative inline-block mb-6"><ProgressRing radius={60} stroke={6} progress={pct} color={gc}/><div className="absolute inset-0 flex items-center justify-center"><span className="text-3xl font-bold" style={{color:gc}}>{pct}%</span></div></div><p className="text-gray-400 mb-8">{sessionCorrect}/{sessionTotal}</p><div className="flex gap-3 justify-center"><button onClick={()=>{setStarted(false);setCurrentQ(0);setSelected(null);setShowResult(false);setSessionCorrect(0);setSessionTotal(0);setConsecutiveCorrect(0);setIsFinished(false);}} className="px-6 py-3 bg-amber-500/20 text-amber-400 rounded-lg font-medium">Recommencer</button><button onClick={onBack} className="px-6 py-3 bg-dojo-border text-gray-300 rounded-lg font-medium">Retour</button></div></div>);}
  const q=questions[currentQ];
  return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden"><div className="h-full bg-amber-500 rounded-full transition-all" style={{width:((currentQ+1)/questions.length*100)+'%'}}/></div><span className="text-xs text-gray-500 font-mono">{currentQ+1}/{questions.length}</span><span className="text-xs text-emerald-400 font-mono">{sessionCorrect}\u2713</span></div>{consecutiveCorrect>=3&&<div className="text-center mb-3 text-amber-400 text-sm font-medium">&#128293; Streak x{consecutiveCorrect}</div>}<div className="dojo-card p-6 mb-4"><div className="flex items-center gap-2 mb-3"><span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:SKILL_BRANCHES[q.branch]?.color+'20',color:SKILL_BRANCHES[q.branch]?.color}}>{SKILL_BRANCHES[q.branch]?.name}</span></div><p className="text-white text-lg font-medium">{q.q}</p></div><div className="space-y-2 mb-4">{q.options.map((opt,i)=>{let cl='quiz-option dojo-card p-4';if(showResult){if(i===q.correct)cl+=' correct';else if(i===selected)cl+=' wrong';}return(<div key={i} className={cl} onClick={()=>handleAnswer(i)}><div className="flex items-start gap-3"><div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${showResult&&i===q.correct?'bg-emerald-500/30 text-emerald-400':showResult&&i===selected?'bg-red-500/30 text-red-400':'bg-dojo-border text-gray-400'}`}>{String.fromCharCode(65+i)}</div><span className="text-sm text-gray-200">{opt}</span></div></div>);})}</div>{showResult&&(<div className={`animate-slide-up dojo-card p-4 mb-4 ${selected===q.correct?'border-emerald-500/30':'border-red-500/30'}`}><p className={`text-sm font-medium mb-1 ${selected===q.correct?'text-emerald-400':'text-red-400'}`}>{selected===q.correct?'\u2713 Correct':'\u2717 Incorrect'}</p><p className="text-sm text-gray-300">{q.explanation}</p></div>)}{showResult&&(<button onClick={nextQuestion} className="w-full py-3 bg-amber-500/20 text-amber-400 rounded-lg font-medium hover:bg-amber-500/30">{currentQ+1>=questions.length?'Resultats':'Suivante \u2192'}</button>)}</div>);

function ScenarioEngine({state,setState,onBack}) {
  const [cs,setCs]=useState(null);const [step,setStep]=useState(0);const [sel,setSel]=useState(null);const [showFb,setShowFb]=useState(false);const [score,setScore]=useState(0);const [answers,setAnswers]=useState([]);const [done,setDone]=useState(false);
  const r=getRank(state.xp);const available=SCENARIOS_DB.filter(s=>{const ri=RANKS.findIndex(rk=>rk.id===s.rank);return ri<=r+1;});
  if(!cs){return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><h2 className="text-xl font-bold text-white">Scenarios</h2></div><div className="space-y-3">{available.map(s=>{const d=state.completedScenarios[s.id];const ri=RANKS.findIndex(rk=>rk.id===s.rank);return(<div key={s.id} className="dojo-card p-5 cursor-pointer hover:border-cyan-500/30" onClick={()=>setCs(s)}><div className="flex items-center justify-between"><div><div className="flex items-center gap-2 mb-1"><span className="text-white font-semibold">{s.title}</span>{d&&<span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">\u2713</span>}</div><p className="text-sm text-gray-400">{s.steps.length} etapes</p></div><span className="text-xs px-2 py-1 rounded" style={{background:RANKS[ri].color+'20',color:RANKS[ri].color}}>{s.rank}</span></div></div>);})}</div></div>);}
  // PATCH 4: Scenario XP reduced
  if(done){const pct=Math.round(score/cs.steps.length*100);return(<div className="animate-slide-up text-center py-10"><h2 className="text-2xl font-bold text-white mb-2">{cs.title}</h2><p className="text-4xl font-bold mb-2" style={{color:pct>=75?'#10B981':pct>=50?'#F59E0B':'#EF4444'}}>{pct}%</p><p className="text-gray-400 mb-6">{score}/{cs.steps.length}</p><button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);setDone(false);}} className="px-6 py-3 bg-dojo-border text-gray-300 rounded-lg font-medium">Retour</button></div>);}
  const st=cs.steps[step];
  const handleStepAnswer=(idx)=>{if(showFb)return;setSel(idx);setShowFb(true);const ok=idx===st.correct;if(ok)setScore(score+1);setAnswers([...answers,{step,selected:idx,correct:st.correct,isCorrect:ok}]);if(ok){const ns={...state};if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _cr4=DAILY_XP_CAP-((ns.dailyXpLog||{})[todayStr()]||0);const _ax4=Math.min(3,Math.max(0,_cr4));ns.xp+=_ax4;ns.dailyXpLog[todayStr()]=((ns.dailyXpLog||{})[todayStr()]||0)+_ax4;ns.rank=getRank(ns.xp);setState(ns);saveState(ns);}};
  const nextStep=()=>{if(step+1>=cs.steps.length){const ns={...state};ns.completedScenarios[cs.id]={score,date:todayStr()};if(!ns.dailyXpLog||Array.isArray(ns.dailyXpLog))ns.dailyXpLog={};const _cr5=DAILY_XP_CAP-((ns.dailyXpLog||{})[todayStr()]||0);const _ax5=Math.min(cs.xpReward,Math.max(0,_cr5));ns.xp+=_ax5;ns.dailyXpLog[todayStr()]=((ns.dailyXpLog||{})[todayStr()]||0)+_ax5;ns.rank=getRank(ns.xp);if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>m.type==='scenario'&&!m.completed?{...m,progress:1,completed:true}:m);ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});}setState(ns);saveState(ns);setDone(true);return;}setStep(step+1);setSel(null);setShowFb(false);};
  return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-4"><button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);}} className="text-gray-400 hover:text-white">\u2190</button><div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden"><div className="h-full bg-cyan-500 rounded-full transition-all" style={{width:((step+1)/cs.steps.length*100)+'%'}}/></div><span className="text-xs text-gray-500 font-mono">{step+1}/{cs.steps.length}</span></div>{step===0&&!showFb&&<div className="dojo-card p-4 mb-4 border-cyan-500/20"><p className="text-xs text-cyan-400 font-medium mb-1">CONTEXTE</p><p className="text-sm text-gray-300">{cs.context}</p></div>}<div className="dojo-card p-5 mb-4"><p className="text-white font-medium">{st.q}</p></div><div className="space-y-2 mb-4">{st.options.map((opt,i)=>{let cl='quiz-option dojo-card p-4';if(showFb){if(i===st.correct)cl+=' correct';else if(i===sel)cl+=' wrong';}return<div key={i} className={cl} onClick={()=>handleStepAnswer(i)}><span className="text-sm text-gray-200">{opt}</span></div>;})}</div>{showFb&&(<><div className={`animate-slide-up dojo-card p-4 mb-4 ${sel===st.correct?'border-emerald-500/30':'border-red-500/30'}`}><p className={`text-sm ${sel===st.correct?'text-emerald-400':'text-red-400'}`}>{st.feedback}</p></div><button onClick={nextStep} className="w-full py-3 bg-cyan-500/20 text-cyan-400 rounded-lg font-medium">{step+1>=cs.steps.length?'Resultats':'Suivante \u2192'}</button></>)}</div>);
}
