// ============================================================
// CHART ENGINE — Canvas-based candlestick renderer
// ============================================================

const CHART_COLORS = {
  bg: '#0D0D15',
  grid: '#1A1A25',
  bullish: '#10B981',
  bearish: '#EF4444',
  text: '#6B7280',
  crosshair: '#D4A85380',
  entry: '#06B6D4',
  sl: '#EF4444',
  tp: '#10B981',
  ob: '#8B5CF680',
  fvg: '#3B82F640',
  highlight: '#D4A85340',
};

function drawCandlestickChart(ctx, candles, width, height, options = {}) {
  const {
    markers = [],
    zones = [],
    highlightCandles = [],
    visibleCount = candles.length,
    scrollOffset = 0,
    showPriceAxis = true,
    showCandleNumbers = true,
    crosshair = null,
    interactionMode = null,
  } = options;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = CHART_COLORS.bg;
  ctx.fillRect(0, 0, width, height);

  if (candles.length === 0) return;

  const padding = { top: 20, bottom: showCandleNumbers ? 30 : 15, left: 10, right: showPriceAxis ? 60 : 10 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  const startIdx = Math.max(0, scrollOffset);
  const endIdx = Math.min(candles.length, startIdx + visibleCount);
  const visible = candles.slice(startIdx, endIdx);

  if (visible.length === 0) return;

  let minP = Infinity, maxP = -Infinity;
  visible.forEach(c => { minP = Math.min(minP, c.low); maxP = Math.max(maxP, c.high); });
  markers.forEach(m => { if (m.price) { minP = Math.min(minP, m.price); maxP = Math.max(maxP, m.price); } });
  const priceRange = maxP - minP || 1;
  const pPad = priceRange * 0.08;
  minP -= pPad; maxP += pPad;
  const totalRange = maxP - minP;

  const priceToY = (p) => padding.top + chartH * (1 - (p - minP) / totalRange);
  const yToPrice = (y) => minP + (1 - (y - padding.top) / chartH) * totalRange;
  const candleW = Math.max(3, chartW / visible.length);
  const bodyW = Math.max(2, candleW * 0.65);
  const gap = (candleW - bodyW) / 2;

  // Grid lines
  ctx.strokeStyle = CHART_COLORS.grid;
  ctx.lineWidth = 0.5;
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const y = padding.top + (chartH / gridLines) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
    if (showPriceAxis) {
      const price = yToPrice(y);
      ctx.fillStyle = CHART_COLORS.text;
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText(price.toFixed(price > 100 ? 0 : 4), width - padding.right + 5, y + 3);
    }
  }

  // Zones (OB, FVG)
  zones.forEach(z => {
    const y1 = priceToY(z.high);
    const y2 = priceToY(z.low);
    const x1 = z.startCandle !== undefined ? padding.left + (z.startCandle - startIdx) * candleW : padding.left;
    const x2 = z.endCandle !== undefined ? padding.left + (z.endCandle - startIdx + 1) * candleW : width - padding.right;
    ctx.fillStyle = z.type === 'ob' ? CHART_COLORS.ob : CHART_COLORS.fvg;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    if (z.label) {
      ctx.fillStyle = z.type === 'ob' ? '#8B5CF6' : '#3B82F6';
      ctx.font = 'bold 9px Inter';
      ctx.fillText(z.label, x1 + 3, y1 - 3);
    }
  });

  // Highlight candles
  highlightCandles.forEach(idx => {
    const ci = idx - startIdx;
    if (ci >= 0 && ci < visible.length) {
      const x = padding.left + ci * candleW;
      ctx.fillStyle = CHART_COLORS.highlight;
      ctx.fillRect(x, padding.top, candleW, chartH);
    }
  });

  // Candles
  visible.forEach((c, i) => {
    const x = padding.left + i * candleW;
    const isBull = c.close >= c.open;
    const color = isBull ? CHART_COLORS.bullish : CHART_COLORS.bearish;

    // Wick
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    const wickX = x + candleW / 2;
    ctx.beginPath();
    ctx.moveTo(wickX, priceToY(c.high));
    ctx.lineTo(wickX, priceToY(c.low));
    ctx.stroke();

    // Body
    const bodyTop = priceToY(isBull ? c.close : c.open);
    const bodyBot = priceToY(isBull ? c.open : c.close);
    const bodyH = Math.max(1, bodyBot - bodyTop);
    ctx.fillStyle = color;
    ctx.fillRect(x + gap, bodyTop, bodyW, bodyH);

    // Candle number
    if (showCandleNumbers && (visible.length <= 40 || i % Math.ceil(visible.length / 20) === 0)) {
      ctx.fillStyle = CHART_COLORS.text;
      ctx.font = '9px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(String(startIdx + i + 1), x + candleW / 2, height - 5);
    }
  });

  // Markers (Entry, SL, TP)
  markers.forEach(m => {
    const y = priceToY(m.price);
    if (y < padding.top || y > height - padding.bottom) return;
    ctx.setLineDash(m.type === 'entry' ? [] : [5, 3]);
    ctx.strokeStyle = m.type === 'entry' ? CHART_COLORS.entry : m.type === 'sl' ? CHART_COLORS.sl : CHART_COLORS.tp;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = ctx.strokeStyle;
    ctx.font = 'bold 10px Inter';
    ctx.textAlign = 'right';
    const label = m.type === 'entry' ? 'ENTRY' : m.type === 'sl' ? 'SL' : 'TP';
    ctx.fillText(`${label} ${m.price.toFixed(m.price > 100 ? 0 : 4)}`, width - padding.right - 5, y - 5);

    // Diamond for entry
    if (m.type === 'entry') {
      ctx.fillStyle = CHART_COLORS.entry;
      ctx.beginPath();
      ctx.moveTo(padding.left + 15, y);
      ctx.lineTo(padding.left + 20, y - 5);
      ctx.lineTo(padding.left + 25, y);
      ctx.lineTo(padding.left + 20, y + 5);
      ctx.closePath();
      ctx.fill();
    }
  });

  // Crosshair
  if (crosshair) {
    ctx.strokeStyle = CHART_COLORS.crosshair;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(crosshair.x, padding.top); ctx.lineTo(crosshair.x, height - padding.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(padding.left, crosshair.y); ctx.lineTo(width - padding.right, crosshair.y); ctx.stroke();
    ctx.setLineDash([]);

    const price = yToPrice(crosshair.y);
    ctx.fillStyle = '#D4A85390';
    ctx.fillRect(width - padding.right, crosshair.y - 8, padding.right, 16);
    ctx.fillStyle = '#FFF';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(price.toFixed(price > 100 ? 0 : 4), width - padding.right + 3, crosshair.y + 3);
  }

  return { padding, candleW, chartW, chartH, minP, maxP, totalRange, priceToY, yToPrice, startIdx, endIdx };
}

// ============================================================
// PROCEDURAL CHART GENERATION
// ============================================================

function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }

function makeCandle(open, dir, vol) {
  const bodySize = rnd(vol * 0.2, vol * 1.2);
  const close = dir > 0 ? open + bodySize : open - bodySize;
  const wickUp = rnd(0, vol * 0.6);
  const wickDn = rnd(0, vol * 0.6);
  const high = Math.max(open, close) + wickUp;
  const low = Math.min(open, close) - wickDn;
  return { open: +open.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +close.toFixed(5) };
}

function makeRangeCandles(start, count, vol, center) {
  const candles = [];
  let price = start;
  for (let i = 0; i < count; i++) {
    const dir = price > center ? -1 : price < center - vol ? 1 : (Math.random() > 0.5 ? 1 : -1);
    const c = makeCandle(price, dir, vol * 0.6);
    candles.push(c);
    price = c.close;
  }
  return candles;
}

function makeTrendCandles(start, count, vol, direction) {
  const candles = [];
  let price = start;
  for (let i = 0; i < count; i++) {
    const dir = Math.random() < 0.75 ? direction : -direction;
    const c = makeCandle(price, dir, vol);
    candles.push(c);
    price = c.close;
  }
  return candles;
}

function generateTurtleSoupChart() {
  const basePrice = rnd(1.05, 1.25);
  const vol = rnd(0.002, 0.006);
  const candles = [];

  // Build up: slight uptrend then range with equal lows
  const rangeLow = basePrice - vol * 2;
  candles.push(...makeTrendCandles(basePrice, 3, vol, -1));
  candles.push(...makeRangeCandles(candles[candles.length-1].close, 5, vol, basePrice - vol));

  // Create equal lows zone
  const eqLow = Math.min(...candles.slice(3).map(c => c.low));

  // Manipulation candle: purge below equal lows then close back inside
  const manipOpen = candles[candles.length-1].close;
  const purgeLow = eqLow - vol * 1.5;
  const manipClose = manipOpen + vol * 0.5;
  const manipHigh = manipOpen + vol * 0.3;
  candles.push({ open: +manipOpen.toFixed(5), high: +manipHigh.toFixed(5), low: +purgeLow.toFixed(5), close: +manipClose.toFixed(5) });
  const manipIdx = candles.length - 1;

  // Aggressive reversal up (displacement)
  candles.push(...makeTrendCandles(manipClose, 5, vol * 1.3, 1));

  // More continuation
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 4, vol * 0.8, 1));

  return {
    candles,
    pattern: 'turtle_soup',
    patternName: 'Turtle Soup',
    direction: 'bullish',
    keyCandles: [manipIdx],
    entryZone: { price: manipClose + vol * 0.3, sl: purgeLow - vol * 0.3, tp: manipClose + vol * 5 },
    zones: [{ type: 'ob', high: manipOpen, low: purgeLow, startCandle: manipIdx, endCandle: manipIdx, label: 'Manipulation' }],
    explanation: 'Turtle Soup: Le prix purge les equal lows (liquidite), puis reverse agressivement. Entry apres le displacement, SL sous la meche de manipulation.',
    manipIdx,
    askAt: manipIdx + 1,
  };
}

function generateDoublePurgeChart() {
  const basePrice = rnd(1.08, 1.20);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  // Range phase
  candles.push(...makeRangeCandles(basePrice, 5, vol, basePrice));
  const rangeHigh = Math.max(...candles.map(c => c.high));
  const rangeLow = Math.min(...candles.map(c => c.low));

  // Purge HIGH first
  const purgeHighOpen = candles[candles.length-1].close;
  const purgeHighHigh = rangeHigh + vol * 1.5;
  const purgeHighClose = purgeHighOpen - vol * 0.3;
  candles.push({ open: +purgeHighOpen.toFixed(5), high: +purgeHighHigh.toFixed(5), low: +(purgeHighClose - vol * 0.2).toFixed(5), close: +purgeHighClose.toFixed(5) });
  const purgeHighIdx = candles.length - 1;

  // Small pullback
  candles.push(...makeTrendCandles(purgeHighClose, 2, vol * 0.5, -1));

  // Purge LOW
  const purgeLowOpen = candles[candles.length-1].close;
  const purgeLowLow = rangeLow - vol * 1.5;
  const purgeLowClose = purgeLowOpen + vol * 0.5;
  candles.push({ open: +purgeLowOpen.toFixed(5), high: +(purgeLowClose + vol * 0.2).toFixed(5), low: +purgeLowLow.toFixed(5), close: +purgeLowClose.toFixed(5) });
  const purgeLowIdx = candles.length - 1;

  // Expansion up (bullish resolution)
  candles.push(...makeTrendCandles(purgeLowClose, 6, vol * 1.2, 1));
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 0.7, 1));

  return {
    candles, pattern: 'double_purge', patternName: 'Double Purge', direction: 'bullish',
    keyCandles: [purgeHighIdx, purgeLowIdx],
    entryZone: { price: purgeLowClose + vol * 0.4, sl: purgeLowLow - vol * 0.3, tp: purgeHighHigh + vol * 2 },
    zones: [
      { type: 'fvg', high: rangeHigh, low: rangeLow, startCandle: 0, endCandle: candles.length - 1, label: 'Range' },
    ],
    explanation: 'Double Purge: Le prix purge le HIGH puis le LOW du range. Les deux DOL sont prises = haute probabilite de reversal bullish.',
    manipIdx: purgeLowIdx,
    askAt: purgeLowIdx + 1,
  };
}

function generateCRTChart(valid = true) {
  const basePrice = rnd(1.06, 1.22);
  const vol = rnd(0.003, 0.006);
  const candles = [];
  const isBullish = Math.random() > 0.5;

  // Pre-context
  candles.push(...makeRangeCandles(basePrice, 4, vol, basePrice));

  if (valid) {
    if (isBullish) {
      // OLHC: Open, goes to Low, then High, Close near High
      const o = candles[candles.length-1].close;
      // Down candle first (fakeout)
      candles.push(makeCandle(o, -1, vol * 0.8));
      // Then strong up
      candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 1.2, 1));
      // Close near high
      const lastP = candles[candles.length-1].close;
      candles.push(makeCandle(lastP, 1, vol * 0.5));
    } else {
      // OHLC: Open, goes to High, then Low, Close near Low
      const o = candles[candles.length-1].close;
      candles.push(makeCandle(o, 1, vol * 0.8));
      candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 1.2, -1));
      const lastP = candles[candles.length-1].close;
      candles.push(makeCandle(lastP, -1, vol * 0.5));
    }
  } else {
    // Invalid CRT: choppy, no clear sequence
    candles.push(...makeRangeCandles(candles[candles.length-1].close, 5, vol * 1.2, basePrice));
  }

  // Continuation
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 4, vol * 0.8, isBullish ? 1 : -1));

  const crtStart = 4;
  return {
    candles,
    pattern: valid ? 'crt' : 'invalid_crt',
    patternName: valid ? `CRT ${isBullish ? 'Bullish (OLHC)' : 'Bearish (OHLC)'}` : 'CRT Invalide',
    direction: isBullish ? 'bullish' : 'bearish',
    keyCandles: [crtStart, crtStart + 1, crtStart + 2],
    entryZone: valid ? { price: candles[crtStart + 2]?.close || basePrice, sl: isBullish ? candles[crtStart]?.low - vol * 0.3 : candles[crtStart]?.high + vol * 0.3, tp: isBullish ? candles[crtStart + 2]?.close + vol * 4 : candles[crtStart + 2]?.close - vol * 4 } : null,
    zones: [],
    explanation: valid ? `CRT valide ${isBullish ? 'bullish (OLHC)' : 'bearish (OHLC)'}. La sequence Open > ${isBullish ? 'Low > High > Close' : 'High > Low > Close'} est respectee.` : 'CRT invalide. La sequence OHLC/OLHC n\'est pas respectee. PASS.',
    valid,
    askAt: 6,
  };
}

function generateMSSChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  // Downtrend (creating lower highs, lower lows)
  candles.push(...makeTrendCandles(basePrice, 6, vol, -1));

  // MSS: break above last lower high
  const lastHigh = Math.max(...candles.slice(-3).map(c => c.high));
  const mssOpen = candles[candles.length-1].close;
  const mssClose = lastHigh + vol * 1.5;
  candles.push({ open: +mssOpen.toFixed(5), high: +(mssClose + vol * 0.3).toFixed(5), low: +(mssOpen - vol * 0.2).toFixed(5), close: +mssClose.toFixed(5) });
  const mssIdx = candles.length - 1;

  // Retracement to OTE (50% of the MSS move)
  const midPoint = (mssOpen + mssClose) / 2;
  candles.push(makeCandle(mssClose, -1, vol * 0.6));
  candles.push({ open: +candles[candles.length-1].close.toFixed(5), high: +(candles[candles.length-1].close + vol * 0.2).toFixed(5), low: +midPoint.toFixed(5), close: +(midPoint + vol * 0.3).toFixed(5) });
  const oteIdx = candles.length - 1;

  // Expansion up
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 5, vol * 1.3, 1));
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 0.8, 1));

  return {
    candles, pattern: 'mss_ote', patternName: 'MSS + OTE', direction: 'bullish',
    keyCandles: [mssIdx, oteIdx],
    entryZone: { price: midPoint + vol * 0.3, sl: midPoint - vol * 1.5, tp: mssClose + vol * 5 },
    zones: [
      { type: 'fvg', high: mssClose, low: mssOpen, startCandle: mssIdx, endCandle: mssIdx, label: 'MSS' },
      { type: 'ob', high: midPoint + vol * 0.5, low: midPoint - vol * 0.5, startCandle: oteIdx, endCandle: oteIdx, label: 'OTE Zone' },
    ],
    explanation: 'MSS + OTE: Le prix casse la structure (MSS = break du dernier lower high), puis retrace a 50% (OTE). Double validation = entree la plus safe.',
    manipIdx: mssIdx,
    askAt: oteIdx,
  };
}

function generateManipulationTrap() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.002, 0.005);
  const candles = [];

  // Looks like a Turtle Soup but isn't
  candles.push(...makeRangeCandles(basePrice, 5, vol, basePrice));
  const rangeLow = Math.min(...candles.map(c => c.low));

  // Fake purge: breaks below but closes below too (breakout, not TS)
  const fakeOpen = candles[candles.length-1].close;
  const fakeLow = rangeLow - vol * 2;
  const fakeClose = rangeLow - vol * 0.8; // Closes BELOW = real breakout
  candles.push({ open: +fakeOpen.toFixed(5), high: +(fakeOpen + vol * 0.2).toFixed(5), low: +fakeLow.toFixed(5), close: +fakeClose.toFixed(5) });
  const trapIdx = candles.length - 1;

  // Small bounce (looks like reversal but fails)
  candles.push(makeCandle(fakeClose, 1, vol * 0.4));
  candles.push(makeCandle(candles[candles.length-1].close, 1, vol * 0.3));

  // Continuation down (the trap springs)
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 6, vol * 1.1, -1));

  return {
    candles, pattern: 'manipulation_trap', patternName: 'Piege (Faux Turtle Soup)', direction: 'bearish',
    keyCandles: [trapIdx],
    entryZone: null,
    zones: [{ type: 'ob', high: fakeOpen, low: fakeLow, startCandle: trapIdx, endCandle: trapIdx, label: 'PIEGE' }],
    explanation: 'PIEGE: Ca ressemble a un Turtle Soup mais le prix CLOSE en-dessous du range. C\'est un vrai breakout bearish, pas un TS. Entrer long ici = se faire pieger. La discipline dit PASS.',
    isTrap: true,
    askAt: trapIdx + 2,
  };
}

function generateFVGChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.003, 0.006);
  const candles = [];

  candles.push(...makeRangeCandles(basePrice, 4, vol * 0.7, basePrice));

  // Create FVG: 3 candles where wick1 doesn't touch wick3
  const fvgOpen = candles[candles.length-1].close;
  const c1 = makeCandle(fvgOpen, 1, vol * 0.5);
  candles.push(c1);
  // Big displacement candle
  const c2 = { open: +c1.close.toFixed(5), high: +(c1.close + vol * 3).toFixed(5), low: +(c1.close - vol * 0.1).toFixed(5), close: +(c1.close + vol * 2.5).toFixed(5) };
  candles.push(c2);
  // C3 opens above c1 high with gap
  const c3Open = c2.close - vol * 0.3;
  const c3 = makeCandle(c3Open, 1, vol * 0.6);
  candles.push(c3);
  const fvgIdx = candles.length - 2;

  candles.push(...makeTrendCandles(c3.close, 3, vol * 0.5, 1));

  candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 0.6, -1));
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 4, vol * 0.8, 1));

  return {
    candles, pattern: 'fvg', patternName: 'Fair Value Gap (FVG)', direction: 'bullish',
    keyCandles: [fvgIdx - 1, fvgIdx, fvgIdx + 1],
    entryZone: { price: (c1.high + c3.low) / 2, sl: c1.high - vol, tp: c2.high + vol * 2 },
    zones: [{ type: 'fvg', high: c3.low, low: c1.high, startCandle: fvgIdx - 1, endCandle: fvgIdx + 1, label: 'FVG' }],
    explanation: 'FVG bullish: Ecart entre meche haute de la bougie 1 et meche basse de la bougie 3. Le prix revient souvent mitiger ce gap.',
    askAt: fvgIdx + 2,
  };
}

function generateOBChart() {
  const basePrice = rnd(1.08, 1.18);
  const vol = rnd(0.003, 0.006);
  const candles = [];

  candles.push(...makeRangeCandles(basePrice, 3, vol * 0.6, basePrice));

  // Last bearish candle before displacement up = OB
  const obCandle = makeCandle(candles[candles.length-1].close, -1, vol * 0.8);
  candles.push(obCandle);
  const obIdx = candles.length - 1;

  // Displacement up
  candles.push(...makeTrendCandles(obCandle.close, 4, vol * 1.5, 1));

  // Retest OB
  candles.push(...makeTrendCandles(candles[candles.length-1].close, 3, vol * 0.7, -1));
  // Bounce from OB
  const bouncePrice = obCandle.high + vol * 0.2;
  const lastC = candles[candles.length-1];
  if (lastC.close > obCandle.open) {

  } else {
    candles.push(makeCandle(lastC.close, 1, vol * 0.8));
  }

  candles.push(...makeTrendCandles(candles[candles.length-1].close, 4, vol * 1.0, 1));

  return {
    candles, pattern: 'ob', patternName: 'Order Block', direction: 'bullish',
    keyCandles: [obIdx],
    entryZone: { price: obCandle.high, sl: obCandle.low - vol * 0.5, tp: obCandle.high + vol * 6 },
    zones: [{ type: 'ob', high: obCandle.open, low: obCandle.low, startCandle: obIdx, endCandle: obIdx, label: 'OB Bullish' }],

}

function getRank(xp) { let r=0; for(let i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].xpRequired){r=i;break;}} return r; }
function getXpProgress(xp) { const r=getRank(xp); const cur=RANKS[r],next=RANKS[r+1]; if(!next)return{pct:100,current:xp-cur.xpRequired,needed:0}; const inR=xp-cur.xpRequired,needed=next.xpRequired-cur.xpRequired; return{pct:Math.min(100,(inR/needed)*100),current:inR,needed}; }
function todayStr() { return new Date().toISOString().split('T')[0]; }

function generateDailyMissions(state) {
  const r = getRank(state.xp);
  const today = todayStr();
  if (state.missionsDate === today && state.dailyMissions.length > 0) return state.dailyMissions;
  const branches = Object.keys(SKILL_BRANCHES);
  const weakBranches = [...branches].sort((a,b) => {
    const aS=SKILL_BRANCHES[a].concepts.reduce((s,c)=>s+(state.skillLevels[c.id]||0),0);
    const bS=SKILL_BRANCHES[b].concepts.reduce((s,c)=>s+(state.skillLevels[c.id]||0),0);
    return aS-bS;
  });
  return [
    { id:'m1_'+today, text:`Reussis ${5+r*2} quiz ${SKILL_BRANCHES[weakBranches[0]].name}`, type:'quiz', xp:15+r*5, completed:false, target:5+r*2, progress:0, branch:weakBranches[0] },
    { id:'m2_'+today, text:`Enchaine ${3+r} bonnes reponses`, type:'streak_quiz', xp:20+r*5, completed:false, target:3+r, progress:0 },
    { id:'m3_'+today, text:`${60+r*5}% sur un set de quiz`, type:'score', xp:20+r*5, completed:false, target:60+r*5, progress:0 },
    { id:'m4_'+today, text:'Complete un scenario', type:'scenario', xp:30+r*5, completed:false, target:1, progress:0 },
    { id:'m5_'+today, text:`${15+r*5} quiz au total`, type:'total_quiz', xp:25+r*5, completed:false, target:15+r*5, progress:0 },
    { id:'m6_'+today, text:'Complete 1 exercice Arena', type:'arena', xp:25+r*5, completed:false, target:1, progress:0 },
  ];
}

function generateQuizSet(state, branch = null, count = 15) {
  const rankIdx = getRank(state.xp);
  const fixedCount = Math.floor(count * 0.4);
  const generatedCount = count - fixedCount;
  let fixedPool = QUIZ_DB.filter(q => { const qRankIdx=RANKS.findIndex(r=>r.id===q.rank); return qRankIdx<=rankIdx+1; });
  if (branch) fixedPool = fixedPool.filter(q => q.branch === branch);
  fixedPool.sort((a,b) => { const aS=state.conceptScores[a.concept],bS=state.conceptScores[b.concept]; return (aS?aS.correct/aS.total:0.5)-(bS?bS.correct/bS.total:0.5); });
  const fixedQuestions = [];
  const pPool = fixedPool.slice(0, Math.max(30, fixedPool.length));
  while (fixedQuestions.length < Math.min(fixedCount, pPool.length)) {
    const idx = Math.floor(Math.random() * Math.min(pPool.length, fixedCount * 3));
    const q = pPool[idx];
    if (q && !fixedQuestions.find(fq => fq.id === q.id)) fixedQuestions.push(q);
  }
  let templates = QUIZ_TEMPLATES.filter(t => t.minRank <= rankIdx + 1);
  if (branch) templates = templates.filter(t => t.branch === branch);
  const generated = [];
  let attempts = 0;
  while (generated.length < generatedCount && templates.length > 0 && attempts < generatedCount * 3) {
    attempts++;
    const t = templates[Math.floor(Math.random() * templates.length)];
    try { const q=t.generate(); generated.push({...q,concept:t.concept,branch:t.branch,id:'gen_'+t.id+'_'+Date.now()+'_'+attempts,isGenerated:true}); } catch(e) {}
  }
  return [...fixedQuestions, ...generated].sort(() => Math.random() - 0.5);
}

function ChartCanvas({ candles, markers, zones, highlightCandles, visibleCount, crosshairEnabled, onChartClick, width: propWidth, height: propHeight, className }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [dimensions, setDimensions] = useState({ w: propWidth || 350, h: propHeight || 280 });
  const [crosshair, setCrosshair] = useState(null);
  const chartInfoRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(entries => {
      const e = entries[0];
      if (e) setDimensions({ w: e.contentRect.width, h: propHeight || Math.min(320, Math.max(220, e.contentRect.width * 0.7)) });
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, [propHeight]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = dimensions.w * dpr;
    canvas.height = dimensions.h * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = dimensions.w + 'px';
    canvas.style.height = dimensions.h + 'px';
    chartInfoRef.current = drawCandlestickChart(ctx, candles || [], dimensions.w, dimensions.h, {
      markers: markers || [],
      zones: zones || [],
      highlightCandles: highlightCandles || [],
      visibleCount: visibleCount || (candles || []).length,
      crosshair,
    });
  }, [candles, markers, zones, highlightCandles, visibleCount, crosshair, dimensions]);

  const handleInteraction = useCallback((clientX, clientY) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    if (crosshairEnabled) setCrosshair({ x, y });
    if (onChartClick && chartInfoRef.current) {
      const price = chartInfoRef.current.yToPrice(y);
      const candleIdx = Math.floor((x - chartInfoRef.current.padding.left) / chartInfoRef.current.candleW) + chartInfoRef.current.startIdx;
      onChartClick({ x, y, price, candleIdx });
    }
  }, [crosshairEnabled, onChartClick]);

  const onMouseMove = (e) => { if (crosshairEnabled) { const r = canvasRef.current.getBoundingClientRect(); setCrosshair({ x: e.clientX - r.left, y: e.clientY - r.top }); } };
  const onMouseLeave = () => setCrosshair(null);
  const onClick = (e) => handleInteraction(e.clientX, e.clientY);
  const onTouchEnd = (e) => { if (e.changedTouches.length > 0) { const t = e.changedTouches[0]; handleInteraction(t.clientX, t.clientY); e.preventDefault(); } };

  return (
    <div ref={containerRef} className={`w-full rounded-lg overflow-hidden ${className || ''}`} style={{ background: CHART_COLORS.bg }}>
      <canvas ref={canvasRef} onMouseMove={onMouseMove} onMouseLeave={onMouseLeave} onClick={onClick} onTouchEnd={onTouchEnd} style={{ cursor: crosshairEnabled ? 'crosshair' : 'default' }} />
    </div>
  );
}

function TradeReplay({ state, setState, onBack }) {
  const [scenario, setScenario] = useState(null);
  const [visibleCandles, setVisibleCandles] = useState(0);
  const [phase, setPhase] = useState('intro'); // intro, building, question, placing, result, summary
  const [question, setQuestion] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [score, setScore] = useState(0);
  const [totalQ, setTotalQ] = useState(0);
  const [userMarkers, setUserMarkers] = useState([]);
  const [placingMode, setPlacingMode] = useState(null); // 'entry', 'sl', 'tp'
  const [flashClass, setFlashClass] = useState('');
  const [feedback, setFeedback] = useState(null);

  const startScenario = () => {
    const genIdx = Math.floor(Math.random() * CHART_GENERATORS.length);
    const gen = CHART_GENERATORS[genIdx];
    const data = gen.fn();
    setScenario(data);
    setVisibleCandles(3);
    setPhase('building');
    setAnswers([]);
    setScore(0);
    setTotalQ(0);
    setUserMarkers([]);
    setFeedback(null);
  };

  const addCandle = () => {
    if (!scenario) return;
    const next = visibleCandles + 1;
    setVisibleCandles(next);

    if (next >= scenario.candles.length) {
      setPhase('summary');
      return;
    }

    // Check if we should ask a question
    if (scenario.askAt && next === scenario.askAt) {
      askQuestion();
    }
  };

  const askQuestion = () => {
    const questions = [];

    // Market profile question
    if (!answers.find(a => a.type === 'profile')) {
      const profiles = ['Range', 'Expansion', 'Manipulation', 'Reversal'];
      const correct = scenario.isTrap ? 'Manipulation' : scenario.direction === 'bullish' ? 'Reversal' : 'Reversal';
      const opts = profiles.sort(() => Math.random() - 0.5);
      questions.push({
        type: 'profile',
        text: 'Quel est le profil de marche actif ?',
        options: opts,
        correct: opts.indexOf(correct),
      });
    }

    // Pattern identification
    if (!answers.find(a => a.type === 'pattern')) {
      const patterns = ['Turtle Soup', 'Double Purge', 'CRT Valide', 'MSS + OTE', 'FVG', 'Order Block', 'Piege / Invalide'];
      const correct = scenario.isTrap ? 'Piege / Invalide' : scenario.patternName.includes('Invalide') ? 'Piege / Invalide' : patterns.find(p => scenario.patternName.includes(p)) || scenario.patternName;
      const visible = [correct];
      const others = patterns.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [...visible, ...others].sort(() => Math.random() - 0.5);
      questions.push({
        type: 'pattern',
        text: 'Quel pattern identifies-tu ?',
        options: opts,
        correct: opts.indexOf(correct),
      });
    }

    // Trade decision
    if (!answers.find(a => a.type === 'decision')) {
      const correct = scenario.isTrap || !scenario.valid === false || scenario.pattern === 'invalid_crt' ? 'PASS — conditions non reunies' : 'ENTRY — setup valide';
      const opts = ['ENTRY — setup valide', 'PASS — conditions non reunies', 'Attendre plus de bougies', 'Shorter le mouvement'];
      if (!opts.includes(correct)) opts[0] = correct;
      const shuffled = [...opts].sort(() => Math.random() - 0.5);
      questions.push({
        type: 'decision',
        text: 'Decision : Entrer, Attendre, ou Pass ?',
        options: shuffled,
        correct: shuffled.indexOf(correct),
      });
    }

    if (questions.length > 0) {
      setQuestion(questions[0]);
      setPhase('question');
    } else if (scenario.entryZone && !scenario.isTrap && !answers.find(a => a.type === 'placement')) {
      setPhase('placing');
      setPlacingMode('entry');
      setFeedback({ text: 'Tape sur le chart pour placer ton ENTRY', color: '#06B6D4' });
    }
  };

  const answerQuestion = (idx) => {
    const isCorrect = idx === question.correct;
    const newScore = score + (isCorrect ? 1 : 0);
    setScore(newScore);
    setTotalQ(totalQ + 1);
    setAnswers([...answers, { type: question.type, correct: isCorrect }]);
    setFlashClass(isCorrect ? 'flash-correct' : 'flash-wrong');
    setTimeout(() => setFlashClass(''), 500);

    setFeedback({
      text: isCorrect ? 'Correct ! +15 XP' : `Incorrect. Reponse : ${question.options[question.correct]}`,
      color: isCorrect ? '#10B981' : '#EF4444',
    });

    if (isCorrect) {
      const ns = { ...state, xp: state.xp + 15 };
      ns.rank = getRank(ns.xp);
      setState(ns); saveState(ns);
    }

    setTimeout(() => {
      setQuestion(null);
      setFeedback(null);
      // Ask next question or continue
      if (answers.length + 1 < 3) {
        askQuestion();
      } else if (scenario.entryZone && !scenario.isTrap) {
        setPhase('placing');
        setPlacingMode('entry');
        setFeedback({ text: 'Tape sur le chart pour placer ton ENTRY', color: '#06B6D4' });
      } else {
        setPhase('building');
      }
    }, 1500);
  };

  const handleChartClick = ({ price }) => {
    if (phase !== 'placing') return;
    if (placingMode === 'entry') {
      setUserMarkers([...userMarkers, { type: 'entry', price }]);
      setPlacingMode('sl');
      setFeedback({ text: 'Maintenant place ton STOP LOSS (SL)', color: '#EF4444' });
    } else if (placingMode === 'sl') {
      setUserMarkers([...userMarkers, { type: 'sl', price }]);
      setPlacingMode('tp');
      setFeedback({ text: 'Maintenant place ton TAKE PROFIT (TP)', color: '#10B981' });
    } else if (placingMode === 'tp') {
      const newMarkers = [...userMarkers, { type: 'tp', price }];
      setUserMarkers(newMarkers);
      setPlacingMode(null);

      // Evaluate placement
      const entry = newMarkers.find(m => m.type === 'entry');
      const sl = newMarkers.find(m => m.type === 'sl');
      const tp = newMarkers.find(m => m.type === 'tp');
      const ideal = scenario.entryZone;

      if (entry && sl && tp && ideal) {
        const risk = Math.abs(entry.price - sl.price);
        const reward = Math.abs(tp.price - entry.price);
        const rr = risk > 0 ? (reward / risk) : 0;
        const goodRR = rr >= 1.8;
        const goodSL = scenario.direction === 'bullish' ? sl.price < ideal.sl + Math.abs(ideal.sl - ideal.price) * 0.5 : sl.price > ideal.sl - Math.abs(ideal.sl - ideal.price) * 0.5;
        const placementScore = (goodRR ? 1 : 0) + (goodSL ? 1 : 0);
        const xpGain = placementScore * 10;

        setFeedback({
          text: `RR = ${rr.toFixed(1)}:1 ${goodRR ? '(OK)' : '(< 2:1 !)'}. SL ${goodSL ? 'bien place' : 'a ameliorer'}. +${xpGain} XP`,
          color: placementScore >= 2 ? '#10B981' : placementScore >= 1 ? '#F59E0B' : '#EF4444',
        });

        setScore(score + placementScore);
        setTotalQ(totalQ + 2);

        if (xpGain > 0) {
          const ns = { ...state, xp: state.xp + xpGain };
          ns.rank = getRank(ns.xp);
          setState(ns); saveState(ns);
        }
      }

      setTimeout(() => {
        setPhase('building');
        setFeedback(null);
      }, 2500);
    }
  };

  const finishReplay = () => {
    const totalXP = 25;
    const ns = { ...state };
    ns.xp += totalXP;
    ns.arenaStats = { ...ns.arenaStats, replaysCompleted: (ns.arenaStats.replaysCompleted || 0) + 1, totalArenaXp: (ns.arenaStats.totalArenaXp || 0) + totalXP };
    ns.rank = getRank(ns.xp);
    // Arena mission
    if (ns.missionsDate === todayStr()) {
      ns.dailyMissions = ns.dailyMissions.map(m => m.type === 'arena' && !m.completed ? { ...m, progress: 1, completed: true } : m);
      ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp += m.xp; m.xpAwarded = true; } });
    }
    setState(ns); saveState(ns);
    setPhase('summary');
  };

  // INTRO SCREEN
  if (phase === 'intro' || !scenario) {
    return (
      <div className="animate-fade-in">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
          <h2 className="text-xl font-bold text-white">Trade Replay</h2>
        </div>
        <div className="text-center py-8">
          <span className="text-5xl block mb-4">&#128200;</span>
          <h3 className="text-2xl font-bold text-white mb-2">Trade Replay Mode</h3>
          <p className="text-gray-400 mb-6 max-w-sm mx-auto">Le chart se construit bougie par bougie. Identifie les patterns, prends tes decisions, place tes trades.</p>
          <button onClick={startScenario} className="arena-btn primary px-8 py-4 rounded-xl text-amber-400 font-bold text-lg">Commencer un Replay</button>
        </div>
      </div>
    );
  }

  // SUMMARY SCREEN
  if (phase === 'summary') {
    const pct = totalQ > 0 ? Math.round(score / totalQ * 100) : 0;
    return (
      <div className="animate-slide-up text-center py-8">
        <span className="text-5xl block mb-4">{pct >= 70 ? '\u2705' : '\u274C'}</span>
        <h3 className="text-2xl font-bold text-white mb-2">Replay Termine</h3>
        <p className="text-gray-400 mb-1">{scenario.patternName}</p>
        <p className="text-3xl font-bold mb-4" style={{ color: pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444' }}>{pct}%</p>
        <p className="text-sm text-gray-400 mb-2">{score}/{totalQ} correct</p>

        <div className="dojo-card p-4 mx-auto max-w-md text-left mb-6">
          <p className="text-xs text-amber-400 font-semibold mb-2">EXPLICATION</p>
          <p className="text-sm text-gray-300">{scenario.explanation}</p>
        </div>

        <div className="flex gap-3 justify-center">
          <button onClick={startScenario} className="arena-btn primary px-6 py-3 rounded-lg text-amber-400 font-medium">Nouveau Replay</button>
          <button onClick={onBack} className="arena-btn px-6 py-3 rounded-lg text-gray-300 font-medium">Retour</button>
        </div>
      </div>
    );
  }

  const displayCandles = scenario.candles.slice(0, visibleCandles);

  return (
    <div className={`animate-fade-in ${flashClass}`}>
      <div className="flex items-center gap-3 mb-3">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-amber-500 rounded-full transition-all" style={{ width: (visibleCandles / scenario.candles.length * 100) + '%' }} />
        </div>
        <span className="text-xs text-gray-500 font-mono">{visibleCandles}/{scenario.candles.length}</span>
      </div>

      <ChartCanvas
        candles={displayCandles}
        markers={userMarkers}
        zones={visibleCandles > (scenario.askAt || 999) ? scenario.zones : []}
        highlightCandles={[]}
        crosshairEnabled={phase === 'placing'}
        onChartClick={handleChartClick}
      />

      {feedback && (
        <div className="animate-slide-up dojo-card p-3 mt-3 text-center" style={{ borderColor: feedback.color + '40' }}>
          <p className="text-sm font-medium" style={{ color: feedback.color }}>{feedback.text}</p>
        </div>
      )}

      {phase === 'question' && question && (
        <div className="mt-4 animate-slide-up">
          <div className="dojo-card p-4 mb-3">
            <p className="text-white font-medium">{question.text}</p>
          </div>
          <div className="space-y-2">
            {question.options.map((opt, i) => (
              <div key={i} className="quiz-option dojo-card p-3 text-sm text-gray-200" onClick={() => answerQuestion(i)}>{opt}</div>
            ))}
          </div>
        </div>
      )}

      {phase === 'building' && (
        <div className="mt-4 flex gap-3">
          <button onClick={addCandle} className="flex-1 arena-btn primary py-3 rounded-lg text-amber-400 font-medium">
            Bougie suivante \u25B6
          </button>
          {visibleCandles >= scenario.candles.length - 2 && (
            <button onClick={finishReplay} className="arena-btn py-3 px-4 rounded-lg text-gray-300 font-medium">Terminer</button>
          )}
        </div>
      )}

      {phase === 'placing' && (
        <div className="mt-3 text-center text-xs text-gray-500">
          Mode placement : {placingMode === 'entry' ? 'ENTRY (cyan)' : placingMode === 'sl' ? 'STOP LOSS (rouge)' : 'TAKE PROFIT (vert)'}
        </div>
      )}
    </div>
  );
}

function PatternSpotter({ state, setState, onBack }) {
  const [scenario, setScenario] = useState(null);
  const [phase, setPhase] = useState('intro'); // intro, identify, select_candles, place_entry, result
  const [selectedPattern, setSelectedPattern] = useState(null);
  const [selectedCandles, setSelectedCandles] = useState([]);
  const [entryPrice, setEntryPrice] = useState(null);
  const [score, setScore] = useState(0);
  const [flashClass, setFlashClass] = useState('');

  const startScenario = () => {
    const validGens = CHART_GENERATORS.filter(g => g.id !== 'manipulation_trap' && g.id !== 'invalid_crt');
    const gen = validGens[Math.floor(Math.random() * validGens.length)];
    const data = gen.fn();
    setScenario(data);
    setPhase('identify');
    setSelectedPattern(null);
    setSelectedCandles([]);
    setEntryPrice(null);
    setScore(0);
  };

  const patternChoices = ['Turtle Soup', 'Double Purge', 'CRT Bullish', 'CRT Bearish', 'MSS + OTE', 'FVG', 'Order Block', 'Breaker Block'];

  const handlePatternChoice = (pattern) => {
    setSelectedPattern(pattern);
    const correct = scenario.patternName.toLowerCase().includes(pattern.toLowerCase().split(' ')[0].toLowerCase()) ||
                    (pattern === 'CRT Bullish' && scenario.pattern === 'crt' && scenario.direction === 'bullish') ||
                    (pattern === 'CRT Bearish' && scenario.pattern === 'crt' && scenario.direction === 'bearish') ||
                    (pattern === 'Order Block' && scenario.pattern === 'ob');
    if (correct) {
      setScore(score + 1);
      setFlashClass('flash-correct');
    } else {
      setFlashClass('flash-wrong');
    }
    setTimeout(() => { setFlashClass(''); setPhase('select_candles'); }, 600);
  };

  const handleCandleClick = ({ candleIdx }) => {
    if (phase !== 'select_candles') return;
    if (candleIdx < 0 || candleIdx >= scenario.candles.length) return;
    const newSel = selectedCandles.includes(candleIdx) ? selectedCandles.filter(c => c !== candleIdx) : [...selectedCandles, candleIdx];
    setSelectedCandles(newSel);
  };

  const confirmCandles = () => {
    // Check how many key candles the user got right
    const hits = selectedCandles.filter(c => scenario.keyCandles.includes(c)).length;
    const accuracy = scenario.keyCandles.length > 0 ? hits / scenario.keyCandles.length : 0;
    if (accuracy >= 0.5) setScore(s => s + 1);
    setFlashClass(accuracy >= 0.5 ? 'flash-correct' : 'flash-wrong');
    setTimeout(() => { setFlashClass(''); setPhase('place_entry'); }, 600);
  };

  const handleEntryClick = ({ price }) => {
    if (phase !== 'place_entry') return;
    setEntryPrice(price);
    // Evaluate entry placement
    if (scenario.entryZone) {
      const dist = Math.abs(price - scenario.entryZone.price);
      const range = Math.abs(scenario.entryZone.tp - scenario.entryZone.sl);
      const accuracy = 1 - Math.min(1, dist / (range * 0.3));
      if (accuracy >= 0.5) setScore(s => s + 1);
      setFlashClass(accuracy >= 0.5 ? 'flash-correct' : 'flash-wrong');
    }
    setTimeout(() => { setFlashClass(''); setPhase('result'); }, 600);
  };

  const finishSpotter = () => {
    const xpGain = score * 15 + 10;
    const ns = { ...state };
    ns.xp += xpGain;
    ns.arenaStats = { ...ns.arenaStats, patternsSpotted: (ns.arenaStats.patternsSpotted || 0) + 1, totalArenaXp: (ns.arenaStats.totalArenaXp || 0) + xpGain };
    ns.rank = getRank(ns.xp);
    if (ns.missionsDate === todayStr()) {
      ns.dailyMissions = ns.dailyMissions.map(m => m.type === 'arena' && !m.completed ? { ...m, progress: 1, completed: true } : m);
      ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp += m.xp; m.xpAwarded = true; } });
    }
    setState(ns); saveState(ns);
  };

  if (phase === 'intro' || !scenario) {
    return (
      <div className="animate-fade-in">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
          <h2 className="text-xl font-bold text-white">Pattern Spotter</h2>
        </div>
        <div className="text-center py-8">
          <span className="text-5xl block mb-4">&#128269;</span>
          <h3 className="text-2xl font-bold text-white mb-2">Pattern Spotter Mode</h3>
          <p className="text-gray-400 mb-6 max-w-sm mx-auto">Identifie le pattern, selectionne les bougies cles, place l'entree optimale.</p>
          <button onClick={startScenario} className="arena-btn primary px-8 py-4 rounded-xl text-amber-400 font-bold text-lg">Commencer</button>
        </div>
      </div>
    );
  }

  if (phase === 'result') {
    finishSpotter();
    const pct = Math.round(score / 3 * 100);
    return (
      <div className={`animate-slide-up ${flashClass}`}>
        <ChartCanvas
          candles={scenario.candles}
          markers={scenario.entryZone ? [
            { type: 'entry', price: scenario.entryZone.price },
            { type: 'sl', price: scenario.entryZone.sl },
            { type: 'tp', price: scenario.entryZone.tp },
          ] : []}
          zones={scenario.zones}
          highlightCandles={scenario.keyCandles}
        />
        <div className="mt-4 text-center">
          <p className="text-3xl font-bold mb-2" style={{ color: pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444' }}>{pct}%</p>
          <p className="text-gray-400 mb-2">{score}/3 correct — {scenario.patternName}</p>
          <div className="dojo-card p-4 text-left mb-4">
            <p className="text-xs text-amber-400 font-semibold mb-2">CORRECTION</p>
            <p className="text-sm text-gray-300 mb-2">{scenario.explanation}</p>
            <p className="text-xs text-gray-500">Les bougies surlignees en or sont les bougies cles du pattern. Les lignes montrent l'entry, SL et TP optimaux.</p>
          </div>
          <div className="flex gap-3 justify-center">
            <button onClick={() => { setScenario(null); setPhase('intro'); }} className="arena-btn primary px-6 py-3 rounded-lg text-amber-400 font-medium">Nouveau Pattern</button>
            <button onClick={onBack} className="arena-btn px-6 py-3 rounded-lg text-gray-300 font-medium">Retour</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className={`animate-fade-in ${flashClass}`}>
      <div className="flex items-center gap-3 mb-3">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <h2 className="text-lg font-bold text-white">Pattern Spotter</h2>
        <div className="flex-1" />
        <div className="flex gap-1">
          {['identify', 'select_candles', 'place_entry'].map((p, i) => (
            <div key={p} className="w-8 h-1.5 rounded-full" style={{ background: ['identify', 'select_candles', 'place_entry'].indexOf(phase) >= i ? '#D4A853' : '#1E1E2E' }} />
          ))}
        </div>
      </div>

      <ChartCanvas
        candles={scenario.candles}
        highlightCandles={phase === 'select_candles' ? selectedCandles : []}
        markers={entryPrice ? [{ type: 'entry', price: entryPrice }] : []}
        crosshairEnabled={phase === 'place_entry'}
        onChartClick={phase === 'select_candles' ? handleCandleClick : phase === 'place_entry' ? handleEntryClick : null}
      />

      {phase === 'identify' && (
        <div className="mt-4 animate-slide-up">
          <p className="text-white font-medium mb-3">Quel pattern est present sur ce chart ?</p>
          <div className="grid grid-cols-2 gap-2">
            {patternChoices.map(p => (
              <div key={p} className="quiz-option dojo-card p-3 text-sm text-gray-200 text-center" onClick={() => handlePatternChoice(p)}>{p}</div>
            ))}
          </div>
        </div>
      )}

      {phase === 'select_candles' && (
        <div className="mt-4 animate-slide-up">
          <p className="text-white font-medium mb-2">Tape sur les bougies cles du pattern</p>
          <p className="text-xs text-gray-500 mb-3">Selectionne les bougies qui forment le pattern ({selectedCandles.length} selectionnees)</p>
          <button onClick={confirmCandles} className="w-full arena-btn primary py-3 rounded-lg text-amber-400 font-medium" disabled={selectedCandles.length === 0}>Confirmer la selection ({selectedCandles.length})</button>
        </div>
      )}

      {phase === 'place_entry' && (
        <div className="mt-4 animate-slide-up">
          <p className="text-white font-medium mb-2">Place l'entree optimale</p>
          <p className="text-xs text-gray-500">Tape sur le chart au niveau ou tu entrerais</p>
        </div>
      )}
    </div>
  );
}

function QuickDrill({ state, setState, onBack }) {
  const [round, setRound] = useState(0);
  const [totalRounds, setTotalRounds] = useState(8);
  const [scenario, setScenario] = useState(null);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(false);
  const [flashClass, setFlashClass] = useState('');
  const [isFinished, setIsFinished] = useState(false);
  const [timer, setTimer] = useState(15);
  const timerRef = useRef(null);

  const nextRound = useCallback(() => {
    if (round >= totalRounds) {
      setIsFinished(true);
      const xpGain = score * 10 + 10;
      const ns = { ...state };
      ns.xp += xpGain;
      ns.arenaStats = { ...ns.arenaStats, drillsCompleted: (ns.arenaStats.drillsCompleted || 0) + 1, totalArenaXp: (ns.arenaStats.totalArenaXp || 0) + xpGain };
      ns.rank = getRank(ns.xp);
      if (ns.missionsDate === todayStr()) {
        ns.dailyMissions = ns.dailyMissions.map(m => m.type === 'arena' && !m.completed ? { ...m, progress: 1, completed: true } : m);
        ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp += m.xp; m.xpAwarded = true; } });
      }
      setState(ns); saveState(ns);
      return;
    }

    const gen = CHART_GENERATORS[Math.floor(Math.random() * CHART_GENERATORS.length)];
    const data = gen.fn();

    // Create a quick question
    const patterns = ['Turtle Soup', 'Double Purge', 'CRT', 'MSS + OTE', 'FVG', 'Order Block', 'Piege / Invalide'];
    const correctName = data.isTrap ? 'Piege / Invalide' : !data.valid && data.valid !== undefined ? 'Piege / Invalide' : patterns.find(p => data.patternName.toLowerCase().includes(p.toLowerCase().split(' ')[0].toLowerCase())) || data.patternName;
    const others = patterns.filter(p => p !== correctName).sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [correctName, ...others].sort(() => Math.random() - 0.5);

    setScenario({ ...data, options: opts, correctIdx: opts.indexOf(correctName) });
    setAnswered(false);
    setTimer(15);

    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimer(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setAnswered(true);
          setFlashClass('flash-wrong');
          setTimeout(() => { setFlashClass(''); setRound(r => r + 1); }, 1200);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  }, [round, totalRounds, score, state]);

  useEffect(() => {
    if (!isFinished) nextRound();
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [round]);

  const handleAnswer = (idx) => {
    if (answered) return;
    setAnswered(true);
    if (timerRef.current) clearInterval(timerRef.current);
    const correct = idx === scenario.correctIdx;
    if (correct) setScore(s => s + 1);
    setFlashClass(correct ? 'flash-correct' : 'flash-wrong');
    setTimeout(() => { setFlashClass(''); setRound(r => r + 1); }, 1200);
  };

  if (isFinished) {
    const pct = Math.round(score / totalRounds * 100);
    return (
      <div className="animate-slide-up text-center py-8">
        <span className="text-5xl block mb-4">{pct >= 70 ? '\u26A1' : '\u274C'}</span>
        <h3 className="text-2xl font-bold text-white mb-2">Quick Drill Termine</h3>
        <p className="text-3xl font-bold mb-4" style={{ color: pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444' }}>{score}/{totalRounds}</p>
        <p className="text-gray-400 mb-6">{pct}% de precision</p>
        <div className="flex gap-3 justify-center">
          <button onClick={() => { setRound(0); setScore(0); setIsFinished(false); }} className="arena-btn primary px-6 py-3 rounded-lg text-amber-400 font-medium">Rejouer</button>
          <button onClick={onBack} className="arena-btn px-6 py-3 rounded-lg text-gray-300 font-medium">Retour</button>
        </div>
      </div>
    );
  }

  if (!scenario) return <div className="text-center py-20 text-gray-400">Chargement...</div>;

  return (
    <div className={`animate-fade-in ${flashClass}`}>
      <div className="flex items-center gap-3 mb-3">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-amber-500 rounded-full transition-all" style={{ width: (round / totalRounds * 100) + '%' }} />
        </div>
        <span className="text-xs text-gray-500 font-mono">{round}/{totalRounds}</span>
        <span className={`text-sm font-bold font-mono ${timer <= 5 ? 'text-red-400' : 'text-amber-400'}`}>{timer}s</span>
      </div>

      <div className="flex items-center justify-between mb-2">
        <span className="text-xs text-emerald-400 font-mono">{score} \u2713</span>
        <span className="text-xs text-gray-500">Identifie le pattern rapidement !</span>
      </div>

      <ChartCanvas candles={scenario.candles} zones={[]} highlightCandles={[]} />

      <div className="mt-3 grid grid-cols-2 gap-2">
        {scenario.options.map((opt, i) => (
          <div key={i} className={`quiz-option dojo-card p-3 text-sm text-center ${answered ? (i === scenario.correctIdx ? 'correct' : 'wrong') : 'text-gray-200'}`} onClick={() => handleAnswer(i)}>{opt}</div>
        ))}
      </div>
    </div>
  );
}

function QuizEngine({ state, setState, onBack, branch = null }) {
  const [questions,setQuestions]=useState([]); const [currentQ,setCurrentQ]=useState(0); const [selected,setSelected]=useState(null); const [showResult,setShowResult]=useState(false); const [sessionCorrect,setSessionCorrect]=useState(0); const [sessionTotal,setSessionTotal]=useState(0); const [consecutiveCorrect,setConsecutiveCorrect]=useState(0); const [isFinished,setIsFinished]=useState(false); const [started,setStarted]=useState(false);
  const startQuiz=(size)=>{setQuestions(generateQuizSet(state,branch,size));setStarted(true);};
  if(!started){return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><h2 className="text-xl font-bold text-white">Taille du quiz</h2></div>{branch&&<div className="mb-4 text-sm text-gray-400">Branche : <span style={{color:SKILL_BRANCHES[branch]?.color}}>{SKILL_BRANCHES[branch]?.name}</span></div>}<div className="grid gap-3" style={{gridTemplateColumns:'repeat(2, 1fr)'}}>{[{size:10,label:'10',desc:'Rapide',color:'#10B981'},{size:15,label:'15',desc:'Standard',color:'#F59E0B'},{size:25,label:'25',desc:'Approfondi',color:'#8B5CF6'},{size:50,label:'50',desc:'Marathon',color:'#EF4444'}].map(o=>(<button key={o.size} onClick={()=>startQuiz(o.size)} className="dojo-card p-5 text-left" style={{borderColor:o.color+'30'}}><p className="text-2xl font-bold" style={{color:o.color}}>{o.size}</p><p className="text-sm text-white">{o.label} questions</p><p className="text-xs text-gray-500">{o.desc}</p></button>))}</div></div>);}
  const handleAnswer=(idx)=>{if(showResult)return;setSelected(idx);setShowResult(true);const q=questions[currentQ];const isC=idx===q.correct;const nC=sessionCorrect+(isC?1:0);const nCons=isC?consecutiveCorrect+1:0;setSessionTotal(sessionTotal+1);setSessionCorrect(nC);setConsecutiveCorrect(nCons);const ns={...state};ns.totalQuizAnswered=(state.totalQuizAnswered||0)+1;ns.totalCorrect=(state.totalCorrect||0)+(isC?1:0);if(!ns.conceptScores[q.concept])ns.conceptScores[q.concept]={correct:0,total:0};ns.conceptScores[q.concept].total++;if(isC)ns.conceptScores[q.concept].correct++;if(isC)ns.xp=(state.xp||0)+5+(nCons>=3?5:0);const cs=ns.conceptScores[q.concept];if(cs.total>=3){const ratio=cs.correct/cs.total;ns.skillLevels[q.concept]=Math.max(ns.skillLevels[q.concept]||0,ratio>=0.95?5:ratio>=0.85?4:ratio>=0.7?3:ratio>=0.5?2:ratio>=0.3?1:0);}if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>{if(m.completed)return m;if(m.type==='quiz'&&m.branch===q.branch){const p=(m.progress||0)+(isC?1:0);return{...m,progress:p,completed:p>=m.target};}if(m.type==='total_quiz'){const p=(m.progress||0)+1;return{...m,progress:p,completed:p>=m.target};}if(m.type==='streak_quiz')return{...m,progress:Math.max(m.progress||0,nCons),completed:nCons>=m.target};return m;});ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});}ns.rank=getRank(ns.xp);setState(ns);saveState(ns);};
  const nextQuestion=()=>{if(currentQ+1>=questions.length){setIsFinished(true);const pct=Math.round(sessionCorrect/sessionTotal*100);const ns={...state};if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>(m.type==='score'&&pct>=m.target&&!m.completed?{...m,progress:pct,completed:true}:m));ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});ns.rank=getRank(ns.xp);setState(ns);saveState(ns);}return;}setCurrentQ(currentQ+1);setSelected(null);setShowResult(false);};

  const q=questions[currentQ];
  return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden"><div className="h-full bg-amber-500 rounded-full transition-all" style={{width:((currentQ+1)/questions.length*100)+'%'}}/></div><span className="text-xs text-gray-500 font-mono">{currentQ+1}/{questions.length}</span><span className="text-xs text-emerald-400 font-mono">{sessionCorrect}\u2713</span></div>{consecutiveCorrect>=3&&<div className="text-center mb-3 text-amber-400 text-sm font-medium">&#128293; Streak x{consecutiveCorrect}</div>}<div className="dojo-card p-6 mb-4"><div className="flex items-center gap-2 mb-3"><span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:SKILL_BRANCHES[q.branch]?.color+'20',color:SKILL_BRANCHES[q.branch]?.color}}>{SKILL_BRANCHES[q.branch]?.name}</span></div><p className="text-white text-lg font-medium">{q.q}</p></div><div className="space-y-2 mb-4">{q.options.map((opt,i)=>{let cl='quiz-option dojo-card p-4';if(showResult){if(i===q.correct)cl+=' correct';else if(i===selected)cl+=' wrong';}return(<div key={i} className={cl} onClick={()=>handleAnswer(i)}><div className="flex items-start gap-3"><div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${showResult&&i===q.correct?'bg-emerald-500/30 text-emerald-400':showResult&&i===selected?'bg-red-500/30 text-red-400':'bg-dojo-border text-gray-400'}`}>{String.fromCharCode(65+i)}</div><span className="text-sm text-gray-200">{opt}</span></div></div>);})}</div>{showResult&&(<div className={`animate-slide-up dojo-card p-4 mb-4 ${selected===q.correct?'border-emerald-500/30':'border-red-500/30'}`}><p className={`text-sm font-medium mb-1 ${selected===q.correct?'text-emerald-400':'text-red-400'}`}>{selected===q.correct?'\u2713 Correct':'\u2717 Incorrect'}</p><p className="text-sm text-gray-300">{q.explanation}</p></div>)}{showResult&&(<button onClick={nextQuestion} className="w-full py-3 bg-amber-500/20 text-amber-400 rounded-lg font-medium hover:bg-amber-500/30">{currentQ+1>=questions.length?'Resultats':'Suivante \u2192'}</button>)}</div>);

  const [cs,setCs]=useState(null);const [step,setStep]=useState(0);const [sel,setSel]=useState(null);const [showFb,setShowFb]=useState(false);const [score,setScore]=useState(0);const [answers,setAnswers]=useState([]);const [done,setDone]=useState(false);
  const r=getRank(state.xp);const available=SCENARIOS_DB.filter(s=>{const ri=RANKS.findIndex(rk=>rk.id===s.rank);return ri<=r+1;});
  if(!cs){return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button><h2 className="text-xl font-bold text-white">Scenarios</h2></div><div className="space-y-3">{available.map(s=>{const d=state.completedScenarios[s.id];const ri=RANKS.findIndex(rk=>rk.id===s.rank);return(<div key={s.id} className="dojo-card p-5 cursor-pointer hover:border-cyan-500/30" onClick={()=>setCs(s)}><div className="flex items-center justify-between"><div><div className="flex items-center gap-2 mb-1"><span className="text-white font-semibold">{s.title}</span>{d&&<span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">\u2713</span>}</div><p className="text-sm text-gray-400">{s.steps.length} etapes</p></div><span className="text-xs px-2 py-1 rounded" style={{background:RANKS[ri].color+'20',color:RANKS[ri].color}}>{s.rank}</span></div></div>);})}</div></div>);}
  if(done){const pct=Math.round(score/cs.steps.length*100);return(<div className="animate-slide-up text-center py-10"><h2 className="text-2xl font-bold text-white mb-2">{cs.title}</h2><p className="text-4xl font-bold mb-2" style={{color:pct>=75?'#10B981':pct>=50?'#F59E0B':'#EF4444'}}>{pct}%</p><p className="text-gray-400 mb-6">{score}/{cs.steps.length}</p><button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);setDone(false);}} className="px-6 py-3 bg-dojo-border text-gray-300 rounded-lg font-medium">Retour</button></div>);}
  const st=cs.steps[step];
  const handleStepAnswer=(idx)=>{if(showFb)return;setSel(idx);setShowFb(true);const ok=idx===st.correct;if(ok)setScore(score+1);setAnswers([...answers,{step,selected:idx,correct:st.correct,isCorrect:ok}]);if(ok){const ns={...state,xp:state.xp+10};ns.rank=getRank(ns.xp);setState(ns);saveState(ns);}};
  const nextStep=()=>{if(step+1>=cs.steps.length){const ns={...state};ns.completedScenarios[cs.id]={score,date:todayStr()};ns.xp+=cs.xpReward;ns.rank=getRank(ns.xp);if(ns.missionsDate===todayStr()){ns.dailyMissions=ns.dailyMissions.map(m=>m.type==='scenario'&&!m.completed?{...m,progress:1,completed:true}:m);ns.dailyMissions.forEach(m=>{if(m.completed&&!m.xpAwarded){ns.xp+=m.xp;m.xpAwarded=true;}});}setState(ns);saveState(ns);setDone(true);return;}setStep(step+1);setSel(null);setShowFb(false);};
  return(<div className="animate-fade-in"><div className="flex items-center gap-3 mb-4"><button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);}} className="text-gray-400 hover:text-white">\u2190</button><div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden"><div className="h-full bg-cyan-500 rounded-full transition-all" style={{width:((step+1)/cs.steps.length*100)+'%'}}/></div><span className="text-xs text-gray-500 font-mono">{step+1}/{cs.steps.length}</span></div>{step===0&&!showFb&&<div className="dojo-card p-4 mb-4 border-cyan-500/20"><p className="text-xs text-cyan-400 font-medium mb-1">CONTEXTE</p><p className="text-sm text-gray-300">{cs.context}</p></div>}<div className="dojo-card p-5 mb-4"><p className="text-white font-medium">{st.q}</p></div><div className="space-y-2 mb-4">{st.options.map((opt,i)=>{let cl='quiz-option dojo-card p-4';if(showFb){if(i===st.correct)cl+=' correct';else if(i===sel)cl+=' wrong';}return<div key={i} className={cl} onClick={()=>handleStepAnswer(i)}><span className="text-sm text-gray-200">{opt}</span></div>;})}</div>{showFb&&(<><div className={`animate-slide-up dojo-card p-4 mb-4 ${sel===st.correct?'border-emerald-500/30':'border-red-500/30'}`}><p className={`text-sm ${sel===st.correct?'text-emerald-400':'text-red-400'}`}>{st.feedback}</p></div><button onClick={nextStep} className="w-full py-3 bg-cyan-500/20 text-cyan-400 rounded-lg font-medium">{step+1>=cs.steps.length?'Resultats':'Suivante \u2192'}</button></>)}</div>);
}

// --- DOJO PAGE ---
function DojoPage({state,setState,subPage,setSubPage}) {
  if(subPage==='quiz')return<QuizEngine state={state} setState={setState} onBack={()=>setSubPage(null)}/>;
  if(subPage==='scenarios')return<ScenarioEngine state={state} setState={setState} onBack={()=>setSubPage(null)}/>;
  if(subPage&&subPage.startsWith('quiz_'))return<QuizEngine state={state} setState={setState} onBack={()=>setSubPage(null)} branch={subPage.replace('quiz_','')}/>;
  return(<div className="animate-fade-in space-y-6"><h2 className="text-xl font-bold text-white">Dojo</h2><div className="space-y-3"><div className="dojo-card p-5 cursor-pointer hover:border-amber-500/30" onClick={()=>setSubPage('quiz')}><div className="flex items-center gap-4"><span className="text-3xl">\u26A1</span><div><p className="font-semibold text-white text-lg">Quiz Adaptatif</p><p className="text-sm text-gray-400">{QUIZ_DB.length} fixes + {QUIZ_TEMPLATES.length} templates</p></div></div></div><div className="dojo-card p-5 cursor-pointer hover:border-cyan-500/30" onClick={()=>setSubPage('scenarios')}><div className="flex items-center gap-4"><span className="text-3xl">&#127919;</span><div><p className="font-semibold text-white text-lg">Scenarios</p><p className="text-sm text-gray-400">{SCENARIOS_DB.length} situations reelles</p></div></div></div></div><div><h3 className="text-sm text-gray-400 font-medium mb-3">PAR BRANCHE</h3><div className="grid gap-2" style={{gridTemplateColumns:'repeat(2, 1fr)'}}>{Object.entries(SKILL_BRANCHES).map(([key,branch])=>{const avg=branch.concepts.reduce((s,c)=>s+(state.skillLevels[c.id]||0),0)/branch.concepts.length;return(<div key={key} className="dojo-card p-4 cursor-pointer" style={{borderColor:branch.color+'30'}} onClick={()=>setSubPage('quiz_'+key)}><div className="flex items-center gap-2 mb-2"><span>{branch.icon}</span><span className="font-medium text-sm text-white">{branch.name}</span></div><div className="h-1.5 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:(avg/5*100)+'%',background:branch.color}}/></div></div>);})}</div></div></div>);
}

// --- SKILL TREE ---
function SkillTree({state}) {
  return(<div className="animate-fade-in space-y-6"><h2 className="text-xl font-bold text-white">Skill Tree</h2>{Object.entries(SKILL_BRANCHES).map(([key,branch])=>(<div key={key} className="dojo-card p-5"><div className="flex items-center gap-3 mb-4"><span className="text-2xl">{branch.icon}</span><h3 className="font-semibold text-white">{branch.name}</h3></div><div className="space-y-3">{branch.concepts.map(concept=>{const level=state.skillLevels[concept.id]||0;const sc=state.conceptScores[concept.id];const acc=sc?Math.round(sc.correct/sc.total*100):0;const tot=sc?sc.total:0;return(<div key={concept.id} className="flex items-center gap-3"><div className="flex gap-0.5">{[1,2,3,4,5].map(l=><div key={l} className="w-2 h-6 rounded-sm" style={{background:l<=level?branch.color:'#1E1E2E'}}/>)}</div><div className="flex-1 min-w-0"><div className="flex items-center justify-between"><span className="text-sm text-gray-200 truncate">{concept.name}</span><span className="text-xs font-mono" style={{color:acc>=80?'#10B981':acc>=60?'#F59E0B':acc>0?'#EF4444':'#4B5563'}}>{tot>0?acc+'%':'\u2014'}</span></div><p className="text-xs text-gray-600 truncate">{concept.desc}</p></div></div>);})}</div></div>))}</div>);
}

// --- MENTOR PAGE ---
function MentorPage() {
  const [search,setSearch]=useState('');const [selectedCat,setSelectedCat]=useState(null);const [expanded,setExpanded]=useState(null);
  const filtered=KNOWLEDGE_BASE.filter(kb=>{const ms=!search||kb.name.toLowerCase().includes(search.toLowerCase())||kb.shortDesc.toLowerCase().includes(search.toLowerCase());const mc=!selectedCat||kb.category===selectedCat;return ms&&mc;});
  return(<div className="animate-fade-in space-y-6"><h2 className="text-xl font-bold text-white">&#129504; Mentor</h2><div className="relative"><input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." className="w-full bg-dojo-card border border-dojo-border rounded-lg px-4 py-3 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-amber-500/50"/></div><div className="flex gap-2 flex-wrap"><button onClick={()=>setSelectedCat(null)} className={`px-3 py-1.5 rounded-full text-xs font-medium ${!selectedCat?'bg-amber-500/20 text-amber-400 border border-amber-500/30':'bg-dojo-card text-gray-400 border border-dojo-border'}`}>Tout</button>{KB_CATEGORIES.map(cat=>(<button key={cat.id} onClick={()=>setSelectedCat(selectedCat===cat.id?null:cat.id)} className={`px-3 py-1.5 rounded-full text-xs font-medium ${selectedCat===cat.id?'border':'bg-dojo-card text-gray-400 border border-dojo-border'}`} style={selectedCat===cat.id?{background:cat.color+'20',color:cat.color,borderColor:cat.color+'50'}:{}}>{cat.icon} {cat.name}</button>))}</div><div className="space-y-3">{filtered.map(kb=>{const cat=KB_CATEGORIES.find(c=>c.id===kb.category);const isExp=expanded===kb.id;return(<div key={kb.id} className={`dojo-card kb-card ${isExp?'':'p-5'}`} onClick={()=>setExpanded(isExp?null:kb.id)} style={isExp?{borderColor:cat?.color+'40'}:{}}>{!isExp?(<><div className="flex items-center gap-2 mb-2"><span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:cat?.color+'20',color:cat?.color}}>{cat?.name}</span></div><h3 className="text-white font-semibold mb-1">{kb.name}</h3><p className="text-sm text-gray-400">{kb.shortDesc}</p></>):(<div className="p-5 space-y-4" onClick={e=>e.stopPropagation()}><div className="flex items-center justify-between"><span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:cat?.color+'20',color:cat?.color}}>{cat?.name}</span><button onClick={()=>setExpanded(null)} className="text-gray-500 hover:text-white text-sm">\u2717</button></div><h3 className="text-xl font-bold text-white">{kb.name}</h3><p className="text-sm text-gray-300">{kb.fullDesc}</p><div><h4 className="text-xs text-amber-400 font-semibold uppercase mb-2">Regles</h4><ul className="space-y-1">{kb.rules.map((r,i)=><li key={i} className="text-sm text-gray-300 flex items-start gap-2"><span className="text-amber-400 text-xs">&#9654;</span>{r}</li>)}</ul></div><div><h4 className="text-xs text-red-400 font-semibold uppercase mb-2">Erreurs</h4><ul className="space-y-1">{kb.mistakes.map((m,i)=><li key={i} className="text-sm text-gray-400 flex items-start gap-2"><span className="text-red-400 text-xs">&#9888;</span>{m}</li>)}</ul></div></div>)}</div>);})}</div></div>);
}

// --- CHALLENGE ---
function Challenge30({state,setState}) {
  const startChallenge=()=>{const ns={...state,challengeStartDate:todayStr(),challengeDay:1,challengeCompleted:{}};setState(ns);saveState(ns);};
  const challengeActive=state.challengeStartDate!=null;const challengeDay=challengeActive?Math.min(30,Math.floor((Date.now()-new Date(state.challengeStartDate).getTime())/86400000)+1):0;
  const toggleObjective=(day,objIdx)=>{const ns={...state};const key='day_'+day;if(!ns.challengeCompleted[key])ns.challengeCompleted[key]={completed:false,date:todayStr(),objectives:[]};const objs=[...(ns.challengeCompleted[key].objectives||[])];objs[objIdx]=!objs[objIdx];ns.challengeCompleted[key].objectives=objs;const dayData=CHALLENGE_30[day-1];const allDone=dayData.objectives.every((_,i)=>objs[i]);ns.challengeCompleted[key].completed=allDone;if(allDone&&!ns.challengeCompleted[key].xpAwarded){ns.xp+=dayData.xp;ns.challengeCompleted[key].xpAwarded=true;ns.rank=getRank(ns.xp);}setState(ns);saveState(ns);};
  if(!challengeActive){return(<div className="animate-fade-in text-center py-16"><span className="text-6xl block mb-6">&#127942;</span><h2 className="text-3xl font-bold text-white mb-3">30-Day Challenge</h2><p className="text-gray-400 mb-8">30 jours pour devenir discipline.</p><button onClick={startChallenge} className="px-8 py-4 bg-gradient-to-r from-amber-500 to-amber-600 text-black font-bold rounded-xl text-lg">Commencer</button></div>);}
  const weekColors=['#8B5CF6','#06B6D4','#F59E0B','#EF4444'];const weekNames=['Fondations','Repetition','Precision','Transition'];
  return(<div className="animate-fade-in space-y-6"><div className="flex items-center justify-between"><h2 className="text-xl font-bold text-white">30-Day Challenge</h2><span className="text-amber-400 font-bold">Jour {challengeDay}/30</span></div><div className="dojo-card p-4"><div className="h-3 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-purple-500 via-cyan-500 to-red-500 transition-all" style={{width:(challengeDay/30*100)+'%'}}/></div></div>{[1,2,3,4].map(week=>(<div key={week}><h3 className="text-sm font-medium mb-3" style={{color:weekColors[week-1]}}>S{week} — {weekNames[week-1]}</h3><div className="space-y-2">{CHALLENGE_30.filter(d=>d.week===week).map(day=>{const key='day_'+day.day,data=state.challengeCompleted[key]||{objectives:[]};const isCurrent=day.day===challengeDay,isPast=day.day<challengeDay,isFuture=day.day>challengeDay,isComplete=data.completed;return(<div key={day.day} className={`dojo-card p-4 ${isCurrent?'border-amber-500/40':''} ${isFuture?'opacity-50':''}`}><div className="flex items-center justify-between mb-2"><div className="flex items-center gap-2"><div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isComplete?'bg-emerald-500/20 text-emerald-400':isCurrent?'bg-amber-500/20 text-amber-400':'bg-dojo-border text-gray-500'}`}>{isComplete?'\u2713':day.day}</div><span className={`font-medium text-sm ${isCurrent?'text-white':'text-gray-400'}`}>{day.title}</span></div><span className="text-xs font-mono text-amber-400/50">+{day.xp}</span></div>{(isCurrent||isPast)&&<div className="space-y-1.5 ml-9">{day.objectives.map((obj,i)=>{const dn=data.objectives[i];return(<div key={i} className="flex items-center gap-2 cursor-pointer" onClick={()=>!isFuture&&toggleObjective(day.day,i)}><div className={`w-4 h-4 rounded border flex items-center justify-center text-xs ${dn?'bg-emerald-500/20 border-emerald-500 text-emerald-400':'border-gray-600'}`}>{dn?'\u2713':''}</div><span className={`text-xs ${dn?'text-gray-500 line-through':'text-gray-300'}`}>{obj}</span></div>);})}</div>}</div>);})}</div></div>))}</div>);
}

// --- ANALYTICS ---
function Analytics({state,setState}) {
  const branches=Object.entries(SKILL_BRANCHES);const branchScores=branches.map(([key,branch])=>{const scores=branch.concepts.map(c=>{const s=state.conceptScores[c.id];return(!s||s.total===0)?0:s.correct/s.total*100;});return{key,name:branch.name,icon:branch.icon,color:branch.color,avg:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)};});
  const handleCSVImport=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const lines=ev.target.result.split('\n');const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());const trades=lines.slice(1).filter(l=>l.trim()).map(line=>{const vals=line.split(',');const obj={};headers.forEach((h,i)=>obj[h]=vals[i]?.trim());return obj;});const ns={...state,trades:[...state.trades,...trades]};setState(ns);saveState(ns);}catch(err){}};reader.readAsText(file);};
  return(<div className="animate-fade-in space-y-6"><h2 className="text-xl font-bold text-white">Analytics</h2><div className="grid gap-3" style={{gridTemplateColumns:'repeat(3, 1fr)'}}><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-amber-400">{state.totalQuizAnswered}</p><p className="text-xs text-gray-500">Quiz</p></div><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-emerald-400">{state.totalQuizAnswered>0?Math.round(state.totalCorrect/state.totalQuizAnswered*100):0}%</p><p className="text-xs text-gray-500">Precision</p></div><div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-purple-400">{(state.arenaStats?.totalArenaXp||0)}</p><p className="text-xs text-gray-500">Arena XP</p></div></div><div className="dojo-card p-5"><h3 className="text-sm text-gray-400 font-medium mb-4">FORCES & FAIBLESSES</h3><div className="space-y-3">{branchScores.map(b=>(<div key={b.key}><div className="flex items-center justify-between mb-1"><span className="text-sm text-gray-300">{b.icon} {b.name}</span><span className="text-sm font-mono" style={{color:b.avg>=80?'#10B981':b.avg>=60?'#F59E0B':b.avg>0?'#EF4444':'#4B5563'}}>{b.avg}%</span></div><div className="h-2 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:b.avg+'%',background:b.color}}/></div></div>))}</div></div><div className="dojo-card p-5"><h3 className="text-sm text-gray-400 font-medium mb-3">IMPORT CSV</h3><label className="inline-block px-4 py-2 bg-dojo-border text-gray-300 rounded-lg cursor-pointer hover:bg-dojo-hover text-sm">Importer <input type="file" accept=".csv" className="hidden" onChange={handleCSVImport}/></label>{state.trades.length>0&&<p className="text-xs text-emerald-400 mt-2">{state.trades.length} trades</p>}</div></div>);
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [state, setState] = useState(loadState);
  const [page, setPage] = useState('dashboard');
  const [subPage, setSubPage] = useState(null);

  useEffect(() => {
    const today = todayStr();
    if (state.missionsDate !== today || state.dailyMissions.length === 0) {
      const ns = { ...state };
      if (state.lastActiveDate) {
        const y = new Date(); y.setDate(y.getDate() - 1);
        ns.streak = state.lastActiveDate === y.toISOString().split('T')[0] ? (state.streak || 0) + 1 : state.lastActiveDate === today ? state.streak : 1;
      } else { ns.streak = 1; }
      ns.lastActiveDate = today;
      ns.longestStreak = Math.max(ns.streak, state.longestStreak || 0);
      ns.dailyMissions = generateDailyMissions(ns);
      ns.missionsDate = today;
      setState(ns); saveState(ns);
    }
  }, []);

  const r = getRank(state.xp);
  const rk = RANKS[r];

  const pages = [
    { id: 'dashboard', label: 'Home', icon: '\u2B21' },
    { id: 'arena', label: 'Arena', icon: '\u2694\uFE0F' },
    { id: 'dojo', label: 'Dojo', icon: '\u26A1' },
    { id: 'mentor', label: 'Mentor', icon: '\uD83E\uDDE0' },
    { id: 'skills', label: 'Skills', icon: '\uD83C\uDF33' },
    { id: 'challenge', label: '30 Days', icon: '\uD83C\uDFC6' },
    { id: 'analytics', label: 'Stats', icon: '\uD83D\uDCCA' },
  ];

  return (
    <div className="min-h-screen bg-dojo">
      <div className="sticky top-0 z-50 bg-dojo/90 backdrop-blur-md border-b border-dojo-border">
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <span className="text-lg font-bold" style={{ color: rk.color }}>700S</span>
              <span className="text-lg font-bold text-white">DOJO</span>
              <span className="text-xs text-gray-600 font-mono">v4</span>
            </div>
            <div className="flex items-center gap-4">
              <StreakFlame streak={state.streak} />
              <RankBadge rankIndex={r} size="sm" />
              <span className="text-xs font-mono text-amber-400">{state.xp} XP</span>
            </div>
          </div>
          <div className="flex gap-1 mt-2 nav-scroll -mx-4 px-4">
            {pages.map(p => (
              <button key={p.id} className={`nav-item px-3 py-1.5 text-sm font-medium whitespace-nowrap ${page === p.id ? 'active text-amber-400' : 'text-gray-500'}`} onClick={() => { setPage(p.id); setSubPage(null); }}>
                <span className="mr-1">{p.icon}</span>{p.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 py-6">
        {page === 'dashboard' && <Dashboard state={state} setState={setState} setPage={setPage} setSubPage={setSubPage} />}
        {page === 'arena' && <ArenaPage state={state} setState={setState} />}
        {page === 'dojo' && <DojoPage state={state} setState={setState} subPage={subPage} setSubPage={setSubPage} />}
        {page === 'mentor' && <MentorPage />}
        {page === 'skills' && <SkillTree state={state} />}
        {page === 'challenge' && <Challenge30 state={state} setState={setState} />}
        {page === 'analytics' && <Analytics state={state} setState={setState} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
