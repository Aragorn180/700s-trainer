  { id:'q26', concept:'model2', branch:'entries', rank:'platinum', q:'Dans le Model 2, comment identifier si on est en phase de manipulation ou expansion ?', options:['Par le volume seul','En verifiant si le mouvement casse ET close au-dela du key level (expansion) ou juste wick (manipulation)','Par la couleur des bougies','Avec le RSI'], correct:1, explanation:'Manipulation = wick sans close au-dela. Expansion = close au-dela. La fermeture de la bougie est la cle.' },
  { id:'q27', concept:'mss_ote', branch:'entries', rank:'diamond', q:'Tu vois un MSS (break of structure) sur le 4H. Mais l\'OTE ne se forme pas dans les 2-3 bougies suivantes. Que fais-tu ?', options:['Entrer quand meme sur le MSS','PASS — sans OTE, la confirmation est incomplete','Descendre sur le 15min pour trouver l\'OTE','Attendre le prochain MSS'], correct:1, explanation:'MSS sans OTE = confirmation incomplete. La patience est non-negociable. Attendre la sequence complete.' },
  { id:'q28', concept:'model3', branch:'entries', rank:'diamond', q:'Un Breaker Block se forme apres qu\'un OB a ete casse. Comment l\'utiliser ?', options:['Ignorer le niveau','Le traiter comme un nouveau support/resistance inverse pour une re-entry','Placer son SL dessus','C\'est un signal de sortie'], correct:1, explanation:'Breaker = OB casse devenu le contraire. C\'est un niveau premium pour re-entry dans la direction du break.' },
  { id:'q28a', concept:'model1', branch:'entries', rank:'diamond', q:'ANALYSE DE TRADE : GBPUSD Short, mercredi 10h NY, Weekly bearish, Daily Turtle Soup sur key level, 4H expansion confirmee, SMT avec DXY, RR 3.2:1. Grade ?', options:['B+ — il manque des elements','A — solide mais pas parfait','A+ — TOUS les criteres sont remplis + SMT','C — trop risque'], correct:2, explanation:'HTF bearish OK, Key Level OK, TS OK, CRT OK, Candle Choice OK (mercredi = bon), SMT = bonus. C\'est un A+ avec RR 3.2:1.' },
  { id:'q28b', concept:'model2', branch:'entries', rank:'master', q:'Model 2 : tu identifies une manipulation sur le 4H (wick haute sans close). La bougie suivante ouvre, descend prendre la DOL, puis commence a monter. Est-ce une expansion haussiere ?', options:['Oui, c\'est une expansion','Non — la manipulation haute indique que l\'algo veut vendre, pas acheter','Peut-etre, attendre la prochaine bougie','Oui si le volume augmente'], correct:1, explanation:'La manipulation haute = l\'algo a pris la liquidite des vendeurs. Direction probable = hausse. MAIS verifier le HTF avant.' },
  { id:'q28c', concept:'ote', branch:'entries', rank:'master', q:'PIEGE : L\'OTE montre une fermeture a 50% du range. Un trader debutant voit cela comme un signal d\'entree. Pourquoi a-t-il potentiellement tort ?', options:['50% est toujours bon','L\'OTE a 50% est generique — le vrai piege est de ne pas verifier si c\'est une fermeture algorithmique intentionnelle ou juste du bruit','Le RR sera mauvais','Il faut attendre 61.8%'], correct:1, explanation:'Toutes les fermetures a 50% ne sont pas des OTE. Il faut verifier le contexte : est-ce apres un MSS ? Y a-t-il un displacement ? Le niveau seul ne suffit pas.' },
  { id:'q28d', concept:'model1', branch:'entries', rank:'radiant', q:'Tu as un Model 1 parfait sur le Daily EURUSD. Mais tu remarques que le Monthly est en plein milieu d\'un range sans direction claire. Que fais-tu ?', options:['Entrer — le Daily suffit','PASS — sans direction Monthly claire, le setup perd beaucoup de probabilite','Entrer avec risque reduit','Regarder le Quarterly a la place'], correct:1, explanation:'Monthly sans direction = pas de vent arriere HTF. Un Model 1 sans HTF clair perd une de ses 5 composantes obligatoires.' },

  // ===================== PATTERN RECOGNITION (35 questions) =====================
  { id:'q30', concept:'turtle_soup', branch:'patterns', rank:'iron', q:'Qu\'est-ce qu\'un Turtle Soup ?', options:['Un trade sur la paire GBP/JPY','Une purge de liquidite sur DOL cle suivi d\'un reversal immediat','Un breakout confirme','Un pattern de continuation'], correct:1, explanation:'Turtle Soup = purge de liquidite sur DOL cle + reversal immediat.' },
  { id:'q31', concept:'turtle_soup', branch:'patterns', rank:'bronze', q:'Quand est-ce que le Turtle Soup a le plus de probabilite ?', options:['En fin de bougie','En debut de bougie','Pendant les news','Le vendredi apres-midi'], correct:1, explanation:'Meilleur TS = EN DEBUT de candle, pas a la fin.' },
  { id:'q32', concept:'double_purge', branch:'patterns', rank:'silver', q:'Qu\'est-ce qui rend la Double Purge si haute probabilite ?', options:['Elle utilise 2 indicateurs','Deux DOL validees = preuve repetee d\'intention','Elle se produit sur 2 timeframes','Elle combine 2 paires'], correct:1, explanation:'Double Purge = 2 DOL confirmees = preuve repetee d\'intention. Pas d\'ambiguite.' },
  { id:'q33', concept:'ob_brk', branch:'patterns', rank:'gold', q:'Quelle est la difference entre un Order Block et un Breaker Block ?', options:['Aucune','OB = derniere bougie opposee avant displacement. Breaker = OB casse devenu support/resistance inverse','OB = support, Breaker = resistance','OB = daily, Breaker = weekly'], correct:1, explanation:'OB = derniere bougie opposee avant un displacement majeur. Breaker = OB casse puis inverse.' },
  { id:'q34', concept:'butterfly', branch:'patterns', rank:'platinum', q:'A quoi ressemble visuellement le Butterfly Effect ?', options:['Un double top','Une manipulation centrale entouree de deux expansions symetriques','Un triangle ascendant','Un head & shoulders'], correct:1, explanation:'Butterfly Effect = manipulation centrale + expansions symetriques = papillon.' },
  { id:'q35', concept:'turtle_soup', branch:'patterns', rank:'gold', q:'DIAGNOSTIC : Un trader prend un short GBPUSD sur Turtle Soup. Entry parfaite. Mais il perd. Son SL etait a l\'interieur de la bougie de manipulation. Quelle est l\'erreur ?', options:['Le trade etait mauvais','SL mal place — il devait etre AU-DELA de la bougie manipulation','Le timing etait mauvais','Le RR etait insuffisant'], correct:1, explanation:'SL a l\'interieur de la manip = l\'algo va le chercher. TOUJOURS au-dela.' },
  { id:'q36', concept:'double_purge', branch:'patterns', rank:'platinum', q:'Une Double Purge Weekly se forme mais le Monthly est range (pas de direction). Grade du setup ?', options:['A+ comme toujours','A — Double Purge est forte mais sans HTF directionnel c\'est degrade','B — trop d\'incertitude','C — ne pas trader'], correct:1, explanation:'Double Purge = haute proba mais sans Monthly directionnel, on degrade de A+ a A. Le HTF manque.' },
  { id:'q37', concept:'banana_crt', branch:'patterns', rank:'diamond', q:'Qu\'est-ce qui distingue le Banana CRT des autres patterns CRT ?', options:['Il est plus rapide','La courbure specifique du prix qui forme un arc (banane) avant le reversal, typique des weekly ranges','Il utilise le volume','Il est reserve au BTC'], correct:1, explanation:'Banana CRT = arc de prix courbant progressivement avant un reversal. Frequemment visible sur les weekly ranges.' },
  { id:'q38', concept:'ob_brk', branch:'patterns', rank:'diamond', q:'Un OB bullish sur le Daily n\'a pas ete respecte (le prix l\'a traverse). Que devient ce niveau ?', options:['Il disparait','Il devient un Breaker bearish','Il reste un OB bullish','Il devient un FVG'], correct:1, explanation:'OB non respecte = Breaker. Il change de camp. Un OB bullish traverse devient resistance (Breaker bearish).' },
  { id:'q38a', concept:'turtle_soup', branch:'patterns', rank:'master', q:'PIEGE : Tu vois un TS sur le 4H en London Open. Mais le Daily montre que le prix est en plein milieu du range sans avoir touche de key level. Est-ce un bon TS ?', options:['Oui, tous les TS sont bons','Non — un TS en milieu de range sans key level = faible probabilite','Oui si le RR est bon','Ca depend du volume'], correct:1, explanation:'TS sans key level = faible conviction. Le TS est puissant QUAND il purge un vrai DOL/key level, pas du vide.' },
  { id:'q38b', concept:'butterfly', branch:'patterns', rank:'master', q:'Le Butterfly Effect se forme generalement sur quel timeframe ?', options:['5min uniquement','N\'importe quel TF mais plus fiable sur Daily/Weekly','Uniquement sur le Monthly','1H et 4H'], correct:1, explanation:'Le Butterfly fonctionne sur tous les TF mais sa fiabilite augmente avec le HTF (Daily/Weekly) car la manipulation centrale est plus significative.' },
  { id:'q38c', concept:'double_purge', branch:'patterns', rank:'radiant', q:'Tu observes une Double Purge Daily (high et low purges). Le Weekly close au-dessus du high. Continuation ou reversal ?', options:['Reversal car double purge','Continuation haussiere — le Weekly close above confirme la direction','Neutre — attendre','Bearish car survendu'], correct:1, explanation:'Double Purge + Weekly close above high = continuation haussiere confirmee. La close Weekly tranche le debat.' },

  { id:'q40', concept:'rr_21', branch:'risk', rank:'iron', q:'Quel est le Risk/Reward minimum pour TOUT trade ?', options:['1:1','1.5:1','2:1','3:1'], correct:2, explanation:'RR minimum 2:1 sur tous les trades. Non-negociable. Si RR < 2:1, PASS le trade.' },
  { id:'q41', concept:'sl_placement', branch:'risk', rank:'iron', q:'Ou placer le Stop Loss ?', options:['Au milieu de la bougie manipulation','Au-DELA de la bougie manipulation','Au point d\'entree - 10 pips','Il n\'y a pas besoin de SL'], correct:1, explanation:'SL place APRES la bougie manipulation, jamais a l\'interieur.' },
  { id:'q42', concept:'position_sizing', branch:'risk', rank:'iron', q:'Quel est le risque maximum par trade pour un debutant ?', options:['5%','2%','0.10-0.30%','10%'], correct:2, explanation:'Debutant : 0.10-0.30% par trade. Gestion saine = survie.' },
  { id:'q43', concept:'calendar', branch:'risk', rank:'bronze', q:'Combien de jours avant NFP/FOMC faut-il ARRETER de trader ?', options:['Le jour meme seulement','1-2 jours avant','1 semaine avant','On peut trader pendant'], correct:1, explanation:'Pas de trade 1-2 jours avant NFP, FOMC, ou major news rouge.' },
  { id:'q44', concept:'grading', branch:'risk', rank:'bronze', q:'Quels grades de setup sont acceptables pour un debutant ?', options:['Tous','A+ et A uniquement','A+, A et B+','B+ et au-dessus'], correct:1, explanation:'Debutant = A+ et A uniquement. Etre extremement selectif.' },
  { id:'q45', concept:'calendar', branch:'risk', rank:'silver', q:'Quelle est la semaine la plus haute probabilite du mois ?', options:['Semaine 1','Semaine 2','Semaine 3','Semaine 4'], correct:2, explanation:'Week 3 = highest probability week of month.' },
  { id:'q46', concept:'grading', branch:'risk', rank:'gold', q:'Un setup A+ permet quel risque maximum ?', options:['0.50%','1%','3%','5%'], correct:3, explanation:'Grading: A+ = risk max 5%, A = max 3%, B+ = max 2%, B = 1%.' },
  { id:'q47', concept:'position_sizing', branch:'risk', rank:'gold', q:'Quel est le % de TP recommande sur un CRT ?', options:['100% au TP','50% = partiel ou full TP','25% par palier','Trailing stop uniquement'], correct:1, explanation:'50% d\'un CRT = partiel ou full TP. Securiser les gains.' },
  { id:'q48', concept:'calendar', branch:'risk', rank:'bronze', q:'Quelles sont les heures de purge haute probabilite (NY time) ?', options:['6AM-8AM et 12PM-2PM','1AM-4AM et 8AM-11AM','10AM-12PM et 3PM-5PM','5PM-8PM et 12AM-2AM'], correct:1, explanation:'Heures optimales : 1AM-4AM et 8AM-11AM NY time.' },
  { id:'q49', concept:'calendar', branch:'risk', rank:'silver', q:'Que faire la premiere semaine du mois ?', options:['Trader normalement','Attendre le PMI (lundi crucial)','Ne pas trader du tout','Only scalping'], correct:1, explanation:'Week 1 = attendre PMI. PMI influence directement la narrative du mois.' },
  { id:'q49a', concept:'position_sizing', branch:'risk', rank:'platinum', q:'CALCUL : Capital 10,000 euros. Setup A+ (risk max 5%). SL = 50 pips sur EURUSD. Quelle taille de position ?', options:['1 lot standard','0.6 lot (6 euros/pip)','1 mini lot (0.1)','10 micro lots'], correct:3, explanation:'Risk = 10,000 x 5% = 500 euros. Mais attention, A+ = 5% MAXIMUM, pas obligatoire. Prudent = 1-3%. Avec 500 euros / 50 pips = 10 euros/pip = 1 lot. Mais 10 micro lots = meme chose.' },
  { id:'q49b', concept:'position_sizing', branch:'risk', rank:'platinum', q:'CALCUL : Capital 5,000 euros. Setup A (risk 3%). SL = 30 pips. Combien risques-tu en euros ?', options:['50 euros','150 euros','300 euros','500 euros'], correct:1, explanation:'5,000 x 3% = 150 euros de risk. 150/30 pips = 5 euros/pip = 0.5 lot.' },
  { id:'q49c', concept:'rr_21', branch:'risk', rank:'diamond', q:'Tu as un setup avec entry a 1.1000, SL a 1.0960, TP a 1.1070. Quel est le RR ?', options:['1:1','1.5:1','1.75:1','Le RR est insuffisant'], correct:2, explanation:'Risk = 40 pips, Reward = 70 pips. RR = 70/40 = 1.75:1. C\'est SOUS le minimum de 2:1. PASS le trade.' },
  { id:'q49d', concept:'grading', branch:'risk', rank:'diamond', q:'Setup B+ avec SMT confirmee. Quel risk prendre ?', options:['5% — la SMT eleve le grade','2% maximum — B+ = 2% peu importe les bonus','3% — la SMT fait monter a A','0.50% — B+ est trop risque'], correct:1, explanation:'B+ = risk max 2%. La SMT ameliore la confiance mais ne change pas le grade officiel du setup.' },
  { id:'q49e', concept:'sl_placement', branch:'risk', rank:'master', q:'PIEGE : Ton SL est correctement place au-dela de la manip. Mais le spread s\'elargit pendant London Open et te touche. C\'est une erreur de placement ?', options:['Oui, SL trop serre','Non — c\'est le risque de spread, il faut ajouter un buffer de spread au SL','Oui, il fallait trader pendant NY','Non, c\'est de la malchance'], correct:1, explanation:'SL = au-dela de la manip + buffer pour le spread. Surtout en London Open ou le spread s\'elargit temporairement.' },
  { id:'q49f', concept:'calendar', branch:'risk', rank:'master', q:'Vendredi 15h Paris (9AM NY). C\'est la premiere semaine du mois. NFP sort a 14h30 NY. Tu as un setup A+. Decision ?', options:['ENTRY — A+ ne se refuse pas','PASS — NFP jour meme + premiere semaine = double raison de ne pas trader','Entrer avant le NFP avec SL serre','Attendre apres le NFP pour entrer'], correct:1, explanation:'NFP = jour meme + premiere semaine. Meme un A+ ne justifie pas de trader dans ce contexte. PASS.' },
  { id:'q49g', concept:'position_sizing', branch:'risk', rank:'radiant', q:'Tu es en drawdown de -8% sur le mois. Tu vois un A+. Quel risk ?', options:['5% pour te refaire','0.10% — drawdown = reduction du risk, pas augmentation','1% maximum','PASS — en drawdown on ne trade pas'], correct:1, explanation:'En drawdown, on REDUIT le risk. 0.10-0.30% max. Le but est de survivre et retrouver la confiance, pas de se "refaire".' },

  // ===================== PSYCHOLOGY (35 questions) =====================
  { id:'q50', concept:'patience', branch:'psychology', rank:'iron', q:'Quelle est la regle #1 du trading selon 700S ?', options:['Gagner un maximum','Preserver le capital','Avoir raison','Trader tous les jours'], correct:1, explanation:'Preserver le capital = Regle #1. La survie est plus importante que les gains.' },
  { id:'q51', concept:'fomo', branch:'psychology', rank:'bronze', q:'Tu viens de rater un setup parfait qui explose. Que fais-tu ?', options:['Tu entres en retard quand meme','Tu doubles le risque sur le prochain','Tu passes. Tu attends le prochain setup A+ patiemment.','Tu changes de paire pour trouver un trade'], correct:2, explanation:'Pas de FOMO. Pas de revenge. Le marche donne des opportunites chaque jour.' },
  { id:'q52', concept:'error_logging', branch:'psychology', rank:'bronze', q:'Si tu fais la meme erreur 3 fois, que dois-tu faire ?', options:['Continuer et esperer que ca passe','STOP et relearn le concept de base','Augmenter le risque pour compenser','Changer de strategie'], correct:1, explanation:'Erreur repetee 3x = misconception fondamentale. STOP et reprendre les bases.' },
  { id:'q53', concept:'self_knowledge', branch:'psychology', rank:'silver', q:'Pourquoi 700S deconseille le CRT 4H aux debutants ?', options:['C\'est trop lent','Confiance = competence. Sans maitrise, les emotions dominent = pertes.','Le 4H n\'a pas assez de setups','C\'est reserve aux pros'], correct:1, explanation:'Trader sans maitrise = emotions = perte. Commencer Daily/Weekly, 50+ trades simules avant reel.' },
  { id:'q54', concept:'discipline', branch:'psychology', rank:'gold', q:'Quelles sont les 4 etapes du trade ideal dans l\'ordre ?', options:['Entry, SL, TP, Close','Planning, Waiting, Executing, Waiting','Analyse, Confirmation, Entry, Exit','Setup, Trigger, Entry, Management'], correct:1, explanation:'Planning > Waiting(1) > Executing > Waiting(2). La majorite du temps est dans l\'attente.' },
  { id:'q55', concept:'patience', branch:'psychology', rank:'gold', q:'Combien de temps passes-tu en mode "Waiting" dans les 4 etapes ?', options:['20% du temps','50% du temps','80%+ du temps','10% du temps'], correct:2, explanation:'80%+ du temps = attente. Planning + 2x Waiting dominent. L\'execution est breve.' },
  { id:'q56', concept:'fomo', branch:'psychology', rank:'platinum', q:'Tu viens de perdre 3 trades d\'affilee. Tu vois un setup B. Ton cerveau te dit "il faut te refaire". Que fais-tu ?', options:['Entrer pour compenser les pertes','STOP. Ferme les charts. Reviens demain.','Entrer avec un petit risque','Chercher un meilleur setup'], correct:1, explanation:'3 pertes + envie de se refaire = REVENGE TRADING. Ferme tout. Le marche sera la demain.' },
  { id:'q57', concept:'error_logging', branch:'psychology', rank:'platinum', q:'Quel est le but du journal de trading ?', options:['Calculer les profits','Identifier les patterns d\'erreurs recurrentes pour les eliminer','Impressionner les autres traders','Suivre les news'], correct:1, explanation:'Le journal sert a identifier et eliminer les erreurs recurrentes. C\'est un outil d\'apprentissage, pas de comptabilite.' },
  { id:'q58', concept:'self_knowledge', branch:'psychology', rank:'diamond', q:'Tu as une winrate de 65% mais tu perds de l\'argent. Quel est le probleme le plus probable ?', options:['Pas assez de trades','Mauvais RR — tes pertes sont plus grosses que tes gains','Le marche est contre toi','Malchance'], correct:1, explanation:'65% de winrate avec des pertes = RR mauvais. Si tu gagnes 65% mais que chaque perte = 2x chaque gain, tu perds.' },
  { id:'q59', concept:'discipline', branch:'psychology', rank:'diamond', q:'PIEGE : Tu as fait 5 trades gagnants d\'affilee. Tu te sens invincible. Un setup C+ apparait. Tu entres. Pourquoi est-ce une erreur ?', options:['C+ est acceptable apres une serie gagnante','L\'euphorie est aussi dangereuse que le tilt. C+ = gambling peu importe ton etat.','C\'etait le bon moment','Les series gagnantes durent longtemps'], correct:1, explanation:'L\'euphorie abaisse tes standards. Un C+ reste un C+ (0.50% max, voir PASS). Les regles ne changent pas avec tes emotions.' },
  { id:'q59a', concept:'patience', branch:'psychology', rank:'master', q:'On est mercredi, 0 trade cette semaine. Tous les setups etaient B ou moins. Tu es frustre. Que fais-tu ?', options:['Baisser tes standards a B+','0 trade en 3 jours = EXCELLENTE discipline. Continue d\'attendre.','Trader un autre actif','Changer de strategie'], correct:1, explanation:'0 trade = 0 perte. Le marche ne te doit rien. La patience EST le trade.' },
  { id:'q59b', concept:'fomo', branch:'psychology', rank:'master', q:'Un ami trader te montre un trade qui a fait +500%. Tu veux faire pareil. Analyse ce biais.', options:['C\'est de la motivation','SURVIVORSHIP BIAS + FOMO. Tu ne vois pas ses 50 trades perdants.','C\'est un bon objectif','Tu devrais copier sa strategie'], correct:1, explanation:'Survivorship bias : tu ne vois que les gagnants. Son winrate global est peut-etre de 30%. Et c\'est du FOMO pur.' },
  { id:'q59c', concept:'self_knowledge', branch:'psychology', rank:'radiant', q:'Tu realises que tu trades mieux le matin que l\'apres-midi. Que dois-tu faire ?', options:['Forcer le trading PM pour t\'ameliorer','Adapter ton plan : trader uniquement pendant tes heures optimales','Ca n\'a pas d\'importance','Prendre du cafe l\'apres-midi'], correct:1, explanation:'Self-Knowledge = adapter le systeme a TOI. Si tu performes mieux le matin, optimise ton plan autour de ca.' },

  { id:'q60', concept:'calendar', branch:'risk', rank:'bronze', q:'London Open correspond a quelles heures NY time ?', options:['6AM-9AM','2AM-5AM','9:30AM-11AM','12PM-3PM'], correct:1, explanation:'London Open = 02:00-05:00 NY time (08:00-11:00 Paris).' },
  { id:'q61', concept:'calendar', branch:'risk', rank:'silver', q:'NY Open correspond a quelles heures ?', options:['2AM-5AM NY','9:30AM-11:00AM NY','12PM-3PM NY','6AM-8AM NY'], correct:1, explanation:'NY Open = 09:30-11:00 NY time. Session majeure.' },
  { id:'q62', concept:'calendar', branch:'risk', rank:'silver', q:'NY PM session ?', options:['9:30-11AM','11AM-1PM','1:30PM-3PM NY','3PM-5PM'], correct:2, explanation:'NY PM = 13:30-15:00 NY time. Deuxieme fenetre d\'opportunite.' },
  { id:'q63', concept:'calendar', branch:'risk', rank:'gold', q:'Asian Range correspond a quelles heures NY ?', options:['6PM-2AM NY','8PM-4AM NY','10PM-6AM NY','2AM-8AM NY'], correct:0, explanation:'Asian range = 18:00-02:00 NY time. Range de reference pour les sessions suivantes.' },
  { id:'q64', concept:'calendar', branch:'risk', rank:'platinum', q:'TIMING : Il est 3h du matin heure NY. Quelle session est active ?', options:['Asian session','London Open','NY Open','Pas de session active'], correct:1, explanation:'3AM NY = London Open (02:00-05:00 NY). C\'est aussi dans les heures de purge HP (1AM-4AM).' },
  { id:'q65', concept:'calendar', branch:'risk', rank:'platinum', q:'Il est 3AM NY. Est-ce une heure de purge HP ?', options:['Non, les purges sont en NY session','OUI — 1AM-4AM NY est une fenetre de purge HP','Seulement certains jours','Uniquement pendant les news'], correct:1, explanation:'1AM-4AM NY = heures de purge HP. La liquidite de l\'Asian range est souvent purgee a ce moment.' },
  { id:'q66', concept:'calendar', branch:'risk', rank:'diamond', q:'Un vendredi 16h Paris (10AM NY). FOMC mercredi prochain. Weekly BTCUSD neutre. Daily range. 4H double purge potentiel. Tu as 2 trades ouverts. Decision ?', options:['Entrer un 3e trade','Fermer les 2 trades + ne pas entrer. Vendredi + 2 trades ouverts + semaine FOMC = trop de risk','Entrer si le double purge confirme','Garder les trades et ajouter'], correct:1, explanation:'Vendredi PM + FOMC semaine prochaine + deja 2 positions = overexposure. Securise ce que tu as.' },
  { id:'q67', concept:'calendar', branch:'risk', rank:'diamond', q:'Quel jour de la semaine est generalement le meilleur pour les setups CRT ?', options:['Lundi (debut de semaine)','Mardi-Mercredi (apres setup du lundi)','Jeudi-Vendredi (confirmation)','Tous les jours sont egaux'], correct:1, explanation:'Mardi-Mercredi = meilleurs jours. Le lundi etablit le range/piege, mardi-mercredi = expansion.' },

  { id:'ta1', concept:'model1', branch:'entries', rank:'gold', q:'ANALYSE : EURUSD Long. Lundi 14h Paris. Weekly haussier. Daily FVG. 4H Turtle Soup. Pas de DOL revisitee. RR 2.5:1. Verdict ?', options:['ENTRY — le setup est bon','PASS — la DOL n\'a pas ete revisitee','ENTRY — le FVG compense la DOL','Attendre 1h de plus'], correct:1, explanation:'Sans DOL revisitee, un des piliers manque. PASS. Meme avec tout le reste.' },
  { id:'ta2', concept:'grading', branch:'risk', rank:'platinum', q:'ANALYSE : BTCUSD Short. Mercredi 10AM NY. Monthly bearish. Weekly TS sur key level. Daily OB respecte. 4H MSS+OTE. RR 4:1. SMT BTC/ETH confirmee. Grade ?', options:['A','A+ — setup parfait sur tous les plans','B+ — le BTC est volatile','A+ mais risk 1% car crypto'], correct:1, explanation:'Monthly OK, Weekly TS OK, Daily OB OK, 4H MSS+OTE OK, SMT OK, RR 4:1 OK, timing OK. A+ textbook.' },
  { id:'ta3', concept:'model2', branch:'entries', rank:'diamond', q:'ANALYSE : GBPUSD Long. Jeudi 8AM NY. Weekly bullish. Daily en expansion haussiere. 4H retracement vers un FVG. RR 2.2:1. Mais tu vois que le DXY fait aussi un low (pas de SMT divergence). Probleme ?', options:['Aucun probleme','DXY et GBPUSD dans la meme direction = pas de SMT = conviction reduite','Le RR est suffisant','Le timing est bon'], correct:1, explanation:'GBP/USD Long = DXY devrait monter pour confirmer (correlation inverse). Si DXY baisse aussi, pas de divergence SMT = setup affaibli.' },
  { id:'ta4', concept:'model1', branch:'entries', rank:'master', q:'ANALYSE : GOLD Short. Vendredi 14h NY. Weekly neutre. Daily bearish. 4H Butterfly avec manipulation haute. RR 2.8:1. Pas de news. SILVER ne confirme pas (monte). Decision ?', options:['ENTRY — le pattern est beau','PASS — 1) Vendredi PM 2) Weekly neutre 3) SILVER divergence haussiere = 3 red flags','Entrer avec petit risk','Attendre lundi'], correct:1, explanation:'3 problemes : 1) Vendredi PM = bad timing, 2) Weekly neutre = pas de HTF, 3) Silver diverge = pas de SMT. PASS.' },
  { id:'ta5', concept:'rr_21', branch:'risk', rank:'platinum', q:'CALCUL : Entry 1.2500, SL 1.2530, TP 1.2440. RR = ?', options:['1:1','1.5:1','2:1','C\'est un short avec RR = 60/30 = 2:1'], correct:3, explanation:'C\'est un short : Risk = 1.2530 - 1.2500 = 30 pips. Reward = 1.2500 - 1.2440 = 60 pips. RR = 2:1. Acceptable.' },

  { id:'tc2', concept:'fomo', branch:'psychology', rank:'silver', q:'DIAGNOSTIC : Un trader voit EURUSD exploser de 80 pips. Il entre en retard. Il perd. Son erreur ?', options:['Mauvaise paire','FOMO — entrer apres l\'expansion = acheter le top de la manipulation','Mauvais timing','Il aurait du shorter'], correct:1, explanation:'Entrer apres un mouvement de 80 pips = FOMO classique. Le trade etait AVANT l\'explosion, pas apres.' },
  { id:'tc3', concept:'discipline', branch:'psychology', rank:'gold', q:'DIAGNOSTIC : Un trader gagne 3 trades, augmente son risk a 5% sur le 4e, et perd gros. Erreur ?', options:['Le 4e trade etait mauvais','Overconfidence — il a change ses regles de risk apres des gains','Le 5% etait justifie','Il aurait du mettre 10%'], correct:1, explanation:'Changer les regles de risk apres des gains = overconfidence = gambling. Les regles sont fixes.' },
  { id:'tc4', concept:'calendar', branch:'risk', rank:'gold', q:'DIAGNOSTIC : Un trader entre short GBPUSD 1h avant le NFP. Le trade part dans sa direction puis reverse violemment. Erreur ?', options:['Le setup etait bon','Trading avant news majeure — le mouvement pre-news etait une manipulation','Il fallait mettre un SL plus large','Le short etait correct'], correct:1, explanation:'Pre-news = manipulation pure. L\'algo nettoie les deux cotes avant l\'evenement. JAMAIS trader avant NFP/FOMC.' },
  { id:'tc5', concept:'model1', branch:'entries', rank:'platinum', q:'DIAGNOSTIC : Setup Model 1 valide. Tous les criteres. Mais le trader entre a la bougie de fermeture du 4H au lieu d\'attendre le CRT LTF. Resultat : SL touche. Erreur ?', options:['Le model 1 etait faux','Il est entre trop tot — sans confirmation LTF le CRT n\'est pas complete','Le SL etait mal place','Le HTF a change'], correct:1, explanation:'Entrer sur la bougie de confirmation HTF sans attendre le LTF CRT = entree prematuree. Le CRT LTF donne le timing precis.' },
  { id:'tc6', concept:'error_logging', branch:'psychology', rank:'platinum', q:'DIAGNOSTIC : Un trader fait la meme erreur (entrer sans DOL) pour la 4e fois en 2 semaines. Que doit-il faire ?', options:['Continuer — il finira par apprendre','STOP IMMEDIAT. Relearn la DOL. 0 trade reel tant que le concept n\'est pas maitrise.','Mettre un rappel','Trader des montants plus petits'], correct:1, explanation:'4x la meme erreur = le concept n\'est pas compris. STOP. Retour aux fondamentaux. 0 trade reel.' },

  { id:'td2', concept:'grading', branch:'risk', rank:'gold', q:'SITUATION : Setup B+ en formation. HTF bullish. Key level touche. DOL pas revisitee. Fin de session NY. Decision ?', options:['ENTRY — HTF bullish suffit','PASS — B+ sans DOL = C au mieux. Fin de session = mauvais timing.','Entrer avec risk minimal','Attendre 5 min'], correct:1, explanation:'B+ sans DOL = setup faible. Fin de session = pas de liquidite. PASS.' },
  { id:'td3', concept:'patience', branch:'psychology', rank:'platinum', q:'SITUATION : -3 trades consecutifs. Drawdown -2.5%. Setup A apparait. Decision ?', options:['PASS — en tilt, arrete la semaine','ENTRY — un A est un A','Moitie du risk habituel','Verifier ton etat mental d\'abord, puis decider'], correct:3, explanation:'Introspection d\'abord. Un A est valide MAIS en tilt, l\'execution sera mauvaise. Self-knowledge > setup.' },

  { id:'td5', concept:'discipline', branch:'psychology', rank:'diamond', q:'SITUATION : Tu as fait +5% cette semaine en 2 trades. C\'est mercredi. Un setup B apparait. Tu te dis "je suis en forme, je peux le prendre". Decision ?', options:['ENTRY — tu es confiant','PASS. Les regles ne changent pas avec ton PnL. B = 1% max ou PASS.','Entrer avec 0.50%','Prendre le trade mais couper tot'], correct:1, explanation:'L\'euphorie des gains ne change pas les regles. B = B, meme apres une semaine de +5%.' },

  { id:'tf1', concept:'htf_trend', branch:'htf', rank:'gold', q:'PIEGE : Le Daily est bullish avec 5 bougies vertes consecutives. Le Weekly est bearish. Tu dois trader dans quelle direction ?', options:['Long — le Daily est clairement bullish','SHORT — le Weekly (HTF) prime sur le Daily (LTF)','Neutre — contradiction','Long avec petit risk'], correct:1, explanation:'HTF > LTF. TOUJOURS. Le Weekly bearish = pas de longs. Les 5 bougies Daily vertes = potentielle manipulation.' },
  { id:'tf2', concept:'rr_21', branch:'risk', rank:'silver', q:'PIEGE : Ton setup a un RR de 1.9:1. C\'est presque 2:1. Tu entres ?', options:['Oui, 1.9 c\'est assez proche','NON. 2:1 minimum. 1.9 = PASS. Pas d\'approximation.','Oui si le setup est A+','Ca depend du contexte'], correct:1, explanation:'1.9:1 < 2:1 = PASS. La regle est non-negociable. Pas de "presque".' },
  { id:'tf3', concept:'turtle_soup', branch:'patterns', rank:'platinum', q:'PIEGE : Tu vois ce qui ressemble a un Turtle Soup. Le prix purge un equal low et remonte. Mais la remontee est faible (3-4 pips) et lente. C\'est un bon TS ?', options:['Oui, le low a ete purge','NON — un bon TS = reversal AGRESSIF et IMMEDIAT. 3-4 pips lents = pas de conviction','Oui avec un SL serre','Attendre 1 bougie de plus'], correct:1, explanation:'TS = reversal agressif et immediat apres la purge. Si le prix remonte faiblement, l\'algo n\'a pas fini = DANGER.' },
  { id:'tf4', concept:'position_sizing', branch:'risk', rank:'gold', q:'PIEGE : Tu as un setup A+ (risk max 5%). Tu mets 5% sur CHAQUE trade A+. C\'est correct ?', options:['Oui, A+ = 5%','NON — 5% est le MAXIMUM, pas la norme. Un debutant devrait etre a 1-3% meme sur A+','Oui si le capital le permet','5% est trop peu pour A+'], correct:1, explanation:'5% = maximum absolu, pas le standard. Un debutant sur A+ = 1-2%. Le 5% est pour les traders confirmes avec historique.' },
  { id:'tf5', concept:'dol', branch:'ltf', rank:'silver', q:'PIEGE : Le prix touche un key level que tu surveilles. Tu entres immediatement. Erreur ?', options:['Non, le key level est la','OUI — toucher un key level n\'est PAS un revisit de DOL. Il faut la reaction de l\'algo.','Non si le HTF confirme','Seulement si le timing est mauvais'], correct:1, explanation:'Toucher un niveau != DOL revisitee. La DOL = le prix va au niveau ET l\'algo reagit (absorption visible). Le touch seul ne suffit pas.' },
  { id:'tf6', concept:'smt', branch:'ltf', rank:'diamond', q:'PIEGE : Tu vois une divergence SMT entre EURUSD et GBPUSD. Les deux montent mais GBP monte plus fort. C\'est une SMT ?', options:['Oui — divergence de vitesse','NON — SMT = un monte et l\'autre descend (ou un fait un new high/low et l\'autre non). Monte plus/moins fort = correlation normale.','Oui, bearish signal','Neutre'], correct:1, explanation:'SMT = divergence de DIRECTION ou de structure (new high/low non confirme), pas de vitesse. Les deux qui montent = pas de SMT.' },
  { id:'tf7', concept:'model1', branch:'entries', rank:'master', q:'PIEGE : Tu as les 5 elements du Model 1 valides. Mais tu viens de perdre 5 trades. Un ami te dit "le systeme ne marche pas". Que reponds-tu ?', options:['Il a raison, je change','5 pertes avec un systeme a 55-60% de winrate = NORMAL. Ca fait partie des probabilites.','Je modifie les regles','Je prends une pause de 1 mois'], correct:1, explanation:'5 pertes consecutives avec 55% winrate = probabilite d\'environ 1.8%. Rare mais NORMAL. Le systeme fonctionne sur un large echantillon.' },
  { id:'tf8', concept:'calendar', branch:'risk', rank:'master', q:'PIEGE : C\'est la semaine 3 (highest probability). Tu vois plein de setups B et B+. Tu veux tous les prendre car "c\'est la meilleure semaine". Erreur ?', options:['Non, week 3 = fonce','OUI — week 3 = meilleurs setups mais les CRITERES ne changent pas. A+ et A uniquement.','Prendre les B+ seulement','Augmenter le risk car c\'est week 3'], correct:1, explanation:'Week 3 = plus de probabilites mais les regles de selection restent identiques. Ne pas baisser ses standards.' },
  { id:'tf9', concept:'discipline', branch:'psychology', rank:'radiant', q:'PIEGE ULTIME : Tu as un systeme qui te rapporte regulierement. Un "guru" sur YouTube presente une "meilleure" strategie. Tu es tente. Analyse.', options:['Tester la nouvelle strategie','GARDER TON SYSTEME. Le systeme se repete. Pas d\'excitation, pas de shiny object syndrome.','Combiner les deux','Demander l\'avis des autres'], correct:1, explanation:'Le systeme qui marche = le garder. Changer de strategie en etant profitable = l\'erreur #1 des traders. Discipline.' },

  { id:'qbb3', concept:'htf_trend', branch:'htf', rank:'gold', q:'Close BELOW previous low signifie quoi ?', options:['Reversal','Continuation baissiere','Manipulation','Expansion'], correct:1, explanation:'Close BELOW previous low = continuation baissiere. L\'algo confirme la direction sud.' },

  rank: 0, xp: 0, streak: 0, longestStreak: 0, lastActiveDate: null,

  dailyXpLog: [], sessionsLog: [],
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = { ...defaultState(), ...JSON.parse(raw) };
    // Migrate old belt field
    if (s.belt !== undefined && s.rank === 0 && s.belt > 0) { s.rank = s.belt; delete s.belt; }
    return s;
  } catch { return defaultState(); }
}

function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ============================================================
// UTILITY FUNCTIONS
// ============================================================

function getRank(xp) {
  let r = 0;
  for (let i = RANKS.length - 1; i >= 0; i--) { if (xp >= RANKS[i].xpRequired) { r = i; break; } }
  return r;
}

function getXpProgress(xp) {
  const r = getRank(xp);
  const cur = RANKS[r], next = RANKS[r + 1];
  if (!next) return { pct: 100, current: xp - cur.xpRequired, needed: 0 };
  const inRank = xp - cur.xpRequired, needed = next.xpRequired - cur.xpRequired;
  return { pct: Math.min(100, (inRank / needed) * 100), current: inRank, needed };
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function generateDailyMissions(state) {
  const r = getRank(state.xp);
  const today = todayStr();
  if (state.missionsDate === today && state.dailyMissions.length > 0) return state.dailyMissions;
  const branches = Object.keys(SKILL_BRANCHES);
  const weakBranches = [...branches].sort((a, b) => {
    const aS = SKILL_BRANCHES[a].concepts.reduce((s, c) => s + (state.skillLevels[c.id] || 0), 0);
    const bS = SKILL_BRANCHES[b].concepts.reduce((s, c) => s + (state.skillLevels[c.id] || 0), 0);
    return aS - bS;
  });
  return [
    { id:'m1_'+today, text:`Reussis ${5+r*2} quiz sur ${SKILL_BRANCHES[weakBranches[0]].name}`, type:'quiz', xp:15+r*5, completed:false, target:5+r*2, progress:0, branch:weakBranches[0] },
    { id:'m2_'+today, text:`Enchaine ${3+r} bonnes reponses d'affilee`, type:'streak_quiz', xp:20+r*5, completed:false, target:3+r, progress:0 },
    { id:'m3_'+today, text:`Atteins ${60+r*5}% sur un set de 10 quiz`, type:'score', xp:20+r*5, completed:false, target:60+r*5, progress:0 },
    { id:'m4_'+today, text:'Complete un scenario de trading', type:'scenario', xp:30+r*5, completed:false, target:1, progress:0 },
    { id:'m5_'+today, text:`Complete ${15+r*5} quiz au total aujourd'hui`, type:'total_quiz', xp:25+r*5, completed:false, target:15+r*5, progress:0 },
  ];
}

function ProgressRing({ radius, stroke, progress, color }) {
  const nr = radius - stroke * 2, c = nr * 2 * Math.PI;
  return (
    <svg height={radius*2} width={radius*2}>
      <circle stroke="#1E1E2E" fill="transparent" strokeWidth={stroke} r={nr} cx={radius} cy={radius} />
      <circle className="progress-ring-circle" stroke={color} fill="transparent" strokeWidth={stroke} strokeDasharray={c+' '+c} style={{strokeDashoffset:c-(progress/100)*c}} strokeLinecap="round" r={nr} cx={radius} cy={radius} transform={`rotate(-90 ${radius} ${radius})`} />
    </svg>
  );
}

function RankBadge({ rankIndex, size = 'md' }) {
  const rk = RANKS[rankIndex];
  const sizes = { sm:'w-7 h-7 text-xs', md:'w-10 h-10 text-sm', lg:'w-16 h-16 text-xl' };
  return (
    <div className={`${sizes[size]} rounded-lg flex items-center justify-center font-bold`} style={{ background: rk.color+'20', border:`2px solid ${rk.color}`, color: rk.color, boxShadow:`0 0 12px ${rk.color}30` }}>
      {rk.icon}
    </div>
  );
}

function StreakFlame({ streak }) {
  return (
    <div className="flex items-center gap-1">
      <span className="streak-flame" style={{fontSize: Math.min(20, 14 + streak * 0.3)}}>🔥</span>
      <span className="font-bold text-amber-400 text-sm">{streak}</span>
    </div>
  );
}

function XPBar({ xp }) {
  const r = getRank(xp);
  const { pct, current, needed } = getXpProgress(xp);
  const next = RANKS[r + 1];
  return (
    <div className="w-full">
      <div className="flex justify-between items-center mb-1">
        <span className="text-xs text-gray-400">{current} XP</span>
        {next && <span className="text-xs text-gray-500">{needed - current} XP pour {next.name}</span>}
      </div>
      <div className="h-2.5 bg-dojo-border rounded-full overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500" style={{ width:pct+'%', background:`linear-gradient(90deg, ${RANKS[r].color}80, ${RANKS[r].color})` }} />
      </div>
    </div>
  );
}

// --- QUIZ ENGINE ---
function QuizEngine({ state, setState, onBack, branch = null }) {
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [sessionCorrect, setSessionCorrect] = useState(0);
  const [sessionTotal, setSessionTotal] = useState(0);
  const [consecutiveCorrect, setConsecutiveCorrect] = useState(0);
  const [isFinished, setIsFinished] = useState(false);

  useEffect(() => {
    const rankIdx = getRank(state.xp);
    let pool = QUIZ_DB.filter(q => {
      const qRankIdx = RANKS.findIndex(r => r.id === q.rank);
      return qRankIdx <= rankIdx + 1;
    });
    if (branch) pool = pool.filter(q => q.branch === branch);

    pool.sort((a, b) => {
      const aS = state.conceptScores[a.concept], bS = state.conceptScores[b.concept];
      const aR = aS ? aS.correct/aS.total : 0.5, bR = bS ? bS.correct/bS.total : 0.5;
      return aR - bR;
    });

    const sel = [], pPool = pool.slice(0, Math.max(20, pool.length));
    while (sel.length < Math.min(10, pPool.length)) {
      const idx = Math.floor(Math.random() * pPool.length);
      if (!sel.find(q => q.id === pPool[idx].id)) sel.push(pPool[idx]);
    }
    setQuestions(sel);
  }, [branch]);

  const handleAnswer = (idx) => {
    if (showResult) return;
    setSelected(idx); setShowResult(true);
    const q = questions[currentQ];
    const isCorrect = idx === q.correct;
    const newCorrect = sessionCorrect + (isCorrect?1:0);
    const newConsecutive = isCorrect ? consecutiveCorrect+1 : 0;
    setSessionTotal(sessionTotal+1); setSessionCorrect(newCorrect); setConsecutiveCorrect(newConsecutive);

    const ns = { ...state };
    ns.totalQuizAnswered = (state.totalQuizAnswered||0) + 1;
    ns.totalCorrect = (state.totalCorrect||0) + (isCorrect?1:0);
    if (!ns.conceptScores[q.concept]) ns.conceptScores[q.concept] = {correct:0, total:0, lastSeen:Date.now()};
    ns.conceptScores[q.concept].total++;
    if (isCorrect) ns.conceptScores[q.concept].correct++;
    ns.conceptScores[q.concept].lastSeen = Date.now();
    if (isCorrect) ns.xp = (state.xp||0) + 5 + (newConsecutive>=3?5:0);

    const cs = ns.conceptScores[q.concept];
    if (cs.total >= 3) {
      const ratio = cs.correct/cs.total;
      const nl = ratio>=0.95?5:ratio>=0.85?4:ratio>=0.7?3:ratio>=0.5?2:ratio>=0.3?1:0;
      ns.skillLevels[q.concept] = Math.max(ns.skillLevels[q.concept]||0, nl);
    }

    const today = todayStr();
    if (ns.missionsDate === today) {
      ns.dailyMissions = ns.dailyMissions.map(m => {
        if (m.completed) return m;
        if (m.type==='quiz' && m.branch===q.branch) { const p=(m.progress||0)+(isCorrect?1:0); return {...m, progress:p, completed:p>=m.target}; }
        if (m.type==='total_quiz') { const p=(m.progress||0)+1; return {...m, progress:p, completed:p>=m.target}; }
        if (m.type==='streak_quiz') return {...m, progress:Math.max(m.progress||0, newConsecutive), completed:newConsecutive>=m.target};
        return m;
      });
      ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp+=m.xp; m.xpAwarded=true; } });
    }
    ns.rank = getRank(ns.xp);
    setState(ns); saveState(ns);
  };

  const nextQuestion = () => {
    if (currentQ+1 >= questions.length) {
      setIsFinished(true);
      const pct = Math.round(sessionCorrect/sessionTotal*100);
      const ns = {...state};
      if (ns.missionsDate===todayStr()) {
        ns.dailyMissions = ns.dailyMissions.map(m => {
          if (m.type==='score' && pct>=m.target && !m.completed) return {...m, progress:pct, completed:true};
          return m;
        });
        ns.dailyMissions.forEach(m => { if (m.completed && !m.xpAwarded) { ns.xp+=m.xp; m.xpAwarded=true; } });
        ns.rank = getRank(ns.xp);
        setState(ns); saveState(ns);
      }
      return;
    }
    setCurrentQ(currentQ+1); setSelected(null); setShowResult(false);
  };

  if (questions.length === 0) return <div className="text-center py-20 text-gray-400">Chargement...</div>;

  if (isFinished) {
    const pct = sessionTotal > 0 ? Math.round(sessionCorrect/sessionTotal*100) : 0;
    const grade = pct>=90?'A+':pct>=80?'A':pct>=70?'B+':pct>=60?'B':pct>=50?'C':'D';
    const gc = pct>=90?'#10B981':pct>=80?'#3B82F6':pct>=70?'#F59E0B':'#EF4444';
    return (
      <div className="animate-slide-up text-center py-10">
        <div className="relative inline-block mb-6">
          <ProgressRing radius={60} stroke={6} progress={pct} color={gc} />
          <div className="absolute inset-0 flex items-center justify-center"><span className="text-3xl font-bold" style={{color:gc}}>{grade}</span></div>
        </div>
        <h2 className="text-2xl font-bold text-white mb-2">{pct}%</h2>
        <p className="text-gray-400 mb-1">{sessionCorrect}/{sessionTotal} bonnes reponses</p>
        <p className="text-sm text-gray-500 mb-8">{pct>=80?'Solide.':pct>=60?'Pas mal, mais tu peux mieux.':'Revois les bases.'}</p>
        <div className="flex gap-3 justify-center">
          <button onClick={()=>window.location.reload()} className="px-6 py-3 bg-amber-500/20 text-amber-400 rounded-lg font-medium hover:bg-amber-500/30">Recommencer</button>
          <button onClick={onBack} className="px-6 py-3 bg-dojo-border text-gray-300 rounded-lg font-medium hover:bg-dojo-hover">Retour</button>
        </div>
      </div>
    );
  }

  const q = questions[currentQ];
  return (
    <div className="animate-fade-in">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-amber-500 rounded-full transition-all" style={{width:((currentQ+1)/questions.length*100)+'%'}} />
        </div>
        <span className="text-xs text-gray-500 font-mono">{currentQ+1}/{questions.length}</span>
        <span className="text-xs text-emerald-400 font-mono">{sessionCorrect}\u2713</span>
      </div>
      {consecutiveCorrect >= 3 && <div className="text-center mb-3 text-amber-400 text-sm font-medium animate-fade-in">🔥 Streak x{consecutiveCorrect} — +5 XP bonus !</div>}
      <div className="dojo-card p-6 mb-4">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:SKILL_BRANCHES[q.branch]?.color+'20', color:SKILL_BRANCHES[q.branch]?.color}}>{SKILL_BRANCHES[q.branch]?.name}</span>
          <span className="text-xs text-gray-600">\u00B7</span>
          <span className="text-xs text-gray-500 capitalize">{q.rank}</span>
        </div>
        <p className="text-white text-lg font-medium leading-relaxed">{q.q}</p>
      </div>
      <div className="space-y-2 mb-4">
        {q.options.map((opt, i) => {
          let cl = 'quiz-option dojo-card p-4';
          if (showResult) { if (i===q.correct) cl+=' correct'; else if (i===selected) cl+=' wrong'; }
          else if (i===selected) cl+=' selected';
          return (
            <div key={i} className={cl} onClick={()=>handleAnswer(i)}>
              <div className="flex items-start gap-3">
                <div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${showResult&&i===q.correct?'bg-emerald-500/30 text-emerald-400':showResult&&i===selected?'bg-red-500/30 text-red-400':'bg-dojo-border text-gray-400'}`}>{String.fromCharCode(65+i)}</div>
                <span className="text-sm text-gray-200">{opt}</span>
              </div>
            </div>
          );
        })}
      </div>
      {showResult && (
        <div className={`animate-slide-up dojo-card p-4 mb-4 ${selected===q.correct?'border-emerald-500/30':'border-red-500/30'}`}>
          <p className={`text-sm font-medium mb-1 ${selected===q.correct?'text-emerald-400':'text-red-400'}`}>{selected===q.correct?'\u2713 Correct !':'\u2717 Incorrect'}</p>
          <p className="text-sm text-gray-300">{q.explanation}</p>
        </div>
      )}
      {showResult && (
        <button onClick={nextQuestion} className="w-full py-3 bg-amber-500/20 text-amber-400 rounded-lg font-medium hover:bg-amber-500/30 animate-fade-in">
          {currentQ+1>=questions.length?'Voir les resultats':'Question suivante \u2192'}
        </button>
      )}
    </div>
  );
}

// --- SCENARIO ENGINE ---
function ScenarioEngine({ state, setState, onBack }) {
  const [cs, setCs] = useState(null);
  const [step, setStep] = useState(0);
  const [sel, setSel] = useState(null);
  const [showFb, setShowFb] = useState(false);
  const [score, setScore] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);

  const r = getRank(state.xp);
  const available = SCENARIOS_DB.filter(s => { const ri = RANKS.findIndex(rk=>rk.id===s.rank); return ri<=r+1; });

  if (!cs) {
    return (
      <div className="animate-fade-in">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={onBack} className="text-gray-400 hover:text-white">\u2190</button>
          <h2 className="text-xl font-bold text-white">Scenarios de Trading</h2>
        </div>
        <div className="space-y-3">
          {available.map(s => {
            const d = state.completedScenarios[s.id];
            const ri = RANKS.findIndex(rk=>rk.id===s.rank);
            return (
              <div key={s.id} className="dojo-card p-5 cursor-pointer hover:border-cyan-500/30 transition-all" onClick={()=>setCs(s)}>
                <div className="flex items-center justify-between">
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-white font-semibold">{s.title}</span>
                      {d && <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">\u2713</span>}
                    </div>
                    <p className="text-sm text-gray-400">{s.steps.length} etapes · +{s.xpReward} XP</p>
                  </div>
                  <span className="text-xs px-2 py-1 rounded capitalize" style={{background:RANKS[ri].color+'20', color:RANKS[ri].color}}>{s.rank}</span>
                </div>
                <p className="text-xs text-gray-500 mt-2">{s.context.substring(0,120)}...</p>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if (done) {
    const pct = Math.round(score/cs.steps.length*100);
    return (
      <div className="animate-slide-up text-center py-10">
        <h2 className="text-2xl font-bold text-white mb-2">{cs.title}</h2>
        <p className="text-4xl font-bold mb-2" style={{color:pct>=75?'#10B981':pct>=50?'#F59E0B':'#EF4444'}}>{pct}%</p>
        <p className="text-gray-400 mb-6">{score}/{cs.steps.length} decisions correctes</p>
        <button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);setDone(false);}} className="px-6 py-3 bg-dojo-border text-gray-300 rounded-lg font-medium hover:bg-dojo-hover">Retour</button>
      </div>
    );
  }

  const st = cs.steps[step];
  const handleStepAnswer = (idx) => {
    if (showFb) return;
    setSel(idx); setShowFb(true);
    const ok = idx===st.correct;
    if (ok) setScore(score+1);
    setAnswers([...answers, {step, selected:idx, correct:st.correct, isCorrect:ok}]);
    if (ok) { const ns={...state, xp:state.xp+10}; ns.rank=getRank(ns.xp); setState(ns); saveState(ns); }
  };

  const nextStep = () => {
    if (step+1>=cs.steps.length) {
      const ns = {...state};
      ns.completedScenarios[cs.id] = {score, date:todayStr(), answers};
      ns.xp += cs.xpReward; ns.rank=getRank(ns.xp);
      if (ns.missionsDate===todayStr()) {
        ns.dailyMissions = ns.dailyMissions.map(m => m.type==='scenario'&&!m.completed?{...m,progress:1,completed:true}:m);
        ns.dailyMissions.forEach(m => { if (m.completed&&!m.xpAwarded) { ns.xp+=m.xp; m.xpAwarded=true; } });
      }
      setState(ns); saveState(ns); setDone(true); return;
    }
    setStep(step+1); setSel(null); setShowFb(false);
  };

  return (
    <div className="animate-fade-in">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={()=>{setCs(null);setStep(0);setSel(null);setShowFb(false);setScore(0);setAnswers([]);}} className="text-gray-400 hover:text-white">\u2190</button>
        <div className="flex-1 h-1.5 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full bg-cyan-500 rounded-full transition-all" style={{width:((step+1)/cs.steps.length*100)+'%'}} />
        </div>
        <span className="text-xs text-gray-500 font-mono">Etape {step+1}/{cs.steps.length}</span>
      </div>
      {step===0 && !showFb && (
        <div className="dojo-card p-4 mb-4 border-cyan-500/20">
          <p className="text-xs text-cyan-400 font-medium mb-1">CONTEXTE</p>
          <p className="text-sm text-gray-300 leading-relaxed">{cs.context}</p>
        </div>
      )}
      <div className="dojo-card p-5 mb-4"><p className="text-white font-medium leading-relaxed">{st.q}</p></div>
      <div className="space-y-2 mb-4">
        {st.options.map((opt, i) => {
          let cl = 'quiz-option dojo-card p-4';
          if (showFb) { if (i===st.correct) cl+=' correct'; else if (i===sel) cl+=' wrong'; }
          return <div key={i} className={cl} onClick={()=>handleStepAnswer(i)}><span className="text-sm text-gray-200">{opt}</span></div>;
        })}
      </div>
      {showFb && (
        <>
          <div className={`animate-slide-up dojo-card p-4 mb-4 ${sel===st.correct?'border-emerald-500/30':'border-red-500/30'}`}>
            <p className={`text-sm ${sel===st.correct?'text-emerald-400':'text-red-400'}`}>{st.feedback}</p>
          </div>
          <button onClick={nextStep} className="w-full py-3 bg-cyan-500/20 text-cyan-400 rounded-lg font-medium hover:bg-cyan-500/30">
            {step+1>=cs.steps.length?'Voir les resultats':'Etape suivante \u2192'}
          </button>
        </>
      )}
    </div>
  );
}

// --- 30-DAY CHALLENGE ---
function Challenge30({ state, setState }) {
  const startChallenge = () => { const ns={...state, challengeStartDate:todayStr(), challengeDay:1, challengeCompleted:{}}; setState(ns); saveState(ns); };
  const challengeActive = state.challengeStartDate != null;
  const challengeDay = challengeActive ? Math.min(30, Math.floor((Date.now()-new Date(state.challengeStartDate).getTime())/86400000)+1) : 0;

  const toggleObjective = (day, objIdx) => {
    const ns = {...state};
    const key = 'day_'+day;
    if (!ns.challengeCompleted[key]) ns.challengeCompleted[key] = {completed:false, date:todayStr(), objectives:[]};
    const objs = [...(ns.challengeCompleted[key].objectives||[])];
    objs[objIdx] = !objs[objIdx];
    ns.challengeCompleted[key].objectives = objs;
    const dayData = CHALLENGE_30[day-1];
    const allDone = dayData.objectives.every((_,i)=>objs[i]);
    ns.challengeCompleted[key].completed = allDone;
    if (allDone && !ns.challengeCompleted[key].xpAwarded) { ns.xp+=dayData.xp; ns.challengeCompleted[key].xpAwarded=true; ns.rank=getRank(ns.xp); }
    setState(ns); saveState(ns);
  };

  if (!challengeActive) {
    return (
      <div className="animate-fade-in text-center py-16">
        <span className="text-6xl block mb-6">🏆</span>
        <h2 className="text-3xl font-bold text-white mb-3">30-Day Challenge</h2>
        <p className="text-gray-400 max-w-md mx-auto mb-2">30 jours pour passer de debutant a trader discipline.</p>
        <p className="text-amber-400 text-sm mb-8">Tu t'engages. Pas d'excuses.</p>
        <button onClick={startChallenge} className="px-8 py-4 bg-gradient-to-r from-amber-500 to-amber-600 text-black font-bold rounded-xl text-lg hover:from-amber-400 hover:to-amber-500 transition-all">Commencer le Challenge</button>
      </div>
    );
  }

  const weekColors = ['#8B5CF6','#06B6D4','#F59E0B','#EF4444'];
  const weekNames = ['Fondations','Repetition','Precision','Transition'];

  return (
    <div className="animate-fade-in space-y-6">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-white">30-Day Challenge</h2>
        <div className="flex items-center gap-2">
          <span className="text-amber-400 font-bold text-lg">Jour {challengeDay}/30</span>
          <StreakFlame streak={state.streak} />
        </div>
      </div>
      <div className="dojo-card p-4">
        <div className="h-3 bg-dojo-border rounded-full overflow-hidden">
          <div className="h-full rounded-full bg-gradient-to-r from-purple-500 via-cyan-500 to-red-500 transition-all duration-500" style={{width:(challengeDay/30*100)+'%'}} />
        </div>
        <div className="flex justify-between mt-2">
          {weekNames.map((w,i)=><span key={i} className="text-xs" style={{color:weekColors[i]}}>S{i+1}</span>)}
        </div>
      </div>
      {[1,2,3,4].map(week=>(
        <div key={week}>
          <h3 className="text-sm font-medium mb-3" style={{color:weekColors[week-1]}}>SEMAINE {week} — {weekNames[week-1].toUpperCase()}</h3>
          <div className="space-y-2">
            {CHALLENGE_30.filter(d=>d.week===week).map(day=>{
              const key='day_'+day.day, data=state.challengeCompleted[key]||{objectives:[]};
              const isCurrent=day.day===challengeDay, isPast=day.day<challengeDay, isFuture=day.day>challengeDay, isComplete=data.completed;
              return (
                <div key={day.day} className={`dojo-card p-4 ${isCurrent?'border-amber-500/40':''} ${isFuture?'opacity-50':''}`}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isComplete?'bg-emerald-500/20 text-emerald-400':isCurrent?'bg-amber-500/20 text-amber-400':'bg-dojo-border text-gray-500'}`}>{isComplete?'\u2713':day.day}</div>
                      <span className={`font-medium text-sm ${isCurrent?'text-white':'text-gray-400'}`}>{day.title}</span>
                    </div>
                    <span className="text-xs font-mono text-amber-400/50">+{day.xp} XP</span>
                  </div>
                  {(isCurrent||isPast)&&(
                    <div className="space-y-1.5 ml-9">
                      {day.objectives.map((obj,i)=>{
                        const dn=data.objectives[i];
                        return (
                          <div key={i} className="flex items-center gap-2 cursor-pointer" onClick={()=>!isFuture&&toggleObjective(day.day,i)}>
                            <div className={`w-4 h-4 rounded border flex items-center justify-center text-xs ${dn?'bg-emerald-500/20 border-emerald-500 text-emerald-400':'border-gray-600'}`}>{dn?'\u2713':''}</div>
                            <span className={`text-xs ${dn?'text-gray-500 line-through':'text-gray-300'}`}>{obj}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// --- ANALYTICS ---
function Analytics({ state, setState }) {
  const branches = Object.entries(SKILL_BRANCHES);
  const branchScores = branches.map(([key, branch]) => {
    const scores = branch.concepts.map(c => { const s=state.conceptScores[c.id]; return (!s||s.total===0)?0:s.correct/s.total*100; });
    return { key, name:branch.name, icon:branch.icon, color:branch.color, avg:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) };
  });

  const allConcepts = Object.entries(SKILL_BRANCHES).flatMap(([bK,b])=>b.concepts.map(c=>({...c, branch:bK, branchName:b.name, branchColor:b.color})));
  const weakConcepts = allConcepts.map(c=>{const s=state.conceptScores[c.id]; return {...c, accuracy:s&&s.total>0?s.correct/s.total*100:-1, total:s?.total||0};}).filter(c=>c.total>0).sort((a,b)=>a.accuracy-b.accuracy).slice(0,5);

  const handleCSVImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const lines = ev.target.result.split('\n');
        const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
        const trades = lines.slice(1).filter(l=>l.trim()).map(line=>{const vals=line.split(','); const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]?.trim()); return obj;});
        const ns = {...state, trades:[...state.trades,...trades]}; setState(ns); saveState(ns);
      } catch(err) { console.error(err); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="animate-fade-in space-y-6">
      <h2 className="text-xl font-bold text-white">Analytics</h2>
      <div className="grid gap-3" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
        <div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-amber-400">{state.totalQuizAnswered}</p><p className="text-xs text-gray-500">Quiz repondus</p></div>
        <div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-emerald-400">{state.totalQuizAnswered>0?Math.round(state.totalCorrect/state.totalQuizAnswered*100):0}%</p><p className="text-xs text-gray-500">Precision</p></div>
        <div className="dojo-card p-4 text-center"><p className="text-2xl font-bold text-purple-400">{Object.values(state.skillLevels).filter(l=>l>=3).length}</p><p className="text-xs text-gray-500">Concepts maitrises</p></div>
      </div>

      <div className="dojo-card p-5">
        <h3 className="text-sm text-gray-400 font-medium mb-4">FORCES & FAIBLESSES</h3>
        <div className="space-y-3">
          {branchScores.map(b=>(
            <div key={b.key}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-sm text-gray-300">{b.icon} {b.name}</span>
                <span className="text-sm font-mono" style={{color:b.avg>=80?'#10B981':b.avg>=60?'#F59E0B':b.avg>0?'#EF4444':'#4B5563'}}>{b.avg}%</span>
              </div>
              <div className="h-2 bg-dojo-border rounded-full overflow-hidden"><div className="h-full rounded-full transition-all" style={{width:b.avg+'%',background:b.color}} /></div>
            </div>
          ))}
        </div>
      </div>

      {weakConcepts.length>0 && (
        <div className="dojo-card p-5">
          <h3 className="text-sm text-gray-400 font-medium mb-3">POINTS FAIBLES A TRAVAILLER</h3>
          <div className="space-y-2">
            {weakConcepts.map(c=>(
              <div key={c.id} className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full" style={{background:c.branchColor}} />
                  <span className="text-sm text-gray-300">{c.name}</span>
                  <span className="text-xs text-gray-600">{c.branchName}</span>
                </div>
                <span className="text-sm font-mono text-red-400">{Math.round(c.accuracy)}% ({c.total})</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="dojo-card p-5">
        <h3 className="text-sm text-gray-400 font-medium mb-3">IMPORT TRADEZELLA</h3>
        <p className="text-xs text-gray-500 mb-3">Importe tes trades CSV pour les scorer CRT x ICT</p>
        <label className="inline-block px-4 py-2 bg-dojo-border text-gray-300 rounded-lg cursor-pointer hover:bg-dojo-hover text-sm">
          Importer CSV <input type="file" accept=".csv" className="hidden" onChange={handleCSVImport} />
        </label>
        {state.trades.length>0 && <p className="text-xs text-emerald-400 mt-2">{state.trades.length} trades importes</p>}
      </div>

      <div className="dojo-card p-5">
        <h3 className="text-sm text-gray-400 font-medium mb-3">REFERENCE RAPIDE</h3>
        <div className="space-y-2 text-xs text-gray-400">
          <p><span className="text-amber-400">Killzones :</span> London 02:00-05:00 NY | NY Open 09:30-11:00 | NY PM 13:30-15:00 | Asian 18:00-02:00</p>
          <p><span className="text-amber-400">Purge HP :</span> 1AM-4AM et 8AM-11AM NY</p>
          <p><span className="text-amber-400">Grading :</span> A+ (5%) | A (3%) | B+ (2%) | B (1%) | C+ (0.50%) | C (0.30%)</p>
          <p><span className="text-amber-400">Risk :</span> Debutant 0.10-0.30% | Modere 0.30-0.60% | Haut 0.60-1% MAX</p>
          <p><span className="text-amber-400">SMT :</span> EU-DXY/GU | NQ-ES-YM | BTC-ETH | GOLD-SILVER</p>
          <p><span className="text-amber-400">Week 3</span> = highest probability</p>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [state, setState] = useState(loadState);
  const [page, setPage] = useState('dashboard');
  const [subPage, setSubPage] = useState(null);

  useEffect(() => {
    const today = todayStr();
    if (state.missionsDate !== today || state.dailyMissions.length === 0) {
      const ns = {...state};
      if (state.lastActiveDate) {
        const y = new Date(); y.setDate(y.getDate()-1);
        ns.streak = state.lastActiveDate === y.toISOString().split('T')[0] ? (state.streak||0)+1 : state.lastActiveDate===today ? state.streak : 1;
      } else { ns.streak = 1; }
      ns.lastActiveDate = today;
      ns.longestStreak = Math.max(ns.streak, state.longestStreak||0);
      ns.dailyMissions = generateDailyMissions(ns);
      ns.missionsDate = today;
      setState(ns); saveState(ns);
    }
  }, []);

  const r = getRank(state.xp);
  const rk = RANKS[r];

  const pages = [
    {id:'dashboard', label:'Home', icon:'\u2B21'},
    {id:'dojo', label:'Dojo', icon:'\u26A1'},
    {id:'skills', label:'Skills', icon:'\uD83C\uDF33'},
    {id:'challenge', label:'30 Days', icon:'\uD83C\uDFC6'},
    {id:'analytics', label:'Stats', icon:'\uD83D\uDCCA'},
  ];

  return (
    <div className="min-h-screen bg-dojo">
      <div className="sticky top-0 z-50 bg-dojo/90 backdrop-blur-md border-b border-dojo-border">
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <span className="text-lg font-bold" style={{color:rk.color}}>700S</span>
              <span className="text-lg font-bold text-white">DOJO</span>
            </div>
            <div className="flex items-center gap-4">
              <StreakFlame streak={state.streak} />
              <RankBadge rankIndex={r} size="sm" />
              <span className="text-xs font-mono text-amber-400">{state.xp} XP</span>
            </div>
          </div>
          <div className="flex gap-1 mt-2 nav-scroll -mx-4 px-4">
            {pages.map(p=>(
              <button key={p.id} className={`nav-item px-3 py-1.5 text-sm font-medium whitespace-nowrap ${page===p.id?'active text-amber-400':'text-gray-500'}`} onClick={()=>{setPage(p.id);setSubPage(null);}}>
                <span className="mr-1">{p.icon}</span>{p.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 py-6">
        {page==='dashboard' && <Dashboard state={state} setState={setState} setPage={setPage} setSubPage={setSubPage} />}
        {page==='dojo' && <DojoPage state={state} setState={setState} subPage={subPage} setSubPage={setSubPage} />}
        {page==='skills' && <SkillTree state={state} />}
        {page==='challenge' && <Challenge30 state={state} setState={setState} />}
        {page==='analytics' && <Analytics state={state} setState={setState} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
